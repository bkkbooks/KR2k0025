body:
  text: 延祐四明志卷二十元袁桷撰集古考詩歸四明詩胡幽貞海色連四明扁舟去容易天籍豈輒問不是卑朝士憶四明山泉施肩吾愛彼山中石泉水幽聲夜落虛窗裏至今憶得卧雲時猶自涓涓在人耳寄四明山子髙棲只在千峯裏塵世望君那得知長憶去年風雨夜向君窗下聽猿時同諸隱者夜登四明山半夜尋幽上四明手攀松桂觸雲行相呼已到無人境何處玉簫吹一聲宿四明山梨洲老人命余宿杳然髙頂浮雲平下視不知幾千仭欲曉不曉天雞聲遊太平山孔稚圭石險天貌分林交日容闕隂澗落春榮寒巖留夏雪戲贈育王虛白老王安石白雲山頂病禪師昔日公卿各贈詩行盡四方年八十却歸荒寺有誰知觀明州圖明州城郭畫中傳尚記西亭一艤船投老心情非復昔當時山水故依然遊天童溪上溪水清漣樹老蒼行穿溪樹踏春陽溪深樹密無人處惟有幽花度水香鄞縣西亭收功無路去無田竊食窮城度兩年更作世間兒女態亂栽花竹養風煙寄育王大覺禪師山木悲鳴水怒流百蟲專夜思髙秋道人方丈應無夢想復長吟擬慧休别鄞女年登三十已衰翁滿眼離傷秪自攻今夜扁舟來訣汝死生從此各西東題寶岩寺寒碧亭兩岸青山刻峭成一溪回曲篆紋平緑隂隱隱無重數欲去黃鸝又一聲又風吹洞口雲水動山頭月野老時問人前村多少雪送竇公持鄞江尉范仲淹片帆飛去若輕鴻一霎春潮過浙東王謝江山久蕭索子真今為起清風送丁司理赴明州仙家枝葉令威孫南去司刑庇越民金闕道書微旨在獄多隂德是真人道書謂升真者皆須曽為獄官送湛公歸四明講席滿面南風指四明山長水曲不勝情自言此去雲林下惟講華嚴報太平遊翠巖山舒亶桃源深處一招提門對寒雲路繞溪長使千峯光景動未應洞裏老金雞遊大梅護聖萬壑聲中柏子煙髙僧日日看雲眠當年象虎今何在千古寒堂一鐵鞭仙去人間地轉靈蛟龍合處谷風生誰知雲霧千峯頂長作青天霹靂聲流水山間無盡時登臨到處與心期世人只愛桃源好梅熟山間怎得知雞犬同時亦上升赤霄今日幾人行我來正唱升平曲不用山間變姓名遊灌頂三首十里曽聞一嘯聲當年猿鶴想猶驚白雲不礙青天路贏得重來擺手行萬松偃蹇插雲根四靣諸峯盡子孫日日飛煙雲霧斂不妨掌上看乾坤雪頂神僧眼覷天只應風月是生緣那知坐作人間雨千丈巖頭一道泉歸郡書金峨二首叱吒滄溟雪浪空鯨鯢騎去杳無蹤錬丹井畔春蕭索知在蓬萊第幾重又入西湖醉過春嶺頭猿鶴幾時聞無端雨意催人去直恐衣巾盡是雲含珠林萬箇松杉一顆珠老僧心手最工夫冷光長在千峯頂誰道人間夜月孤題天王院內鑑堂等是人間出世人數他珍寶信非真茫茫白日誰回首此處元無一點塵福勝院蒼巖赤壁聳﨑􅋂長者何年為布金却憶樵風生乳竇萬松回合兩龍吟湖心寺偶書吹落清香縹眇風樓臺髣佛水邊紅人間誰是丹青手畫取春湖細雨中題竇林院瓊闍黎房山農未用踏溝車一穴靈泉蔭萬家香積從今飽檀施會看講夜落天花題法喜院是院一瓦一木皆自能師手而師丈室唯布衾木枕無復長物即之坐龎眉皓頂泊然似不能言者無乃真有道者耶抱山重屋兩回廊杉檜如雲百尺長香火他年誰第一老師辛苦頂如霜了無情解作攀緣一鉢三衣只兀然坐對青山不知老學人休問祖師禪太白峯千峯下視盡兒孫仙事寥寥不可聞長作人間三月雨請看膚寸嶺頭雲太白庵何年杖錫此徘徊天上真官為我來芝圃鶴歸香火冷石臺空鎖舊莓苔玲瓏岩詭形迥與萬山殊空洞由來一物無直恐虛心自天意人間穿鑿枉工夫響石淵明休弄沒絃琴混沌中含太古音聞説幾回風雨夜四山彈作老龍吟龍池虛蹤聊寄數峯雲雨意含雲白晝昏不用髙僧時呪鉢一泓長貯萬家村虎跑泉一嘯風從空谷生直教平地作滄溟靈山不與江心比誰會茶仙補水經佛迹蒼崖絶壁印苔䀶陳迹千年尚似新杖屨紛紛走南北幾人不是刻舟人臨雲閣髙僧終日笑憑欄亦似無心懶出山幾度海風吹雨散坐看綵翠落人間春樂軒隔水岩花紅淺深花邊相對語幽禽管絃不到山間耳誰會憑欄此日心題宿鷺亭雲過千溪月上時雪蘆霜葦冷相依正緣野性如僧癖肯為遊魚下釣磯次韻昌國文饒陳瓘百川衮衮到來休此是人間第一流鯨鬛為君駭翻浪蘭苕空自滿汀洲海邦渺渺知何在風入髙帆頃刻過何似一尊湖上酒月明安穩照寒波文饒自京師還欲往昌國而風作不可渡絶句戲之欲衝髙浪却沉吟酒近瀛洲懶得斟莫道顛風無好意為君吹過逺歸心對酒憶賀監并序李白太子賔客公於長安紫極宮一見余呼余為謫仙人因解金龜換酒為樂殁後對酒悵然有懷而作是詩四明有狂客風流賀季真長安一相見呼我謫仙人昔好杯中物翻為松下塵金魚換酒處却憶淚沾巾狂客歸四明山隂道士迎敕賜鏡湖水為君臺沼榮人亡餘故宅空有荷花生念此杳如夢凄然傷我情衆樂亭王安石使君幕府開東部名髙海曲人知慕艤船談笑政績成洗滌山川作佳趣平泉浩浩銀河注想見明星弄機杼載沙築成天上路投虹為橋取孤嶼掃除荆棘水中央碧瓦朱甍隨指顧春風滿城金板舫來看置酒新亭上百女吹笙綵鳳悲一夫伐鼓靈鼉壯安期羡門相與遊方丈蓬萊不更求酒酣忽跨鯨魚去陳迹空令此地留悼四明杜醇杜生四五十孝友稱鄉里隱約不外求耕桑有妻子藜杖牧雞豚筠筒釣魴鯉嵗時沽酒歸亦不乏甘旨天涯一杯飯夙昔相逢喜談辭足詩書篇詠又清泚都城問越客安否常在耳日月未渠央如何棄豫死古風久凋零好學少為已悲哉四明山此士今已矣憶鄞縣東吳太白山水孤城回首距幾何憶得好處長經過最思東山春樹靄更憶東湖秋水波三年飄忽如夢寐萬事感激徒悲歌應須飲酒不復道今夜江頭明月多書會别亭西城路居人送客西歸處年年借問去何時今日扁舟從此去春風吹花落髙枝飛來飛去不自知路上行人亦如此應有重來此處時寄育王山長老常坦道人少賈海上遊海舶破散身波浮抱金滿篋人所寄吹簸偶得還中州羸身歸來不受報秪取斗酒相獻酬歡娛慈母終一世脫棄妻子藏嵓幽蒼煙寥寥池水漫白玉菡萏吹髙秋夜燃柏子煮山藥憶此東望無時休塞垣春枯積雪留沙礫感怒黃雲愁五更匹馬隨鴈起想見郊郭花木稠百年誇奪終一丘世間滿眼真悠悠寄聲萬里心綢繆莫道異趣無相求送豐稷曽子固桃花染破南山青漢江此時春水生客舟相語人夜起徑櫓亂江羣鴈聲知君飄泊動歸思告我舉裝千里行閎材壯思風雨發緑鬢少年氷雪清讀書一見若經誦下筆千言能立成精微自得有天質操行秀出存鄉評嗟徒薄祿困流滯能誘鄙俗銷紛爭絃歌躬勸士強學田里堵安人力耕嗟豫據桉但畫諾遇事縮手方蒙成雖知璞玉難強獻欲挂塵榻空含情嵗寒不變乃知確物理先否終當亨維舟且盡今日語明日帆隨白鳥輕和馬粹老修廣德湖舒亶古作重慮始功利故能永末俗分錐刀往往附光影此幾百嵗餘興廢屢動靜七鄉十萬家利害寄俄頃譸張好惡曹聒亂劇池黽使君武陵孫明潔水中荇坐嘯黃堂春獨得意外景登臨莽蕪沒歎息民不幸一日山水光蕩漾出荒梗黍禾雜菰魚狼籍被他境人指白鶴祠殷勤竊有請衣冠儼郡公一一畫真鯁斯人豈可作庶用薦遺秉公乎且勿去何以慰鄉井願屬丹青手千載共觀省題它山善政侯兼簡鄞令嗚呼王封君心事鬼出沒驅山截長江化作雲水窟旱火六月天萬棟挂龍骨蕭條一祠宇像設何髣佛破屋夜見星漏雨濕衫笏杯酒謝車篝兹事恐亦忽我聞古先王報施必稱物矧今崇佛宮民力殆欲屈豈無制作手一為起荒茀李侯仁賢資撫字良矻矻可但清似氷方看健如鶻沉迹千載後行且見披拂隂功世易忘逺慮俗多咈勉哉君毋遲斯民久已鬱題放生池南州幾萬家舟楫江湖上􅊻羅竭魚鱉旁饜口腹養可憐長者子於此事脫放藻荇被清流春風不驚浪直鈎亦何心明珠豈所望落日倚朱欄無言獨惆悵題水月橋長空瑩如磨平湖淨無滓萬里夜寥寥清光墮寒水松風吹更圓沙鳥睡不起徒勞野猿捕漫作玄珠比相對倚朱欄時有逍遙子遊翠岩六首繆悠此投間邂逅如得請終日對林僧是樂非世境千秋紙上塵萬事空中影既往悔可追無能味何永仍幸甘露音時時灌吾頂翠岩老禪和欲退未容請聊許隱堂人先占廣軒境髙松有寒青孤雲無定影草暖幽澗香鳥啼清晝永一笑碧雲旁未羡匡廬頂聊謝都城遊來赴道人請冥懷麋鹿羣回首冠蓋境潨瀉泉石聲蕭森松檜影風帽何妨頽藜徑敢辭永還聞鐘磬音為我下雲頂先生盍言歸小子願有請由來陶淵明結廬在人境間抱無絃琴靜弄南窗影勝事幾人知髙風千載永何當理籃輿步月下孤頂願聞海潮音幾煩檀越請有物還有機無心即無境何當雪衲身重現水月影髙卧與世疏孤坐共夜永時時挂西窗溪光照霜頂欣聞厭冥煩頗亦謝造請孤鶱出塵埃勝踐得真境萬籟發靜音千巖度空影無味道終憐有役慮真永會當立茆茨望子蒼岑頂再遊天童山回吳與權諸友夜集太白嶄岩幾百尺仙人一去無消息臨雲時復倚欄干獨看千峯萬峯碧昨夜長鬚城裏回報道湖上秋風來醉園雨過月臺冷籬根白菊看看開却杖青藜趂流水目送征鴻下山觜蓬船答浪繞叢蘆咫尺煙汀幾萬里忽見江頭江月白紛紛笑語城東陌一尊此酒一枰碁未到懶堂猶是客遊承天望廣德湖桃源二月春風起是處穠華有桃李調笑聞聲不見人遊人只在華山裏華山逋客來何遲隱隱茶林隔煙水滿眼相思寄碧雲獨立城南望山觜送韋太守四明山水東南表海鼇背上三仙島麗譙髙逼斗牛寒一曲梅花萬家曉太守文章建安骨爽氣冷侵寒月窟黃堂水洗火符空明光却擁荷囊笏有客醉園雙鬢老宦情文思如秋草紫雲夢斷玉龍飛年年送客西城道曽是野亭同問柳綺裘紗帽金船酒長安宫闕九天邊肯為江蘺回首否粹老使君前被召約往它山謁善政侯祠既不果以書見抵謂可歎惜并示廣德湖新記因成長句奉寄長江衮衮西南流秋水時至狂不收大浪似屋山欲浮王侯神智禹所啾萬鬼琢玉它山幽梅梁贔屭卧龍虯咄嗟湍駭就斂揫巨靈縮手愚公羞障成十里沙中洲支分股引聽所求赤旱稽浸民不憂那得蟲蝗隨督郵汙邪甌窶滿車篝斯民飽暖何以酬廟貌突兀寒溪頭嵗嵗雞黍祠春秋老農擊鼓稚子謳當時人物紛鴈鷗豈無鼎食腰金儔朽骨往往空蒿丘姓名幾復人間留唯侯施惠膏如油江聲浩浩風飂飂千古不見使人愁拔俗萬丈山標崷使君不減裴商州下車百蠧隨鋤耰一笑四境無瘡疣天間老步須驊騮已聞歸作金華遊欽賢訪古意未休畫船載酒岸鳴騶約我與往置脯饈冠蓋紛紛暇莫偷搔首悵望情綢繆我問使君亦何尤西湖萬頃蛟龍湫幾年荒茀今則修鼛鼓弗勝財不掊長堤岌嶫髙岑樓寫有澮兮蕩有溝餘波北注引漕舟桑麻被野禾連疇鶴鶴白鳥雜遊鯈菰蒲菱芡厭採搜柳楊成幄蔭道周耕漁呼歌羸病瘳使君之賜侯可侔天邊旌斾看悠悠父老雪涕爭攀輈地僻借恂恨無由髙文摛秀春華抽豐碑崒嵂鑱銀鈎千年空此留海陬君知此日思君不還如今日人思侯登育王明月堂引月貯虛堂堂髙附南極我當盛暑來萬象生秋色堂豈朝朝新月亦有時食一寸坐禪心萬古磨不得同舍弟泛舟西湖登晝錦堂步至紫翠亭望懶堂景物懷故龍圖舒先生王庭秀城中十頃湖雲水相演漾春風破氷谷拍岸新流漲平鋪鴨頭緑淡沱蒲萄釀朱甍媚孤嶼梵宇麗相向萬瓦生清暉千花聮錦帳晨曦照炯炯芳氣浮泱泱日暮姿態妍煙霞渺空曠誰將水仙境聊借詩人仗卧護五年城追懷老詩將微吟示清野鏖戰得間放變化無端倪虛無落名狀坐令湖上景勝絶神宇王當時經行地藻麗隨屨杖斯人今則亡物色亦摧喪他年牛馬走曽拜丈人行塵埃久飄泊嵗月成漫浪問訊懶堂君松竹欣無恙尚意壁間聲時賡朱絲唱撫事重興嗟陳迹徒悵望哦公十洲詩風月為悽愴遊香山佛迹周鍔靈山名逹蓬香水靄薝蔔龍祇久覆護雲物翳深谷拂衣何劫中神斧斷蒼玉至哉天人尊靈迹印金粟頗聞開士讖飛錫隱巖麓坐令湖海間香供走川陸巍巍處報地色相儼金屋緬想舊巾瓶猶能慰心目籃輿訪蓮社一笑欣白足撫事動幽尋疇能念榮辱松爐裊知見餘力付碁局更覺夢中身翛然百無欲書隱潭郟修輔在昔知何人鑿破青山骨飛泉直下來千尺㵼倐忽兩壁蒼翠開一陳風雷突旁無塵埃蹤中有蛟龍窟寒氣不可嚮猛勢豈能屈安得當旱年為霖濟羣物題東寺松石小軒呈同遊關彥長明府盛次仲一松偃蹇蒼龍盤一石嶄巖怒虎踞漫來題作龍虎軒便恐風雲卷將去送賀監歸四明應制李白久辭榮祿遂初衣曽向長生説息機真訣自從茅氏得恩波寧阻洞庭歸瑶臺含霧星辰滿仙嶠浮空島嶼微借問欲棲珠樹鶴何年却向帝城飛衆樂亭并序錢公輔衆樂亭居南湖之中南湖又居城之中望之真方丈瀛洲焉以其近而易至四時勝賞得以與民共之民之遊者環觀無窮而終日不厭孟子曰獨樂與衆樂孰樂不若與衆衆樂之名於是乎書既又為詩以記真景之萬一云誰把江湖付此翁江湖更在廣城中葺成世界三千景占得鵬天九萬風宴豆四時喧畫鼓遊人兩岸跨長虹他年若數東南勝須作蓬丘第一宮勢壓平湖四面佳好風明月是生涯鯨鯢背上浮三島菡萏香中放兩衙屏列已疑雲母淨簾垂不待水精奢此心會笑元丞相終日樓臺為一家同前司馬光橫橋通廢島華宇出荒榛風月逢知己湖山得主人使君如獨樂衆庶必深嚬何以知家給笙歌滿水濱同前邵必梅邊民物鮮歡娛太守經營與衆俱園圃新隂多杞柳池塘生意足魚蒲長空不礙髙飛鵠淺水兼容短脛鳬此樂有誰知我趣歸來紅斾日西晡城外千帆海舶風城中居市苦憧憧幾生佳景為民老一日賢侯與我同道上槐隂連帟翠水邊人面照花紅寄言樂有時還盡徒見甘棠憶召公同前吳中復賢侯新葺水雲鄉虛閣崢嶸緑渺茫波面長橋步明月人家疏影帶殘陽風中白鳥侵煙去雨後紅蕖擁袖香從此郡圖添故事嵗時遺愛似甘棠煙波空闊岸低回草緑花紅處處堆一片湖光分島溆四邊山色入樓臺從來未有吾民樂此地欣逢刺史來目斷鄞江何日到京師只得畫圖開同前陳汝義聞説湖亭又一新不徒行樂樂斯民水光剩占鷗鷴地人意常同桃李春試展畫圖清俗眼况專間席傲天真使君已陟螭頭貴應為煙雲入夢頻遙思湖上自由春醉踏吟看屬使君水底天光開靜鑑岸頭花氣遞紅雲島浮虛檻橋橋接風翼時鐘寺寺聞漬墨新名人會否不將民樂廢民勤同前張伯玉句章太守錢君倚湖上新為衆樂亭花木豈徒遊子愛笙歌長與郡人聽坐來髙韻天風起飲罷餘香夕雨零安得憑欄縱吟筆玉觴遙對數峯青同前陳舜俞湖光野色著人衣衆樂開亭此處宜擊棹浩歌山自響踏青紅影岸相隨消除矰􅗤容鷗鳥改換風煙入柳絲荇菜藕花應見憶短蓬孤榜獨來時同前章望之是水為佳境中城浸碧湖樓臺萬室近物象幾州無太守恩千里新亭望一都地勞吾卜築景與衆遊娛宇色低欄外波光上屋隅鴛鴦宜繡幕翡翠失深蘆九夏荷開簟三秋芰洗盂山林何處異江海此情孤夜氣寒蟾媚晴暉落日殊畫橋斜映柳細草亂縈蒲漁棹開浮藻風簾散戲鳬野僧留曠蕩行子過踟蹰逸興攀銀漢明眸湛玉壺圖經終煥越歌詠己流吳壯觀嘉時敘招來好酒徒樂僮優好伎唱女桀名姝閉户誰能事宜人正丈夫樂邦方美俗鼓舞荷唐虞同前胡宗愈平湖拍岸海潮通亭在平湖杳靄中花艷含春雲島晚波光照夜玉壺空動搖人影兩橋月洗滌塵襟四面風野老半酣亭下笑漁樵今日與人同平蕪十頃緑含煙勝事興衰已百年島榭漫隨民意樂溪山應喜主人賢點粧野趣灘邊鷺髣佛妖容水上蓮日日流風轉謡俗棹歌長在釣魚船三江亭潘良貴假守衰頽病日侵湖山雖好倦追尋登城忽覩三江水快我平生萬里心聊築小亭怡父老敢承佳句粲珠金春濤正待諸君賞更拂詩碑看醉吟和蔣璿安仁不放二毛侵爽氣凌虛玉萬尋談笑薄施三昧手登臨誰會五湖心倦遊方戢沖天翼髙賦難賡擲地金怪得朝雲飛畫棟夜來曽聽老龍吟和顧文詞源倒峽勢奔侵綆短那容汲萬尋望屬滄浪驚鶴唳志存流水識琴心揮毫句句囊盛錦拜賜人人袖有金不日都俞在廊廟更聽虎嘯應龍吟和王珩潘郎未覺鬢霜侵佳致乘間得得尋古岸渺茫分逺渡飛甍虛敞快人心融樽想見頻頽玉季諾由來雅勝金野老固慙東閣客何妨同作醉翁吟和汪思溫危亭聳觀與雲侵勝概何勞杖屨尋回合江山真有意去來鷗鷺本無心歡聲洋溢均千里好句清新抵萬金四海倚需經濟手豈容長對白頭吟和薛朋龜爽氣寒光四壁侵青山千仭水千尋逺觀吾里瀛洲路悵望誰人魏闕心春到已多鳴珮玉酒酣應有解貂金紫微太守經營巧消得時賢次第吟和王伯庠使君不受二毛侵杖屨逍遙得勝尋撥遣簿書聊永日登臨山水一何心殘梅墜雪垂垂白弱柳搖風淡淡金倚矚大江供一笑幾多襦袴在謳吟和鄭若谷望逺登髙萬象侵元戎端不為花尋未誇駕鶴蓬山路應壯斬鯨遼海心小艇鱸肥盤繪玉危欄客醉碗揮金中流擊楫雄圖逺回笑三閭澤畔吟和陳晉錫神襟百慮不容侵勝概乘間偶訪尋趺坐豈無觀水術臨流應有濟川心斂將蓬島溶溶氣散作陽春字字金郢曲