偶成二首去路鶱騰逼紫霄何年鳬舄墮王喬暗峯藏雨皆龍窟靈草含霜半藥苗已覺山衣雲撲撲還疑風鬢雪瀟瀟捫蘿更上岧嶤頂下視滄溟百水潮塵境回頭隔聖凡參差疊嶂巧如鑱歸雲墮碧粘僧屐落葉飄紅上客衫果熟遙看猿渡澗風號定想虎離岩長天自有無窮景未信西岡日半銜和劉誼翁留題惠安二首塢雲過雨翠成堆天淡平湖一鑑開萬木號風韻絲竹千峯帶月上池臺靜無俗駕金鋪地間有高人玉滿杯聞道碧桃看欲發劉郎何事不歸來十里松行翠插天暗溪嫩草尚芊綿笙歌自滿蕭郎宅琴鶴空隨賀老船未分舊遊雲寂寞遙知歸夢蝶聮翩故山幸好宜回首還見人間換一年和新開西湖十洲之什洗出煙華紫翠勻再將絶景付重闉千山有影螺垂地一水無塵鏡照人香濺釣筒萍雨夜緑搖花塢柳風春杖藜盡日滄浪興時有幽人岸白綸秋燕十洲閣緑玉手持尋五嶽正應未識海邊洲倚欄花木參差見對岸笙歌次第遊煙霽多疑九峯曉波平全勝六鼇浮仙風坐隔紅塵路消得丹青詫此州和樓試可遊育王參天松柏緑隂隂古佛巖前一路深猿鳥不驚如有舊雲山相對自無心數泓寒水雲藏雨十里輕沙地布金杖屨更知非世境上方日日海潮音題鄞江地吞越絶海分深渺渺平流萬馬駸早晚渡江潮有信往來鷗鳥客無心寒空倒影千山動暖日澄波萬籟沉安用魚龍間養鬛平時春雨自成霖題西山雙乳泉石眼雙開白欲漫潺湲更傍碧琅玕地饒爽氣全無滓天借靈源兩不乾曉月自分雲外潤午茶誰鬬雪中寒孝先多睡相如渴始把清甘乞取看題靈鰻廟三首繞塔想曽隨白馬老父云此龍為護塔神蟠泥故復傍金沙旱天霹靂長平地樂嵗汚邪每滿車受賜由來千里境論封消得萬人家朱門便是金塗榜未負風雲在一涯絶境朱丹新棟宇深山靈響雜蚖蛇黃金地底應千嵗古記云金千嵗有龍甘雨人間幾萬家西域不勞方士呪西域方士能呪者臨川禹步吹氣龍即浮出見抱朴子南州重識使君車後漢百里嵩為隨州刺史行部雨輒隨車老農爭賽豐年社古木蕭蕭自曉鴉亘古人間蒙潤澤數泓雲底貯清泠功將名並山無泐道與人尊地轉靈曉殿千家供香火旱天萬里入風霆誰知别有醍醐味行路憧憧半未醒題香山湯禪師千古神僧舊石扃清風如在地還靈溪形偃月無窮碧山氣當雲不改青葉熟猿猱時嘯聚錫飛岩穴尚芳馨西來祖意誰人問老柏森森翠滿庭題蒙堂由來去住不相關贏得隨緣到處間笑出海雲飛一錫行分江月過千山微言定許誰人叩勝事偏於俗士慳咫尺蒙堂隔霄壤城東搔首只空還題翠巖丈室别移寶所出埃塵無限金光欲照人斤斧不驚龍象伏棟梁特地水雲新千峯坐斷人間路一榻分來月裏身更看須彌師子座未饒摩詰妙通神題明月堂郢匠猶來巧運斤清光那復隔纎塵九秋萬里雲頭路半夜千峯頂上人坐見乾坤入肝膽陡驚草木亦精神應憐赤水尋珠客白日茫茫尚問津題五峯兼簡英禪師何人縮地海東偏靈嶽分來不計年幾見彩雲爭照日真疑仙掌欲擎天依稀故國松千尺迤邐前山石一拳四面開軒看不足老僧時立碧溪前題天童日日青鞋踏白沙未應泛艇即靈槎雨溪清越鳴哀玉風蔓蜿蜒動暗蛇曉潤芝􅓕挑秀茁午香茶竈煮蒼芽玲瓏仙客知何在千古煙霞自一家題布袋和尚休話人間我獨尊何妨㕓肆且隨羣乞錢往往多空手問路時時向白雲壁上形容圖尚在囊中氣味許誰分分明提起無人問欲會應須眼裏聞題靈橋門危樓清迥立江風紫邏紅旗落日中暑雨澗溪來浩蕩暮煙洲渚隔朦朧歡聲不厭重城近霽色遙知秀野豐滄海一時傳麗句天才真是杜陵翁蘇文饒往昌國意頗憚之送以詩因勉之陳瓘己聞舟楫具那得苦留君雨過霜風急帆飛雪浪分長途方策足暇日正論文功業他年事風波豈足云送周初年虀鹽雖不飽心與古人期口體非吾養紛華任爾為經明逢地芥頴脫看囊錐兩驥皆宛種天衢好並馳次韻袁朝請陪太守遊湖心寺塵鏡紛紛俗纍增故尋幽境訪南能湖波浩渺無窮渌寺屋髙低不計層詩老新吟工惱客使君餘暇得陪僧棋中得失何時了一局輸贏未可憑豫同彥老自四明之永嘉中道留宿嶽林會法照海印二禪伯夜話投曉登車乃行留題于寺盧天驥病骨倦鞍馬禪居欣少留暮雲山盡路孤磬月明樓林靜鉤輈曉風香罷亞秋重來坐磐石相對話歸休歎息老禪伯蕭間心自如買松栽别塢引水過新渠草色經行外禽聲晏坐餘自慚雙客鬢垂老尚征車報國竟無補敢辭山路遙晚寒生竹徑新漲斷溪橋奔走真逋客安間愧老樵令人欲心折風雨夜瀟瀟途中書懷寄奉化知縣自帶淵明漉酒巾食鮭甘作庾郎貧雖無殘菊簮華髮賴有青山似故人幾處鴉鳴牛背肉經年衣犯馬蹄塵待携神武朝衫去還我煙溪潄石身奔馳漸覺嵗崢嶸負郭蕪田未退耕正恐山溪吹岸去任從煙草喚愁生别來竹院門長掩好去魚舟手自撑漸晚歸心在何許夕陽低處伴雲橫延祐四明志卷二十
