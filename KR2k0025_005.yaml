body:
  text: 延祐四明志卷五元袁桷撰人物考史浩史浩字直翁祖父詔善居閭里民有鬬訟嘗從詔求直不復訟官府以八行科徴于朝不應浩以南省前行當得教官浩願習民事初補餘姚縣尉後沈煥袁燮以舍法辭教官繇浩始為國子博士召對高宗目送之時建普安恩平二王府即除祕書郎兼普安郡王府教授上嘗命普安王書蘭亭敘五百本以進浩曰此趙鞅訓戒之旨王溢其數以進上復賜宫女十人以侍王浩曰當以庶母禮事之王如其言高宗益賢普安遂為皇子封建王浩之力也完顔亮逼江上將親征建王上奏請將兵為前驅浩時在告力疾詣府啓王曰昔唐肅宗能從明皇幸蜀靈武事安有王大驚亟具奏謝罪遂從高宗視師以歸由是立為太子普安即位是為孝宗浩遷中書舍人十日為翰林學士逾三月參知政事明年拜尚書右僕射同中書門下平章事兼樞密使孝宗鋭意恢復張魏公浚屢奏取山東開都督府請上幸建康浩曰太上倦勤禪位陛下若奉以行太上寧能肯與俱往都城一有警動陛下何以處太上孝宗悟其言後竟繇禁中命邵宏淵等出兵公語僕射陳康伯曰吾屬兼樞密兵出不與聞所宜去遂見上丐罷浩歸甫十四日符離師潰凡一十三萬人浚上表自劾復勸上速議和後知紹興府復判福州淳熙五年拜右丞相在相位七月即罷浩再相時朱熹教授生徒于建寧山中浩力挽之繇是出守南康雅度涵蓄凡議毁浩者浩悉奬引之善薦士陸遊賜進士出身繇浩力在經筵嘗薦薛叔似陸九淵葉適等十五人又薦金安節汪應辰三十四人後皆顯達兩授節鉞遍歷三公壽八十九以終始諡文惠後更忠定追封越王歷官表奏皆手屬藁耄嵗猶不倦文集五十卷號真隱漫録論語口義二十卷尚書講義二十二卷周官講義十四卷長子彌大終禮部侍郎力學勵行著衍極朴語諡獻文彌正敷文閣待制彌逺别傳彌堅别傳魏杞魏杞字南夫繇焦山徙于鄞紹興十二年進士第歷縣有能名後遷宗正少卿丞相湯思退薦于孝宗言可備使聘遂假禮部尚書使金國行次盱眙金人以萬騎脅之杞不為動卒奉禮幣以往于時隆興議和改君臣獻納禮孝宗以書封授杞杞行近北界心動亟回白上曰國書封縢不知為何事彼震怒凌辱將倉猝占對失國體願陛下諭意臣願以死承詔上大悟始盡語書旨初上不言者愳杞畏恧辭行耳杞至金金主果怒絶飲食困杞杞言宋皇帝意鋭恢復將使兩國之民俱受塗炭羣臣交奏迭諫故更進和議誠與太上皇帝時言和不同也使不允杞死此耳金主悔卒正敵國禮減嵗幣舊數以歸孝宗大喜除起居郎遷給事中乾道二年拜同知樞密參知政事明年拜右僕射時大雷葉衡與杞俱罷為太平興國宫使史浩舊與杞為餘姚尉交代入言于上得視宰相恩數除觀文殿學士後以所薦吏犯贓降端明殿十年復大資政而杞卒諡文節杞能詩居小溪遍遊諸名山習方外學絶不言時政文集三十卷號山房集晚著三蘇言行編初杞祖父葬焦山後居明登宰輔移葬于鄞葬師云若果遷將不利相君不從後以雷變罷宰相褫職孝宗朝葉顒魏杞為最重汪大猷汪大猷字仲嘉年四嵗對客誦孝經止十七章客問十八章何以不誦以具慶對客大奇之登進士第為婺州金華丞李椿年行經界法量田不實者論徒罪大猷言法峻民未喻蓋有田多而增多者少固受罪多何所從取李然其言減其罪乾道元年擢禮部員外郎積遷吏部侍郎兼權尚書是時法度數變更吏得高下大猷上疏論其事定為勑令格式後率以其凡例增補之七年除敷文閣待制知泉州海中有大洲居民雜植五穀有海蠻乘船掩獲之調兵討之輒入水不可捕春夏遣戍煩擾大猷立屋柵以居蠻乃遁三佛齊欲鑄銅瓦于泉詔許之大猷言銅不宜入海卒不與以敷文直學士改知隆興府荼冦賴文政起湖北轉掠湖南入江西大猷遣將蹙之將輕冦大衄自劾以歸降龍圖閣待制上怒謫官南康二年後始復祠有唁于南康者笑曰大猷今年逾五十使以恩科得官為是尉不賀我乎紹熙二年致仕慶元五年升學士卒時年八十大猷性坦夷敦敘姻黨遇大禮先奏兄弟之子割田二十畝為義莊首倡子立中為郡守始登第為立符桂坊高元之高元之字端叔武烈王瓊之七世孫建炎間衣冠南渡父寓籍明州因家焉家貧無書得易編口誦不輟數月忘盥櫛鄰士有書深憐之稍借以觀後受易春秋學于沙隨程迥時傅伯成為郡教授少許可折節與之交遊繇是鄉學者數百人師事之元之作變離騷九篇曰愍畸志曰臣薄才曰惜來日曰感回波曰力敶曰危衷曰悲嬋娟曰古誦曰繹思行于世宋諸儒擬騷弗能及也集春秋説三百餘家號義宗悉本經旨凡百五十卷易詩論語後漢厯志解各一卷詩三千雜著五百號茶甘甲乙藁五上禮部卒不第而門人俱顯仕將死手屬書樓宣獻鑰以陽公闕南省白欄求志文貧不能葬門人會葬于桃源鄉蔣山買田立祠于寶嚴院嵗時祀之今廢號萬竹先生元之事親孝貧能輕財復喜言兵凡隂陽方技九流之説悉能究其指歸陳居仁陳居仁字安行父膏太府少卿壻慶厯汪先生家因占籍焉膏為御史時四明有僧法恩謀不軌事露得其籍從附者餘萬人朝議將屠城膏力爭之止殱其首而在籍者亦俱免居仁登進士第丞相虞允文見而奇之欲俾習兵法居仁謝曰立事功宜先定大計若大言無益也潁州韓元吉見其文言宜為制誥翰林學士洪邁典貢舉居仁時為中書舍人命攝其事孝宗曰今兩制獨居仁奉行信官宜擇人醫王涇誤以藥進德壽宫高宗崩議罪編置居仁率後省官爭之卒杖都市配筠州居仁言慶赦之弊僅足惠姦猾而小民不與願放下戶身丁稅以寬民力上從之歷知鄂州建寧府鎮江府福州為鎮江時有僧投牒言嘗結廬江滸地與江隂犬牙相接率為邏卒煩擾不便居仁察其姦利命尉掩其室得盜數人卒夷其居後以華文閣直學士終于家諡文懿居仁孝友其在官奉其叔父及甥妹以行斥田二頃為義莊以贍宗姻舅尚書汪公大猷以學士致仕居城中居仁暨樓宣獻鑰皆汪出亦以直學士在家時人榮之趙彥逾趙彥逾字德老紹興三十年進士第作邑有吏能孝宗亟用之守蜀多惠政李心傳志紹興以來蜀帥可稱者數人彥逾與焉其在蜀餽遺不入公府將出蜀以其俸餘聚九縣之宗族分給之為工部尚書孝宗崩光宗以心疾不能成喪禮汝愚時為樞密彥逾勸汝愚立嘉王見殿前都指揮郭杲諭意杲未及對彥逾力責之杲始受命後推定䇿恩汝愚謂彥逾曰吾屬宋臣難議功未幾汝愚為丞相彥逾以端明殿學士出帥蜀始憾汝愚將行盡疏一時名士為汝愚黨慶元黨禁繇是興彥逾後守鄉里以觀文殿學士終于家子䈣夫守袁州寶慶初真文忠公德秀薦為亷吏第一樓鑰樓鑰字大防異孫舉進士中教官科為宗正丞時閩蜀士大夫各植黨與入對歷言前代朋黨之弊光宗即位為起居郎兼掌內外制光宗病不能持喪傳位皇太子鑰草詔曰雖喪紀自行于宫中然禮文難示于天下人服其婉遷給事中朱熹為侍講有旨除職與郡鑰言熹始除宫祠深駭觀聽復除職是聖意不在熹也然熹難進易退孰若授以內祠仍畀修史異日復侍講筵則君臣之道備時韓托胄用事日貴臺臣希旨論汝愚言定鼎乘龍之夢語涉不道鑰曰嘗聞汝愚言夢先帝以金湯壺賜之若是則謂之定鼎可乎又嘗夢會朝望白龍以升天未幾上衰服嗣位若是則謂之乘龍可乎吏部侍郎彭龜年入內殿力奏知閣韓托胄擅權漸不可制上大怒黜龜年外除托胄罷知閣進秩與祠鑰與林大中共疏言黃裳已死黃由守喪沈有開陳傅良相繼罷去凡此五人皆嘉邸舊臣惟龜年猶在今又去之則陛下舊寮無遺矣托胄憾之不數日改吏部尚書實奪其言事也黨禁興即丐歸未幾遂致仕居家凡十有三年後托胄嘗曰樓大防善士也何一書不入都城耶且諭意鑰時聚書東踰樓萬卷皆手讐校號善本客有願傳録者輒欣然啓帙以授人有言太師語子弟相顧即索具紙筆鑰從庋中取顔氏家訓言士大夫晚嵗名節事置紙上即入去客疑援某事發書櫝爭視之愧即撤去紙墨須臾就坐客不敢言鑰亦不問即舉酒如平時嘉定元年以翰林學士召拜參知政事自號攻愧文集百二十卷諡宣獻鑰性樂易中原師友淵懿悉窮其淵奧經訓小學精據可傳信嘗定注春秋未脫藁守永嘉見陳傅良書已成即焚已作冠以敘引其伏善類此史彌逺用真德秀掌內制鑰所引薦德秀嘗曰聞公清言竟日或極論達旦退而書紳不為塗人之歸皆公教也子淳終屯田郎中其問學似其父幼子治終權兵部侍郎楊王休楊王休字子美象山人初為黃巖尉邑有豪民植姦黨號三神王休捕得之具罪狀于府黥徙他鄉郡縣稱為鐵面少府授南康軍判官朱公熹時為守郡事悉委之蠲經界賦後守洋州金州大興學宫考商於險塞以備邊絶餽遺唯軍用得取于公帑除利路轉運判官金州大災悉發庫錢賑之兼提點刑獄王休治蜀多善政大修棧閣鑿鬼愁灘堰蟇頤山分西城漢隂平利三邑馬綱以便民築漢嘉西門石梁蜀民德之後為禮部侍郎光宗時名監司凡四人丘崈馬大同辛棄疾王休其一也子燁為吏部尚書後以閣學士終于家趙粹中趙粹中字叔達其先密州人幼嵗能詞章登進士科孝宗鋭意復北疆虞允文王藺趙雄以言兵驟進粹中進恢復機密十論制敵權鑑四十卷富疆要䇿十卷孝宗極喜之一嵗九遷由祕書郎權起居郎給事中後除吏部侍郎所奏對多言邊防粹中嘗上疏罷王安石父子從祀乞正雪嶽飛寃狀又集司馬光范鎮董弅等奏議正宋太祖東嚮之位議不行寧宗即位卒如其議後以待制知池州大閲軍校一日用公帑錢三百萬郡政修舉民生祠之後以遞卒獄失出罷家居十年乃卒粹中善筆札子竴書似其父竴幼孤終身不肯仕嘗隱茅山欲為道士親黨共止之然竴卒不仕郡守屢薦于朝特許循資竴亦謝不受張良臣張良臣字武子一字漢卿家拱州父避冦來明州因占籍焉善為詩清刻髙潔不蹈襲凡近凌厲音節讀者悲壯尤長于唐人絶句語盡而意益逺詩至于盛唐極矣杜牧之李商隱晚出以絶句為專門至宋王安石力倣之病多而不能終似黃庭堅以不使句俗為上律吕乖忤而體益變陳與義借古語為援不為事物牽掣似黃而益奇詩之變無餘藴矣風雅道喪獨良臣穿幽納明復唐格律後宋詩人咸推服之而諸禪僧吟哦諷詠遂悉宗尚而詩稍復其變焉良臣于舉子業非所能隆興元年試南省魏文節公杞時為參詳攜三䇿以見知舉張燾曰此文拙古必故人張武子所作使欲得士願以進燾許之後撤試果良臣也杞晚居小溪山中日從酬唱其作詩或終嵗不出一語官止監左藏庫詩集十卷至咸淳間彌甥徐直諒始裒刻于廣信郡史彌逺史彌逺字同叔忠定罷相歸東湖與弟彌堅先後生忠定深器之嘗曰吾以不言兵後必有為宰相者二子優劣吾未能審也一日攜客遊湖寺二子從忠定隂戒從者進食踰晡時彌逺獨凝坐絶怒色忠定始異之登進士第折節下士與東萊吕祖謙相遊從忠定下世以大理司直遷諸王宫大小學教授出知池州提舉浙東常平入為起居郎兼資善堂直講權禮部侍郎韓托胄為平章軍國事師敗江淮蜀吳曦反彌逺與皇子榮國公密議入啓皇后召夏震傳詔殛死之初餘杭趙汝譡汝談集歷代皇后事號曰坤鑒進后禁中后頗向之會彌逺議誅托胄后計遂決而汝談兄弟終彌逺世不得入朝嘉定元年知樞密院事後拜右丞相去偽學禁贈朱熹敘復故丞相趙汝愚吕祖泰等官召林大中樓鑰故老十五人入朝十五年皇子榮公薨立濟國公竑為皇子時彌逺相已久皇子在府中與左右隂言丞相輔政有不便語寖聞丞相惡之乃密以越州宗室子與莒為沂王後更名貴誠援高宗立普安恩平二王故事將復立為皇子十七年八月會寧宗大漸亟白皇后言貴誠賢德皆先帝猶子遂宣遺詔立為皇太子即帝位是為理宗復為相十年紹定二年薨于賜第贈中書令追封衛王諡忠獻在相位二十六年其行事見宋史及羣賢奏議理宗特御製神道碑額曰公忠翊運定䇿元勳之碑子宅之幼習明國家典制理宗入繼大統宅之甫弱冠預其議後官至同知樞密院事為戶部尚書括浙右田虛籍幾百萬理宗大悅後按其田皆諸道舊𨽻始罷徴而田籍宋社亡猶在至今病之幼子宇之官至觀文殿學士謙儉不自奉冬月居敗屋葛㡡敝衾後疾革問疾者入卧榻皆驚異之張虙張虙字子宓唐建中宰相鎰之裔家慈溪清水上莊號清水張氏家訓嚴整子孫多孝謹嵗時田作無大小咸承命有將赴南宫者宗長命曰第幾郎特免摘茶虙習詩易復工詞賦寧宗即位為别院省試第一故事天子諒隂免䇿士潛邸進士當自陳升名虙不肯調臨江教授樓宣獻見而器之俾闔族子弟師事之暨為翰林學士復舉以自代為浙東安撫司屬官帥檄虙剡縣督舊逋虙謝不能除太學正敘遷博士時金將亡上疏言昔聞其衰則喜今聞其衰當愳今雖足以偷一時之安間而所當深防者實在于自治遷祕書丞兼王府教授以疾出守南康郡有朱文公儀禮黃幹所刻而喪祭禮未備虙求善本補之改處州政不病民而除其病于民者性淡泊復奉祠家居端平元年天子遴選經筵官以國子司業兼侍講召虙講月令至孟秋決獄訟必端平反復數百言復成月令解十二卷以進升國子祭酒工部侍郎厖眉冠帶諸生望之肅如也年八十卒後諡文靖袁韶袁韶字彥淳幼從正獻公燮學于城南淳熙癸卯與鄉書明年當赴禮部願卒受業是嵗闔郡上禮部俱不第公獨以舊牒登淳熙丁未第嘉泰中為吳江丞蘇師旦恃韓托胄威福撓里中役法黃公犖為常平使者檄公核田以定役蘇密諭意言吳江多姻黨倘相容當薦為京朝官公不聽是嵗更定戶籍承徭賦者皆蘇黨蘇諷言者將論去黃公丞以是事白于朝且薦之未幾蘇敗公得為桐廬宰桐廬多宗室持縣事無有善去者公始至絶謁莫敢撓錢唐岸嵗為潮齧率取石桐廬備禦公言廟子山左右皆石不必旁取鄰郡遂得永免嘉定辛未召為太常寺主簿縣父老旗鼓蔽江以餞至于富陽泣謝曰吾曹不復輸石矣後為左司郎中接伴金使者使者索嵗幣語慢甚公曰昔兩國誓約止令輸燕不聞有旨在汴使者語塞是嵗真文忠公德秀亦言幣當絶公實啓之嘉定庚辰尹臨安自是幾十年理訟精簡道不拾遺里巷爭呼為佛子所治疑獄不可勝紀至今遺老猶能言之杭城多火災訟公十嵗無是患其後林介繼之法盡弛太室省部皆燼紹定戊子拜同知樞密院事李全反山陽時相欲以靜鎮揚州告急飛檄載道杭州爭有逃避者拜浙西制置使仍治臨安以鎮遏公謁相言揚失守則京口不可保淮將如卞整崔福皆可用適崔奉閫命來樞府公夜與同見相故事無暮謁相府公言崔實可用雅量鎮浮恐非今時所當先相疑逼已不悅卒罷政歸里端平奉祠薨時年七十有七贈少傅後以郊恩纍贈太師國公臧格臧格字正子鄞縣人慶元五年進士第與慈溪張虙為友虙自以為不及也嘗曰正子才爽邁下筆痛快相從四十年與虙守朴學者良異為太常丞定諡三先生周元公曰大哉元乎易為乾元之首春秋為始年之法天下之理蓋未嘗無其初也古道修明人心純一聖賢之功固無自而見不幸而涣散殫殘之餘有能復振遺響俾絶者自我而續晦者自我而明是故有元之義焉孟軻氏沒異端滋熾重以專門于漢清談于晉至唐則文藝沈痼以迄五季之陋幾于蠧蝕不存矣宋興巨公名人舄奕後先其聞道亦不為淺大概更相推激不離乎文字論議之末而挈提宗旨有濓溪先生出焉先生道學淵懿超然自達敻出乎萬物之表而其最深切者太極有圖所以發其理之幽祕易通有書所以闡其圖之精微圖有無窮之義書有不盡之言學者潛玩而服行之探二氣五行之運見中正仁義之本識人物動靜之别斷斷乎其有功于斯世也近世朱文公某張宣公某吕成公某尊敬斯學或列之篇詩或記于書後或辨于注釋之詳或嚴于問對之確先生之名益閎大光明于時矣謹按諡法主善行德曰元先生博學力行會道有元脈絡貫通上接乎洙泗條緒精密下逮乎河洛以元易名庶幾百世之下知孟氏之後觀聖道者必自濓溪始謹議明道先生曰濓溪傳者有二程先生載惟二先生天分不齊及其體道成德則同歸一致有司舉節惠之典未幾從而區别然二先生所得又豈容以差殊觀哉謹考伯淳先生窮理盡性開示後學潞國太師叶之公言以表其墓曰明道先生夫道之不明天實憫之今天篤生賢哲資稟特異天意固有所屬矣居洛十年充養備至融會貫通內外洞徹人見其氣貌肅然不敢即也而和氣充浹見面盎背遽色厲辭亡有也人見其接物粹然若可易也而望之崇深截截乎規矩準繩不敢慢也局度清越故世若將凂焉而克勤小物雖鄙賤猥瑣弗之憚也立言灑落近而易知扣之則無窮出之則愈新也竊議先生者所見自不一而不知先生道積于中固純乎弗雜也抑嘗究極先生所以用力之地矣謂心不可以一事留謂學不可以一善止有適有莫戒其非天下之全客氣未消防其為義理之勝以至去新學之支離非釋氏之不相聯屬忌學者之先立標準斥記誦者之玩物喪志蓋圭角少露皆先生之所不豫若訓息為生則曰中無間斷推明易理即曰敬無間斷純亦不已此天之所以為天也先生妙造精義渾渾無涯其體統盡在是歟異時身居御史不用文字以懲詆訐之失元祐羣賢悉處散地先生獨有憂色使之協濟于朝以施調一之功安有紹聖報復之禍哉按諸諡法中正精粹曰純先生博大閎深與乾同體非中正精粹而何伊川先生狀其行曰純粹如良金吕本中托諸先賢之論曰溫然純粹張宣公嘗為之贊亦曰會其純全今諡以純庶足以賓其實當伊川先生曰講道一門天下皆知有河南二程之學明道早世天下學者以其事明道者事伊川焉緬惟伊川先生材資徑正法度森嚴凡其造理淵源發微指極者無非明天地之正理行天下之正道貫通融液有不待間邪而誠自存者竊窺仞牆方且自敬而又曰入道莫如敬不敬何以致知曰主一之謂敬不一則二三矣至于涵養則是敬急迫則非敬其著察之深似若一毫不敢少肆先生之學專以敬為主充養既至固宜粹然一出于正也由是用其所學上足以正君心下足以正人心先生被命經筵凡所建明殆不一疏宫庭至嚴閎也欲備知皇帝動息以隨事規切六闕起居有時也欲講官同日晉見從容納誨畨直以冀數召輪侍以希陳説乞坐講以表崇儒之實不避嫌名以抑尊君之道凡所以薰陶人主之德性者固無嫌乎詳也每念先生一遇進講則宿齋預戒期以感動上心豈是求精于章句之末頰舌之嘵嘵哉當人欲蔽痼之餘必使天下知有大學之書嘗考易傳等書莫非經世之大法誨人之要説也然精微嚴密之旨所以扶世立教者惟上足以正君心下足以正人心指歸為最切謹按諡法庶物從之曰正請諡以正孰曰不宜格久在郎署家貧願得補外史丞相靳不與久之微有怨語丞相善鑒人蹙額曰臧君骨清非守土相吾遲遲不外除誠愛臧君今若是以鄉里旁近與之遂守台州迓吏至門果卒陳卓陳卓字立道居仁子甫壯嵗登進士第宦意泊如也守江州寧國有清白名其守寧國也以中書舍人補外道繇臨安將之官丞相以故欲見之卓謝不往丞相深器之繇是卒為翰苑官李全反淮安朝廷靳護事益露卒褫全爵卓詔至淮人益自勵太廟災草罪已詔京師爭感動丞相願貶秩繇是詔端平元年鄭清之為相二年真德秀以翰林學士為參知政事卓為簽書樞密院事二制俱下未幾即丐祠歸里平生不營産業以贊書所酬金築世綸堂人或戲之曰此真金屋也退居十有六年薨年八十有六諡清敏將葬事不能具丞相吳潛聞之為作書閫帥以助孫定孫侍祖父力學孝謹出處進退每怡色以告遂深奇之其諡清敏也一時朝士皆後進定孫力請于朝卒得請其奉諱日哭泣薦祀如平生亦以耆年終樓昉樓昉字暘叔與弟昞俱以文名少從吕成公于婺其文汪洋浩博宜於論議援引敘説小能使之大而統宗據要風止水靜泊然不能以窺其涘故其從學者凡數百人最顯者鄭清之應㒡鄭次申趙與歡善章表李璧黃裳為侍從所為文俱出昉手嘗編歷代文章為一編業進士者咸誦之宋世鄞士善論䇿台越進士嵗率數十人來相從繇昉手守興化軍以卒清之既相追贈直龍圖閣率其弟子祭于墓復立甬東書院袁甫袁甫字廣微父正獻公教授城南年尚幼諭諸生以立志為先甫首領其旨後問道于慈湖楊先生先生曰學以自得為貴正獻之言也心明則本立矣繇是慨然以斯道自任舉進士第一為校書郎當遷願侍親東歸通判湖州十有五年為外官守衢州饒州遷江東提點刑獄一以傳心為本講授學者復取孝經衍其説告于屬邑與象山修白鹿為中庸詳説而講明之朱陸之説分各立黨與遂為之言曰道一而已和而不同乃所以和也道無終窮先賢之切磋有不同者將歸于一則未始不同也江東大飢所存活十餘萬人諸郡咸立祠以奉端平元年始召為祕書少監以論史嵩之和議罷嘉熙元年除中書舍人復以和議論嵩之罷時金將亡事類靖康戰非素技必曰和然正論者所恥後賈似道諱和國以亡而宋三百年卒未見以戰利二者俱難言也後除兵部侍郎兼給事中國子祭酒以權兵部尚書在位卒諡正肅居家嚴正中年絶嗜欲一室湛如子弟終日侍立未嘗有惰容子從守永州善尺牘力倣其儀矩孫裒能詩文諳臺閣故事其亡也鄉里惜之趙與歡趙與歡字悅道父希言令仁和有稱築臨平新堤護田四萬頃後為右司佐丞相言楮幣必當便民舊幣諉民民何所用俸稍兩用官吏則猶當受之後奉祠以卒與歡美儀觀音吐如鳴鐘相者言貴在是然貧亦在是後官節度使家資無百金餘希言知沂王嗣觀察使與莒賢以告丞相丞相心善之先屬矣聞其語意益喜隂以托希言希言死寧宗命丞相召觀察入禁遂命與歡同載以入繇是驟升刑部郎凡所議擬理宗深信之金亡歸明人集兩淮築館致餉不絶河南察罕范用吉求內附力言侯景之害理宗悟不受後尹臨安上隂受輔郡獻納與歡憂之願以酒所羡餘入貢益論理財之害為國危亡本罷諸郡獻納史嵩之起復三學交論上命與歡調護寢其事上言人言可畏非俾致仕不可後卒如其議善薦士馬光祖吳革李伯玉牟子才楊棟陳仲微後皆為大官侍經筵進春秋集解性孝友拜安德軍節度使戶部月以海艘致俸至則分三族合旁近宗黨完聚于家死之日貧不能葬理宗愍之賜田以養其子若干人贈太師諡清敏子孟傳壯嵗守嚴州有亷直名屢守名郡必載弟妹以行車數十兩後為江東坑冶使者丞相賈似道同其至城下論去貧不能載其弟妹歸衆咸憐之尹臨安受丞相陳宜中謀殛殿前帥韓震震黨率所部排禁城門以行晚守鄉郡臨安自紹興皆已納土謝太后詔諭自明繇台孟傳奉表如詔旨復以宣撫使守郡至元十五年世祖皇帝詔入覲拜浙東宣慰使以歸二十一年復召入都除集賢學士卒于都第三子孟何咸淳七年進士第通春秋去褒貶凡例為法度編陵陽牟應龍以同年銘其墓曰吁嗟先生白首窮經無財而富無爵而榮史彌忠史彌忠字良叔鄞縣人進士第初為鄂州咸寧尉官滿歸里槖中裝視之官時良多里人羡企之其父慚怒彌忠愳召里人畢集悉發篋以示皆書帙也監文思院門楊文元公署薦剡曰質直而才遜德無競宰廬陵邑有能名後守南安會盜甫平為政尚安輯蠲白撰錢以便民守吉州治如南安蠲田租十有八萬閩冦大作提舉福建常平鹽茶事薦陳樞密鞾為招捕事定功賞一不受真文忠公時居建寧遺書美之時從弟彌逺久在相位數勸其歸年未七十首乞致仕後子嵩之為丞相除寶謨閣待制繼除龍圖閣學士凡十一封至金紫光祿大夫夫婦就養相府數告歸遂除資政殿學士賜笏頭毬紋帶終于東湖之里贈少師保寧軍節度使鄭國公諡文靖初為尉咸寧趙方尉蒲圻己酉嵗嵩之生庚戌嵗方亦生子葵兩家交持羊酒相賀日者云二尉子皆極貴後彌忠薦方于朝為太師而嵩之葵范俱立功襄漢二子先後為丞相葵范端平開邊嵩之帥襄力言不可繇是交惡嵩之入相葵在外奉書幣于其父援鄂州事契怨稍解然亦竟不能平也嵩之别有傳史彌堅史彌堅字固淑忠定王浩之幼子少警敏端靜忠定奇之忠定召赴慶壽班退朝有憂色彌堅時侍側問其故忠定愀然曰李妃悍惡上欲廢之念未有以對即應曰嘉王即位母子位號必改正今所言議者當執咎忠定愕然曰計得矣翌日見上議遂寢上問忠定卿幼子當已擇婚對忠定謝臣子彌堅幼未知學何敢議姻事上曰朕兄女年相若朕定議成之兄女崇憲靖王伯圭女也後以軍器監尹臨安韓托胄敗兄彌逺入相以嫌出為潭州湖南安撫使平湖冦羅孟傳守建寧行義倉法真文忠公紀其政績守鎮江力薦劉宰于朝以兄久相位數勸歸不聽遂食祠祿于家有十六年判牘神敏舊有書判清明集皆能吏極選彌堅與焉後以資政殿學士光祿大夫卒賜諡忠宣吳泳行詞有云在熙寧則不黨于熙寧如安國之于安石在元祐則不趨于元祐如大臨之于大防史嵩之史嵩之字子申曽祖木建炎元年金兵猝至率姑姊母妻五族暨其鄰保航海得完者踰二千人木孫五人皆登進士第嵩之少倜儻喜經濟嘗與內弟陳塤講學山寺寺僧厭之嵩之怒夜焚其廬去後登第從父丞相彌逺曰新調官當何之嵩之願官襄漢彌逺在相位最久向仕內郡實不知襄漢表裏心大喜即調為襄陽戶曹襄帥陳嵗索調用增厄塞丞相不能拒嵩之密疏地里言某地當撤戍某當增防丞相如其言下之帥大驚軍費減十六不十年與為代端平二年趙范趙葵弟兄用師河南丞相鄭清之主議嵩之奏不可師大衄繇是三姓交惡拜參知政事督視諸道兵拜丞相加都督嘉熙四年入相解光黃圍城渝州皆嵩之善用將士功然不喜儒士迂緩會父彌忠卒將起復三學交論之未幾臺諫合疏服闋勒致仕居家十三年以卒嵩之晚嵗願守蜀且圖江上陽羅堡為要塞後卒如其言贈少師安德軍節度使諡莊肅弟岩之更四路安撫資政殿大學士鄭清之鄭清之字德源少母胡氏將就蓐三日甑鳴甫生嫡母欲不舉丘嫂邊氏請于舅姑願己乳之既貴奉邊氏如母卒為之服期以報教授峽州江陵帥趙方善風鑒夜夢有告者曰明日當有貴客至宜敬禮之遲明典客以峽州教授謁入方從廳屏窺清之狀貌黧瘠且短小殊不稱所告夢賓次坐逾日昃方往來益視清之危坐迄不惰方大器服設高會見其二子挾使受拜禮且曰公他日大貴願以纍公後為相卒拔其二子曰葵為丞相曰范為襄陽帥後王師入洛皆葵范贊啓之初召為國子録史丞相彌逺密語曰皇子濟國公未正儲號動止躁淺似不宜負荷沂王宫新立嗣子容止端謹煩君為講官善輔導之即除魏惠憲王府教授寧宗崩以沂王所後子即帝位是為理宗寶慶元年除起居郎逾年權給事中進翰林學士未幾拜簽書樞密不十年為丞相遂召真德秀魏了翁崔與之趙汝談徐僑尤焴洪咨夔王遂李宗勉杜範遊似袁甫李韶凡數十人為侍從等官是為端平元年三年行明堂禮九月大雷電罷家居凡十年淳祐五年入朝拜奉國軍節度使兼侍讀七年拜太傅右丞相九年進左丞相凡四登相位耄年章表皆手屬藁愛奬文士應㒡劉克莊嘗力薦之卒致大用端平初相四方稱為小元祐及再相會行公田新楮幣上方獨斷郡守大帥時有內署清之力不能止十一年薨贈尚書令魏郡王諡忠定應㒡應㒡字之道昌國人以詞賦試南省第一㒡未第時袁越公韶為京尹㒡為之掌箋記留門下一夕坐有美堂欣然若有得同門客吳必大善樂府暮從外歸問曰何欣然也以擬明堂詔書屬對甚善答之吳哂曰一第脫飢寒猶未能明堂詔何施焉㒡後直內制卒用所擬語而吳以樂府遊公卿困躓以死教授臨安府鄭丞相清之見其文奇之始敘為同舍生樓昉教授鄉里時㒡最後至清之固不識也清之將拜相俾草相麻後卒用之㒡以著作郎兼學士院權直端平開邊兵敗洛陽㒡預邊議坐斥而清之亦罷相居東湖益與㒡搜拾文史號建章集皆制誥所需也清之再相㒡復用以侍郎掌內制遂力薦為內相理宗疑焉一夕召㒡入院降詔遊似右丞相鄭清之奉國軍節度使兼侍讀趙與歡皇兄安德軍節度使開府儀同三司皇弟貴謙與芮授少保凡五制夜四鼓進入上始信之翌日即除翰林學士後拜參知政事以疾告歸卒范楷范楷字子式鄞縣人嘉定元年登進士第調安慶府懷寧尉再授建康府轉般倉秩滿謁吏部時年六十袁越公韶與楷在淳熙間同貢于鄉且同年生嘉定十二年越公已尹臨安一見越公吾老當歸第求一近缺以便養越公笑不答密薦于丞相改臨安府教授遷宗正丞吳從龍吳從龍奉化人李全之變提孤軍為前鋒援不至被擒使至泰州城下誘降終不屈死之廟祀泰州維揚賜額褒忠官其弟從虎淳祐間應㒡奏言從龍有晉解揚漢路中大夫之節請賜諡咸淳中黃裳乞立傳余天錫余天錫字純文昌國人祖父滌教授史忠定子孫因居于鄞天錫亦教授其子忠獻家性謹願絶不與外事忠獻器之是時忠獻在相位久皇子濟公深嫉之念欲有廢置而近屬無有會沂王宫無嗣丞相欲借是隂立為後備天錫試于鄉秋告歸丞相曰今沂王無後里中宗子族屬相似賢厚者幸具以來天錫渡江與越僧同舟舟抵西門天大雨僧言門左有全保長家可避雨如其言訪之保長知為丞相館下客具雞黍甚肅須臾有二子侍立全曰此吾外孫也日者嘗言二雛後極貴問其姓長曰趙與莒次曰與芮天錫憶丞相所屬其號亦良是問其生年月日告于丞相相命二子來保長大喜鬻田治衣冠心以為沂邸後可冀也集姻黨且詫其遇已行天錫見于相府丞相善相人大奇之計事泄不便遽復使歸保長大慙其鄉人亦竊笑之逾年相忽曰越二子可復來乎保長謝不肯相密諭曰二子長最貴宜撫純文家遂載與歸母夫人朱氏為沐浴教字禮度益間習未幾召入嗣沂邸迄即帝位是為理宗天錫嘉定十七年進士寶慶元年超除起居郎不數年拜參知政事復守鄉郡母夫人封周楚國夫人壽過九十將以壽日拜天錫為相天錫以病卒贈太師諡忠惠弟天任為兵部尚書兄弟友恭方貧時率更衣以出終嵗同衾蓋晚貴盛復約以昭穆同葬子尚賓能守孝謹從子晦尹臨安守蜀復守鄉里在蜀以違言論閬州王惟中死士論少之王撝王撝字謙文其先開封人大父繇建炎渡江居于鄞撝博學耿介非其友不與語幼學于里師樓昉為文醇深善議論壯嵗試詞學科不中輒棄去自誓曰它日必令二子業有成後登進士第同年余天錫參知政事屬教其子弟嵗終致束修以謝堅不肯受拱立言曰二兒習詞學鄉里無完書願從公求尺牘往借周益公傳內翰番陽三洪公暨往昔習詞學者凡二十餘家所藏書余欣然許之後二子果俱中科為安吉丞攝令長興捐俸賙水災再攝新城復斥餘財五萬緡代貧民賦遷國子正將作監主簿時丞相史嵩之為相乞補外以避通判婺州御史劉晉之誣衢州掾慮囚受賕刑獄使者不直之命撝審實撝言誠無是事晉之怒而婺之士民咸言撝處置實當晉之不敢犯晉之蓋史相黨人也後攝郡去之日以羡財數十萬留于官改祕書丞後守徽州至郡廩亡三月儲暨解去粟支一年帛萬匹而所宜得錢復助少府用遷吏部郎中兼崇政殿説書疏言羣臣遜志之言多逆耳矯拂實未之見其議剴切深中時病嘗預修四朝史為輿服志六卷後直祕閣知溫州長子應麟别傳次子應鳯與兄生同日其學淹博精切為文詞操筆立就佐淮南箋記填委每入閣口占命吏即上馬去丞相知其能文詞召為太常博士將以內制處之甫入國門即死所為詞科文漢郡縣山川風俗記最詳洽得文體謝昌元謝昌元字叔敬西蜀資州人幼嵗見劉文節公光祖于簡州應對敏解為題扇贈之且勉以學見魏文靖公了翁復奇之類試四川第一調紹慶府教授後守施州築城以修禦開慶元年除太學博士遷太常博士知封州新學校提舉廣東常平茶鹽奏蠲鹽銀以寬民力疏入不報捐俸卒代償之為沿海參議官因家于鄞德祐元年以著作郎遷祕書少監當開慶初長子大椿挈其家屬來東南舟由鄂渚世祖皇帝時為大王駐兵江滸獲其舟載以歸問大椿知為蜀士子甚愛之俾給事殿中十四年世祖平宋乃命子召昌元入朝上深器之呼為南儒預議中書省事時南士為上所推重者曰青陽夢炎王虎臣暨昌元皆為尚書上既厭代是後南士郎署官亦不復用矣為禮部尚書上疏言增軍餉結民心除舊吏戢新軍上允其議又乞行選舉收遺書擇按察官嚴贓吏法置登聞鼓院至元混一之際凡所朝議昌元諸人皆得預聞後以老告歸卒葬于鄞黃震黃震字東發慈溪縣人中進士第為尉有能名後為史館檢閲入對言危亡災異在旦夕而緇黃出入宫禁亡節失朝廷體度宗大怒諭中書削秩罷丞相嘉其直出為通判廣德軍郡守賈蕃世丞相兄子也恃勢以喜怒決郡事震爭不屈後相知曲由兄子卒兩易為紹興府通判未幾守撫州兼提舉常平復兼提點刑獄時諸郡社倉法大弊震言法出三代猶有損益減息濟民青苗法非不善也弊卒不可救今社倉弊亦在是遂發所儲錢買田以代息撫人德之震為人清介自守臨川陸學傳四方震獨崇朱氏學其為文悉本之又尊其門人黃幹書鋟梓于撫善論利害奏疏明暢曲盡人謂其甚似朱氏後為提舉浙東常平升直寶章閣福王趙與芮判紹興朝命俾為長史以佐震不拜國事日蹙朝廷宰輔爭避去震知不可為歸寶幢山中誓不入城府所居日湖圖籍器物爭掠取亦不問在史館時以鄉先生楊文元公張文靖公右軍統制吳從龍死事乞入史館每閲經史文集輒疏其精要辨論曰日抄若干卷春秋禮記皆為集傳其死也里人私諡之為文潔先生陳肖孫陳肖孫字伯巖中進士第鯁介清苦操筆決詞訟曲當事理賈似道咸淳為相不喜四明士獨黃震陳肖孫為名監司士論莫易也以提點刑獄守嘉禾郡帑不妄用絶互送禮繇是蠲逋錢二十萬米四萬子姪合食唯蔬食脫粟人呼為菜湯知府會安吉冦作以措置失宜罷澤不及子朝議惜之遂官其子丞相署曰陳肖孫一亷可取當官其子年六十一終袁洪袁洪字季源七嵗通詩書春秋受業王先生鑐父嚴州守奇之初父與柄臣賈氏同名遂退屏居里益內治産業父死後兄闕析資産父事之盡力無私年十七以大父越公恩補官馬光祖守臨安徴為佐以敏達聞命徴責旁縣不受令禮部尚書李伯玉中書舍人劉震孫以治劇材薦佐兩浙轉運潛説友為轉運使檄督寧國絹十六萬自嘉熙以來名存實亡當取景定至今年逋潛恐數夥命它吏卒如所言胡太初刻削阿僻數謝病不許遷太社令時賈相不樂四明人與同郡士六十餘人坐廢家居講學不及世務其畜德逺權勢如此賈乃悔起奉葉州雲臺觀祠祿調補通判建康慮囚句容縱偽造楮幣連坐者二百餘人時大兵南下帥趙溍出督兵江上城中大駭夜縱火剽掠出郭去密捕首亂者數人斬之乃安諸將益桀驁請較射于是出私帑具賞先發三矢三中衆大驚服溍遁諸將釋兵歸淮西總領費伯恭遁乃微服詣行在所屢遷咸不拜宋亡諸無賴構陷衣冠陳參議允平在陷中帥命招討王世強捕治于是儒服入白人情未安不絶告訐非所以示綏懷也帥悟釋允平由是上變者輒斥去至元十五年入覲世祖皇帝召見授朝列大夫同知邵武路總管府事改溫並以疾辭二十七年侍御史程巨夫奉旨求江南賢士徴以應詔辭不起迎師友好賓客喪葬婚嫁不能任者給財無靳疾疚則治藥以拯之人嘗有過者內愧讋伏然必委曲覆護不以罪之其纍善積行此其類也大德二年改處州命下卒鄉人莫不垂涕泣隂德尤著云汪之林汪之林字德仲尚書大猷之族孫幼嵗見樓宣獻公言行淵懿善尺牘見後進道嘉言善行灑灑不倦舊與賈丞相遊賈相少嵗事遊狎其母禁止之聞與德仲遊不復語晚守汀州歸里自守貧益甚以終蔣曉蔣曉字堯臣伯父峴為諫議大夫以京官奏之謝不受後登第作邑有政聲為文徑正閲唐金石刻最多故其文時似之後以將作監主簿終善威儀巍坐終日不倦所言皆唐宋遺事節婦冀國夫人葉氏慈溪人歸于史冀公簡冀公年二十五為縣從事尉受賕杖平民冀公獨愍之以杖首雜朱殷以進初舉杖血流于凥尉怒以水抆拭之誠偽尉益怒據桉即以平民所受罪杖之歸數日死時夫人年二十有五有娠冀公死且囑曰若生女當嫁果男也幸謹視之夫人泣受其言後得男曰詔鄰保咸曰汝家若是褓中兒寧可恃耶夫人自誓不聽晝夜工紡績俾其子從師于鄉且曰讀書以行已為先操筆為文辭非聖賢本旨後其子訖為善士鄉黨化慕能使爭忿不直者皆自訟不復至縣庭夫人晚嵗理生産益自裕養孤女數人俾有歸年八十六以終凡十八封至冀國夫人詔以八行科舉不就後贈冀國公鄉人稱為八行太師而史氏孫曽貴盛繇夫人始丞相三人浩彌逺嵩之執政二人才宅之視執政三人彌堅守之岩之侍從二人彌大彌忠待制二人彌正寬之卿監四人彌忞望之定之宣之進士二十六人才浩彌大彌逺彌忠彌悆彌遜彌謹彌忞彌應彌鞏岩之嵩之佺之望之及之本之能之胄之俊卿有之常之即之介之蒙卿唐卿孝行楊慶鄞人父病貧不能召醫乃剔股肉啖之良已其後輒以為常自紹聖至宣和刲肝割乳饋親者凡五最後母病不能食慶取右乳焚之以灰和藥進焉入口遂差久之乳復生每勝日輒以筍輿載母禱于阿育王山佛祠年六十餘視聽聰明負儋行逺如四十許人宣和三年守樓異以事聞于朝不報名其坊曰崇孝紹興七年守仇悆申前請十二年有旨旌表門閭蠲免賦稅仇公悆曰韓退之作鄠人對以毁傷肢體為害義而匹夫單人身隔草莽軌訓之理未宏汲引之徒多闕而乃行成于內情發自天使稍知詩書禮義之説推其所存出身事主臨難伏節死義豈減介之推安金藏哉孫之翰字文舉慈溪金川鄉雞鳴山人少志乎學母疾革刲體取肝為粥以進越夕母如醉自醒乃砥于寧守趙伯圭將聞于朝文舉曰本心救親他無所覬守不奪其志年六十六卒于嘉泰二年葬五磊山張超昌國縣狀元橋東人家鬻素食為業超自幼孝年十九父縈患氣疾寖篤醫禱無效超乃炷香刲脅取肝煮粥以進不踰日父病愈乾道二年十二月守趙伯圭舉楊慶例命縣厚加優恤嘉泰四年令葛洪與免徭役仍封植其父母墓禁採樵云吳璿定海人父璋以邊功補副尉璋妻宋氏病璿刲股療之而愈年九十三乃終璿與妻楊氏更病男安禮安時皆刲股以進安禮療其母且至再焉璿七十九乃終楊氏尚在年八十九矣前守李沐以聞于朝嘉泰三年有旨長吏常切存恤府命縣令王百揆建崇孝門以旌之後令商逸卿趙汝重修童八娘鄞之通逺建嶴人居小溪朱氏崇孝庵之側一日虎銜其祖母女手曳虎尾祈以身代虎為釋祖母銜女以去時侍郎林栗侍親官于此目擊兹事既而來守以聞于朝未報而奉祠云逸士蔣宗霸周顯德初人為人慈善溫謹口誦摩訶鄉人稱之曰蔣摩訶時有僧遊奉化寓嶽林寺攜布囊與六七小兒行歌于道曰顛狂彌勒隨所乞咸受囊中鄉人亦稱之曰布袋和尚摩訶心異之而摩訶布袋名益著與之處逾三年一日同浴長汀摩訶視布袋背有目布袋曰吾為汝所窺當去矣吾以布袋贈汝俾子代代為衣冠家布袋歸嶽林坐逝葬封山後越帥遣介過蜀遇布袋道中卒舊遊四明識之乃曰為吾謝摩訶相見已近願自愛卒歸至嶽林道所以發棺視之唯錫杖淨缶焉卒遇摩訶述其語摩訶曰吾已知之一日造城别親友以逝好事者或曰布袋釋氏所謂彌勒也今嶽林遂為布袋道場云朱棣字彥誠鄞人初本江南士子靖康初挈家逃難伏林莽冒溪谷行抵明越之界萬山嵯峨望一石室壁立千仞規舍其中忽有老父曰此聖公巖也神人居之上每有金鼓聲且毒蛇猛獸守其窟烏可往棣下顧曰吾止平地而遇冦必無幸者匿此中未必犯于是棄擔持糒沿崖魚貫而進居旬有五日絶無可怖者而岡嶺秀出泉石清泚真仙者所居殆忘其歸望崖竇數有異光心頗疑之因梯竹而上得一黑匣緘鐍甚固一劍橫其外啓其中有書與印言役鬼治病之術冦退奉之以去設璮而事之自是役鬼神如反掌最異者能追魂疹脈人有病妻則疹其夫父則疹其子有祟則以法治之無祟吞符亦安合沙鄭瓚嘗伺其作法往觀焉見其據桉而坐運指于袖噀水于口以桃茢麾使而鬼神自至訊鞫論報若官府然問曰此何法也棣曰非法也周天大數也大衍所謂成變化而行鬼神也夫天地日月五星列宿與夫山川草木飛潛動植之屬不越乎是況于人乎況于鬼神乎儒者知成變化之數而行鬼神之數未之知也成變化者數之方也行鬼神之數數之圓也棣妻戴氏妊幼子神降于奉化張氏家言上帝使續棣法某日則生戴亦夢一道士顙有珠曰上帝使為子代天行法俄入于懷如期不血而生皮髮指甲猶三易其名曰定鄭瓚托其實記之蓋乾道七年也延祐四明志卷五
