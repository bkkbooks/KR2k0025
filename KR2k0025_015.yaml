body:
  text: 延祐四明志卷十五元袁桷撰祠祀考祭法立五祀謂法施於民死勤事勞定國禦大菑捍大患則祀之繇是祠祀日繁自無而有神之情也故神無形而有用事神之說盡是矣吳越俗尚禨鬼援是五者爭趨奉之烏得而廢諸作祠祀考社稷壇風雨雷師壇附社壇舊在子城西南一里所謂社壇橋是也宋亡社廢皇元改建今在鄞縣城西隅大鄉橋風雨雷師壇今在鄞縣甬東隅鄞縣社壇風雨雷師壇以附郭未建奉化州社壇在州之西南二百步雷雨師壇置於社稷壇內風師壇在州東北五里昌國州社壇在州西門外去州一百步風雨雷師壇未建定海縣社壇在縣西南郊風雨雷師壇宋附東海王廟慈溪縣社壇在縣西南郊風雨雷師壇未建象山縣社壇在縣西二百步風雨雷師壇未建本路城隍廟在于城西南五十步梁貞明二年刺史沈承業建宋嘉定九年攝守程覃奏賜額曰靈佑舊志云漢紀信漫不可考奉化州廟在州西五十步唐咸通六年建昌國州廟在州南城內宋建炎四年賜額曰惠應舊志曰鄉人茹侯鄞縣廟以附郭不建慈溪縣廟在縣西四十步定海縣廟在縣東七十步梁貞明二年建象山縣廟在縣西南二百四十步唐神龍二年建在城神廟純德徵君廟西北距舊子城五十五步唐刺史崔殷作碣銘徐浩書大厯十二年立後漢至行董君諱黯字叔逹句章人也依乎中庸率性純白少孤獨立事親不匱啜菽以盡其歡柔色以溫其省髙堂登壽慈顔裒如和以肥家安不擇地其徙居也庭出寒泉其執喪也林集祥鳥明誠必感厥德惟懋施及千載橫於四海其大孝也歟夫大道未隱不獨親親逮德下衰乃有慈孝行以名蕩情以禮飾季武矯而服縗子春強而過禮此離道以善非天性之孝也子云無違參則直養素冠有諷和琴不成此禮經之孝也文舉棄子士游出妻動非先意何以觀適雖曰可紀或近沽名此非教之孝也夫子一與之質道與之和生於東溟介居夷島俗逺詩禮性復著存無貽一日之憂終報共天之怨負土成壟枕干不言卒斬東鄰祭於中野所謂生知而上成心以隨欲蓋而彰強名曰孝加於古之君子數等矣和帝聞其異行特捨専殺之罪召拜郎中不起竟以壽終夫受命於時惟松柏也冬夏青青稟靈於天唯夫子也能全正性六代祖仲舒漢太中大夫嗣孫宇春領廬江太守世為郡中名族故以董孝名鄉慈溪署縣鄮江之俗薰然遺風皇唐大厯八載余分竹兹郡訊古欽賢環堵已蕪遺記將落徘徊故邑尚想餘範則夫子之行可以德類於人葺宇崇祠昭銘垂代豈不務矣銘曰白刃可蹈仁鮮能存黃金可鑠德無間言道喪於季賢生復古知禮近義變風於魯豈曰無衣寒燠以寧豈曰無魚泉流在庭黃鳥哀音下感棘心哭無常聲灑血盈襟江水湯湯東注窮越夫子德音與之不絶靈應廟北距子城二里半今在西南隅晝錦橋東額曰永泰王廟宋以來纍封為忠嘉神聖惠濟廣靈王邑人樓扶為之記曰我國家肇造區夏仁覆羣生懷柔百神咸秩無文非有德於民者不祀道浙而東四明為樂國繇晉以來靈應為著祠綿歷千載民依怙若慈父以其司一城之命故皆以府主稱闡靈播徽家繪人祝而未嘗驚動以禍福譬諸祥風甘雨其入人也深其潤物也博人陶粹和物用阜蕃優優大哉豈惟捍災禦患水旱疾疫必禱焉而姦芽亂萌消弭於冥默之中者未易以形迹數簮纓蟬聫日盛以滋四民熙熙懷土安業窅爾神化曰用不知嵗少不登藉海鬻以活連檣白粲間擬他往必儒衣示蠁以徠之訓以卑佑至巨室厚藏吝糶者亦然賈帆天際命寄鯨波乘危一呼恃以無恐島夷貢琛既岸匍匐肅謁所謂未施敬而敬者廟食隆盛昭於一方與海邦相為無窮祉哉聖朝褒表功德綸命赫奕貴極王封崇列八宇而麗牲有碑豐績未紀庸非斯文之闕乎爰托譜牒暨封爵嵗月顯揭之以詔來者王姓鮑諱蓋其先東海鄮邑人春秋鮑叔顯於齊西漢有宣與兩龔同傳至永昱事光武世為司隸王其苖裔也初二親籲天祈嗣母晝寢夢吞日有娠在胎三載晉泰始三年九月望日而王始生祥光燭室與前夢協命童名曰圓照既冠美鬚眉容貌秀偉平生賦性沖粹器度宏逺語言慷慨敬老慈幼恤貧軫孤好游俠任氣節以擊鮮弋禽為樂見山中石以為鹿而射之既中視之石因名之為鹿山東海魚龍相角海濱民甚患苦之一日有客艤舟岸旁而王舟至客問適從何來王謂客曰海口一大魚與衆小魚競小者將其羣鬬甚鋭大者力苦不敵遂奮楫擊小魚中之雄者因射之退餘亦俯首奔潰霧斂風息大魚鼓鬛掉尾似有喜色客甫歎息一老叟霜髯鱗裘至王前鞠躬謝且曰吾職東海有年而九江小龍逞驕結儔暴吾廬適㑹戰勢孤幸子助我而今而後海淵安靜如初皆子之賜子異時必廟食願遣息女為嬖妾王謙謝毋戲言叟擲水翻浪微露鱗角而去王屬客勿復言請别遺一小楫後人因號其所在曰小楫客盛傳其事疑信者半之然自是波濤息驚其說益驗王娶湖上方氏明淑能守節生一子絶肖乃翁篤好詩書王既薨建興四年葬鹿山即射石之所後三十年夢告其子我當再生可啓我冢墓次夜妻夢復然謀於親黨皆曰此非常事當如夢及發棺尸儼然如生但無出入息耳衣服潔潤若朝夕所服用冢四角燈燁然州人聚觀加敬乃乘雲而升練真養神蟬蛻塵表道家謂尸解者豈其是乎冢間得一爐非金非石籕文曰東海之寶永和初穆帝聞其異詔取爐禇太后曰神物也緘香遣還許丘祠王又夢呼其妻若子曰東海龍遣女在兹汝當㑹既而相繼以終因並祠鹿山墓旁梁大通末越有奴抄冦三千並海郡邑積嵗罹其禍王因巫者語刺史定襄侯蕭祗曰爾揚我武我濟爾功君第行必以八月十三日破賊至期冦至餘姚失潮舟膠衆惘然若昏醉官軍悉縛之武帝詔崇其祠唐神功元年八月八曰王降於縣東門托鄉童終日而歌曰吾姓鮑氏廟食於此自昔及今四十餘紀馬行水林縣必遷徙家在鹿山不堪居止鄞水西流北接甬水給事祖室實吾之廬汝為我請早為改圖待兔化龍遇齊得王移汝來封日月交光萬載無窮我歌章章父老同守人等告於令栁思古乞更置尉宗魯賢謂甬水有楊給事宅其子承奉郎𢎞道遂乞捨故父給事郎公遺宅為廟他無覬特乞子孫嗣掌祠事其世世無易鸞臺侍郎攝春官尚書狄公仁傑繳奏故至今祝史皆楊氏吳越有國規度而崇奉之舊相傳稱永泰王莫詳所始崇寧二年三月浙東鈐轄尚書豐公稷奏犯名改威烈六年三月路侍郎允迪守直龍圖閣樓公异以雨暘應祈乞封王爵封惠濟王宣和三年六月太守李公友聞奏睦冦竊發及剡魔巢洞距州近藉神休不能侵詔加賜額靈應政和八年九月路侍郎允迪使髙麗奏加忠嘉建炎四年二月髙皇帝南巡護風濤若平陸詔加廣靈嘉定四年九月故侯樓公之聞孫鑰參知政事告諸朝曰時和嵗豐神有大賜於民願顯揚其先以及後昆詔封王父協應侯王母協惠夫人元妃靖順夫人次室昭順夫人王子順助侯紹定間王示夢於史衛王彌逺作新廟端平三年今太傅丞相鄭越公清之奏易威烈為神聖有取大而化之聖而不可知之義復以尚書袁公甫之請詔加王父協應同慶侯王母協惠順慶夫人嘉熙元年正月同日告頒吁王之福吾邦也至矣而邦人欲報之德與天地並聲音笑貌云乎哉信乎其為祥風甘雨也扶家世晝錦密邇祠下目覿心祗思答神貺秉筆無一溢語里之人因語曰春而祈秋而謝牲肥酒香簫鼓喧遝無虛日至誕日逺近輻輳可思歸美侑祀之詩以聲之其詞曰帝閽開兮遙升載雲旗兮從霓旌睨舊鄉兮揚靈心獨直兮為民正奠朱宫兮欽止被潤澤兮大豐美鄮之山兮鄞之水草木葱葱兮黍稷薿薿望飛帆兮天一涯假祥飇兮安歸指商檣兮東之既飲食兮人莫知令海若兮無波魚鱗鱗兮盛多王之顔兮益康以和舞蹲蹲兮鼓坎坎進桂酒兮聲斯感福吾民兮樂只嵗其有兮自今以始民之報兮何千萬祀佽飛廟子城一里二百步鹽倉之西昔有碑今亡故神之姓氏邑里無傳考之淮南子云荆有佽非得寶劔於干遂還渡江中流暴風揚波兩蛟夾繞其舟佽非瞋目攘臂拔劒赴江刺蛟舟人盡濟按宋建隆中鄞令金翊纂異記謂唐武德時以此郡為鄞州至開元中改鄞為明郡名奉化城號甬東地名句章軍號佽飛考此則佽飛廟者蓋出於當時之軍號而軍必有將之者往往有功之人故人為之祠云大觀初本州所編九域志乃引淮南子所謂荆有佽非不知淮南子之非實非是之非非飛走之飛今廟榜稱荆佽飛侯豈非好事者附㑹其說而增以荆字歟舊志所辨次非之說如此今存之然軍號佽飛未必不取義於荆佽非之勇古字轉用甚多何必於非飛二字疑之或云旁有蛟池蛟自江來窟於此人患之故鎮以廟池今為居民所侵堙塞無幾或云唐末刺史黃晟初以佽飛都副兵馬使防遏冦盜保護鄉井沒而人祠之不曰刺史而曰佽飛蓋自領兵時人倚為重故習稱舊號云大人堂舊志云在子城北射圃中今在總管府之東北地黃叔雅云大人堂髙閌撰記謂錢億祠土人不敢稱其名尊曰大人新志疑之按億俶弟乾祐二年判明乾德五年終於任首尾二十三年開寶八年姪惟治為節度創祠以奉蓋子弟尊諸父之通號家語曽子曰參得罪大人漢書髙帝曰大人常以臣亡賴矧億浚湖築塘修它山堰等有功於民建奉國節自億始惟治在鎮又五六年繼此遂列祠於五廟若闞燔吳越家臣無顯功無緣錢氏子弟肯祠今所謂闞相公者以燔錢氏臣曽守此土從祀其旁後遂知有闞不知有億或訛而為吳太傅闞澤澤慈水人不曽守此土郡未移治不應先有此祠奉國軍樓祠在郡之鼓角樓神號旗纛將軍有禱輒應舊志書不載按運判戴公埴鼠墣載云唐百官志節度使陛辭日賜雙旌雙節行則建節立六纛既入境乃築節樓迎以鼓角宋有六纛門旗二受朝廷之賜藏之公宇在私室則謂之節堂朔望次日祭之曰衙日蓋有旌節則有神祀因號旗纛將軍凡節鎮所在皆重此祠宋明州係奉國軍節度使祠之本始其亦取此東嶽行宫在報恩光孝觀東宋紹興十年郡守仇悆所建知觀袁志賢募緣而成有聖母池人或竊物相與詣聖母前啓白投楮鏹於池其浮者為曲人以此畏之五龍堂唐刺史李伉以天壽院天井嵗旱禱雨輒應欲邦人便於奉祠於開元宫建五龍堂且為記以著靈異其略曰在天莫如龍龍之德佐天地養萬物百穀賴以生四海所共尊者也社祭土稷祈穀國之重典也既立壇以享其神矣則龍之靈翔風灑雨澤枯槁滋稼穡可不嚴尊酬之所哉余受命牧明人四月戾止六月大旱俾吏具香酒敬祈於五龍之神有蜥蜴狀者躍入杯中飲酒復出緣器上顧吏久之跳躑而去吏未返雨已大注由是生植茂遂闔邑豐衍思所以崇祀事答神休者乃建宇爽塏依方塑像以時薦饗時咸通六年季秋之末也宋乾道四年郡守張津以舊宇庳隘移創於報恩光孝觀之申地觀即開元宫也今存東嶽奉聖行宫在東南隅獅子橋東唐朝建立宋建炎兵火巋然獨存至元二十六年燬大德間主奉陸貴和募緣重建世奉祠云張帝廟舊附靈濟院佛殿之右宋淳祐六年制帥顔頥仲創於院之南火後僧復建鄉人趙隆孫為之記白龍王廟在延慶寺東宋嘉定十五年見像重建五顯靈順廟在城西南隅宋開禧年間鄉人徐侍郎守徽州神嘗效靈迎香火建廟於此皮場廟在月湖聖功寺內宋纍封為明靈昭惠顯應王元在汴顯仁坊皮角場故名蕭王廟在貫橋側此處舊有佛閣乃行刑之地因立鄼侯廟云鄞江廟在東南隅獅子橋東舊有鄞江門故建海神廟在東渡門裏茶場廟在東北隅拱星坊北東殿廟在東北隅達信廟在東北隅東嶽行宫縣東三十二里近阿育山廣靈王行廟在城外甬東隅顯跡廟乃鮑王舊塜尸解之地在縣東南三十里青山鬼谷先生祠在縣東六十里太白山南滄㠗水簾洞幽深閴寂人跡罕到夏侯曽先地志云鬼谷子廟三面連山前有清溪之水泉源不竭山崖重疊雲霧蔽虧郭璞曽到有遊仙詩曰清溪千餘仞中有一道士雲生梁棟間風吹窗牖裏借問此阿誰云是鬼谷子按鬼谷子祠在處有之不知孰是又有一祠在縣東三十里淵靈廟在阿育王山廣利寺環廟有聖井七自東晉時已著靈異中井有二鰻其一金線自腦達於尾其一每觀光耀折芥引之則雙紅蟹或二蝦前導而後出焉錢武肅王以嵗旱命九華長老十善大德興國中所謂五叔太尉者同迎置錢唐之南塔寺山間鑿石為井立亭其上以效聖井而鄮山井山二鰻游泳自若錢唐憲公為旱用紫羅帕布井中蟹先入靈鰻後隨以銀缸貯沙泉養之置道場有天花散漫之瑞僧統贊寧嘗著護塔靈鰻菩薩傳邦人禱雨必即之宋元祐元年賜額乾道二年守趙伯圭禱有應知鄞縣事李柄記於石或云又有二井在山絶頂險峻不可至靈波廟在縣西廣德湖唐賜額靈龍特封廣德宣聖王宋熙寧七年改賜今額鄞宰張珣輿陳光祿忠恕奉敕建白龍王廟在縣西二十里靈波之别廟也石㠗廟在縣西四十里㠗有靈鰻能興雲雨力施廟在縣西南四十里秋浦廟在縣西南三十五里殷浦廟在縣南一十里遺德廟在縣西南四十里它山堰旁唐太和中鄮令王元暐築堰扞水入小江湖灌溉甚博詳見河渠考民德而祠之封善政侯宋咸平四年廟重修蘇為記之乾道四年七月八日賜額縣宰楊布書守張津所立重修善政祠記載集古考嘉澤廟在東錢湖青山下唐天寶中令陸南金宋天禧中守李夷庚皆濬湖興利民德之故合祠焉水潦旱蝗有禱必應嘉定二年賜今額李侯又有祠堂在天童山景德禪寺千佛閣之東豐惠廟在廣德湖望春山宋政和七年樓异守鄉郡廢湖為田人為立祠嘉定二年賜今額濟顯廟在縣西南六十里即四明山之天井其井凡三有金線蜥蜴能顯靈興雲雨郡旱禱之必應宋嘉定九年賜今額詳見天壽寺吳刺史廟在城西門外九里堰唐大厯年間刺史吳謙字德裕有善政郡民㰱血而祠之宋王荆公宰鄞詣祠奉祀詩云山色湖光一樣清桑麻穀粟荷君情至今民祀年年在莫負當年㰱血盟前朝請大夫王應麟撰記云明自唐開元為州城西門之外有祠耆耋云大厯中州刺史吳侯廟也侯諱謙字德裕官水部員外郎史䇿軼其傳郡乘闕其蹟遺愛在民㰱血奉嘗春秋蘭菊悠久弗懈余艤舟扶藜過廟下式瞻貌像問其故則曰侯守是邦開西郊之湖膏澤滲漉甫田登成其地為九里堰因以名廟歷載綿邈民猶曰吾使君也召棠勿翦韋碑未刻王文公宰鄞為詩以識山色湖光之句遺黎誦之余肅然欽歎斯所謂盛德至善民不能忘者乎語鄉父老曰古者建祀以為民也民功曰庸自稷以來是尊是奉以水佐耕豐稼於野芍陂七門之祀芬至今未泯惟明瀕海厥土舄鹵歷選良守溉田興利孔內史之於句章􅋣任刺史之於廣德湖皆載在簡牘今唯鄮令之王列在祀典他無所紀侯之牧我民也不求焯焯之譽而實德著於人心不為皎皎之政而流澤被於後世若昔河南守吳公治行為天下第一而史無可書之事言漢循吏為稱首侯豈其苖裔歟河南治聲止一時侯自大厯迄今五百有餘載民思無斁於前修有光焉咸以無心為感兊以無言為說此秉彞好德之良心也越俗禨鬼史巫紛若邪怵妖誘匪經禮攸迪無知氓不蠲蒸亦罔能穀於赫仁賢食報兹土正大昭明允合光聖王之祭法粢醴馨潔永永毖享豐年叶氣惠我無疆其孰曰不宜父老曰諶哉盍鑱諸麗牲之石時萬時億承神嘉祉余既書其事又作迎送神詩俾歌以侑其辭曰坎擊鼓兮鄞水滸思仁侯兮昔召父􅋣九里兮釃流為雨水泱泱兮芃芃麥黍鴻隙陻兮謡豆芋侯嘉跡兮依其在渚神之來兮飇輪下蘭觴勺兮薦椒醑民不忘侯兮歌且舞侯不忘民兮俾寧宇神之歸兮娭瑶圃格皓穹兮降多祐屢豐穰兮除疾苦年千世百兮保艾吾土事侯如存兮侯其福女敬共承祀兮無怠終古又詩云城西有祠臨水涘翠松列植路如砥問之耆老此為誰唐大厯中吾刺史刺史為民開陂湖故蹟猶傳堰九里年年簫鼓報豐穰決渠為雨潤澤美遺愛有橋名懷恩姓名不載太史氏昔漢吳公治第一列傳寂寂名無紀刺史豈其苖裔歟明州政亦河南比堂上大書荆公詩蘭菊春秋百世祀地志秪稱王長官有功於民蓋一揆吾聞是邦多賢守裴王碑字顔與李歡侯盛德著人心彼石可焚祠弗圯廣德湖為鴻隙陂召棠欒社誰敢毁粳稌充羡侯之賜廟食長存如此水猛將廟縣東二里神姓李名顯忠髙宗避難神扈駕防送御舟出海祥飇送帆賜爵猛將重節武功大夫水旱疫癘蕃舶海船有禱輒應撥官地一片興建祠宇靈顯廟縣南四里世傳鄭世忠建炎年間隨駕至鄭死於王事邑人義而葬之於金谷里陳㠗後隆之原屢顯靈異有功於民開慶元年賜今額天妃廟在縣甬東隅皇慶二年重建延祐元年十月內欽奉制書愛人利物仁克著於重溟崇德報功禮宜增於異政肆頒綸命用舉彞儀護國庇民廣濟明著天妃林氏聖性明通道心善利當宏往納來之際有轉禍為福之方祥飇送帆曽聞瞬息危檣出火屢闡神光有感必通無逺弗屆顧東南之漕引實左右其憑依不有褒恩曷彰靈跡於戲爵以馭貴惟新懿號之加海不揚波尚兾太平之助可加封護國庇民廣濟明著天妃主者施行慈溪縣靈應廟在縣東一里即廣靈王行祠也純德徵君廟在縣東北一里慈溪因孝子得名而舊無祠宇附祀於城隍宋建炎間縣令林叔豹於靈應廟西建祠堂遷像而祀之紹興三十二年郡户曹董鄰攝邑於普濟寺之西建廟久而圯慶元二年縣令朱堂增修行禮部尚書樓鑰記之張孝子祠孝子諱無擇唐永隆初中明經科仕至中散大夫和州刺史墓在虎胛名山去縣西三十里無擇仕於朝則忠居於家則孝李孝逸將兵討亂公贊謀有功父袁州司馬卒公丁憂於神龍元年奉棺歸葬此山負土結廬三年不櫛七日絶漿感芝草湧泉之瑞鄉人虞彥之百餘人詣州舉之都督竇懷正按驗得實以聞孝行著聞今古稱歎服既禫辭祿廬墓二十年以終身從葬司馬墓博士賀知章志於墓宋嘉定十四年邑士孛夢林請於縣立祠與純德董孝子春秋並祀著作郎張虙記墓久屬他人侵占宋德祐元年有孫張景雲善繼先志慨捐已資竭力回復太學博士陳大震記皇朝凡舉行大禮纍命有司躬詣墓下致祭靈感廟在縣西北七十里地名向頭山宋建炎四年封靈應侯五聖廟一在縣東南一里一在縣西南一里東嶽行宫祠在清道觀之西去縣治一里驃騎將軍廟在縣東南二十五里㑹稽典録云漢世祖張意為驃騎將軍後隱於山遂立廟以祀之祠山張王行祠在永明寺開禧初縣尉施子升始建殿宇宋寶慶二年縣令周符尉莊鎬募衆廣其殿宇水旱疾疫人必禱焉定海縣東海助順孚聖廣德威濟王廟在縣東北五里宋元豐元年安燾陳睦奉使髙麗還上言請建東海神廟於明州定海縣詔元封淵聖廣德王崇寧賜額崇聖宫大觀加封助順宣和加封顯靈仍封附祀風神曰寧順侯雨神曰寧濟侯建炎加封祐聖淳化二年祕書李至言東海廣德王廟在萊州南渡道絶詔加東海正祀典也初度道士以奉祀紹興間請額焉為淵德觀因遷神像於廊東紹定年間立殿以奉之東嶽行宫縣東北五里招寶山下宋紹興八年建助海顯靈侯廟在縣西五里侯姓孔象山翁浦人行第七性剛烈鄉人憚之死於海有劉贊者夢侯曰上帝録吾善命為境神已籍水府吾尸泛於沙浦君能收葬創數楹俾有棲托必為民利贊訪問果如夢即所居葬而祠之錢氏有吳越靜海鎮將以排筏航海驚濤危甚夢侯許以冥助即順風而濟乃立廟於鎮兵部侍郎皮光業為之記宋髙宗幸海道賜額顯靈洋山廟在縣東北五里即昌國州煬帝廟之行祠也廣靈王廟在縣西北三百步宋宣和五年方臘亂邑人賴神隂佑故立廟於此昭利廟在縣東北五里宋宣和五年侍郎路允迪給事中傅時卿出使髙麗涉海有禱由是建廟覺海威顯侯廟在縣南一十里舊號山仙廟宋建炎髙宗幸海道賜今額開禧二年令商逸卿修建新閣且記之陳山忠應侯廟在縣南一十里舊號陳相公廟宋建炎髙宗幸海道賜今封雲雩三公廟在縣東南八十里與鄞境接廟不知所自始其神冕而九旒垂黈纊被山龍黼黻為旱禱輒應主簿永嘉戴相記之謂穀梁氏所謂應乎上公而通乎隂陽者也樞密承㫖卞公祠堂在縣東北五里至元二十六年子朝列大夫卞燾同知府事痛父死王事乃於山下為立祠作記象山縣東嶽行宫在縣西南二百五十步棲霞觀之側宋大觀中建昭應廟在縣西北一百四十步舊名圓峰祠唐㑹昌中王關撰文宣王廟記有云自圓峰祠歷城隍廟則此祠其來尚矣或以為縣主山形圓因名之一日午自其舊祠飛片瓦止於今廟之基邑人姜臯因遷焉境內嘗嵗饑瀕海窘糴忽有米舟抵岸謂邑人曰昨有扁舟招吾來者自云居縣西山下既而詣之乃廟也觀神像驚愕且拜即平價盡糶衆賴以濟宋建炎四年海冦猖獗將抵邑境隂霧陡變舟楫旗幟甲兵衝突風雹大作賊舟沈溺乃遁去使臣冉進欲為亂劉帥見一急足告變乃斬冉等於廟側是嵗賜今額凡水旱疾疫禱之必應纍封靈澤孚佑昭貺顯濟侯咸淳四年封英惠濟烈公沖應真人祠在縣西南二百五十步蓬萊山之下透瓶泉之北與棲霞觀同建真人姓陶諱𢎞景舊封貞白王欽若靈驗記云梁朝真人修藥於蓬萊觀自寫真於東壁有居觀側者晨起必望觀瞻禮常販於天台一旦隨舟渡海將及縣颶風大作舟欲傾沒同舟七十人見一道士乘雲隱約黃色光芒中以羽扇約風曰陶真人相救毋怖畏言訖風息既濟其人引同黨至觀見真人像如舟中所覩遂相率修飾觀宇以答焉宋祥符元年營昭應宫自永嘉掄巨材浮海至邑南風濤幾溺舟人於空中見道士謂曰吾象山蓬萊觀陶真人也且救汝須臾安濟慶厯中道士鄭日徽更造殿宇而壁間所寫真遂泯其徒嘗以縑素摹留副本有誠禱者則幅巾黃服隱然現壁間淳熙末令王椿為旱禱像現而雨上其事錫封沖應真人普濟廟縣東南三十五里舊曰鋸門廟祚聖廟本東門廟在縣南一百里世稱其神曰天門都督按天門山在南海中而接寧海之東境故號東門下有石閫最為湍險舟舶往來必致禱焉唐貞觀間有㑹稽販客曰金林祭畢誤持胙肉去行十餘里忽逆風復漂廟下乃悟所誤亟加祈謝即反風安濟永徽間又有工人曰蔡藏自泉州造佛像回獲緍錢數百祀禱少懈舟發數里而覆宋建炎四年賜今額白鶴廟在縣城內神姓趙名炳字公阿東陽人能方術事見東漢書徐登傳台州人祠之甚謹象山舊為台屬邑故亦祠焉宋嘉祐六年令陳玠銘於石顧長官祠在縣城內長官名方字正夫丹陽人宋皇祐末登進士第調象山令日召邑人父老詢民利害勸善懲惡建學舍教子弟頻為講解誘進於善逾年民大化後方疾篤邑人為之致禱者近千人竟卒於五百里之內號泣慕戀相與立祠丹陽錢君倚毗陵胡完夫上饒州何籕記其事於石昌國州黃公祠在東海晉天福三年建按舊志云賈充問於㑹稽夏統統曰黃公之髙節而㑹稽典録亦稱人材則有黃公潔已暴秦之世然則四皓之一也或引張平子西京賦東海黃公赤刀奧祝冀厭白虎卒不能救之語今兩存之岱山廟在北海中世傳隋末陳稷沒後顯靈於此烈港廟在金塘之烈港乃廣德軍張王之行祠也宋紹興二十年都巡檢使李同建徐偃王廟在州東地名翁浦俗呼為城隍頭十道四蕃志云徐偃王城翁洲以居其址今存按史記載偃王之敗北走彭城武原東山下以死疑非此海中而韓文公為衢州廟碑乃記曰偃王之逃戰不之彭城則之越城之隅棄玉几研於㑹稽之水則四蕃志或可信矣洋山廟在東北海中唐大中四年建黃洽記云海賈有見羽衛森列空中者自稱隋煬帝神遊此山俾立祠宇宋建炎四年髙宗幸海道以煬帝不可加封特封其二妃為惠妃順妃夫人為明德夫人敕藏於廟并刻於石奉化州東嶽行宫在州東北四里虛白觀後城隍廟在州西五十步唐咸通六年縣令李宗申建燬於兵火至元二十六年尹李天益重建延祐七年知州馬稱德重修誠惠廟在州東三百步州有山曰日嶺嶺有怪石髙七八丈逺望屹如婦人十道四蕃志所謂奉化新婦嶺者是也唐立廟曰貞固夫人之廟宋景祐年間縣令子房廢以增學不久復宣和四年賜額紹興三十一年賜號昭德夫人其詞云朕閲輿圖之籍知日嶺之山有石肖人而能錫人之福水旱盜賊之禱應如響答心甚異焉豈烈婦正女一念堅固先天地而常存形寓於石使人觀感而化者可百世祀乎維神聞於有唐廟號於宋朕今明煥恩寵以徽稱從民欲也其侈神休答斯民所以告朕之意嘉定甲申加封順應咸淳乙丑加封福祐云顯佑廟在州南鮚崎鎮神姓仇廟創于唐禱之輒應宋嘉定三年賜今額參政樓公記其事十七年封靈惠侯佽飛廟州北門一里即府治佽飛之别廟也延祐四明志卷十五
