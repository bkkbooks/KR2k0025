body:
  text: 延祐四明志卷七元袁桷撰山川攷隨山濬川禹所陳非𤨏言也治梁及岐後訖不能别何哉明郡以四明山得名其山范不能定或曰在越或曰亡是山唐一行作山河兩戒深有㫖矣四明山由越来至于慈溪東行至于鄞復折入奉化脉隴連屬稽諸田野可攷也江入餘姚上三十里與四明水接更十里潮勢已没古為堰限之吴潜為慶元恨慶元公卿多徙堰于上虞潮至舊堰上不一二尺舟楫蔽沙岸雖驛舟不可發使者數言而上虞謂新堰利益不肯改噫其果有是夫作山川攷山鄞縣四明山繇天台山北面起向東北一百三十里涌為二百八十峯中有三十六峯周迴八百餘里謝靈運山居賦曰天台四明相接孫興公賦曰登陸則有四明天台四明方石四面自然開䆫其中分通溪曰簟溪西引簟溪東入于海地稱句章又云鄞江山有七峯相去各六十里雲霧相通山東面七十峯狀如驚浪之山境接句章郭璞言後五百年當立郡至開元置明州其言適符合棃洲洞水東出句章是四明東門山西狀如奔牛曰奔牛山連脊起峯因以名之中有三朶峯鐺足以立漢張平子居焉中有石室石西南有五朶峯形如芙蓉峯相望各去六里中峯為四明山心棃洲溪生沙棃孫興公與其子孫成游得棃以食因號棃洲楊修游四明山見一老人其言曰見兩人把火且當獲金刀修解之兩火炎也加刀為剡因號剡溪其説誣恠後漢有劉阮二士怪不復録四明山南聳七十峯狀如驅羊其峯存者曰存羊水源十丈有神蛇居之吐靈氣如樓閣可禱雨山足一澗出南過一百二十里水歸鄞江南源也北南洞一源四明山南門也溪號白溪宋有捕魚者恍不見日光因號為大晦山東復有一峯下有龍窟逸士陶源採望如樓觀號小晦山西南八峯下有囊號八囊山山向北有兩陣山如走蛇舊有人居之山之北門也梅福隠越游焉城西曰四明山四面二百八十峯周迴八百餘里東接句章西連舜窟南嗣天台北包翠碣其言不妄山有五朶峯東有一峯髙六里周十里南一巖髙一丈深七丈中有石穴通泉流于棃洲穴生甘草又多古杉栢瑞雲居之西一峯髙四里南有石室下有石碑相𫝊劉阮居之南一峯髙三里有石壁壁出數穴生石乳北一峯髙四里峯頂有天井雲氣吐吞山四面各生一色樹東生樟樹西生松樹南生栢樹北生檉樹及黄楊木其山頂上極平正每有雲葢之晉沙門白道猷從天台入四明將築室不敢居以還木𤣥虚梅福孟亮㳺㝡著其事荒忽不敢紀今因山記采其實而言之劉綱事見太平廣記謝靈運山居賦天台桐栢方石太平二韭四明五奥三菁太平之北諸山神山神仙所居宋書孔祐至行通神隠於四明山嘗見山有數百斛錢視之瓦石不異今父老相傳以繇小溪以上為東四明由餘姚而言為西四明繇奉化雪竇以入者則謂之四明山盖山勢蜿蜒連屬與三境相犬牙金峨山縣南八十里州之桉山也太白山縣東六十里視諸山為㝡髙其顛有龍池雲氣蓊勃生於水面不絶若麗日晴霄澄徹如鏡或風振林木落葉紛紛過之無墮池中者每風雨時雷電多從山頂生天童山有支徑可登此峯頂邦人旱暵必禱焉每有靈物變見雨隨以至或曰山以太白星得名又曰近有小白嶺故此為大白非太白也舒亶題太白峯千峯下視盡兒孫仙事寥寥不可聞長作人間三月雨請看膚寸嶺頭雲題太白庵何年杖錫此徘徊天上真官為我来芝圃鶴歸香火冷石基空鎻舊蒼苔天童山縣東六十里晉永康中僧義興廬山間有童子来給薪水久乃辭去曰吾太白一辰上帝遣侍左右言訖不見太白天童之名昉於此山前有玲瓏石巖多嵌虚支徑透其絶頂景象尤勝舒亶題天童寺日日青鞋踏白沙未應泛艇即靈槎雨溪清越鳴哀玉風蔓蜿蜒動暗蛇曉潤芝􅓕挑秀茁午香茶竈煮蒼芽玲瓏仙客知何在千古烟霞自一家樹王安石題天童山溪水清連樹老蒼行穿溪踏春陽溪深樹宻無人處惟有幽花度水香鄮山縣東三十里髙二百八十丈按十道四蕃志云以海人持貨鄮易於此故名縣居鄮山之隂乃加邑為鄮阿育王山在鄮縣之東髙數百仭阿育王見靈建寺其下因以名山詳見本寺文寺有徑路可上山腰有佛左足跡入石二寸餘有極目亭望海中山如丘垤然玉几山阿育王山之前自寺視之横陳如几大梅山縣東南七十里盖梅子真舊隱也按福本傳王莽顓政福一朝棄妻子去其後人有見㑹稽漢時鄞屬會稽而子真所隠亦不止此一山山中有石洞僊井藥爐丹竈遺跡猶存山頂昔有大梅木在其上則伐為㑹稽禹祠之梁其下則為它山堰之梁禹祠之梁張僧繇圖龍於其上夜或風雨飛入鏡湖與龍鬬後人見梁上水淋漓而萍藻滿焉始駭異之迺以鐵索鎻于柱而它山堰之梁長三丈許去岸數丈嵗久不朽大水不漂或有刀墜而誤傷之者血出不已餘見它山堰灌頂山縣西七十里闕鄉其山直上二十里方至頂有普凈禪院嵗納租故宋有採鐵於此朝㫖禁之自天禧二年租輸府學養士嵗入錢三百貫延祐七年山民陳永等作一十五定後寺僧分佃一半今復通佃它山即善政侯為堰之地水南沿流皆山至是始有一山在水北因兩山相對堰得以成以其無山相接故謂之它山亮闍黎題它山截斷寒流疉石基海潮從此作回期青山自在行人老澗濶水聲無絶時天井山在通逺鄉神龍所居有三井焉一巖突然而出者下瞰百仭之淵地僅容側足縁蘿可行如此者數十步至下井井之旁石皆光潔如龍物常行久而熟之之狀又行三里至中井益險又行三里至上井則難矣旱暵祈晴得蜥蜴或蛇蟹之𩔖自山下望之奕奕有光雨輙應每欲雨則雲霧先興於此山山有龍王堂張良臣記響巖縣東南五十五里句章鄉巖石壁立下浸江水水流作聲則巖中荅之故曰響巖有影如佛像故又名佛影巖天寒有鸕鷀數百為羣集于巖上故又名鸕鷀巖北巖縣南五十里句章鄉巖中可容百人暑月清涼有頻伽鳥巢其中鳯山縣西南七十里通逺鄉石臼山縣西南五十里光同鄉山陂有石圎而匾濶可二丈中有穴似臼世𫝊葛仙翁煉丹之所旁有二足跡世謂之仙跡山下溪潭深迥杳不知其底有魚能負舟或見則必作隂雨或見龍首枕於山麓潭上者仙隠山與此山相連魏文節公杞作碧溪庵於其上芝山縣南五十里光同鄉西石山縣南六十五里通逺鄉出石東石山一名稽山縣東三十里出石姜山縣南三十里平原中崛起有石洞三其一最大曰後巖中可坐數十人洞後又有一小洞上有小穴形圓如月可仰窺天里人像神祠於巖中後分其祀於山前巖下號前巖廟茒山縣南五十里與姜山對峙陽堂山俗曰青山縣東四十九里輿地志云此山四面懸絶下有鮑郎廟即鮑君生所居也銀山縣西南四十五里地名小溪嘗産銀故名錫山縣西南五十里嘗産錫故名大含山縣東南三十里白鶴山望春山皆在廣徳湖陶公山在東錢湖山下多朱姓居之世𫝊陶朱公嘗隠于此有釣魚磯在焉宋寳慶三年守胡榘建煙波館天鏡亭于其上詳見叙水東錢湖内隠學山在東錢湖其下有栖真寺放生池二靈山在東錢湖有張王行祠黎花山月波山百步尖山皆在東錢湖有寺大慈山在東錢湖下水嶴宋丞相史魯公𦵏母夫人于此以此著名聖女山管公山皆在縣西珠山畔跨山有瀑布佛隴山阮山朱長山皆在縣東東山黄山金文山五峰山皆在縣東南建嶴山在縣西南四十五里白石山在縣東三十里翔鳯鄉其山青秀與東錢湖相對人多遊覽焉山有白石故名舊志載亶洲山在縣東四十五里按十道四蕃志云亶洲有虞喜墓縁晉屢召不至死𦵏於此東方朔十洲記云山有不死之草赤莖緑葉人死三日以草覆之即活按吴志黄龍二年春正月魏遣將軍衛温諸葛真將甲士萬人浮海求夷洲及亶洲亶洲在海中漢武洞穴記言秦始皇帝遣方士徐福將童男童女數千人入海求蓬莱神仙及仙藥止洲不還世相承有數萬家其上人民時有至㑹稽貨布㑹稽東縣人海行亦有遭風飄至洲者所在絶逺卒不可得至故衛温等但得夷洲數千人還今謂亶洲山去縣四十五里實無此山世𫝊今日本國即此洲然未知是否也又載雞鳴山云山有石井上有銅瓶著石有大石雞云從浮桑上飛来今猶鳴應扶桑曉太平寰宇記載動石山云有堅石髙五六丈下有小石支之暴風雨則其石自動山行者聞隆隆之聲又載靈山云有石鼓臨澗若鳴則野雉翔鳴故曰靈山今境内皆無之奉化州四明山連㑹稽接天台跨慈溪鄞及州境詳見前鎮亭山州西南一百里漢地理志註鄞有鎮亭山西界于越跨于天台故其鄉為連山鮚埼亭山在東南四十里瀕海之地與袁村相屬漢地理志註鄞有鮚埼亭顔師古云鮚音結蚌也其長一寸廣六分有小蟹在其腹中埼曲岸也其中多鮚故以名亭俗訛為戰埼鄞城山州東五十里古鄞城在其下故名乾道舊志載赤堇山在鄞東四十里山有草曰赤堇鄞縣以此名而加邑焉天門山在州南六十里大海海外列嶂排空有兩山對峙髙入蒼莽南亞于海漢地理志顔師古註云鄞縣東南有天門水入于海有越天門山陶𢎞景真誥云天門在鄞縣之南寧海之北半亞于海雪竇山在州西北五十里四明山之南有千丈巖瀑布泉錦鏡池妙髙峯含珠林宋理宗御書云應夢名山丹小山在州西五十里四明山之南屬剡源鄉之三石村有巨石故名三石山上有二洞洞上有丹霞二字如朱書洞如廣厦中可容五六十人有深穴可容人身昔有入者行㡬半日聞水聲如雷而返水㳙㳙巖罅間其流迹皆赤色下有龍湫旱暵禱之巖後風從竇出常飇飇有聲夏絶無暑冬則凛凛不可近俗號風洞雲笈七籖所謂丹山赤水是也徐無巖在州西北七十里巖立數百仭瀑布飛下冬夏不絶下有潭上有鞠猴巖三大字刋于石大小晦山在州西六十里即四明山南来之兩峰左肩紅嵓山下有覆盆山宋時應則入山初甚秀麗既而㝠晦故曰大小晦四明洞天記云兩峯各有大小晦是也或作悔非望春山在州西五十里其右文筆峰其左展旗峯寳化山在州南三里有古松如卧龍杜䳌花如翔鳯題詠詩見慈氏教寺漢城山在州東北二十里山有五代漢時城基樓大參攻媿有詩云城復于隍遺舊基山雲漠漠草離離當時雷皷聲沉後留得寒巖伴落暉南山在州東南五里西山在州西南五里馬跡山在州南五十五里石上有馬跡故名三山在州南五十五里屹立大海中如三台然旁有數嶼金峨山在州東六十里髙出衆山乃郡治桉山也大雷山在州西南四十里登其山見海二百里外即唐末謝遺塵隠處横山在州南四十里腰山為路二十五里有石文若篆謂之天篆旁有鯉臺劉閬風有摩崖詩新嶺在州東四十里東有七十二曲上下牢巖在州南三十五里上巖壁立下巖回顧謝家石洞在州東三十里洞居山腰深丈許有竅可窺天桃花坑山在州西五十里四明山之上二十里雲之南也山巖壁立數仭延袤數百里嵓色紅白相間隠映出没狀如桃花之初發故名四山環繞宛如盤谷中有平田數百畝鮚埼嶺在州南四十五里畸山在州西北二十一里湖山在州西北一十五里吴郎山在州東南一十里蓬島山在州西南四十里小梅山在州南三十里雷公山在州南三十里九峯山在州東六十里筆架峯在州東三十里其峯崪屼如筆架之狀雲興則必雨天柱峰在州西六十里丁公山在州西七十里義峯在州東七十里九女山在州南二十里大洞山在州南六十里東坑山嶺在州西南六十里燕巖在州北二十里有燕子穴故名獅子巖在州東五十里狀如獅子銅山在州西北一十五里俗𫝊昔有樵夫入山滿目皆金寳意欲拾取之倐有神人仗劍而出頃之旋顧悉不