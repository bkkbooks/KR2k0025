body:
  text: 延祐四明志卷十九元袁桷撰集古攷郡以山川傳傳莫詳於前賢廣其傳則凡四方之公卿與夫騷人禪子之所紀刻益尊以傳焉裴公紀徳碣屢燬益彰牧守宜視諸荒園故宅申之以感慨豐碑磨泐日尋於榛棘聞見益逺桑海之喻詎不信諸作集古攷文明州刺史河東裴公紀徳碣銘并序皇唐御神器一百四十二載天下大康而海隅小冦敢肆蠆毒結亂于甌越而句章控吳越之口戰卒數萬皆由此之故是郡罹灾逾苦井邑焚爇遺骸積而不掩生民僅有存者教養未完其危猶未安天子哀之詔擇可以子物拯艱者以鎮䘏之乃命長安令河東裴儆殿於兹邦詔書既下而罷民歡煦若幼子之望慈父焉彤襜甫來則改令創痍之境熈熈如衣之食之一年而驚逋復田疇闢茨壟興然後以禮義利物之教教之人之啙窳者教之以温恭惇質人之卉服祝髮者教以儀飾之度人之匱財乏食者教以耕耨之事羣吏懐其仁而畏其嚴罔敢射其利焉故為政三年其賞人也不用財其勵人也不以罰於戯長人之體不一若乃華夏之人習性素純其理之也可期月而致若海裔之人土風俗素暴殘嗜殺寛之則法令非行威之則圜視而兇心勃生其欲馴之也難矣哉及公之化風俗為鄒魯使父子長幼各得其宜則知中庸清靜之徳感人深矣夫理一邑而能人和物阜者則可以移於一郡而能導之以徳教者則可以施於天下公之所理之行豈止郡邑而已實宜佐彼大化輔皇王以昌經邦國以康調元氣於隂陽者也公尋而進秩州民共思願紀詞于碑予忝躡髙蹤竊跡前事敢不頌厥美貽諸億祀銘曰美裴公兮肅肅清風純和積中令徳顯融爰踐華省爰宰赤城克成厥功帝曰咨爾休懿可建旟于東美裴公兮于郡斯牧是祗是肅化流比屋變此土風迄成魯俗人之父母匪公而誰慰我􅑏獨羡裴公兮胡棄我而適他邦惟我下民思心徘徊殷焉不忘願頌休績播億萬載刋于圭璋國子監丞充集賢院學士李陽氷書檢校左散騎常侍兼越州刺史賜紫金魚袋江東西節度副使王宻撰慈溪縣清清堂記徐璋余一日過是邑聞邑大夫黄公嚴明通漫刺謁之公倒屣迎門倍越平生好頃之延余一堂榜曰清清憑髙原面廣野基宇聳壮丹青煥飾周旋熟視見平蕪散緑脩竹環翠孤村落照而飛烟有無逺水斷霞而白鳥上下余謂掲堂之名殆以目之所寓者歟公笑復之曰非也將水禽嘲哳松籟悠颺艇棹絶湖而漁唱數聲牛羊下坡而牧笛孤響殆以耳之所聆者歟曰亦非也抑訟息庭虚退而孤坐琴横浄几香裊蠻爐一慮不生萬縁俱滌終日寓之而忘身之在仕堂之為公舍豈以意之所適者歟曰皆非也蓋淳化中有賢令張公叔逹綽著彊明茂昭清徳政施百里而聲逹九重時太宗璽書敦奬先詔尚存後人惜其清名慮乆湮沒無以勸後廼建堂揭榜目曰清清俾游息是堂者睎仰前軌脱不能與其抗衡並馳抑終不失為自好者矣予自領邑見其柱礎傾欹棟梁蠧腐稍不葺完必將頽廢因念召伯之棠尚戒翦拜况棟宇乎遂鳩工掄材増卑廣狹整欹易蠧為一新之不唯不堕前人之志抑將永君子之傳予聞其言戄然自愧逆料鄙淺因嗟先王道徳之澤熄入而從仕者多失已於物以自投于茍賤不亷之地間能潔亷缺晝簾堂記趙省右朝奉郎宋侯子剛治鄞之三年政成民和上下安習凡所施設不待教令而民聽已孚訟稀事簡公庭肅然日以優暇乃即㕔治之東為堂三楹以視事以延客以休其餘日鳩工命材棟宇輪奐官不知費民不告勞經始於辛巳仲秋竣事於是年季冬落成之日因取顧愷之宰山隂之政榜曰晝簾噫侯之為是舉也非夸大以掠美誠得所謂名者實之賓歟夫民不難親也惟平易能近之民不難化也惟寛厚能服之平易貴清淨而不擾寛厚貴豈弟而不暴以是施於有政使之無訟也又何難哉今晏眠而擁黄紬卜晝而酣醇酎文書堆桉漫不省顧以是為平易謂之食焉而怠事可也經費常賦慢令失期獄訟簿書一視成檢以是為寛厚謂之縱吏以虐民可也茍如是則寄百里之任者心逸而體胖齒負版之列者悼屈而無告引利償害其自為謀則善矣獨不念學道愛人之語乎惟宋侯之理鄞則不然旦起據案訟牒山委勤勤致詰曲盡其情催科調斂示以期會下皆奔走而樂輸曽無追逮之煩宜其政平訟理庭無留滯方愷之之治如天冠地屨豈但彷彿其流風善政而已蓋山隂在當時户不過三萬其縣用無事晝日垂簾特折枝之易耳鄞自西漢距今號劇邑民夥訟繁十倍山隂宋侯方且慕仰之若是可謂亷於取名者矣于時國家有邊事州縣簡料兵壯備預儲峙以應上之求常苦不暇給而侯能多多益辦如王夷甫在元城時終日清談而縣務自理其材力過人逺甚若乃吏退身閒賓僚畢集彈緑綺以舒懐對紋楸而坐隱壺觴相命歗歌嬉娛此在它人常刼刼而侯之樂獨有餘亦足以見游刄之所及矣異時第最天朝登名史氏號居循吏之目當以鄞治為先宋侯名應子剛其字也視大丞相莒公為三世祖精於吏道飾以儒雅不圮先世之餘烈云紹興壬午閏二月既望重建經綸閣記徐度或謂君子之仕為郡邑既去而能使人思之不忘在古或有後世則難而邑其无也何哉古之為邑位均子男南面聽事生殺予奪悉繇以出而無有齟齬於其間故得以行其志後世為邑品秩卑而法令繁品秩卑則選任輕法令繁則牽制衆以秩卑之吏而迫於繁令之拘其治效之難成固宜是或一理也而未之思夫君子惟無仕則己仕則未嘗擇官焉居是官也則必事其事就其力之所可為而為之上可以禆於公下可以及於民安有難易之時云乎惟怠者将以遂其媮則常以不得為自解誕者将以肆其夸則常有所不屑也胡不以聖人之事觀之乎昔孔子初仕為中都宰制為養生送死之節長幼異食强弱異任男女别塗路無拾遺器不雕偽行之一年而四方之諸侯則焉孔子固覆生人之器也顧屈為一邑而諄諄於教化如此惟其無有不屑之心故歟且迹夫聖人之所為其稽之當今之法令皆明示勸奬而誘使為之者也故相國荆文王公慶厯中嘗以廷尉評事來為鄞令于時年甚小氣甚鋭而學甚富其志意之所存逺矣蕞爾一邑固區區者宜若無足以為而公初無不屑之心日夜惟以為民興利除害為事距今蓋一百九年矣而其所興造之蹟尚班班可攷遺民子孫常相與傳誦其事指其蹟而懐思之是非真知學夫聖人之為安能及此宜邑人思之愈乆而愈不忘也初公既没當元祐中為令者嘗因一人之思即治所公昔燕休之地作為重屋肖公之象而祠之名曰經綸閣中遭兵火乆廢弗復紹興二十有四年公之弟校理府君諱安國之曽孫右通直郎燁來莅兹邑自以獲踵其先世故治為榮規規焉推前人之心以施於治不敢少自怠弛居無幾何邑人安焉相與言曰文公之徳邑人所不敢忘也而公之諸孫復來治我就使無意於民猶當謹以事之况其賢稱其家哉惟是經綸之閣乆廢未復其何以示吾子孫而慰吾賢大夫之思矧朝廷清明郡政安靜治新斯閣今也其時乃鳩工聚材而請于太守貮卿王公公方以儒術為治亦樂夫有助於教化也而許焉閱七十日而告訖功凡材甓甎坯葦竹之費土木工人之直一出於民之願輸而官無所預焉既而燁以書來告度曰閣之復也非我實使之民惟吾家相國之不忘是不可以不有紀述也子於我有連其為我書其事度辭謝不敢當書再三返而請益勤曰吾石具已乆待子之文以刻乃為叙邑人所以不忘者且誌嵗月焉燁字子華謹飭好學能守其家法者也紹興二十五年二月旦日東嶽行宫記蔣安義四明屬邑六獨昌國居重海大洲中視他邑最為僻逺部使者按視罕及其境傳檄徃來趣期會簿書而已初邑之未建𨽻籍于鄞度越既險民之利病休戚有不得告者焉熈寧間荆國王文公始請建邑逮今四十載矣更令佐以十數然流風善政不可悉舉頃則有延平陳公戩建安章公邦獻今大梁趙公君竑受命為宰而南康李公恕實為之佐下車以來諏詢民瘼弊者革之蠧者鋤之政適其平人用不爭年榖告豐邑遂大治邑之老聚族而謀曰我曹生長太平不見兵革幸值明天子惠我以賢令佐矜老而恤孤養病而𦵏死雖父母之恩不厚於此我聞東嶽之神實祐我宋隂福吾人盍相與尸而祝之以祈吾令佐富夀康寧乎於是翕就應者如響父老占之少壯營之運土于原度材于山深殿覃覃脩廊隂隂其直如繩其平如砥其髙如軒其張如翼堊以白盛飾以丹雘春秋嵗時以祀以享若有神物來游其間宫始造於元符三年四月落成於大觀元年五月郡人蔣安義為之文曰瀕海之東龍濤匝空杯浮土封為明附庸兩山中分屹立嘉門雷吼電奔控潮于鄞壤絶勢孤摧舟畏塗束手庭趨聽于大夫二公之來天鍚雄材却除氛埃霧闢雲開政道其平安瀾不驚和氣充盈庶績以成斯民無憂聚族而謀以祈以求報之公休稽首嶽神體聖蹈仁手斡洪鈞下臨斯人廼咨羣工作為行宫父子祈公夀考來同席捲榛荆巖巖百楹塗以渥青周以層城春秋嵗時祭祀禱祠旨酒純犧饋饑有儀匪豆匪觴明徳之将神之來翔降福穰穰蒼山之巔石完而堅勒此文焉垂千萬年阿育王山廣利寺宸奎閣記蘇軾皇祐中有詔廬山僧懐璉住京師十方淨因禪院召對化成殿問佛法大意奏對稱㫖賜號大覺禪師是時北方之為佛者皆留於名相囿於因果以故士之聰明超逸者皆鄙其言詆為蠻夷下俚之説璉獨指其妙與孔老合者其言文而真其行峻而通故一時士大夫喜從之游遇休沐日璉未盥潄而户外之屨滿矣仁宗皇帝以天縱之能不由師傅自然得道與璉答問親書頌詩以賜之凡十有七篇至和中上書乞歸老山中上曰山即如如體也將安歸乎不許治平中再乞堅甚英宗皇帝留之不可賜詔許自便璉既渡江少留于金山西湖遂歸老于四明之阿育王山廣利寺四明之人相與出力建大閣藏所賜頌詩榜之曰宸奎時京師始建寳文閣詔取其副本藏焉且命嵗度僧一人璉歸山二十有三年年八十有三臣出守杭州其徒使來告曰宸奎閣未有記君逮事昭陵而與吾師㳺最舊其可以辭臣謹按古之人君號知佛者必曰漢明梁武其徒蓋常以藉口而繪其像于壁者漢明以察為明而梁武以弱為仁皆縁名失實去佛甚逺恭惟仁宗皇帝在位四十二年未嘗廣度僧尼崇侈寺廟干戈斧質未嘗有所私貸而升遐之日天下歸仁焉此所謂得佛心法者古今一人而已璉雖以出世法度人而持律嚴甚上嘗賜以龍腦鉢盂璉對使者焚之曰吾法以壊色衣以瓦鐵食此鉢非法使者歸奏上嘉歎乆之銘曰巍巍仁皇體合自然神曜得道非有師傳維道人璉逍遥自在禪律並行不相留礙於穆頌詩我既其文惟佛與佛廼識其真咨爾東南山君海王時節來朝以謹其藏鄞縣經游記王安石慶厯七年十一月丁丑余自縣出属民使浚渠至萬靈鄉之老界宿慈福院戊寅升雞山觀碶工鑿石遂入育王山宿廣利寺雨不克東辛巳下靈巖浮石湫之壑以望海而謀作斗門于海濱宿靈巖之旌教院癸未至蘆江臨决渠之口轉以入于瑞巖之開善院遂宿甲申遊天童山宿景徳寺質明與其長老瑞新上石望玲瓏巖須猿吟者乆之而還食寺之西堂遂行至東吳具舟以西質明泊舟堰下食大梅山之保福寺荘過五峯行十里許復具舟以西至小溪以夜中質明觀新渠及洪水灣還食普寧院日下昃如林村夜未中至資夀院質明戒桃源清道二鄉之民以其事凡東西十有四鄉鄉之民畢己受事余遂歸去新刻漏銘王安石戊子王公始治于明丁亥孟冬刻漏具成追謂屬人嗟汝予銘自古在昔挈壺有職匪器則弊人亡政息其政謂何弗棘弗遲君子小人興息維時東方未明自公召之彼寧不勤得罪于時厥荒懈廢乃政之疵嗚呼有州謹哉維兹兹惟其中俾我後思基法師真贊楊億巍巍哲士出生象季演教台巖領徒鄞水安養靜因假中了義花雨談空薪灰滅智雷潮聞寂丹采章施卓爾其相儼然正思牛檀匪歇犀柄如揮師承有衆瞻諦焉依奉國軍節度使彭城錢公碑銘崔仁冀嗚呼魯誄宣尼謂旻天不弔齊銘文獻謂半嶽摧峯彼惟歎哲此乃傷宗終始禮全儻有貴乎啓足短脩分定亦奚甚乎戚容我國家系自仙靈基於神武岐周孫子𤓰瓞綿綿而逾長魯衞兄弟棣華韡韡以方盛其分宗之大創業之髙班布前書煥列今史可得而畧焉公即武肅王之孫文穆王之第十子今大元帥吳越國王之大弟也諱億字延世錢塘人也天垂象而列為公輔嶽炳靈而誕作英髦神清而水鑑旁輝表異而山庭上聳未當就傅之嵗已有能文之性採蠟珠而為鳳智與識偕溲雞白以成碑辭兼理勝生七嵗而後異志千里以自然驪珠擅愛於掌中鳳綍推恩於膝下未出閤嵗制授尚書禮部郎中尋改直中都都指揮使檢校司徒開國伯食邑七百户罷南宮之錦帳講上將之玉鈐鴻羽漸昇犀渠是肅辛丑嵗文穆王升遐八極中獻王纉服二邦繼體守文乍洽輿人之望自家刑國先推睦族之恩天福八年六月授公起復雲麾将軍檢校太子太保尋歴太傅太尉尚書右僕射開國侯加食邑至一千五百户端右纔儀於庭鷺具瞻旋逼於臺鸞俄自五宗言同三品丁未嵗我上應楚庭之當拜副代邸之奉迎乾坤定位於太初雷雨覃恩於洪覆指棲雞之将正階司顧審像之求不遐天序堯俞所属康誥屢行公於是大空土之資真濟川之秩監董狐之史筆總天祿之殿書宗相燮和而惟允霸君垂拱以仰成未幾上以鎔山煑海之權富國強兵之本式資心計以贍軍須乾祐元年四月委公判兩浙監鐵仍封新定郡公加食邑五百户夜思經濟豈惟師孔僅前脩嵗入羡盈不假辟李華旁賛四明提封千里雲屋萬家貢分於齒革羽毛俗殷於魚鹽蜃蛤南琛交貿有蠻舶以時來東道送迎有皇華而嵗至慎選兹任非親勿君明年五月授公判四明諸軍事易利建侯詩優布政攬轡有蘇舒之志下車多恵愛之方南畆嗇夫荷决渠降雨之利東野編户安熬波出素之業郡歌來暮朝議陟明属我上守位以仁因心則友念犬牙之相制式賴親親當龍首之髙居常逥睠睠奉綸言而奨授擇寳器以頒宣駱驛道途蟬聮嵗序其間擁旄入覲執玉在庭每将梁孝同居親為東平行邸恩光不二禮分特高故得大國進封遥裂翦鶉之壤羣官處長兼同浴鳳之儀顯徳初丁周國明懿善慶太夫人憂尋從泣血之中仰奉奪情之典洎大宋皇帝起陸龕難應天革命以我上秉三世之大節北面尊周率萬國之諸侯同心戴舜霸業騰髙於踐土寵章廕及於在原建隆元年敕命公為奉國軍節度使自膺帝命彌勵政經内和民人外固封守福星坐照周旋六考之間甘雨行随康濟一方之内必謂受禄未艾介福猶登無何方寸之間忽遘在肓之疾台星中折晉司空早自知亡䘮氣東行荆太守俄鍾此釁以乾徳五年春二月丁卯薨于府城之正寢享夀凡二百二十六甲子哀聞逹聽痛軫上心七日罷朝百官奉慰博議易名之典廣求監護之才制贈官諡曰康憲以其年四月庚申葬于本軍奉化縣禽孝鄉白石里之原禮也守龜吉日踣馬開塋哀引長驅指蒿埏而去去風悲四起咽笳吹以凄凄北邙永閟於幽扃南氏空書於遺績公星潢演𣲖虹玉滋苖出藩入輔之才諒由天賦緯武經文之業且見日新其政理也簡靜爲先緩猛相濟愛如冬日穆若清風班鉄尺於旗亭市無二價設缿筩於閭里路不拾遺其課績也輿賦均登逋民繈負疏鵠陂而資溉注創鼇榭以勝追遊設險守邦大峻金墉之制樹碑紀績親刋黄絹之辭其文學也洞究百家𠖇搜萬象蝌蚪書出于魯壁芙蓉詩生在謝塘玉如意之揮時紛紛兼講銅鉢聲之敲處續續成章其伎藝也授劔術於猿公𫝊弓聲於鴈将章呈擅敏草聖推工顧誤曲於坐隅五音潜别覆殘碁於碑背一路無遺其風度也玉海千尋黄陂萬頃折旋中矩終讌不疲菊映漉巾陶亮乃羲皇上客雪沾鶴氅王恭真神仙中人其理性也得古佛之指歸經祖師之印可鍊寳結生天之果布金追陟屺之恩啟廸言筌豈止作山隂都講發揮心要固将同方丈上人總是全才誕為英器而乃際吾主隆平之運極周親友愛之恩入専和嶠之車出仗辛毗之節况復有厚於國有慶於家康樂鳳毛悉聮榮於仕路太冲紈素俱結偶於相門委大化以如歸考終命而不亂斯盡善矣復何歉哉紀是殊政宜乎大手仁冀綵筆慙名銀臺辱召奉綸言而比事抽軋思以僅成刻在琅玕逺愧乎披文相質寘諸㝠寞聊防乎深谷為陵謹為銘曰東南福地表裏仙岡牒稱著姓䜟述興王極天基大積石流長秦中鹿走浙右龍驤武祖勃興文考光啟國霸魯史家肥戴禮乃子乃孫宜兄宜弟磐石分封平臺立邸國之貴介才自天生蟾供硯滴霞翦詩情爰居西邸是則東平為霖入用同氣分榮地曰句章州名海岱乃輟牢盆言驅大斾六考之間百城之内民詠安堵史書課最覆君敦愛裂地酬勲天王覃寵奉國名軍圭桐舊翦符玉新分如榰天柱如捧日雲誓著山河任兼将相水薤政聲金縢德望適賴永藩忽悲中䘮星澹三階位虚五帳鄮山之下鄞水之濱今兹蓍兆擇得蒿隣風旌飄瞥露挽酸辛為陵有日大夜無晨生理四明民享餘利殁窆四明神資吉地有邵棠兮興歌有羊碑兮堕淚公之徳兮公之功百世可知於錫諡戊辰遊山題壁記舒亶元祐戊辰閏十一月己巳自西湖懶堂率臨海趙逢當時出江東宿延福庚午過東山永安己巳嵗癸酉入大梅護聖觀常師舎利錫杖鉄鞭象齒丙子上保福己卯抵金峨真相謁中禪師辛巳鄞江張宏公度吳升潜道至自郡留一夕徃象山壬午遊金文還宿西堂甲申同中師離瑞相令偕師下東山迤邐以歸蓋在山間十有五日得僧院者六獨辛巳晴和登山為鬬草之劇餘輒雨雪所謂梅子真鍊丹井法華泉石柱山雲外庵皆欲徃不果而公度約余道奉川境上遊安嵓雪竇諸山且復不至亦遺恨也四明陳及之日誦金剛經於如如堂多年矣忽於誦經之所有芝草之祥作伽陁以賛之陳瓘念念然燈佛發此無根草堂上默觀之髮白何曽老多福院記𡊮轂予自昭武歸故鄉視其閭巷非故也昔之榛棘者皆連甍而駢棟矣昔之雕峻者皆蕭然而不屋矣見其父老非故也昔之孩提者皆頎然而長矣昔之少壮者皆皤然而老矣且死者十有八九矣訪其居民非故也昔之農者今轉而為工昔之商者今流而為𨽻貧者富而賤者貴皆交相為盛衰矣嗚呼世態之變如此所不變者巍然而髙者吾知其為刹矣儼然而尊者吾知其為佛矣鐘于朝鼓于暮環然而食者吾知其為僧矣嵗雖水旱天不能以饑宅雖不毛地不能以寒勢雖王公人不能以賤求之於迹盛多而衰少推之於心背寡而向衆信乎非有常者孰能如此甬東有多福院者乾德三年州民趙軒舎園作室主者徳全以施無礙之浴開寳七年州刺史錢億易號興福治平元年始錫今號焉熈寧元年有圓瑩者興其所廢而人樂輸其財新其所故而工樂竭其力未信者信人樂從其化未悟者悟衆樂入其室元豐七年春二月燕然坐終繼者清雅亦其人也夫萬事之理勤於未就而怠於己成佚於有餘而勞於不足師能勤其所怠而勞其所佚則繼師者雖百世吾知其如今日矣元祐二年二月望記奉化縣忠節四公祠堂記家鉉翁國於天地必有與立其惟忠義不二心之臣乎劉淵窺晉人知王道之反正不知開於戰死之路述祿山沸唐人知子儀之撥亂不知基於仗節之杲卿伐我亡也鄙我亦亡也不能使無伐而能使無鄙國其庶幾不能使無伐又不能使無鄙猶謂國有人乎肆惟寧皇之末年李全歸自山東而舉措非循服者越厥我理宗在御連率一旦束溼之全異心滋不可遏時則有若曹公孝先糾郡山陽建明屯田欲挈之以東征俾無居城中其慮深矣未報㑹全無厭之求弗慊偽如海州之命劉慶福脅犯閫帥曹公聞變亟自僉舎趨庭撫諭謂之曰有情欲陳當入文状制置朝廷之制置犯制置是犯朝廷汝不欲使李氏保其富貴哉其首命部曲弗敢言許制使國得泛舟于楚臺以避旣而讙動射公中咽公㧞箭叱曰誤李全斬東市非汝而誰曹孝先决不求生許制使决不可殺鋩鏃交集血流被體猶登子城求許公謀焉血盡氣微許公枕公以磚而絶手蔽吭而不可拆目怒瞠然許公回舟中慷慨曰國無以事朝廷報曹君矣亦死之公既不得斂亂軍取葦燎於城曲全歸自海反哭而弔且斬麾下謝公事定家人求骸弗可識漫號死灰覩縷烟冉冉繞諸孤發之褐衲方尺儼不燬蓋公内手成者遂得裹馳事聞朝廷醻公甚厚當是時全特未反越明年冬全叛去保楚城於兩期生楚人於再嵗非公其為誰全既猖獗嘯游淮濆揚州之戰丁勝遣統制吳公從龍先鋒而不出師是置之死地也豈其挺身赴賊馬仆被執夷猶揚泰之道從容甲乙之辰易旗幟改號令陽許諾為開關洎駕海陵城下則呼曰我右軍統制吳從龍馬中矢執至于此揚州亡恙泰城堅冝死守賊無能為也全寸臠之而吳公詈不絶口嗚呼烈哉其功豈直蔽遮一城而已曽不兩月全首獻闕下初賊得吳喜甚謂泰在目中一死盡折其銳魄褫氣奪不敗何待朝廷知公賜廟于揚于泰由今觀之曹公死於前全兩年而不反吳公死於後全五旬而遂亡謂非忠義之功可乎中間楚陷二三逹官職曹府史多不免監州郭公徳暢一家殱焉逆李為妖泰有三仁可不大書特書也哉異時汪冦煽衢又得一人曰西安尉舒公瀛目厭横道唱義鼔行竟與江山開化同寅捐驅緑林功雖未昌亦萬人吾徃者朝廷既各旌之祠以對敭明詔長吏之責固爾未容以為多也余老矣岸幘山中聞邊遽輒思死士忽鄞友曹夢合走一介書以制使文昌本齋陳公從攝令常朝宗之請建祠學官求余記余持憲節浙東時嘗聞其語未暇求其人也朝宗吾甥也忠毅之孫頗有志攝事幾何時不避貪天誚當因公之教邦人之意如此邑有忠信尚告于未知者咸淳十年十一月朝奉大夫直寳謨閣家鉉翁記通奉大夫寳謨閣待制提舉江州太平興國宫奉化郡食邑缺户高衡孫書寳謨直學士中奉大夫知慶元軍府事兼管内勸農使沿海制置使龍泉縣開國男食邑缺户陳存篆蓋昌國縣大夫劉君生祠記王應鳳上臨御之三十三載妙簡銅墨以字民訓風示㝢縣劉君謙孫繇元祐故家宰明之昌國於是適再期矣亷平簡靖民便安之越明年政成邑士纍君之化相與言曰令君幸惠吾邑勤亦至矣今将造朝微以寓攀截借留之意維昔庚桑治畏壘社而祝之厥有舊比廼肖像于學而祠焉踵余門請識其事余謝之曰劉君余伯氏之同寮也子諒肫實裏襮一如溫乎柔木之絲澹乎衣錦之絅豈與世健令求赫赫名者班乎而奚以象為且邑有生祠非古也昉於漢之于公厥後韋廣都義杜池陽軫陸浚儀雲史不絶書然繩之以召棠勿翦之義猶曰變之正者夫令去民最近是邑雖海陬去天為尤近近天則聲聞易徹近民則恩信難孚毋怪乎推謝摩肩而誦僑絶響也劉君何以得此於邑人哉問之庠塾之士則曰言政不及化吏皆然令為甚君甫下車垂意誨育縮費廪士以嵗之正飲酒于序燕毛以齒禮遜興焉學宫水環如帶鄉老以為文字之祥廼疏廼滌玦縈鏡澄而又捐奉入以養之涖校比以勸之是嵗賓興有鴈行聮璧而監學亦多中鵠擢第者有人興廢葺圮去之日如始至復築室以奉先聖舊像扁以燕居膏火之中教雨浹焉弓張之急弦歌奏焉斯乃蒲宻之所以垂芳也子以為何如余曰一鄉善士令君教養之所及也必如子羽之未嘗至偃室然後其言情而信姑徐之為我問政於􅋣溆荒寂之濱既閱月有聽輿誦而復於余者曰維兹鶩行舊多叨懫自君之來民不識吏庭少諍辭維兹萌黎近監之貧訖君之去海無怪風人厭魚蟹余聞之舎然曰士之言華民之言質是足以爼豆前脩矣于韋杜陸不專美於漢晉矣維先忠肅公以冀之南宫縣譜推而為滑臺郡譜又推而為元祐相譜文獻所漸裳華是似清惠維祖朔齊維兄其政不棘於期㑹而以善俗為先厥有本哉君家自朔而蜀又自蜀而吴余常稱其為宰蓋所謂安靜吏悃愊無華者故不敢相䝉而溢美云寳祐五禩龍集丁巳閏四月既望儀真郡文學掾王應鳳記并書延祐四明志卷十九
