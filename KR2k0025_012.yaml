body:
  text: 延祐四明志卷十二元袁桷撰賦役考人民之數年嵗不同三年大比稽諸史不誣也貢賦有恆貧富循環而田制莫有改取力於民始蠲其租曰竈户曰水馬户弓手户圭田無征以養官也寺觀免租限以統一世祖皇帝之仁政也因田以為役髙下莫定其可稽者曰弓兵獄卒衙前作賦役考田土本路總計二萬一千一百六十九頃三十畝一分八釐六毫係皇慶元年計撥數官田二千七百頃四畝四分二釐八毫四絲四忽民田一萬八千四百六十九頃二十五畝七分五釐七毫五絲六忽鄞縣四千三百七十三頃八十一畝一分二釐官田五百二十六頃六十一畝四釐七毫一絲六微六塵民田三千八百四十七頃二十畝七釐二毫九絲奉化州四千九百四十八頃三十一畝八分四釐四毫七絲五忽官田六百三十頃一十七畝二分一釐四毫民田四千三百一十八頃一十四畝六分三釐七絲五忽昌國州一千五百一頃一十九畝一分一釐八毫官田三百一十三頃八畝七分三釐民田一千一百八十八頃一十畝二分八釐八毫慈溪縣四千六百一十六頃四十四畝五毫一絲七忽官田一百九十六頃四十四畝五毫一絲七忽民田四千四百一十九頃八十五畝一分二釐二毫九絲四忽定海縣三千八百三十九頃一畝五分五釐二毫八忽三微四塵官田四百一十四頃六十二畝一釐一絲民田三千四百二十四頃三十九畝五分四釐一毫九絲八忽三微四塵象山縣一千八百九十頃五十二畝五分官田六百一十八頃九十六畝五分民田一千二百七十一頃五十六畝竈户田八百三十九頃八十二畝六分四毫四絲九忽官田四十二頃五十畝五分五釐五毫三絲三忽六微六塵民田七百九十七頃三十二畝四釐九毫一絲五忽三微七塵僧道田僧寺田一千三百二十八頃六十一畝九分一釐七毫道觀田五十八頃九十四畝九分七釐六毫驛户田馬驛户民田四百六十一頃九十七畝七分七釐七毫水驛户民田八十二頃九十二畝三分職田標撥各官九十九頃三十九畝五分各處舊有成熟田九十一頃八十六畝三分五釐荒間田七頃五十三畝一分五釐兵本路各州司縣該設六百三十名至元二十二年五月內承奉省劄仰於見納稅三石以下一石以上丁多户內差撥録事司額設二十五名鄞縣該設六十五名尉司二十五名大嵩巡檢司二十名小溪巡檢司二十名奉化州該設一百四十五名捕盜司二十五名連山巡檢司二十名公塘巡檢司二十名鮚崎檢司二十名􅔐墟巡檢司二十名東宿巡檢司二十名田下巡檢司二十名昌國州該設一百六十名捕盜司三十名岑江巡檢司二十名岱山巡檢司三十名螺頭巡檢司三十名北界巡檢司三十名三姑巡檢司二十名慈溪縣該設六十五名尉司二十五名鳴鶴巡檢司二十名丈亭巡檢司二十名定海縣該設一百五名尉司二十五名白峯巡檢司二十名管界巡檢司二十名施公山巡檢司二十名海內巡檢司二十名象山縣該設六十五名尉司二十五名東門巡檢司二十名門巡檢司二十名獄卒本路各州司縣該設四十三名至元二十二年十月內承奉省劄仰於苗糧一名以下五斗之上户內差撥司獄司該設一十五名録事司該設三名鄞縣該設五名奉化州該設四名昌國州該設四名慈溪縣該設四名定海縣該設四名象山縣該設四名本路各州司縣該設一百三十四名至元二十二年十月內奉省劄仰於苗糧一名以下五斗之上户內差撥本路祗候該設四十名經歷司曳刺一十名録事司祗候該設一十名鄞縣祗候該設一十二名奉化州該設祗候一十二名曳刺四名昌國州該設祗候一十二名曳刺四名慈溪縣祗候該設一十名定海縣祗候該設一十名象山縣祗候該設一十名秋糧實徴總計糧米一十三萬五百五十二石一斗八升四合鈔中統一百三十六錠一十一兩六錢三分七釐官田糧米四萬八千七十五石六斗五升六合鈔一百三十二錠四十六兩八錢二分七釐民田糧米八萬二千四百七十三石五斗二升八合元科米六萬八千七百二十七石九斗三升九合五勺添科米一萬三千七百四十五石五斗八升八合五勺鈔三兩五錢五分房屋租錢中統鈔三錠一十一兩二錢六分官牛糧米三石奉化州實徴糧米一萬三千五百一十八石九斗八升五勺鈔五十五錠二十一兩六錢五分五釐官田糧米一千二百五十五石一斗四升五合五勺鈔五十五錠一十七兩六錢五分五釐民田糧米一萬二千二百六十石八斗三升五合元科一萬二百一十七石三斗六升二合五勺添科二千四十三石四斗七升二合五勺房屋租錢中統鈔四兩官牛糧米三石昌國州實徴糧米四千六百七十六石四斗六升六合鈔一十定三十五兩九錢八分官田糧米一千四百九十二石六斗二升二合鈔一十錠二十一兩五錢八分民田糧米三千一百八十三石八斗四升四合元科二千六百五十三石二斗三合五勺添科五百三十石六斗四升五勺房屋租錢中統鈔一十四兩四錢鄞縣實徴糧米六萬五千四百八十五石三斗五升一合五勺鈔二十七錠二十八兩九錢八分五釐官田糧米三萬五千一百三十九石九斗九升三合鈔二十六錠三十一兩二錢三分五釐民田糧米三萬三百四十五石三斗五升八合五勺元科二萬五千二百八十七石七斗九升八合五勺添科五千五十七石五斗六升鈔三兩五錠五分房屋租錢中統鈔四十四兩二錢慈溪縣實徴糧米二萬五千九十一石一斗九升五合五勺鈔中統四錠二十七兩四錢五分官田糧米七千一十四石三斗九升六合五勺鈔四錠二十七兩四錢五分民田糧米一萬八千七十六石七斗九升九合元科一萬五千六十三石九斗九升九合添科三千一十二石八斗定海縣實徴糧米一萬七千四百二十六石九斗四升八合五勺鈔一十五錠四十五兩七錢三分七釐官田糧米一千八百八十八石九升六合鈔一十五錠四十五兩七錢三分七釐民田糧米一萬五千五百三十八石八斗五升二合五勺元科一萬二千九百四十九石四升三合五勺添科二千五百八十九石八斗九合象山縣實徴糧米四千三百五十三石二斗四升二合鈔一十四錠四十二兩三錢二分官田糧米一千二百八十五石四斗三合鈔一十四錠四十二兩三錢二分民田糧米三千六十七石八斗三升九合元科二千五百五十六石五斗三升二合五勺添科五百五十一石三斗六合五勺録事司實徴鈔七錠九兩五錢一分係官地租錢五錠一十兩八錢五分房屋租錢一錠四十八兩六錢六分夏稅依驗糧額科徴每民苗米一石帶科中統鈔三兩總計鈔中統四千二百九十八錠一十九兩五錢九分六釐奉化州鈔六百四十四錠二十三兩六錢五分四釐昌國州鈔一百五十九錠二十七兩九錢二釐鄞縣鈔一千六百六錠三十二兩七錢一分五釐慈溪縣鈔九百四十錠一兩三錢九分一釐定海縣鈔七百九十四錠一十四兩三錢三分三釐象山縣鈔一百五十三錠一十九兩六錢一釐稅課周嵗該辦總計鈔中統鈔六千二百一錠二十兩九分三釐在城務鈔四千四百三十八錠二十三兩四錢四分七釐定海縣務鈔七百八十五錠二十六兩二錢五分奉化州務鈔五百四十五錠八兩慈溪縣務鈔二百一十六錠七錢五分象山縣務鈔一百一十二錠二十四兩五錢昌國州務鈔一百三錠三十七兩一錢四分六釐官降契本發下稅務銷用每本收中統鈔一兩五錢另項作數解官酒醋課周嵗該辦總計鈔中統四千八百五十一錠三十六兩八錢八分八釐録事司鈔一千五百二十二錠一兩四錢八釐鄞縣鈔一千四百三十二錠四十六兩九錢六分奉化州鈔七百一錠二十四兩五錢六分慈溪縣鈔五百三十七錠一十一兩八錢八分定海縣鈔四百六十錠一兩昌國州鈔一百一錠四十九兩八錢八分象山縣鈔九十六錠一兩二錢茶課嵗周該辦總計鈔四十錠七兩五錢一分鄞縣鈔一十一錠二十兩六錢八分昌國州鈔三錠五兩六錢四分象山縣鈔三錠五兩六錢四分慈溪縣鈔一十錠一十八兩八錢八釐奉化州鈔九錠一兩三分二釐定海縣鈔三錠五兩七錢一分鐡冶課奉化州嵗辦鈔中統二錠鹽課本路合屬鹽場周嵗額煎鹽數總計嵗煎實辦鄞縣大嵩場元額鹽五千九百八十八引一百七十四斤一兩九錢二分因飢荒見辦二千八百九十五引三百七十八斤一兩五錢一分昌國州正監場元額鹽六千三百六十一引三百六十九斤除逃亡外實辦六千二百一十六引三十二斤岱山場額辦鹽七千五引一百八斤蘆花場額辦鹽六千八百七十一引慈溪縣鳴鶴場額辦鹽二萬八千引定海縣清泉場額辦鹽七千三百三十七引穿山場額辦鹽七千二百九十二引三百四斤龍頭場額辦鹽六千七百三十五引長山場額辦鹽八千四百八十三引象山縣玉泉場額辦鹽九千三百四十三引本路合屬州司縣周嵗額辦食鹽場總計嵗辦二萬一千二百六十六引一百六十四斤一十四兩二錢五分録事司一千五百一十六引一百九十二斤一十一兩四錢八分奉化州五千二百九十七引一百八十六斤一十二兩五錢五分六釐鄞縣三千七百六十四引二百四十六斤四兩九錢定海縣二千七百一十三引七斤五兩一錢五分慈溪縣四千四百九十二引二百九十八斤一十五兩一錢昌國州二千一百一十二引一百三十八斤一十一兩八錢六分四釐象山縣一千三百六十九引二百九十四斤一兩二錢織染周嵗額辦總計段匹三千二百九十一段俱係陸托紵絲一千七百二十六段暗花八百六十二段素八百六十四段枯竹褐四百八十四段捍草褐一百八十九段駝褐二百五十二段藍青一百二十八段棗紅二百二十四段鴉青二百二十四段明緑二百二十五段絲紬一千五百六十五段胸背三百一十三段斜紋一千二百五十二段枯竹褐一百一十七段駝褐一百六十段棗紅六百一十五段鴉青三百九十六段明緑一百一十八段橡子竹褐一百五十九段雜造軍器周嵗額辦總計軍器一百七十五副人甲一百五副紫真皮盔甲袋全黑漆羅圈鐡甲八十八副四巴水牛皮甲一十七副黑漆甲五副朱紅甲四副緑油甲四副雄黃甲四副手刀一百一十五口黑漆木鞘靶全弓袋箭葫蘆雜帶皂真皮弓袋五十五副水牛皮箭葫蘆五十五箇皂真皮雜帶五十五條皮貨額辦總計貉皮三千七十六張狸皮二十張鄞縣貉皮額辦一千五百一十張奉化州貉皮額辦五百五十九張因飢荒捕户逃亡見辦四百一十張昌國州狸皮額辦二十張慈溪縣貉皮額辦一千三張定海縣貉皮額辦一百二十張因飢荒實辦七十五張象山縣貉皮額辦七十八張沙魚皮本路額辦一百六十三張奉化州額辦二十七張昌國州額辦九十四張定海縣額辦四十二張魚鰾本路額辦二百斤奉化州額辦四十斤昌國州額辦八十斤定海縣額辦四十斤象山縣額辦四十斤延祐四明志卷十二
