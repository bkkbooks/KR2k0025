body:
  text: 延祐四明志卷六元袁桷撰人物攷史忠定十二先生贊蓬萊黄公先生商於六里肥遯四賢公居其間美行卓然時乎一出羽翼翩翩漢祚四百由兹卜年大梅梅公先生堂堂伊人漢世之傑方時昏昏上書剴切退伏市門或來明越我游大梅尚想忠烈石臺葛公先生公游宇内蹤跡殆徧一月千江無處不見大隠石臺波光如練山闕丹林清可覿面石窻賀公先生道既不逢當去勇決野服黄冠孰能羈紲鄞水烟波鏡湖風月高標凜凜濯世執熱大隠楊公先生道契皇王德參天地俯仰窺察出處一致三聘及門疾驅逺避齊魯大臣公其無二慈溪杜公先生伊歟高尚抱道弗違下視流俗突梯脂韋荆國之清叩其𤣥微九原可作非公誰歸甬水王公先生生負大材棲于甬水雖有聲名且無生理陋巷簞瓢王公知已百世聞風莫不興起西湖樓公先生翁臨西蜀一化南閩公以是教作成吾鄞逮今士子傳學彬彬收功貽厥世有顯人桃源王公先生公脩隠德約處桃源文肩李杜行踵淵騫教育千里執經滿門天之報施煌煌後昆望春王公先生使者入境金橘是求公責以義彼實懷羞晩使作邑投劾歸休鄧城彭澤千載同流湖西周公先生宦游寡偶不如投閒言之孔易行則惟艱公平勇退雙鬢未斑蕖月蘋風誰復追攀奉化孫公先生朱梁僣竊公懷憤恥仕還民服年著甲子寥寥唐末有兹義士遺編雖存惜無信史王尚書八賢贊童判子王介甫為鄞令奉行敕書訪義夫節婦得三人其一人可采曰童判子為人掌典庫其家養疏屬數口奉寡嫂承順不違甥不事家業屢負人債輙為償之而不以告姊江隣幾紀其事于雜志賢哉若人儒行塵蹟悌友祥順展也實德我興視世口舜心跖居市不市前言匪激蔣璯學必以已義榮道腴博觀約守胷吞石渠良朋問疑詡徑未蕪誰其似之子雲林閭王茂剛夢吞三畫韞玉山棲象外繫表捐筌棄蹄心學自得羲文與稽緒言不傳林深草萋顧主簿言行慥慥白賁素履忠信篤敬行乎州里其德如蘭薫我晉鄙漢之長者周云吉士李宗質字文叔濮人文定公之裔所生母展罹靖康之亂母子相失有姊歸司馬文正公之諸孫與俱詣行在所至江州水南治遇展氏於㕓中物色良是姉見之而信抱持相哭人以為孝感别十餘年而奉色養者二十年文叔卜居鄞之名塘攻媿樓公銘其阡誠齋楊公為傳而賛之曰非至孝奚而通神明非通神明奚而得母烝烝純孝其感以天昔朱今李盛事光前綵衣華髮介以耆年孰補南陔章善旌賢李猷黄子游信義之重死生如一求諸古人欒布脂習偉哉二士卓行特立砥訓薄俗百世時式陳之翰貴義如璧賤金如土不億不信莫余敢侮誠於為善君子所予彼晝攫者羞愧汗雨衣冠盛事四世宰執史才樞密姪浩丞相越王子彌逺丞相衞王從姪嵩之丞相永國公父子宰相史浩子彌逺父子御史王次翁御史中丞子伯庠侍御史父子侍從楊王休子燁袁燮子甫魏豹文子峻父子西掖陳居仁子卓祖孫侍御史陳禾四世孫大方兄弟博學宏詞王應麟弟應鳯師生祕書監官袁燮祕書監袁韶著作郎兄弟辟雍賜第林保弟霔父子殿帥馮湛子榯父子同榜孫技袁甫榜子起予李元白吳潜榜子以稱祖孫侍從林保孫祖洽祖孫甲科王异吕溱榜第一甲第五人孫伯序汪應辰榜第一甲第五人兄弟侍從史彌大弟彌堅史宅之弟宇之兄弟同榜王時㑹鄭僑榜弟時叙趙汝述衞涇榜弟汝逵史彌忠王容榜弟彌悆趙師適鄒應龍榜弟師侊史彌應袁甫榜弟彌忞趙汝櫄吳潜榜弟汝榟趙琪夫吳潜榜弟璛夫趙崇侇黄朴榜弟崇儕舅甥三學士汪大猷甥陳居仁樓鑰典鄉郡黄晟鄞人唐末守郡二十年孫沔逺祖郤奉化人皇祐三年守郡王周鄞人慶厯中以司封郎中守郡樓异其先奉化人政和中守郡五年所居號晝錦坊南門内有錦照橋趙彦逾鄞人嘉泰四年四月資政殿大學士太中大夫知慶元府兼沿海制置使所居號錦里趙善湘鄞人嘉熙二年二月資政殿大學士銀青光祿大夫沿海制置使兼知慶元府名其所居之坊曰錦勲坊余天錫鄞人嘉熙四年六月資政殿大學士知慶元府兼沿海制置使名其所居之坊曰錦樂建鄉節鄭清之鄞人淳祐五年以少師越國公醴泉觀使兼侍讀領奉國軍節度使省元陳塤狀元姚穎傅行簡袁甫釋褐狀元宣繒何大圭武舉狀元胡應時以絶倫升第一名童子科桂錫孫王人英應翔孫進士舊志以特奏名雜載題名碑亦然今悉按登科記釐正之端拱二年陳堯叟榜聖人不尚賢賦五色一何鮮詩禹拜昌言論楊説淳化三年孫何榜巵言日出賦射不主皮詩儒行論李泳咸平五年王曽榜有物混成賦髙明柔克詩君子黄中通理論許鉉景德二年李迪榜天道猶張弓賦德輶如毛詩以八則治都鄙論郎簡盧慎微張合大中祥符五年徐奭榜鑄鼎象物賦天險不可升詩以人占天論王周葛源大中祥符八年蔡齊榜置天下如置器賦君子以恐懼修省詩順時慎微其用何先論沈偕許惲同三傳出身天聖五年王堯臣榜聖有謨訓賦南風之薰詩執政如金石論李奕登科記作亦虞恊天聖八年王拱辰榜藏珠於淵賦溥愛無私詩儒者可與守成論朱公綽施渥景祐元年張唐卿榜旁心為明堂賦和氣致祥詩積善成徳論許敏沈言寶元元年吕溱榜富民之要在儉節賦鯤化為鵬詩亷吏民之表論王异慶厯二年楊寘榜應天以實不以文賦吹律聽鳴鳯詩順徳者昌論沈起申屠㑹慶厯六年賈黯榜戎祀國之大事賦形鹽象武詩兩漢循吏孰優論陳詵馮準王該周處厚李撫辰俞翺皇祐元年馮京榜蓋軫象天地賦日昃不暇食詩天聽君人之言論杜諮郭暨皇祐五年鄭獬榜圜丘象天賦律聽軍聲詩樂本人心論盧隠陳詥詵堂弟樓郁貫開封陳誴説兄貫開封項睎貫開封葛良嗣貫開封周師厚處厚弟嘉祐二年章衡榜民監賦鸞刀詩重巽申命論劉仲淵于鋭貫開封嘉祐四年劉煇榜堯舜性仁賦求遺書於天下詩簡易得天下之理論俞充朱長文貫開封豐稷嘉祐六年王俊民榜王者通天地人賦天德清明詩水幾於道論童于項瞻睎堂弟袁轂嘉祐八年許將榜寅畏以饗福賦樂通神明詩成敗之機在察言論葛藴貫開封馮碩準姪陳謐栁韶治平二年彭汝礪榜大舜善與人同賦春和議振貸詩君子以成德為行論樓常郁子舒亶熙寧三年葉祖洽榜是年始有御試䇿王吉王夬周子貫和州馮景貫開封熙寧六年余中榜俞偉充叔韋著明經熙寧九年徐鐸榜陳伯彊貫開封姚孶杜屺貫開封樓光郁子元豐二年時彦榜吳矜周鍔師厚子元豐五年黄裳榜江炳翁升俞夔豐安常稷子陳撝誴族貫開封王瓘該子元豐八年焦蹈榜君人者制仁論樓异常子元祐三年李常寧榜吳正平姚希陳攄撝弟張宏舉經明行修王光祖异之孫貫齊州元祐六年馬涓榜童􅔖袁灼轂子貫開封劉渭元祐九年畢漸榜俞袤偉子胡斡化紹聖四年何昌言榜蔣璿馮涇貫開封章韞茹開貫開封元符三年李釡榜陳禾謐子陳抍撝弟郭慎實暨子馮軫景姪孫樓弁汪洙崇寧二年霍端友榜周銖師厚子貫湖州王次翁异孫貫齊州崇寧五年蔡薿榜馮滋涇弟蔣珫馮子濟涇堂弟夏承汪思齊洙子曹貫顧父上舍魁大觀三年賈安宅榜王珩該姪胡旦吳升矜從弟蔣安義政和二年莫儔榜汪思温洙子王庭秀發子張邦彦宏姪林保林霔保堂姪弟政和五年何㮚榜樓航政和八年王嘉榜林孝雍陳時舉陳秉謐子舉八行姚持阜姪貫開封桂舟陳宗翰詵孫吳秉義升子汪廷彦史才薛朋龜王勲宣和元年上舍釋褐樓瑋航子宣和三年何涣榜王琥何涇楊正權吳秉信升子宣和六年沈晦榜王壁庭秀子又於紹興五年魁博學宏詞科曹粹中貫姪林孝友孝雍弟建炎二年李易榜張嗣良子閌紹興元年上舍釋褐高閌紹興二年張九成榜王瑋琥弟于庭式鋭孫王伯庠次翁子貫濟南薛靖朋龜族史純臣貫湖州周廣譽紹興五年汪應辰榜王伯序次翁子貫濟南石師能貫紹興史師雄純臣從叔鄭若谷趙慎臨高安世閌兄劉濤紹興八年黄公度榜省試軍天子以德為車賦談笑却秦詩六藝折中夫子論吳邦傑貫紹興蔣楰璿從姪陳曦禾子余遇蔡毅紹興十二年陳誠之榜魏杞貫開封豐至稷姪孫姚孚希從姪俞觀能夔子姜濤貫開封禇棣紹興十五年劉章榜汪大猷思温子史浩才姪張濟嗣良從兄周維莫冠卿王瀹夬孫貫和州林大節孝雍姪高誾安世弟紹興十八年王佐榜沈中立童大定紹興二十一年趙逵榜方天保陳居仁貫興化裴定吳化鵬張遜任三傑紹興二十七年王十朋榜方南强天保弟趙彦弼趙公遷紹興三十年梁克家榜樓鍔异孫樓鈜异孫卞圜貫泰州高文虎安世姪葉時王明發趙彦逾趙師峴趙師章師峴兄鄭鍔貫福州劉俁沈元憲莫堂冠卿子隆興元年木待問榜聖人作而萬物覩賦人鑑詩一正君而國定論李唐卿貫紹興府李霖鄭若容若谷弟趙善待樓鑰异孫張良臣貫拱州林圭馮緯文涇孫汪大辯思温姪林頤張孝伯乾道二年蕭國梁榜趙師正改名師津施純仁楊王休俞茂系觀能子乾道五年鄭僑榜楊簡王時㑹沈涣袁章灼孫史彌大浩子趙善纁王時叙時㑹兄戴樟乾道八年黄定榜范榘盧子材王煇陳紀韓永德貫開封舒璘趙伯省舒烈亶曽姪孫淳熙二年詹騤榜趙彦通彦逾仲兄趙渭夫趙師信改師潯師正弟趙彦逺彦逾弟淳熙五年姚穎榜姚穎孚孫黄豹王鎬壁姪蘇養直貫泉州鄭瓚鍔弟淳熙八年黄由榜袁燮灼曽孫趙汝勝趙師晨淳熙十一年衞涇榜高文善安世姪高似孫趙汝逵善待子趙汝述善待子趙善讚善纁弟淳熙十四年王容榜史彌逺浩子趙師晃師晨弟姚師臯袁韶史彌忠浩姪羅仲舒趙希言趙汝遇趙師俌師晃從弟趙希㻶李震唐卿姪孫吳振史彌悆彌忠弟紹熙元年余復榜邊恢友聞姪葉澄趙瑺夫豐有俊稷四世孫諸葛安節貫紹興趙崇復趙崇衡崇復從兄林惟孝劉致一陳卓居仁子貫興化林圭周焯鍔曽孫紹熙四年陳亮榜楊琛樓昉樓鏞弁孫趙師旻趙崇德應傃姜光濤姪孫貫開封厲思明陳從貫福州姜柄濤姪貫開封趙筠夫彦逾子改名䈣夫臧植蔣經貫鎮江劉垕童居善大定孫葛容王洙勲孫慶元二年鄒應龍榜天子大采朝日賦玊燭陽明詩高祖寛明而仁恕論張虙嗣良姪孫史彌遜才孫趙汝笈趙汝适善待子趙善湘姚師虎師臯弟張珩葉子高趙時穆樓汶异曽孫董仁澤鄭襃之若谷姪章禹圭孫逢吉趙師侊師俌弟趙師宜希吉叔趙汝法趙師適師俌弟趙彦樞桂萬榮袁洽轂四世孫蔣峴珫曽孫馮自强武舉鍾元達潘伯恭盧元吉慶元五年曽從龍榜袁肅燮子史彌謹浩姪劉叔向臧格植弟皇甫曄王暨煇姪貫開封汪文中大猷姪姜㸂光弟貫開封趙善潼善湘弟王大醇上舍虎姪孫趙崇衎趙汝稠趙崇佋王埏伯庠孫陳㮣禾曽孫嘉泰二年傅行簡榜聖人成天下之大順賦春旗簇仗齊詩漢御外理内之術論傅行簡繆師臯次年試中教官林惟忠上舍惟孝兄施琮楊琮琛從兄胡鑑嘉泰二年武學釋褐范良輔嘉泰三年兩優釋褐宣繒開禧元年毛自知榜汪之彊大猷姪孫趙彦杉郭九思李以制袁汝寛徐愿趙與龍趙希揚林宗一惟忠子貫湖州嘉定元年鄭自誠榜王宗道時㑹姪郭德暢九思從叔王埜明發孫趙汝憚范楷榘弟薛師㸃朋龜曽孫張起巖胡剛中劉厚南叔向姪董仁聲仁澤從弟陳公益李詵伯以制叔吳晞甫化鵬姪武舉周師鋭榜童䝉正林㟽榜胡光陳良彪榜胡應時光子本第二名以絶倫特與第一名恩例嘉定四年趙建大榜任龠謙子俞疇充曽姪孫貫湖州趙時慥趙希舍師俌子樓淮馮宋興軫姪孫陳誼黄定上舍趙希􅴯趙希瑑程士龍汪了翁武舉王國定杜霆林拱嘉定七年袁甫