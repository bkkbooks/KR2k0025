槱之珩之姪鄭士胄勑授將仕郎清之從子朱祐之鄔秀實文伯樓滮鑰之從子滓之弟蔣覿珫之曽孫規之親兄貝良臣周岳王應龍應逢子袁符樓椲舒濟世琮之孫繆應符張堂胡時中徐日宣姜煇㸂之從弟樓枝翁歸仁趙希墫希埵之弟吳尚深武舉章夢飛榜湯大全戴元質淳祐十年方逢辰榜沈發史俊卿彌髙之孫林潜周坦上舍鍔之四世孫華焯之親姪陳若水恊之弟林禹玉公玉之兄朱端方定國之曽孫胡發鑑之子趙與臻希鎰子趙與希叙子魁名與恩省楊景山趙若惠渭夫孫時擇子髙桂指之兄袁垚虞逢午戴杰王耒林煟惟孝親姪宗一之弟沈士龍鏜之孫中父弟洪翌洪翬楊垕簡之姪孫蔣夢符楊興伯桂本寶祐元年姚勉榜陸逵佃之五世孫舒夢庚孫獬孫胡咸中剛中時中弟黄翔龍馬元演李應龍史有之上舍彌鞏之子趙時浝戴得之權之子上舍臧元孫單德旗賈萬金孫震孫錢保舒渚王安道文貫之弟王自然林霆陳翥林峻陳諫王良休之子汪奎汪翔龍袁士復蔣峒施泰孫琮之姪舒璋琥之孫虞逢酉敏求之姪逢午之兄林灼寶祐四年文天祥榜王應鳯撝之子應麟之弟趙若棋羅雷發黄震劉應老趙崇回趙必聰陳著章霆瑞卓雲舒杭杜夢冠楊應霆琛之姪宗卿之兄夏已震嚞之子史即之李國寶余梅叟鄭士洪張應埜樓世仁陳鼎翥之子了翁之兄李以秉李璛己未再對二等林一枝徐汝周劉南强史常之馮懋楊坰琰之兄簡之姪孫開慶元年周震炎榜王復于槐之子蔣世傑張興祖胡從義張源霆振之姪霆龍之子孫真孫趙與㫙趙必衢崇侇之子張龍應張霆龍霆振之弟章介甫俞道明蕭楠盧天祐史介之李以興樓極胡機樓森圭張虡羅季禹李以圭于巽閌之曽孫王寶之蔣縯王桂發鄭大津桂壯孫景定三年方山京榜方山京舒津王山甫王一桂沈溎劉揚祖張光張大圭孫惠時張潤孫沈芑練晞顔咸淳元年阮登炳榜孫治鳯樓岩姚夢薦李檞林子宣曹一新王鑐楊應翔胡大浩韓福孫黄三接葉夢牛史䝉卿徐斗明陸覺史唐卿三學前廊賜進士釋褐咸淳三年登極循資恩沈震孫蔣元趙必昌咸淳四年陳文龍榜臧璧趙必祐樓嵒咸淳七年張鎮孫榜王叔龢戴表元趙孟何仲高咸淳十年王龍澤榜蕭元澥陳觀吳化龍王午龍延祐四明志卷六
