body:
  text: 延祐四明志卷十三元袁桷撰學校考家孰黨庠廢所來久矣文翁立博士弟子後世規制深髣之宋用隋唐法取士率出於學校法雖有弊賢德碩輔皆繇是出世祖皇帝平海宇首復儒役諄諄然勸勉至矣先帝崇文尚儒慨然復立科舉學者宜益自奮勵郡學教養昔論以四明為先今而日遊惰抑盛衰使然歟觀昔時得人之盛見於科目皇朝建蒙古學復立醫學隂陽學凡四學作學校考本路蒙古學學在西南隅倉橋側至元二十九年命天下州郡立學大德十年草創于兹以肄業廬猶未完贍學田土學官教授一員學正一員奉化州蒙古學學官學正一員本路儒學開元二十六年四明始治州學寶應廣德間州燬于袁朝之亂貞元四年王沐始建夫子廟太和七年于季友以開元褒封文宣王册文刻石天禧二年李夷庚移學于城之東建炎兵燬先聖殿獨存郡人林暐首捐金錢數十萬紹興七年仇愈卒成後為明倫堂東齋曰上逹廣譽造道西齋曰登賢成已時升十九年徐琛即明倫堂之後建稽古堂堂之上舊有五經閣閣毁經亡後以藏宋御書嶽甫守郡復置成德齋後以置養正齋皇朝至元十九年火僅存外門二十九年本道亷訪副使陳祥即閣基立尊經閣有記二十年鄉之儒士裒力新明倫堂至大二年舊殿以民居為之弗稱副使趙宏偉勸士重建有記復新儀門泮水東教授吳宗彥建賔序養蒙堂在廊東史復伯吳宗彥等建先賢祠堂舊有五先生祠楊杜王樓王後增陳忠肅公豐清敏髙獻簡林侍郎保汪尚書大猷復增郡守六人李夷庚仇悆汪伯圭嶽甫程覃趙師教授一人周粹中淳祐中顔頥仲復祠張宣公吕成公陸文安舒文靖沈端憲楊文元袁正獻是後立祠冗雜今不復著而九先生祠迄不敢廢王尚書應麟始立傳為記以奉聖旨崇祀復設二亭在外門東西公厨土祠廳舍凡學所當備具者略弗書射圃以宋孝宗頒射義魏王判郡立今為教授廳重建州學記李璌四明據會稽之東抱負滄海枕山臂江重阜崇嶺連亘數千里其浸不淫於海而瀦以為湖山川之勝雄傑茂異所以人材英拔比他郡為甲至於後進縫掖往往氷玉秀整亷利好學蓋自祖宗以來名公碩儒文詞為諸儒倡者縉紳至今誦之郡舊有學制度甚偉建炎之禍鞠為茂草而先聖之殿僅存扶持傾欹不庇風雨荒榛斷址使人愴然懷舊而悲焉今新昌石君延慶光錫學問淵博連中三科四方望風欽矚願執經席下以丐餘論紹興五年實掌是邦之教事居無黌舍食無粱肉水火器皿之用凡百不備學者猶且負笈而來棲於敗屋之下弦誦之聲不絶蓋其風氣好學如此會太守仇公以次對出鎮恭致天子崇儒右文之意嵗時嚴奉牲幣盛服搢笏祠於庭下將事既畢延見諸生酌以酒醴每病餼廩不給以為公私之患明年政成乃斥公帑百六十萬又丐於耆舊鄉老得錢八十萬始益賦入助其供給復以估𣙜廢村瓦木竹秆凡十萬九千六百有竒益以調度之餘四百萬錢以為梓匠丹堊之費初立重門兩序敞其後以為講議之堂蓋其東以為庖湢之舍閈閎深麗翼飛瓦聳神位像設籩豆俎簋焕爛一新於是頖宫之制具體克備既落成率諸生行舍奠之禮是日鼓舞歌詠莫不稱頌仇公之德又以石君超詣之材屑於細故針抽縷積以至於斯也竊嘗謂古者有國有鄉必立學校蓋非茍然而已以為君子之居而禮義之所從出也為諸侯者於此乎受成遣師以服逺人為大夫者於此乎逰燕休息以議政事執政者又從而究其言善否因以改行下至遊士胄子編户庶民莫不雍容進退於斯講求先王之道皆得興於禮義及其秀傑穎脫則又論而升之俾之為天下政事之臣此所以學校官府初無二體而三代之上家孰黨庠遂序國學如是之設也後世先王之道不明武吏以殺伐暴悍為能文吏以簿書期會為重其間深文刻害便法自營者則悠悠之談指為亷正怙其鷙忍以投時好如蟲食木中傷敗沖氣卒至穿穴侵漏與本俱傾而莫之知也大扺自漢而下承暴秦之緒維持固結之道一切主於法令劫持天下使不能去無復父子君臣之愛一旦潰敗不可鈐握誠以平昔用法便文之積也今承漢唐之後去古益逺為吏者視斯民如仇讎居官者指公府如傳舍朝夕從事米鹽錐刀之末為治之道追胥箕斂耳非復有文學禮義之説也至尊憂勤於上隆師重傅以明先王之道而六經之旨不行於士大夫之間處心積慮官遷留滯而止士之遊於庠序者截決經史取青嫓白以待有司之問更相告語惟恐趨赴功名之後此道之所以不明而先王之道幾於熄也如是而望風俗之醇厚億兆之孝悌忠信難矣郡之有學始曰禮義而先王遺風餘訓標凖在是為政者尚指以為不急之務亦已甚矣四明環地千里浮屠老子之宫無慮數百區窮極土木以享王侯之奉然以州郡之力學校之事求數十楹以庇其徒而艱難勤勩積嵗十數不克有成良可歎也今仇公適丁搶攘之際撫臨一方未及報政而公私便利風化醇厚無厨傳過客之事而有恭儉率循之益為善者有所恃而不懼姦宄小人知所畏憚而不敢自肆是以風帆海舶夷商越賈利原懋化紛至遝來波濤讋伏山谷休靖盲風怪雨不敢輒作乃能於此之時以其餘力及於學校養育人材用異時興起太平之資其所以忠於國家惠其儔類之意深矣又能斥其帑藏之積勉勵郡寮上下協同以致登兹其用心可謂知所先後不忘其本者哉雖然善始者未必善終能作者未必能述今公於此可謂勤矣若夫因卑為髙積微至著日增月益以至熙盛則又有待於後世君子賡繼存愛之而已此則仇公之意亦郡人所望於來者也故併書之以告紹興七年冬閏十月甲申謹記重修州學記鄭耕老國朝慶厯中詔天下皆立學按唐貞觀詔州縣作孔子廟四明學區暨建炎火于兵僅存先聖祠貌有斷碣三考唐開元封文宣王太和始立石紀所封遺裂廟經冦毁貞元四年刺史琅琊公重建刋石文有追贊明王者太和四年修廟六年亦志于石今登科記述天禧中李侯夷庚崇庠序父老傳移學于州治東北即李也邈乎罔究經始之日至改作續修竟與正觀慶厯相先後紹興七年郡將仇公徽學憫建炎之厄乃建門結堂翼以齋館蕩穢披榛未遑宏固更二三紀新故等敝耕老辱典教具聞于府使君趙公閣學力欲興之未及而去越明年直閣張公下車復疏曲折以請公嗜學樂儒隨假之資鳩匠市材惟恐後蠧者撤之橈者易之傾墁罅蓋翻欄植有儼其新使人生敬以乾道三年六月辛巳始事閲月既望訖工率諸生釋菜安奉睟容畢禮歷階升堂行揖遜講中庸申以頖水士儒勸喜芹藻生春耕老職乃事不敢不謹書以詔將來云謹記重建大成殿記王應麟天子初郊見之嵗法駕視學謁欵先聖隮曽子子思侑饗建首善風四方罔不丕式彜訓越再嵗吏部尚書洪公燾以敷文閣學士來牧四明秋舍奠于學顧瞻禮殿梁棟陊剝喟然曰大哉聖人之道於穆不已惠我無強矧東漸于海逺遡洙泗簪紱之盛擬鄒魯職在宣化弗惟道原是崇曷克稱明詔若稽郡乘舊夫子廟肇自唐貞元四年至今四百八十餘年矣元氣回復理若有待明年實咸淳紀號之六年乃鳩工飭材而鼎新之穹棟碩楹奐欒嚴敞視昔有加焉某月日虔妥用幣襟佩雲集相與端拜而議曰吾邦自慶厯諸老淑艾後進乾淳大儒闡繹正學孝悌修於家而仁遜興德齒讓於鄉而風俗厚理義明於心而賢才盛善信充於已而事業顯成我者夫子也聖天子立教于上而夫子之道益尊賢師迪教于下而夫子之道益彰夫道者治之本其功與天地並世之言治者謂古道不可以御今先政刑後教化道寖微而俗滋薄鮮覿天衷民彜之統紀急衆人之所緩可謂知本歟昔魯僖公能修泮宫威德所被至于海邦夫子列其詩於頌而先儒傳春秋則曰學校為國之先務雖用民力不可廢也故不與新作南門概書之策今公兹舉合詩春秋之義豐道扶教作新數百年幾墜之緒盛德至善百世不忘也於是郡博士請書成事于石應麟世家于鄞幸得從先生長者後升堂聞金石之音入宫牆而見宗廟之美惟逰於聖人之門者難為言曷敢贊一辭竊嘗聞之論語始之以君子終之以君子學者所以學為君子也凡我同志服膺聖訓陟降庭止昭假不違上以承天子之休德下以篤師帥之善教罔俾克廣德心專美魯之多士尚其懋哉朝奉大夫祕閣修撰新知徽州王應麟記重建學記王應麟四明自唐為州始為夫子廟宋始建學規模豐敞棟宇穹崇庠聲序音冠于左浙英俊之域紱冕所興文獻蓋彬彬矣至元十九年春學燬于融風教授潘夢桂黃裳吳宗彥史復伯歷載繕葺經始禮殿門廡齋舍寖以略具講堂有席養蒙有堂皆草創未就二十八年冬肅政亷訪副使陳公祥下車謂博十諸生曰化民成俗勸學為先嘗聞疇昔輪奐之盛意不止是盍飭工掄材以復舊觀顧儀門庳隘弗稱從祀容服弗嚴越明年夏鼎新髙明賁飾貌像六旬而畢二堂亦告成又惟斯文與天地並立華榱岑樓式毖厥藏因重建尊經閣五楹里士欣然競助教授蘇君焱撙約學廩續其不給秋九月閣成嶫峨壯偉襟佩聳瞻咸曰六經如日月陟降庭止惠我光明恢人文以迪化原維賢使者之德請識成事於石維諸侯之學載於禮詳矣在易臨之象曰君子以教思無窮澤上有地猶君子之近民也近民則禮逹而教行建其教立其監有師保之義凡以存天理淑人心而已矧是邦為詩書之鄉逸民之黃純孝之董文士之任自漢以來為美談慶厯諸老模範後進淳熙大儒闡明正學惟聖賢是式惟德性是尊小而灑掃應對大而格物致知目濡耳染充然有得每嵗孟春衣冠濟濟齒位秩秩司徒之教倫黨正之禮飲流風遺俗猶存未墜南豐曽公忠肅陳公繼為守貮表率薰陶東諸侯莫逮焉春秋大復古學之復道之泰也不農不工何以謂之士非老非釋何以謂之儒行已有恥尚志仁義士之廣也為君子儒夙夜強學以待問儒之實也遊於斯義於斯盍亦踐其實副其名乎郡國有學昉於漢二千石所察惟曰好文學敬長上肅政教順鄉里三代考行之意藹如也因作新之機而日新其德業孝悌忠信為根本明誠敬義為凖的始于離經辨志成于知類通逹用仰承菁莪樂育之仁不在兹時歟昔魯僖公能修泮宫教澤浹乎海邦其俗秉周禮守經學一變至道聖人稱之誰謂魯逺道無古今師友淵源緒接洙泗頌其詩尚論古之人罔俾克廣德心專美魯之多士凡我同志懋敬哉歐陽子有言善教者以不倦之意須遲久之功禮行俗純然後為學之成乃紀其始成以詔永久俾無怠大成殿記任仲髙聖天子即位首崇學校務作養人材以備選擢德至渥也海內士莫不感激思奮期以奉明詔惟四明古名郡夫子廟學甲東浙壬午既燬有損所居堂以為殿見為庳隘復不以時修葺凛乎其若壓至大己酉夏六月亷訪副使趙公宏偉慮囚實來環顧歎息上方嚮用儒術世隆加封之典而廟祀弗稱非使人昭尊事宣教化此固吾職與教授蘇君塏謀督租入撙用費學官輸俸諸生輟供儒人之在籍者助有差龜吉考度鳩匠庀工物直相得而木石川流地效其良勞佚惟均而丁夫雲集人盡其心羣材既豐衆作咸秩初梓人以圗上一如公指授毋襲前陋毋侈後觀崇賢去浮于以示教視前髙一尋前廡之廣半之既禮行而周旋有餘地樂作而縣設有定所匪亟匪徐有嚴有翼閎麗靚深悉遵禮制法宫既正爰及黌宇藏書有閣肄業有齋講堂數十楹周垣數百尺棟屋之橈壞瓴甓之殘缺丹堊之漫漶或易而新或因而理勿為茍完以植永固萬目聳瞻於前烈有光焉既告成功我公蒞止祗謁薦誠用答嘉貺乃揖長老招諸生而進之曰庠序之設古今攸重非直為觀美也盍知所以為學乎學者合內外之道自謂開物成務而無本則非治自謂窮理盡性而無用則非學本諸心體諸身徴諸庶民堯舜行此道千載而上所以為唐虞夫子明此道千載而下可以為堯舜布在方策炳如日星學者所宜用力于此有閣傑然髙明廣大尚友古人毋使簡編之富徒資蠧蝕也有齋廓然藏修遊息相與琢磨毋使羣居之樂適滋玩愒也有堂巍然正席而講環坐而聽毋為口説之勝而耳學之淺也由是得其門而入見宗廟之美百官之富源深流長器大用宏窮而其志足以有守逹而其材可以有為忠信之行漸被鄉閭詩書之化陶冶萬物立太平之基垂無窮之聞此夫子之道學者之事實聖朝加惠學校之至意也僉曰謹受教願刻之石以諗來學且識其顛末云公通古今知所先後嘗有德于湖湘之民退而以道自娛樂者十年上謂是足司吾風憲者問學以明理為宗政事以敦化為要蓋有本者如是是役經始至大二年十月庚申越明年三月丁未乃備先年營董之責者非一奉化州判官程時敏實竟其事以材選教授蘇君承積弛之餘以職業受知成此駿舉亦克世其家者皆不可以無紀九先生祠堂記王應麟古之鄉先生祭于社近世祠于學社所以養學所以教而教之功尤大秉彜好學之良心百世猶旦暮况其邇者乎頌其詩讀其書尚友古之人非一鄉之望也天下之望也四明鄉先生有九人焉宋慶厯建學之初楊杜二王樓公以道德文行師表後進或授業鄉校或講道閭孰衣冠文獻益盛以大五先生之功也淳熙之沈楊袁鄭諸公以尊德性求放心為根本闡繹經訓躬行實踐學者知操存持養以入聖賢之域四先生之功也郡泮舊有祠因鬱攸之廢至元甲午季冬朔旦亷訪使者狄公桂屬郡博士戴君友始復毖祀觀者興起元貞丙申月正元日亷訪使者完顔公貞至學宫謂祠宇狹陋未稱相攸尊經閣之右規模一新府牧月列公提其綱帥屬協力庀事以迄有成妥侑如禮多士欣欣周爰咨諏章善扶教以穀我子弟惟二使者之賜亦惟承流宣化之賢立師道以美風俗皆宜書凡我同志盍亦修孝悌忠信尚禮義亷恥學必正大學必篤敬式時前哲訓用對作新之盛德可不懋歟重修先聖廟記袁桷河南郭侯視郡事之初首定役法郡民日困醝事旬月按核數常不登郭侯知其姦利乃言曰病在私商濳轉輸其所贏餘卒不入公籍民病不可藥也於是罷賈區分四廂俾總之鱐豉脯各趨其時視計口之授略相等復竦然曰吾職司學校兹曷可少緩督大小學謹授業斥其偽冒以其餘粟大修孔子廟於是進郡博士陸晉之學正録胡禾毛明德而言曰漢文翁立學歷唐宋幾二千年猶完緻君等知其故乎少間曰教在不墜共不廢在繕修乃曰若殿若儀門風雨剝圮在丹艧先聖崇嚴列祀肅雍在作繪定章服在禮象又曰講有書堂有樓吾亦曷敢後姑徐徐為之吾願俾是邦服習仁義秀文林立遣詣王廟將自茲始桷由禁署歸里凡三年愛中和樂職之詩首為詩以詠贊侯名郁字文卿所至官以興學為本詩曰茫茫海甸聿仁義邦圭組績榮失其敦龎歲亦云徂夸侈則降維侯之來靡瘼不知曰維泮宫風化攸基竦其具瞻象神之儀藻井繪櫨絢兮承式降陟有嚴是奉是翼匪土木之工職教攸則瞻彼戟門有飛戾止斯翬煌煌五采屬纚鏘鍠八音粲目在耳嗟爾後生無偷以誕無逸豫伴奐遵我侯度以靖以獻奉璋有峩伊侯之願贍學田土田一萬三千六十六畝三角三十七步一尺五寸上岸田四千一百二十五畝五十八步一尺五寸官湖田八千九百四十一畝二角三十九步地六百一畝三角四十九步山一萬二千二百畝二角三十二步河塗六百一十七畝三角三十步砂岸石同山宜山秀山洋山蝦􅦟鱟塗烏沙洋務大嵩大小塗淫口雙嶴杉木􅦗新婦嶴石壇山穿山團局卓家岸徐公山沙角鄞縣田一萬一千七百三十畝一角五十步二尺地一百五十九畝二角一十步山一萬一千四百六十七畝一十七步三尺砂岸奉化州田四百五十四畝一角二十七步一尺五寸地三百九十畝二十四步山五百五十一畝三角四十二步砂岸昌國州田三十畝三角一十九步地八十三畝一角二步四十五寸山九十七畝三角一十八步三尺砂岸慈溪縣田五百五十三畝二角四十三步五尺山八十三畝三角一十四步定海縣田二百三十三畝二角三十五步三尺地一十九畝一角二十四步砂岸録事司地五畝三角二十六步三尺紹興路蕭山縣田六十三畝二角四十二步嵗收錢糧鈔中統鈔二百四十八錠二十九兩米二千一十石八斗五合一勺穀一千四百七十石七升八合七勺五抄魚鮝三百斤鄞縣鈔中統鈔地租鈔中統鈔一錠一十四兩八錢二分山租錢中統鈔河塗錢中統鈔三錠七兩七錢二分砂岸大嵩橫山中統鈔一錠四十兩米一千六百九十石六斗二升九合二勺八抄穀六百八十三石九斗二升九合七勺八抄奉化州鈔中統鈔三錠四十五兩七錢地租錢中統鈔三十五兩九錢山租錢中統鈔一錠二十九兩八錢砂岸錢淫口雙嶴中統鈔一錠三十兩米二石六斗二升三合九勺穀五百六十三石五斗八升二合四勺七抄昌國州鈔中統鈔二百一十八錠二十兩地租錢中統鈔八兩山租錢中統鈔一十二兩砂岸錢中統鈔二百一十六錠二十五兩魚鮝三百斤石同中統鈔一百四十錠魚鮝三百斤宜山中統鈔五十錠烏沙洋務中統鈔三錠洋山中統鈔二十五錠內教授薛基任內經理到二十錠教授吳廷獻任內增羡到山民陳端等租鈔五錠慈溪縣鈔山租錢中統鈔一兩米二百一十三石八斗四升六勺五抄榖一十三石二斗七升九合五勺定海縣鈔中統鈔一定四十一兩三錢八分地租錢中統鈔一十一兩三錢八分砂岸大小塗中統鈔一錠三十兩內元租一錠二十兩教授吳廷獻任內增羡一十兩米六十五石