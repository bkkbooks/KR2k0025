文集六十册東坡大全集二十七册杜詩一十二册麗澤詩集六册山谷詩注五册東坡詩注一十二册后山詩注三册大學衍義六册職官分紀一十二册論衡七册三朝言行録五册朱子語略五册四朝言行録四册萬花谷二十册五朝元行録三册續四朝元行録四册姓氏辨證一十三册西山讀書記二部共四十四册讀書記一十五册不全經濟奏議三十二册藝文類聚二十册宋朝文鑑三十七册孔白六帖一十七册續文章正宗八册事類合璧一十册不全髙學士祠堂記一軸舊四明志書一十二册續四明志書六册抄籍儒人一千九百二十七戶設官教授一員學正一員學録一員鄞縣儒學鄞縣學始創於唐元和九年其地在縣之東宋崇寧二年移于縣之西南後燬于建炎四年之兵嘉定十三年邑簿吕康年以舊址狹隘有請于丞相史彌逺命郡守俞建相地擇所以寶雲寺西不𨽻將威果指揮廢營更之創禮殿設跪像然亦未大備寶慶二年尚書胡矩守郡捐緡錢出楮券輟市舶之贏率里士之助經營有成堂曰養正齋四曰習説曰辨志曰觀善曰敬業凡縣之士肄焉至元十九年儒學提舉田希亮按治增置二齋曰育英曰進德二十六年郡城災惟兹學巋然獨存二十八年浙東道肅政亷訪副使陳公祥分治于明以舊殿將圯徹而新之易跪像而坐焉塗塈丹雘增煥聿新縣丞王公閏董其役至大二年正月復燬于火是冬縣丞賈思恭以亷訪副使趙公宏偉之命一經營之縣尹張繼祖繼之後同知張伯延成之請杜醇先生入縣學書王安石人之生久矣父子夫婦兄弟賔客朋友其倫也孰持其倫禮樂刑政文物數制事為其具也其具孰持之為之君臣所以持之也君不得師則不知為君臣不得師則不知為臣為之師所以共持之也君不知所以為君臣不知所以為人臣之類其不相賊殺以至于盡者非幸歟信乎其為師之重也古之君子尊其身恥在舜下雖然有鄙夫問焉而不敢忽斂然後其身似不及者有歸之以師之重而不辭曰天之有斯道固將公之而我先得之而不推餘于人使同我所有非天意且有所不忍也安石得縣于此踰年矣方因孔子廟為學以教養縣子弟願先生留聽而賜臨之以為之師安石與有聞焉伏惟先生不與古之君子者異意也幸甚再書惠書何推褒隆而辭讓之過也仁人君子有以教人義不辭讓固己為先生道之今先生過引孟子栁宗元之説以自辭孟子謂人之患在好為人師者謂無諸中而為有之者豈先生謂哉彼宗元惡知道韓退之毋為師其孰能為師天下士將惡乎師哉夫謗與譽非君子所恤也適於義而已矣不曰適於義而唯謗之恤是薄世終無君子唯先生圗之示詩質而無邪亦足見仁人之所存甚善甚善重修學記王應麟鄞在漢為鄮屬會稽郡唐屬明州建夫子廟于縣東五代改鄮曰郡宋始立學王文公安石宰縣因廟為學教養縣之子弟風以詩書衣冠鼎盛後遷縣西南兵燬久未復主簿吕康年請於郡相舊址創禮殿設跪像堂曰養正為齋者四至元十九年增二齋二十六年郡城災兹學巋若魯靈光斯文未墜道其泰乎二十八年濟南陳公祥為肅政亷訪副使分治于明崇庠序之教明年新郡學顧邑校風摧雨圮榱楹將壓殿雖更坐像庳陋未合古制爰命撤舊宇而新是圖夏六月鳩工經始規模崇閎視昔增煥縣尹張君孝安提其綱丞王君閏捐祿米以助主簿任君謙亦贊畫焉多士競勸佐厥費事巨用不給檄縣以義役租續之揭石為門六扇有伉掄材為殿隆棟翬飛清池泱泱芹藻春意自堂及序以次繕修實惟禮樂之使居德善俗啓迪化原以恢宫牆之壯觀縫掖來逰誦公教澤永無斁始教諭趙必燮庀役未克就嚴得桂繼之出私槖帥先吳應酉聫事協力既成請識石章應麟居是邦不敢以耄疾辭惟古者百里有師教以道藝孝弟仁義斯民也三代所與共學也閭為左右孰黨以正齒位時會于州序去民愈近施教愈密自武城弦歌弗聞急繭絲而緩教化先政刑而後詩禮若密令舉善而教新城長延聚生徒何其寂寥哉無以表倡之也我思古人有行部先即學宫見諸生試論有行縣學宫處士執經對講誰其嗣之賢使者新斯學也豈徒媺宫室云爾將新士以新斯民也昔鄞有杜先生醇學行望一鄉縣大夫再書然後起其書謂斯道我先得之必推餘于人願賜臨以為之師其自重難致如此師道立善人多淵源有自為師者盍以為法乎鄮士漢世僅一見虞仲翔之言可考也陸士龍稱鄮之俗禮節恭謹蓋素履行願修其天爵是為入德之基進道之階自學校之建畯彥興起鄉先生前後九人其四出于鄞皆以忠信為本踐履為實仰髙蹈景其人若存為士者不自勉乎師知所以教士知所以學朝而受業晝而講夕而復習思無愧于儒之名前哲有云學所以學為人學為君子學為忠與孝也服膺三言是訓是行化海瀕為洙泗以一邑為天下式將自吾鄞始謹書其事志夫斆學者式克用勸三十年秋八月壬寅前進士王應麟記鄞縣重建學記袁桷粵昔空虛固陋之學淪于人心言理者人人殊師記問者質而不化辭章篆刻滅裂六藝糜爛而不可救師儒有憂之據道德性命之要毫分縷析鑿鑿乎其不可相紊也繇是士得以一其視聽皇王之道復興于千數百年之後可謂盛矣世祖皇帝混同區夏崇學校定國子學成憲皆東南儒先而朱文公所説咸取以為經史模楷於是窮徼絶域中州萬里之內外悉家有其書然而急近功者勦取其近似以為口耳之食天人禮樂損益消長切於施為所宜精思而熟考者一以為凡近迂緩而不講至于修身養心或相背戾而不相似則緣飾儼默遡之莫有窺其涘際夫明絶學以承先聖之統可謂難矣弊生于簡易守其説而湮其本將不勝其弊載籍甚博莫嚴於五經教人之法莫詳於三物楊子雲云丘陵學山而不至于山惡夫畫也今州郡悉置廟學奠謁講説循襲條制而職教之道似若有未修焉者鄞舊有學王文公安石為宰時延會稽杜先生醇教之學者輩出至大二年郡大火學燬之主邑之學曰孔文雋董儒金始建講堂禮殿未完而去皇慶二年三衢姚熙載實來是嵗天子下科舉詔同知郡事吳郡張伯延顧瞻陋蕪首曰其何以稱上意乃率郡官而助之邑令梅君遇春丞簿龎君滋范君祐咸曰吾長于是兹役曷可緩嚴工庀程戒𨽻業者咸輸以佐閲二年夫子像成侑從有序門廡庖庾塗雘繚繞之屬堅密精粲學宫之制完且具矣姚君乃曰鄞號多士昉杜先生宜作先賢祠以祀鄞士之興其自今始乎嘗謂學校宫室循行風俗之使者未嘗不督厲修繕獨教法未定雖聰明自任獨不敢髙下以議今明詔四出郡侯首創其原姚君又能推本前人尊師之旨深有所寓桷雖官朝廷因姚君之請知張侯之美遂以學校之弊首敘其説庶幾吾里之秀士其強敏自修者詢考耆哲篤行于顯微內外之實文質交資上承詳延將以復乎昔時衣冠之盛則姚君之闡微猶昔賢勸道之意也庸刻于石願有以俟焉延祐元年四月十六日記又延祐元年桷記興造矣甫一記職鄞學者括蒼林君傳以事狀來元昔之經度踰於舊址廪入不給故其結構塗塈缺焉未周鄞之尹曰阮君周翰治縣未幾有恪殿謁首以興繕為急割俸以勵儒生於是步履有甓繚繞垣墉礱以密石華以堊丹象設有嚴講席齋廬足以稱絃誦而從祀一百有五悉易以塑合儒先之宜祀者為祠以庇少間曰既完矣盍廣教以振士類立小學師二人而增弟子員凡五十人泰定三年二月朔告成復命原闕從祀廊屋東西各九間趨廊東西各二間櫺星門三座泮池泮橋土祠一間講堂三間扁曰養正東西過廊各三間舫齋三間習説齋三間育英齋三間觀善齋三間辨志齋三間敬業齋三間進德齋三間養蒙堂三間以上皆燬于至大二年田産元管田七百一十八畝三角三十七步五尺地二十畝三角四十五步魚蕩一所續收田一十畝陳學正捨到錢糧米元收一百五十四石三斗七升一合九勺增收三十二石三斗五升鈔中統鈔一十九兩基地一十五畝二角四十五步祭器木爵一十五隻籩七十八隻豆三十二隻坫一十九片俎二十五木勺二箇幣箱五隻簠一十隻簋一十隻篚七隻抄籍儒人三百三十五户設官教諭一員奉化州儒學州學州東二百步宋景祐中邑令于房廣夫子廟以立學宫治平初令裴士堯遷廟學州東久而圮宣和初令周因重建燬于建炎至紹興九年令宋彜復建久又圮慶元二年邑士汪伋徹大成殿及門廡一新之鄉之好義者與協力而彜訓堂東西六齋成至元二十年堂以颶仆復建明年新兩廊儀門主維者令李天益也至元二十九年丁縣尹濟創養正堂教育小學延祐六年知州馬稱德到任復修建學宇增廣田土計田六百四十三畝二角四十步地三十二畝二角一十八步山二千二百六十二畝一角四十四步贍學田土田一千二十三畝一角八步地一百六十一畝一角五十一步山四千六百五十六畝三角三十三步嵗收錢糧鈔中統鈔一十九錠四十兩七錢五分絲一百三十五兩九錢重小麥七石二斗八升烏豆五斗米三十四石一斗六升白米一十八石五斗二升紅米一十五石六斗四升穀一千四百三十二石一斗四升八合屋宇櫺星門三座東西門二座學門一座儀門三間大成殿三間從祀東西廊各六間朱文公祠堂一間三先生祠堂一間六齋六間彜訓堂五間養正堂五間覺後堂三間參前亭一所土祠一間倉屋五間公厨一間小學果行育德二齋各三間堂後軒五間樂器知州馬奉議資遣儒人往蘇杭收置敦請樂師教習編鐘一十六口編磬一十六片備磬四片琴一十張瑟二牀笙四攢鳳簫二架管箎共四枝搏拊二箇柷一座敔一箇并座塤二箇備塤四箇鐘磬絛三十六條瑟朱絃五十條琴絃五十條搏拊絛二條流蘇絛四條流蘇緑油鈸蓋二十箇五色線二十兩重瑟上鴈柱五十箇琴軫足一十副鐘磬架二座龍頭四箇羽孔鵲一十箇裸屬羽屬四箇瑟匣二箇鐘磬匣八箇琴瑟卓六張鐘磬柷槌六件抄籍儒人六百五十七户設官學正一員昌國州儒學學舊在州東一百步宋熙寧八年縣令張懿文建元祐七年簿尉顧復經又徙而東四十步淳熙十二年令王沆徙于丞廳之南役未竟去官令錢棣維其事嘉定甲申令趙大忠葺治增益袁正獻公燮記云闡斯道之奧發是心之良而輔成國家之風教者其惟學乎夫學之于人猶食之有穀粟猶衣之有桑麻也豈可一日闕哉四明之有昌國海中一島也厥地狹矣而士生其間俊敏逸羣修潔自將者時時有之其質美矣加以切磨培植之功孰能而禦之前乎此非無賢令尹也而教養一事多闕而不備豈不知當務之為急哉其興若廢與兵刑財用不同非有朝家之威命大吏之督責姑徐徐焉未見其獲戾故雖有所興為不過一二焉而止此其勢然也若夫發于誠心無所畏慕而自為之其度越他人顧不逺哉今承議郎趙侯清獻公之裔孫也典刑猶在喟然興嘆曰事豈有不可為者哉力或不足痛節冗費可也檢柅吏姦毋俾滲漏可也義所當為勇于必為可也士有餘力資以為助可也如是而後其用足矣左之右之莫不如志而建學之規模在其中矣或因其故而葺治之或創于今而增益之曰殿曰堂屹然中居曰齋曰序翼然旁列門庭由是壯焉像設由是崇焉祭器祭服由是作焉廩廥以儲之垣墉以衛之承學之士皆得優遊涵泳其中而又課焉試焉以警勵之鳶飛魚躍咸受其賜無有終極可不謂盡于其職乎且南安一小郡耳而東坡蘇公記學之成稱其甲于江西禮殿講堂視大邦君之居典領得人能使其居官此理固然也今侯之所為其亦若是也夫雖然侯之設心非獨兹事也嚴祈報之典則冢土是崇恤窮乏之民則委積是豐户籍之要所以窒欺偽也海步之就與夫嶺路之夷又所以便往來也凡有益于民者是究是圗如恐不及矧為禮義教化之宫其汲汲也宜如之何侯名大忠三衢人擢進士科居官所至可紀無忝厥祖矣余是以深美之大成殿三間自遷學後殿宇頺圯宋淳祐丁未令沈睿重建記王應麟淳祐紀元之六年聖上首善崇化以風四方緑字穗書敷賁雍頖庠聲序音丕冒出日昌國大夫沈睿始至謁校宫時禮殿之建適六十􅑤年矣朽蠧弗葺諸生進而言曰學肇基于縣治之東淳熙間王令沅遷于芙蓉洲西挹秀涵清氣勢閎偉俊人魁士含章挺生道原文脈實繫兹殿盍鼎新之對敡雲漢作人之休德君曰承流宣化職也敢不祗若嗇用鳩工士歡趨之參預應公嘉其意諗帥守顔公佐以郡少府錢經始于明年暮春越季夏殿成般爾獻公枚枚奕奕貌象惟肖如臨沂泗侑坐綴食端章儼赫陟降庭止式禮莫愆冠進衣縫瞻儀興敬觀摩麗習文風藹如明年君入監左帑相與祠于學既十年諸生思之請著石章應麟鄞末學也辭弗獲嘗讀臨之象曰君子以教思無窮夫澤上有地猶君子之近民也近民則教彌數故周官族閭之讀法視州黨尤密今之學郡修而邑弛為吏者政急而化緩期會訟獄日鰓鰓畏百適慮不越几案而夫子宫牆漫不省健者舞知怠者視蔭辨髦武城蒲密之言而諉曰難治教化不明醇澆朴散治不愈難歟然非獨今日也漢東京儒雅最盛令長垂意學校者惟宋均楊仁者著于傳何其寂寥哉沈君能急所緩喟然興於學可謂知本矣昔孔子慨道不行託興於浮海是邦近天子之光家詩書人孝弟吾道其行矣乎縣大夫雖不得宿其業以候道化之成後之君子勿替引之率時髦士規聖矩賢毋以小成自畫學必正大志必髙明言必仁義行必篤敬進而經綸天下之大經退而居賢德善俗俾耆老縉紳顧瞻楹桷肅然改容曰此賢令教思之德也將見立于朝者為臯稷入其里者比鄒魯尚當墨筆以頌化民成俗之功云講堂宋嘉泰三年令葛洪建扁曰申義參政樓公鑰書申義堂三大字并為之記云東陽葛容父洪為昌國令葺縣庠之講堂名曰申義求書其扁余喜葛君知政之先務又樂其名之佳既為之大書矣又欲為之記余分教永嘉時作序齒文以示諸生其略曰孔子稱甚矣魯道之衰也洙泗之間齗齗為相遜孟子曰謹庠序之教申之以孝悌之義頒白者不負戴於道路矣夫洙泗之間行者相遜何以為魯道之衰謹庠序之教何與於道路之負戴者及究其説漢地理志云魯瀕洙泗之水其民涉渡幼者扶老而代其任俗既益薄長老不自安與幼者相遜也徐廣文曰蓋幼者患苦長者長者忿愧自守故齗齗爭辭故以為衰也想其盛時老者晏然為父兄之役子弟無復相遜夫子所謂老者安之殆為此也孟子亦謂孝弟既申則頒白負戴少者自當代之噫後世教養士子以科舉得人之多寡為庠序校之盛衰者與古意豈不逺甚昌國甬東也民以漁鹽為業近世儒風日興而猶未盛葛君崇教化以善其俗一聞余言則曰此名堂之本意也始余從弟鏞尉東陽而歸余啓得人之問以容父為稱首兹為鄉邑治聲固已卓然又將興學化民以幾古人之意誠非文法吏所能為者齊變至魯魯變至道顧不在兹乎鑰既為之記而命鏞弟題其上越明年慈湖先生楊簡復記於其後嘉泰四年春昌國葛令君訪簡于慈溪石魚對語從容及邑學忽作而言曰名學之堂以申義願簡申之簡欣然奉命令曰此人心所自有惟申而明之爾簡於是邑喜令言至當厥明敘而書之孔子曰人者天地之心又曰心之精神是謂聖孟子亦每每道性善又曰人人心也大哉斯言蓋萬世人心所自有之靈人孰不愛其親有不愛其親者非人也人孰不知徐行後長有不後于長者非人也此人所自有也不學而能也不慮而知也心之精神是謂聖果如吾聖人之言也其有不然者非其心之罪也惟民生厚因物有遷感於物而昏也心之象神無方無體至靜至虛明有變化而無營禹曰安汝止明其本靜止也舜曰道心明此即道也夫孝天之經地之義人之行事親事長乃天地之心列聖之道可不自知所敬乎重修學記青社韓侯蒞是州踰年顧瞻學宫頺圯日至喟然嘆曰化民成俗必自學始爰相厥攸鈎稽逋負治其島租墾其間田究整是先泰定元年十月甲子役興用工二千有八百計緡錢二千有五百匠石日食之費則諸生欣輸以助於是殿堂門廡齋庖池徑咸得備具謂桷繇翰苑歸俾記其事桷嘗聞之先儒以明理為綱領譏詆漢唐不少假濓洛之説盛行誠敬忠恕毫分縷析一以體用知行概而申之繇是髫齔之童悉能誦習高視闊步轉相傳授禮樂政刑之具獄訟兵甲之實悉有所不講哆口避席謝非所急言詞之不工則曰吾何以華藻為哉考核之不精則曰吾何以援據為哉吾唯理是先唯一是貫科舉承踵駸駸乎魏晉之清談疆宇之南北不接乎視聽馴致社亡求其授命死事率非昔時言性理之士後之學者寧勿置論而循其故習者哉昌國惟四明海中州士之興起自紹熙始著樓宣獻公袁正獻公楊文元公尚書深寧王公嘗記其建學論堂之本始揚雄有言曰百川學海而至于海蓋喻者也首之以訓詁之精次及夫名物度數之密由小成至于大成非積年不能以至州官三物之教詎止執一而以為傳道之要殆不可也委流安行由蹇而逹訖歸于海學之功也侯名摶字仲舉既興其學乃復儒學以為大比之勸學之士子寧不自勵敢執筆以俟是役也州之長布延托噶同知黃棟孫判官張信吏目陳益州學正孫恕皆贊叶其事泰定二年二月癸卯具官袁桷記齋舊有四造道進德存心成性至元壬午本學申請于提舉司添置兩齋曰明善曰立禮其實析四齋之屋為之小學學東廡之南舊名親仁齋嵗久不治元貞乙未州判官馮福京重行修蓋扁曰育德堂專以為訓蒙之所請鄉之耆宿郭薦應季挺任教導焉臺門舊有五間圯壞久矣至元甲申重建攝教應季挺實董其事改扁州學二字櫺星門舊植六柱啓六扉歸附後門遂不存元貞元年州判馮福京重建存禮制也祭器舊所存者嵗久刓弊簡陋弗完宋進士趙若諘訂禮經參以紫陽朱子釋奠圖更視他學稍整今多損缺未有能新之者籩六十豆九十簠三十三簋三十二篚五爵三十八尊五杓七坫二十六奠盆十五罍二洗二羃巾七几十二黃絹帳燭臺二木楪一百二禮服禮冠十禮服十中箄十珮十錢糧田土舊管水田五百九十三畝四十五步二分園地山地柴山一千一百三十二畝三角四十七步砂岸三所屋二座坊基四所舊收米二百二十一石一斗六升六合穀四石錢九百一十二貫六百八十七文十八界田地園山舊志無畝步郎孝祥沒官業係續添見徴米折省斛米一百五十九石七斗六升三合七勺五抄穀二十七石四斗二升二合小麥折省斛三十九石八斗五升八合六勺五抄長短巖租錢中統鈔一十錠上項租鈔舊無之始於元貞二年馮州判經理屋宇大成殿三間講堂三間造道進德存心成性四齋共八間儀門三間從祀廊屋一十間祠堂一所公厨一所抄籍儒人五十户設官學正一員延祐四明志卷十三
