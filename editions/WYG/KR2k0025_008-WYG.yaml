body:
  text: 延祐四明志卷八元袁桷撰城邑攷上河東平陽有堯舜之遺城焉王公設險以守國備豫而然也樓觀門闕觀民之制也各有攸處莫不皆然路室候館使者之禮也嚴其廵徼署舍興焉養其視聽亭宇作焉表識道里門巷之制備矣日中為市都鎮方社野外之制具矣橋梁道里為政之所先存古證今興廢生焉倉廩府庫郡計之本作城邑攷本路城周一十八里二千五百二十七丈唐長慶元年刺史韓察移州治於鄮縣治撤舊城而新之見唐㑹要及移城志唐末黄晟為州刺史增築黄晟鄞人也僖昭之間結羣豪保鄉里董昌表為明州刺史築金湯以壯海嶠絶外冦窺覦之患保一州生聚之安至宋元豐元年守南豐曽鞏受詔而完之曽鞏判太常改知明州受詔完城工冇費而民不知役數月徙知亳州寳慶二年守胡榘因其圯壊而重修之除望京靈橋東渡三處外餘皆一一完葺之奉化江自南来限其東慈溪江自西来限其北若西與南皆它山水環之辨證舊志云羅城黄晟所築長慶所移子城是也按通鑑唐宣宗大中十三年十二月裘甫冦浙東攻陷象山明州城門晝閉懿宗咸通元年甫分兵掠明州州民相與謀曰賊若入城妻子皆為菹醢况貨財乎乃相率出財募壯士治器械為固守之備黄晟沒於梁開平間距唐大中相去五十餘載豈有城未築而先有門之理若指子城而言其周環才四十餘丈豈足以閉門自保於此耶則長慶所移之城即羅城是也子城舊環州治外為塹南為奉國樓門東為州東門西為州西門上皆為橋以通往来庶府有司倉庫公宇皆在其中今帥府總府之外餘廢為民居鎮明嶺在府治前一里三十步宋天禧李夷庚為守通地理築土阜為郡治桉對號鎮明旁有觀音堂今仍存迎恩門城西門舊名朝京門慶元中守鄭興裔更名望京久而圯寳慶中守胡榘重建門樓今廢有水門在其側甬水門城南門有水門在其側舊志云水自南門入實流離宫遇涸則火此渠所闗尤重不當俟其涸而後浚靈橋門城東石門寳慶三年胡榘重修扁曰鄞江樓今廢東渡門城東左門和義門城東門俗曰鹽倉門永豐門城北西門舊曰鄭堰門鄞江門来安門漁浦門達信門今皆廢奉化州州城周圍六百四十八丈城門無名昌國州州城周廣五里東江門西門南門上榮門舟山門艮門慈溪縣縣城周圍五百六十丈定海縣縣城周環四百五十丈静安門迎恩門航濟門象山縣縣城周囘一百五步東門曰登瀛西門曰登台公宇浙東道都元帥府元帥亷希哲因郡治重建教授卓琰為記云浙東為海右巨鎮一道七郡職此其統即古之方伯連率自唐宋以来部使名稱不一唐置觀察使紹興年間立沿海制置司以鎮之所𨽻者温台明越皇元混一㝢内置浙東道宣慰使治于越遷于婺大徳六年十月㫖陞都元帥府凢軍翼戍于東浙者咸𨽻焉樹旄秉鉞職髙而權重七年秋移治古明州明三陲際海扶桑在其東甌粤在其南且控扼日本諸蕃厥維喉衿之地聖天子臨軒冊命常選用重臣非御史耳目之官則宰執股肱之寄重其地則重其人也視事之所軍民具瞻率仍總府舊廨歴年多棟橈屋腐將撤其舊而新之屬至大二年正月郡城火延燎更樓由㕔及序俱為瓦礫因陋就簡尚惟草創是循四年十月帝命中奉大夫亷希哲為宣慰使都元帥公家世將相材也至之日旗幟精明官府整肅慨然鋭意有所興作廼率僚佐謂之曰東浙為今北門牙幢茸纛植焉萬馬􅆛貅立焉非莊嚴則無以崇體勢而肅儀刑也僉曰然命吏披繹舊櫝官為給料起盖廼手畫口授盈尺而盡其制徵材鳩工百堵交作十二月正奉大夫宣慰使都元帥鄭公祐中奉大夫同知元帥瑪哈穆特符節相望而至爰始爰謀爰契我龜同寅和叶是謂大同由是梓人僝功巧者展力羣工具舉邦人咸輔其勞而不省其為役可謂使民以時矣計屋凢原闕楹崇棟髙閎華榱藻棁翼以廊廡繚以垣墉聽事有㕔扁曰帥正退食有堂扁曰敬簡有幙有館吏事有舍大其門閭巍其墻仭非但朱甍翬飛碧瓦鱗次其宏大靚深氣象雄特可超越疇昔十倍而玉帳森嚴之居於是乎稱焉經始於至大四年三月越明年皇慶改元七月榮祿大夫宣慰使都元帥阿爾圖因来鎮是邦用集厥成是年訖功命鄞郡文學掾卓琰記之愚竊謂公卿大夫出而為天下用宇宙間事即吾身分内事扶顛持危興墮補弊隨其職守皆足以究勲業溯自建大府以來毋慮數十執政坐閲數十稔殆𩔖築室于道視不過郵傳是以不朽之功留以俟今日若有數然乗可為之時持竟成之志一時肇新千古作鎮不其偉歟雖然明公皆社稷臣也今之同心治是室異時同心治天下是或一道也謹書以識皇慶元年月日記前帥府大門次為儀門翼以兩廡東西為長廊皆吏舍也正㕔曰帥正西室曰思無邪東室曰公生明經歴司治焉後堂曰敬簡西北則架閣庫以貯案牘浙東海右道肅政亷訪司分司舊在録事司西北隅州西門裏即宋通判西㕔至大二年燬今以鄞縣舊治為之在東北隅開明橋之北萬户府在録事司西北隅永濟坊即宋僉判㕔至大二年燬至大四年重建總管府舊以宋府治為之大徳七年元帥府遷于慶元廼移治四明驛即宋通判㕔故址也四明驛元有㕔事廊廡後堂有樓外有重門悉皆草創中門燬于至大二年之火延祐五年同知張伯延重建如帥府制推官㕔在府㕔之西經歴司在府㕔之東司獄司在元帥府橋之南即宋司理院故址録事司在西南隅迎鳯坊宋府院故址鄞縣治在西北隅宋通判西㕔故址舊治改為亷訪司分司皇慶二年重建于此奉化州治宋為奉化縣歸附後仍為縣元貞元年陞為州即縣治為之皇慶元年本州達嚕噶齊茂巴爾率州人重建昌國州治宋為昌國縣皇元至元十五年陞為州即縣治為之慈溪縣治即舊縣治為之定海縣治即宋舊縣治為之皇朝至元十三年燬于兵至元二十九年達嚕噶齊瑪哈實哩重建未克就緒三十一年縣尹李輝完之象山縣治即宋舊縣治為之奉化州捕盗司就㕔署事未建公宇昌國州捕盗司缺鄞縣尉司在縣甬東隅皇朝至元十三年燬于兵迨今未建署事每僦民居慈溪縣縣尉司缺定海縣縣尉司缺象山縣縣尉司缺鄞縣小溪廵檢司在縣南四十五里句章鄉鎮都大嵩廵檢司在縣東六十里陽堂鄉十一都奉化州公棠廵檢司在州西四十里剡潦鄉五十二都鮚埼廵檢司在州南六十里松林鄉十七都連山廵檢司在州西南一十五里連山鄉五都四下廵檢司在州東南百里忠義鄉二十三都􅔐墟廵檢司在州南二十五里松林鄉十五都東宿巡檢司在州東七十里忠義鄉二十四都昌國州螺頭廵檢司在州西七里岑江廵檢司在州金塘鄉三都三姑廵檢司在金塘鄉烈港岱山廵檢司在蓬莱鄉三都北界廵檢司在蓬莱鄉五都慈溪縣丈亭廵檢司夏侯曽先地志云丈亭是老尉廨宇築方丈室故曰丈亭乃古之軍令尉今館北有老尉浦是其跡矣吴越武肅王改上亭鳴鶴廵檢司定海縣管界廵檢司在靈緒二都施公山廵檢司在靈緒四都海内廵檢司舊於﨑頭置司歸附後移就太丘三都白峯廵檢司舊於海晏三都置司歸附後移海晏一都續遷靈岩一都象山縣莆門廵檢司東門廵檢司缺慶元路平凖行用交鈔庫在錄事司西北隅純孝坊即宋節推㕔故基皇朝至元十四年剏市舶庫在錄事司東南隅靈橋門裏宋舊市舶務遇有舶商到港官為抽分其物皆貯于此不常設官永豐庫在錄事司西北隅奉國樓裏平凖庫之後在城務在錄事司東北隅東渡門裏即宋都税院皇朝至元十三年置都税使司修建公宇碑記奉化重修縣治記王應麟越之東境為鄞漢屬㑹稽唐合鄞於鄮開元中州以四明山名始建縣曰奉化其地則漢之鄞也古鄞城在焉鄞有大里黄公列于四皓卓乎千載人物之冠冕先賢風流所被其俗純如其士彬如廸簡墨綬長吏保綏受命民非才足以揆煩亷足以砥俗仁足以摩拊疲瘵不輕以百里畀也縣治燬于丙子師旅饑饉相仍遺黎蒿焉困顇令長廹期㑹急繭絲慮弗及逺王尹宗信僅克剏聴事三楹李尹天益纔繕吏舍襄賁丁君濟宰兹邑惟武城之室單父之堂所以䟽視瀹聽清應物之原若昔董安于治晉陽一􅘘一柱猶不茍匪賁輪奐以為華壯棟宇以自奉也及契我龜經之營之任城王君澤為丞比善協志而新是謀邑士大夫咸勸趨之庶工丕作民不知勞始事辛夘之冬考成壬辰之秋丁君以書来曰一日必葺古有明訓百堵皆興詩人詠焉聴事東西吾名以節愛清安兩廡翼焉吾名以一清四畏堂曰得初以息以燕亭曰清斯有沼有荷挹爽西山扁以髙清殖殖其楹䡾䡾其門胥吏攸處下逮圜扉粲然一新曷敢視官舍如蘧傳而怠厥事願諗後之人俾勿壊余病耄不能文嘗謂君子為政其本自相在爾室始千室之邑易治也一室之自治為難子程子之視民如傷子張子之訓民善俗以一邑為天下之式其本焉在惟暗室之不欺而已巖谷深窈欲其疾痛必聞如接几席胥徒囂悍欲其隠微必察如在户庭堂上之一笑嚬堂下之萬休戚係焉若保赤子心誠求之推是心達於政蒲宻中牟之化可復也詩曰無已太康職思其居然則居此室可不敬歟聞丁君律己首公愛民束吏日涖庠序惠訓不倦多士訢訢誦子産之誨我弟子是能知本矣耆夀俊相與言曰兹不可不書乃不敢固辭書其事詔永久用勉夫字民者至元二十九年八月前進士王應麟記奉化陞州記陳著黄唐彊理天下至周之職方而大備降而秦而郡縣隨時沿革勢也元貞改元朝廷以諸縣地産民稠者升而州中下其等明之奉化為户五萬而贏為下官視州設員七明年月正元日宣授達嚕噶齊察罕公知州事李公炳勅授同知星公燦判官趙公秉李公居安省授吏目臧㳙鄭元均各以其職視事既而以記屬余謂吾夫子之言為政道之以徳齊之以禮有耻且格孟子曰善政不如善教之得民也聖賢格言如日月如金石斷斷乎其不可易也教化者本獄訟徭賦末也盖教化行習俗美獄訟將自簡而徭賦自易易耳夫然則吾事畢矣况仕也以義方六七十如五六十皆可行志蕞爾之魯有周禮在雖齊之大莫能抗蜀雖僻逺文翁以經學化之當時至以齊魯比謂地不足囘旋儒術近於迂濶可乎况兹邑之舊諸老先生典刑之遺章甫縫掖甲於一路皆素分而自重農工商賈之家畏法而専業循循然惟長民者所休戚薫之以詩書浹之以禮義教亦政也和平而不流於弱簡易而不失於䟱政亦教也三代而上之化民亦若是而已此謂知本於從政乎何有咸曰善是吾心也其以是刻之石大徳元年六月日前太學博士陳著記奉化州重建公宇記陳觀奉化於明為望山海風物之殊衣冠閥閲之盛自為縣時前人紀述備矣然土瘠而民儉食於耕地阻而四方不甚通於貨治者雖謂其難而亦存乎其人比年民數登進為州官吏品秩以次俱升獨莅事所因循猶舊嵗久漸弗及皇慶壬子達嚕噶齊茂巴爾公之来顧而嘆曰縣之為州雖征賦所不増土地所不闢而今之視昔難以㮣論司存不壯麗難以示觀瞻既而耆年士民不謀同辭乃諗諸同僚上之統府上下胥悦鳩堅蒐良凢木植之可致者必厚直以貿屋廬之願售者必倍價以償工匠之勞夫丁之募皆日有給始於癸丑三月為㕔為軒為佐幕為賓榮畫諾有堂宴息有室不日皆成譙門吏廡犴狴垣墉次第具舉體制宏敞輪奐翬飛儼然千里之郡矣邦人欲頌公之徳紀公之績舍儒者其誰歟余不獲辭竊謂天下事有志者竟成而事有非一朝一夕之可集亦非一手一足之能為其事豈易易惟公於民得之也有素使之也有道平時律己亷持心恕牘不輕署卒不輒發不施鞭而賦自辦不假箠而辭自服兩造在庭事輕者釋之以理使不戾其和氣重者得其情而勿喜凢此皆所以作其遜讓之風道其君子長者之歸故是役也人之趨之如子弟之従其父兄聞者樂於勸役者忘其勞猗歟美哉今之仕也耳目聰明不能周於簿書期㑹何暇他及亦有茍延嵗月視為𫝊舍不能一日葺寧有不愧於公若公之才試於一州者特出其緒餘吾知其去是而黼黻帝室柱石明堂有非此邦之士民所得私者矣同寅協恭實相斯舉敬書於石前進士陳觀記重修定海縣記定海為縣日昔號重地鎮遏戍守異於他所南受諸蕃絶域之颿舶東控島夷不庭之邦商賈舟楫噴薄出没據㑹濟勝實天下之竒觀也皇元考圖受貢益倍于異代信使香幣渡海嵗不絶縣令將迎日疲於供事視公宇若𫝊舍嵗益圮剥至治二年實都君始莅事曰吾受天子命長邑於是失撫字則奚以仕嵗適大歉徵租於民將不勝逋負計嵗所入一萬有竒遂覈其實止輸竒於官鹽賦嵗不登民益以困卒請而蠲若干嚴飭官驛置隸人以候過客而復其役乆而曰吾將治所居以聳民視瞻一撤以新為楹五十餘瓴甓木石丹漆箭鐵皆堅緻可永乆教諭蔣君昭先列其行事俾為記余謂治縣莫先於宜民承上意而不鳴其疾苦甚者増羡以求媚善譽乎何有縣當水陸之衝輒黙計嵗月得解職即謝去植仆舉弊終其身未能也若是則實都君之行事汲汲慕古将有以大其所為夫豈苟計目前之功效者哉余特記其興造使來者有攷蒋君所述多善政不復著推其所為舉綱以遺目葢可知矣是役也尹曹敏中主簿薛炳悉力賛治故迄用有成泰定二年二月日郡人翰林侍講學士奉政大夫知制誥同修國史袁桷記慈溪縣興造記泰定二年冬十有一月保定孫公楫循行四明至於慈溪覩其縣治壯麗整密咨嗟徘徊詢諸縣人邑長為誰咸曰此昔烏瑪喇忠顯之所成也忠顯為縣首治董孝子祠以化俗次修孔子廟三皇祠曰儒以長民醫以養民又治社壇嚴其齋宿以謹水旱迺曰迎詔禮賓兹不可不䖍𫝊驛休息宜慎其寒燠興繕既畢始曰吾亦得以廣居于是矣語未終孫公曰是誠可紀載於是命進士翁心𫝊為圖俾桷為之記聴事五楹髙其前三楹焉堂曰清清淳化中尹張叔達璽書之所褒因其名而築之者也挾以吏舍厨湢獄室縣門皷樓前後有序縣治之後有小湖湖之中為洲花竹四列風蓮水栁映翳繚繞為亭以休其居有四曰思政佐治以察民隱也曰栁意勝覽以樂其神觀也圖既畢復言忠顯之政墾萊輯亡役不病於民去其姦饕以為政本今其去十有三年思如一日而其繕營足以支永乆於是有驗噫今之為縣嘗患夫土豪之控持也其始也利以誘之終三年更徵需斂散一聴其命户稅更易拱手莫與之抗甚者為之囊槖可哀也已孫公之來兹邑也其亦有所感表去尹之美亦將以警夫來者余昔在太史覩循吏之實書以示後忠顯不求名而名自至孫公之為使者夫豈計目前以為黜陟哉俾凡今之為縣者廣使者之用心以成其政績始忠顯之滌篆也漫不可考謹視之實秭歸縣印言於攸司而更正之其精覈率𩔖是桷雖老尚當記之泰定二年嵗次乙丑冬十有二月甲午郡人袁桷記慶元轉運鹽使分司記國朝定煮海之賦倍於前代邦用是資其選官委任為不輕兩浙設總司於杭東西屬郡率置分司以董督四明號為浙東繁夥饑饉薦罹逋負益廣急之則疲勞愁嘆黧色骨立見於耄稚故受其任者為最難桷官翰林時預議中書堂嘗白丞相乞減嵗額丞相頷其議于時大臣咸然其説卒以户部籍不能易是後憂國者迄減其直繼今善謀邦計之士亦將以有待也泰定元年冬分司燬三年張侯伯威莅是邦以官楮若干委於郡郡守郭侯曰兹役不可緩必擇善於營繕者是屬曰阮君申之縣庠之興君能紹之曰尉周君一䕫尉廨乆湮能起之兹其以是屬僉謀曰取於山里胥是刪鬻於市大賈以喜將視其材市於民堅完縝密是則不負於郭侯之教矣六月闡工九月告成聴事崇嚴夾舍拱揖門臺有叙百堵俱列斧斤鼛鼔不撤于垣周君則曰尉雖不才囹圄之設非我職矧轉運府設是則益以病盍去諸復以楮之餘者歸于司官常患不得其人急奉於公怨讟滋興況復因之以竊其利周君則不然人皆曰作之登登周君是承去其榜笞民完以熙若是則任其職者絶叫囂息追逮其賦寧有不登于天府昔之使者遺愛揭于堅珉矣後之來者登斯堂也藹然仁政將屢書不絶桷老矣尚當見之泰定四年二月庚寅袁桷記堂宇本路進思堂在舊府治内紹興四年守郭仲荀建咸淳六年顔頤仲重建錦堂在舊府治㕔後淳祐元年守余天錫新之今廢鄮山堂在鎮海樓之北宋政和丙申守周邦彦建建炎兵燬巋然獨存九經堂宋淳化元年詔頒國子監九經二年守陳充作堂以藏乆而堂圯書散元祐五年守李閎别求九經藏之胡公幹化賦云太守李侯以雄才碩量剖符此邦下車之日首布徳化訟簡刑措政風肆行冬十二月逰桃源因故基命工掄才闢九經堂而新之發石刻於黄壁收斷編於秋草士有成徳人知向儒明年春合樂以落成之且命幹化賦之幹化謂兹堂廢㡬百年而再造於一時非特踵前人之餘芳亦所以揚先王之茂烈是宜有鴻儒碩徳發越辭章播金石而被管絃享鬼神而薦宗廟僣越不知其愚賦二子言以述盛事其詞曰於鑠哉皇帝即位之二年也景星明慶雲祥日月耀虹霓藏風威百蠻鏡照四方乃眷四明位於東南之陽負溟渤控扶桑倚巨鎮吞長江規圓杯浮奠于中央睿澤弗渥淳風未揚命李侯兮守是邦虎符東方赤黻載佩標金軛以為車擁紅旌而為葢介節俊厲英風爽邁悍卒武夫氣奪而魂散老姦宿贓星分而蟻潰布冬日之愛戢秋霜之威畆不輟耒室無停機鳴絃千室安瀾乎四陲宣化承流若時覆載民無札瘧物無疪癘甘雨飛兮緑野祥雲擁兮紫塞簡書既靜囹圄既空我政既修我民既同乃乗雲車控玉驄擁堅甲攢奇峰金鱗耀而月彩煥兵氛凜而霜雪濛介乎譙門之南入乎桃源之東沖融窈窕兮紛烟雲之横騖突兀朦朧兮森觀閣之相重遏風露以為樓兮來空翠於羣峰呀泉脈以為池兮落天鏡於空中孤亭突波兮浮層嶷之飛鯨横橋挿天兮亘綵錯之鮮虹集余亭兮侯弓侯矢升余堂兮載笙載鏞霧擁雲隨髙車載馳採三老之遺言升九經之故基覽遺跡之長存悼前人之莫追排緑苔於砌石弔遺言於折碑春鳯乍驚兮飄荒烟之緜緜落日夕映兮動芳草之離離鸞鳳矯翅兮紛鬬戰之螻蟻虎豹潜形兮聚羣嘯之狐狸乃證乎卜筮考乎蓍龜測日月之瑞方究星宿之躔維踐層巒以抵髙浮疎川而相卑軋地軸以盤根麾天倪而創䂓均四氣之和卜三農之隙不家至而申令因子來而為役搜抉乎蒼莽之野採窮乎望洋之澤剔土髪以為材琢山骨以為石運斤成風乃紀乃綱累以刻層承以平堂建以雲楣設以虹梁棟上極楹四旁擁雙闥開六窗鏤楶山檠華榱翼張重簷鴻鶱雕桷龍驤缺兮飛鸞舞鳳缺兮垂纓布璫玉題朝煥兮規日印月皓璧晝鮮兮凝脂截舫古礎平平兮瓊瑤鍾潤碧瓦鱗鱗兮結緑含光近而視之星耀而霞燦逺而遡之烟飛而霧揚大創崇基弗冗弗長宏䂓偉度既麗既莊亘風霆之表兮挿雲霓之旁橫八維之脊兮扼四方之吭辨山川之殊形區遐邇之異𩔖絡阡陌之縦橫分郊原之向背縞練橫分兮長江曉轉菱花斜判兮平湖亂漲凄賦逸響兮日墮瑤海澹露含輝兮月湧烟障暖浮畫棟兮春雲藹藹清泛玉琴兮炎薫盎盎香風滿地兮落金波之桂子素影横空兮涷銀潢之雪浪於是㸃翠幕張紅筵飛錦書聘羣賢收浩景於雲間􅂞天風於日邊烟斜霧横麾節行焉電走雷旋軒車至焉和鸞雍雍衆賓集焉玉佩鏘鏘太守揖焉蘭馨桂烈衆饌陳焉鳳嘯龍驚衆樂作焉於是秦國公子以辯為喜瞪目而視捉襟而起揖晉都先生而語曰昔江南太守興洪都之新府修滕王之故事合樂大饗羣賢畢至使王勃賦之侈廣其意𫝊流潤色承以不墜亦可以賛刺史之遺徳揚當世之盛美者矣今先生電掩長舌星垂方瞳筆動長鯨氣吞秋虹升髙堂集羣公適清宴之未䦨仰流景之方融亦可以踵前世之遺芳揚前人之素風乎先生悠然而笑曰然乎哉昔伏羲之王天下也四方文明鑒乎太清地不愛其寳天不愛其靈使神龜出洛負書而行伏羲得之網羅造化包括堪輿融結山川吞納風霆制為八卦分為四營布六爻之縦横規兩儀之降升文王繇之而其道悉備仲尼翼之而斯文大成葢取乎道之為妙是謂乎易之為經斷三皇始五帝上逮乎夏商之統下及乎秦周之系典謨貢範訓誥命誓陳禪遜之紀綱列君臣之分際軌五行之變化位九州之形勢足以扶天地之運開日月之蔽流睿澤於天下鞏皇圖於千世孔壁藏之而簡編弗墜伏生誦之而典章次第葢取乎事之遺跡是謂乎書之為制耋老黄童小夫賤工或去國之大夫或列位之三公覽時事之興廢觀盛徳之形容情態交乎前美刺興乎中詠山川之髙深記草木之纎濃則方軸以下申擘圓清而上通葢取乎譎諫之義是謂乎古詩之風秉素王之符抗列聖之辯是褒貶之雄柄揭賞刑之大本鬱者必發微者必闡亂者必削惡者必翦紀之以嵗月分之以晦旦文之以禮樂飾之以誅勸扶日月而上出漲江河而東轉葢取乎紀事之實是謂春秋之典下採成周上追陶唐揚列聖之素風擷前人之遺芳其制禮也措三百以提經其辨儀也周三千而布綱其設爵也建六官而等位其列土也面五侯而尊王朝覲宗遇所以交諸侯而揖賓客冠昬祭祀所以㑹男女而寧死喪俎豆籩鼎所以辨彜儀而昭物軌犧牲粢盛所以享上帝而薦先王陶匏笙竽所以洽淳思而導和氣圭裳冕弁所以祀清廟而朝明堂此二禮之垂經所以器範而川防隨流揚波鈎𤣥貫理喉襟大道之要羽翼仲尼之㫖或先經而始事或後經而終義或依經而辨理或析經而合異微而顯兮如長雲翳星炳而不耀志而晦兮如巨浸含山鬱然髙峙婉成章兮如回鱗盤龍彩鳳映流盡不汚兮如廣溪清江觸山蟠地此三𫝊之餘訓所以提領而振紀夫然揭大訓示丕彞包裹太極斡旋二儀秦火熾烈兮斯文不焚梁風浸淫兮斯文不漓嵩嶽可磨兮斯文不磷江河可竭兮斯文不淄夫潜龍雖神無慶雲不能雄升海鵬雖大無扶揺不能髙飛日月雖明無隂陽不能扶其運天地雖大無風霆不能示其威是必表大訓之宏規存素王之遺跡申以齋戒擇以月日篆以丹青鏤以金石發天語飛宸章錫玉札示四方付之有司而實兹堂焉豈無故而然哉宏規下蹯法持載於坤也宏宇上庇均覆燾於乾也大楹居璇柱石堯舜也山楶層巒鞏固羲軒也離離羣桷矩義之方也差差衆椽䂓智之圓也望之崇然形徳之體也即之沉然蓄道之淵也堊以白盛質以示素也飾以丹漆潤以容文也若回若翔樂之和易也如軒如翼禮之周旋也通衢修塗敞孟荀之步也墉垣壯址闢楊墨之路也誅茅伐棘夷老莊之蔓也除貍薫䑕去申韓之蠧也清風掃門洗情思之氛也明月在户開性天之悟也是故由不正者不能得其門行不方者不能窺其牆道不深者不能入其室志不髙者不能升其堂不味於淡不能探書林之實不玩於𤣥不能擷文園之芳秦國公子撫席而起稽首再拜曰不登髙山不知天之為葢不臨深溪不知地之為載不聞先生之言不知九經之大修九經堂記李閱上即位之明年九月閱自虞部郎中乞守兹土乃得亳又明年十月自亳被命來領郡事一日㑹賓客於束園之嘉燕堂視其北有遺址荒焉問諸老吏云九經堂基舊記在焉於是取諸頺垣積壤之間磢滌而觀之乃殿中丞陳侯充之文也陳侯當淳化二年為州於此方太宗皇帝以聖謀神斷承藝祖經綸之業以徳以功克集大統散戎馬於寛閒之野休生民於耕鑿之鄉窮日月之際極舟車所到乾旋坤動霆擊電掃四海之内稽首畢臣乃張治具謂治之本莫先於儒術宜公卿大夫以及守令討論經傳求先王所以化民成俗之意庶㡬太平之盛比隆於三代也由是詔以九經賜荆楚湖湘江呉杭越閩中嶺外諸郡而明獲預焉陳侯戾止見所賜書咨嗟抃蹈載仰天子之休遂飾廣厦以藏之名曰九經堂然明於是時更五代干戈之亂幸錢氏保完而歸聖宋撫育涵養生齒滋夥而學者尚少嵗磨月礪為士者日衆善人以不教子為愧後生以無聞為恥故負笈而従師友執經而游學校者踵相接焉州舉進士技藝决科者又相繼而輩出則賜經示教豈不粲然明驗哉況自浙以東農桑自足而訟少事簡明最為樂土者亦風化薰陶使然爾然察於此竊又有可歎者葢事乆則弊且壊者莫不爾自淳化三年迄于今纔百年而九經既散失無有明之衣冠亦不復有知者堂亦廢而草木茂焉可以不修乎哉乃率入官之棄材鳩無用之軍工鑿沼畚土增髙舊址加葺而新之且購九經寘其間使士民復見太宗之遺訓與陳侯經始之迹而時與士大夫游焉若乃四時登覽之勝江山所得與夫晨昬之間晦明之變景物錯出不可得而名狀者則有諸君題詠焉元祐年月十九日記重建九經堂記惟我藝祖始受天命紀元建隆呉越錢王俶首奉表修臣職既又以其弟億假守浙東之四明郡積十有二年未有職司于王室遂為之請命于天子有詔飭有司加優禮升其州為節鎮寵以奉國軍號冊命億為節度使以顯異之於是四明始知有天王之命按舊圖牒其地濱海狃于霸政前此聲教未被固非有鄒魯儒風晉鄭人物著見于世逮太宗朝諸所僣偽悉歸輿地車書既同乃改元淳化詔頒國子監九經于新附諸郡而四明人始被天朝之賜時守臣陳公充喜於王化思有以􅋍動斯民爰卜勝地得髙榭於子城東北隅乃錢公億所創以追勝游者俾葺新之鎮以賜書名之曰九經堂以風示千里其稱述帝徳歸美報上有石刻存焉郡人知尊經術談王道實始於兹而為政者又有以鼓舞感發之未幾風移俗易雍雍然詩書禮樂之邦信乎一變至於道自時厥後襲衣裳吟典籍少而習之長而安之自謂性稟固然殆不知帝力之所自也歴年多堂宇且敝嗣而葺之者間亦有人唯元祐五年太守李公閱盡革其故而鼎新之上以彰睿化下以勸學者其規模壮麗多見於辭人之賦閲四十年不幸悉焚于兵火又十有九年更十有四政猶未能復士𩔖毎嘆息於斯豫章徐公輟自禁從始試以此郡既至上體朝廷仁厚寛大之意政務靜重朞年而有成績暇日顧舊址而慨然曰郡有此堂事闗教化久而未復豈以勞民費財耶今國家念貽謀之重務先復古如其賦不及民民不知役此何憚而弗為乃以程畫付屬吏之有幹理者曾不踰時工告訖功落成之日賓僚相與稱美而形于歌詩者又能茂明公意以接邦人於道閱歸休于里獲登新堂媿不能賦日辱公過之屬書其事既固辭不獲命竊惟聖上方以柔道治天下偃干戈而修俎豆興學校而新館閣凡稽古禮文之事率皆以次蒐舉乃者親灑宸翰立石經于太學頒墨本于天下重命有司版鏤九經以增光祖宗右文之化而四明郡庠方建大閣以藏御書則公之此舉意固有在異時此郡賢材繼興發越前輩相與従容思古念舊而推尋本朝涵養所自來然後知是堂之復自宜特書以詔後人紹興十八年八月丙辰朔謹記春風堂在傳觴亭之西守程覃建芙蓉堂在春風堂之西守程覃建清心堂在芙蓉堂之西宋隆興癸未守趙子潚建真瑞堂在熙春之東衆樂堂在子城西南屹立湖中東南有橋以通來往宋嘉祐間守錢公輔建隠徳堂在衆樂亭之南紹興十三年守莫將為賀知章立像而祠焉取李太白之句名以逸老乆而圮宋寳慶三年守胡榘更新之明年仍繪夏黄公之像合祠其中莫將為之記曰士有負髙世獨見之明介然自守以表於世者不俟招而來麾而去能此者非學也氣也非氣也識也故識非學之所可致亦非氣之所能使其始稟之於天渟涵靜黙燭萬物之理而不昧平居固已凌厲清浮俯仰宇宙視一世富貴顯榮若將凂我凡隨所遭而暫遇之豈復以絲髪許留方寸哉予嘗論疏廣受皆傅皇太子一日俱上疏乞骸骨揮手樂身於宣帝之時而龔勝薛方乃以哀鳴就死欲全節於新室攝居之世管寧抱道懐寳投迹海表終身不見曹氏父子而張翰顧榮乃以秋風蓴羮酣飲謝事欲求吏於太安四王用事之日其識相去遼邈矣葢自漢晉以來至唐得二人曰賀季真李太白世惟以至博之學邁往之氣知之而不知其識之絶人逺甚太白天寳初召見金鑾殿供奉翰林嘗醉詩賦無留意帝愛其才忤髙力士擿其詩激楊貴妃不得官懇求還山帝賜金許之益放傲江湖間終其身季真開元十三年為禮部侍郎集賢院學士宰相源乾曜張說夸其兩命之榮明皇自為賛賜之肅宗為太子遷賓客授秘書監天寳初一病遂請為道士還鄉里詔賜剡州以居初二子為帝所知時李林甫為相羅鉗吉網毒滿天下以太白之風標清粹顧不減盧絢季真風流文章豈在李邕裴敦復之下㡬何不遭其誅鋤乎鳯凰翔乎千仞覽徳輝而下之雲鵬已游乎寥廓羅者猶視乎藪澤二子之識所以絶人逺甚者也季真於長安一見太白呼為謫仙人而太白在金陵送權招夷亦曰吾希風廣成蕩漾浮世受寳訣為三十六帝之外臣即四明逸老賀知章呼予為謫仙人葢實錄爾則二子之相與當有神交於窈㝠者矣世稱中州清淑之氣所窮則盛而不過必蜿蟺扶輿磅礴積鬱其間當生魁奇才識之民四明按東漢地理志乃越之鄮縣地有句章城及古鄞城皆漢廢城也唐武徳初鄞復為州與􅌘姚嚴婺並總于越八年廢鄞為鄮縣開元二十六年析㑹稽之鄮置明州取四明山為名實並東海真淑氣蜿蟺扶輿磅礴積鬱之地宜有魁奇才識之士必季真乃當之而四明之人初不以季真為鄉人予為明州一年得湖上茀地為堂以太白所稱季真之名榜之曰逸老并繪季真之像於堂上尚友千載鳯藻霞觴而想其遺風焉昔通和先生祖貫子元元和己亥年嘗遇季真授以至訣言季真得攝生之妙近數百嵗不死負笈貨藥如韓康伯近於天台上升徧於人聴則季真果仙去無疑予聞仙人左元放許宣平每往來九仙城陽山中蔡經去亦十二年一至其家得道者或未能忘其鄉里安知季真不時來還此間耶紹興十四年八月日記公生明在正堂之後宋守余天錫建未及名陳繼其後摹司馬文正公所書公生明三字扁焉清暑堂在府堂西偏一小里宋淳熙初魏王建中圯于風守余天錫新之扁仍舊仁齋宋寳慶二年守胡榘建鄞縣晝簾堂在㕔事之東面南宋紹興三十一年令宋應建趙省為之記記文已見集古考寛賦堂在宅堂之左面東紹興二十六年令周升亨重建讀書堂宋紹定元年令薛武建琴堂在寛賦堂之北令王􅂱建奉化州恕堂在㕔事之西令榮彝建仁乎堂㕔事之東令榮彛建龍溪道院仁乎堂之南令榮彞建舊曰仁愛堂昌國州大生堂宋主簿王子亨建慈溪縣明恕堂在縣治東廡之東宋李招文建龍虎軒見普濟寺下定海縣清輝軒海光閣前宋嘉定十三年令趙珌夫建清風軒事見正覺寺下亭本路衆樂亭在子城西南屹立湖中宋嘉祐間守錢公輔建邵亢為之記曰嘉祐六年七月壬寅詔以四明太守錢君入直左右史之日抵書其友丹陽邵亢曰我雖治明之日淺然於明人為無恨矣嵗和穀穰愁嘆息而驩豫行我樂與衆人之樂而申之為之亭城西南偏之湖中而以衆樂名焉吾友為我記之既辭不獲命矣其詞曰明治故鄮瀕海之都厥初導江源于南山釃為漕河以入于城呉越肇國兹為輔州率常近親以守以謀湖枝于河葢數百畆中為亭觀卉木洲嶼於今百年下下髙髙頹圯壊隳存者一毫維時錢君來守此邦此邦之人曰維政刑毋枉于直曰維教化日遷于良山樵水耘躋之阜安陶然太和嵗以有年邦人怡怡並尋于娯君曰従事與是同好近而勝者莫湖先焉閼者闢之窪者隆之昔吏之租削而捐之周為飛梁於以往來合為大屋鱗舒翼開逺巖近峰烟矗雨青水流庭階激激有聲君曰従事盍往落之荷房芰盤鳬翻鴇飛飄浮滿前凡州之人月惟暮春聨航接艫肴酒管絃來游其間環隄彷徉風于楊栁夕以忘還明人之憂惟使君是求明人之樂惟使君是度樂乎樂而不與人同樂安在其為樂哉它山之石以鑱以刻以告後人尚識其畧有詩見集古考友山亭在府舊治紹興壬戌守梁汝嘉建今廢占春亭在春風之南宋淳祐六年制使顔頤仲建今廢可憩亭在桃源洞西宋淳祐六年制使顔頤仲建今廢射亭九經堂後宋乾道元年守趙伯圭因舊新之今廢更恭亭嘉定十六年章良朋建前有二檜取東坡先生雙童老更恭之義名之今廢𫝊觴亭在更恭亭北宋嘉定七年攝守程覃建今廢茅亭在甬東書院南今廢熙春亭茅亭之東宋紹興癸酉守韓璡建今廢來芳亭在真瑞堂之東守程覃建今廢及𤓰亭在子城西南百六十步今廢肅賓亭在望京門裏舊名待賓亭今廢三江亭鄞江之東舊有亭名三江久廢宋紹興十年守潘良貴創亭于江之西城之上東渡門之北今廢記云四明在浙東最為瀕海宜有瓌竒偉特之觀恢登臨者之心目予到官二百餘日所向局趣狹陋殆未之見一日送客之東門循城而行大江橫其前羣山拱其外島嶼出没雲烟有無浪舶風㠶來自天際又州之井屋左顧右盼盡在目中予欣然曰噫嘻此四明之絶景也於是作亭其上以為郡人遊觀之所夫天下幽巖窮谷高人達士之所廬固不可以一二數若通都大邑顯顯在人耳目者不過有美堂岳陽樓滕王閣是數者而已湖湘樓閣之盛予固未嘗登覽至有美堂則江湖逺竭目力而僅得之非若此亭可以坐觀而俯揖也然予之好惡取舍出於私見顧未必公當俟倦遊之君子徜徉而賦優劣焉江之東舊有亭名三江更兵火壊不復存此亭之成人謂盡得三江之勝因取其名而榜之亦従父老之願也紹興十年正月二十八日謹記有詩見集古考鄞縣魚熙亭在縣治寛賦堂之前仰高亭宋令王􅂱建今廢西亭宋王荆公舊讀書處也今名王荆公臺在廉訪分司公宇後圃今廢會别亭在城西宋王安石有詩載集古考昌國州浮香亭在縣治後斸雲亭在縣治後氷壺亭宋乾道六年主簿趙善譽建廉泉亭在縣治之後待潮亭在丹山恩波亭慈溪縣環碧亭在縣城之北宋乾道間令陳夀齡建攬秀亭在縣治之後宋紹定元年令周符建麗澤亭在縣治之前宋紹興三十一年令鍾確建濯纓亭在縣治東南迎麾亭在縣治西南二里承流亭在縣治東南二里監司郡守經歴送迎之所定海縣待賢亭縣東門裏迎麾亭縣西門裏無量壽亭宋嘉定十三年令趙善晉建緑野館宋嘉定十三年令趙善晉建觀瀾亭縣北一里宋治平中令林旦建許將為之詩云危亭高處倚岩隈西望蒲昌海浪迴山戴鼇頭天外出水浮鰌穴地中來千重側崦扶搖沒萬里分流混沌開令尹觀瀾知道大三年窮邑更淹才應真亭在縣西煉丹山頂宋治平中令林旦建為之詩云我愛井泉清來逢井上銘佳名知故里絶巘為開亭目外仙舟逺雲間拱木青茫然千古意誰與問滄溟濯纓亭在縣西一百歩宋治平中林旦建詩云早歲逐浮名塵埃已倦行浩然臨絶岸聊此振煩纓世事隨波逺吾心自水清營營朝市路誰識孺歌聲灌木亭在縣西一百步宋治平中林旦建詩云行行竹間往時此一登臨為有凌霄幹常垂滿座隂海雲生逺日山月照閒心幸免材為累無言棄擲深升浮亭在仙掌巖之下宋慶元初令趙善與建照香亭縣治西宋令趙善與建香風亭缺竹間亭縣治之後宋治平中林旦建詩云昔人嘗種竹此意為山林野翠何凌亂羇懐得放吟化龍知有節待鳳豈無心長望山隂宇風愁不可尋曲水亭縣治西圃令林旦詩云岩溜抱山急傳觴何太頻迴看野客醉還笑濁醪醇漢曲人方逺蘭亭跡易陳勞生無足校疏放即天真更好亭在縣治西圃滌塵亭又名東谷泉亭縣東北四里宋嘉定十二年令趙善晉建方壺亭縣西北一里宋嘉定十二年縣令趙善晉建圓嶠亭縣東三里嘉定十二年令趙善晉建樓閣本路鎮海樓在府堂之東偏宋寶祐二年守胡榘建雙瑞樓在春風堂之南守程覃建因田夫以駢幹之粟米獻而名之明秀樓在清心堂之西守程覃建後圯以風喜雨樓在及𤓰亭之上十洲閣王亘詩山川如幻閣長秋一島飛來伴九洲不礙漁樵雙槳過何妨羅綺四時遊雲疑泰華分張去水憶蓬瀛散漫浮禁苑未知湖海樂生綃冩取獻中州澄輝閣周諤詩雄建俯空濶下瞻霄漢浮眼將雲漠漠心寄水悠悠日暖鳥飛鏡月涼魚弄鈎行期分此景家在甬西頭紅蓮閣在子城西南八十步大中祥符間建經綸閣在㕔事之西偏宋元祐中令王安石建建炎四年燬于兵紹興二十五年令王􅂱重建奉化州鎮東樓在縣東北四里市之心宋嘉定中令馮多福建慈溪縣清清閣在縣㕔後宋淳化中建以縣令張穎清徳得名定海縣海光閣舊名多稼亭在縣治西北宋嘉定間令崔端學建象山縣望稔樓在縣治西圃宋慶元初縣令趙善與建臺榭本路百花臺太守曹洙建今廢象山縣月臺在縣治西圃慶元初令趙善與建園圃本路花嶼劉珵淺深艷冶一枝枝帶露臨風不自持水上紅雲真縹渺多才却憶退之詩芳草洲劉珵春水池塘空苒苒長安古道倍依依爭如緑向芳洲遍不怨王孫去未歸栁汀劉珵江渡隋堤千萬縷年年折盡最長條誰知煙雨汀洲晩閒舞東風拂畫橋竹嶼劉珵翠雲搖曳波心起清影扶疎月際來結實終期丹鳳至虚心聊映小桃開煙嶼劉珵閒伴曉雲籠淺瀨半和秋雨羃寒沙溶溶曳曳拖輕素遮盡漁蓑與釣槎芙蓉洲劉珵翠幄臨流結絳囊多情長伴菊花芳誰憐冷落清秋後能把柔姿獨拒霜菊花洲劉珵金蘂寒香冒雨開清無俗格絶塵埃休嗟不及東籬下也有幽人載酒來月島劉珵衆樂亭前月滿洲雨餘風靜正中秋桂華冷射千尋碧十頃湖光爛不収雪汀劉珵六出花輕巧剪裁瑤林玉砌映南臺氷澌四面寒光合疑有飛仙月下來松島劉珵恥隨楊柳嬌春色厭近芙蕖逓暗香直幹凌霜終偃蹇願為一柱壯明堂桃源洞在舊府治之後附録馮氏萬金樓周鍔㡬年江上夢黄鶴意悠悠百尺獨臨水萬金難買秋杵聲喧藥市欄影枕漁舟應有壺中客分身向此遊清斯堂周鍔萬物本空寂浮生方沼中漚輕時出沒萍散只西東檻外風初息天邊月正融了無塵可濯危坐照衰翁臨雲閣舒亶高僧終日笑憑欄亦似無心懶出山幾渡好風吹雨散坐看綵翠落人間春樂軒舒亶隔水岩花紅淺深花邊相對語幽禽管絃不到山間耳誰㑹憑欄此日心宿鷺亭舒亶雲過千溪月上時雪蘆霜葦冷相依正縁野性如僧癖親為游魚下釣磯桃源徑林旦十畝紅桃徑穿花過水西清泉來不斷行客到應迷露錦披荒䲧晴霞倒碧溪年年春意在常㑹自成蹊逓鋪錄事司在城急逓鋪元係亡宋宣詔亭基坐落西北隅至元十三年歸附後置立奉化州大橋鋪元州東五里今遷州治前實延祐七年春也金鐘鋪州東北一十五里奉化鄉一都南渡鋪州東北二十五里長壽鄉三十六都陳橋鋪州東北三十五里長夀鄉三十四都常浦鋪州東北四十五里長壽鄉三十五都龍潭鋪州東南十里奉化鄉三都尚田鋪州東南十五里松林鄉十三都雙溪鋪州南二十五里松林鄉十五都方門鋪州南三十五里松林鄉十五都山隍鋪州南四十五里松林鄉十六都􅔐墟鋪州南五十里松林鄉十六都慈溪縣西渡鋪夾田鋪桐橋鋪倪橋鋪夾山鋪羅家鋪蔣家鋪太平鋪定海縣凡路府公檄下縣者必入逓鋪本縣惟通衢驛道為無逓鋪歸附後於苗糧祗候并禁子内輪充近帥府令於民間有丁無役戸内差㸃往來走逓承接文檄或外路文檄往來亦於在城府前鋪承受投放於是禁子管囚祗候任承直各盡厥職鄞縣夾塘鋪景安鋪洞橋鋪新橋鋪顔橋鋪社錄事司東南隅天字社地字社𤣥字社黄字社宇字社宙字社洪字社荒字社日字社月字社盈字社昃字社辰字社宿字社列字社張字社寒字社來字社暑字社往字社秋字社收字社冬字社藏字社閏字社餘字社成字社嵗字社西南隅律字社吕字社調字社陽字社雲字社騰字社致字社雨字社露字社結字社為字社霜字社金字社生字社麗字社水字社玉字社出字社崑字社岡字社劒字社號字社巨字社闕字社珠字社稱字社夜字社光字社果字社珍字社李字社柰字社菜字社重字社芥字社薑字社海字社鹹字社續字社東北隅河字社淡字社鱗字社潜字社羽字社翔字社龍字社師字社火字社帝字社官字社人字社皇字社始字社制字社文字社字字社乃字社服字社衣字社裳字社推字社位字社在字社竹字社帛字社西北隅遜字社國字社有字社虞字社陶字社唐字社弔字社民字社伐字社罪字社周字社發字社商字社湯字社坐字社朝字社問字社道字社垂字社拱字社平字社章字社愛字社育字社黎字社首字社臣字社伏字社戎字社羌字社遐字社邇字社壹字社體字社率字社賔字社歸字社鄉都鄞縣鄉十一都五十二隅七萬齡老界鄉在縣東五里舊有里一赤城村二盛店尚書今管都四一都二都三都四都陽堂鄉在縣東三十里舊有里太白村寶幢東呉今管都七五都六都七都八都九都十都十一都翔鳳鄉在縣東南四十里舊有里一滄門村隱學今管都五十二都十三都十四都十五都十六都萬齡手界鄉在縣東南一