body:
  text: 延祐四明志卷三元袁桷撰職官攷下鄞縣達嚕噶齊烏瑪喇瑪哈穆特額森布哈茂巴爾斯哈喇哈斯額森布哈實都拉斯瑪特道拉實青沙津伊斯瑪音以上俱缺縣尹李志王元卿劉滋汪褒然唐缺名崔祐王札呼岱張孝安富德庸李璠鄔濟民周汝弼張繼祖王思義梅遇春許庭芝郭德誠以上俱缺縣丞崔顯李在張缺名張顯史漢臣張𢎞毅王閏周聞禮潘津盧廷信賈思恭劉綱鄭璘龎滋張士元周仔肩以上俱缺主簿張濟謝大桐孟永貞任謙張處謙楊濟川程鵬翼朱申劉福范祐巴延特穆爾托斯呼布哈以上俱缺縣尉韓世英劉全時用郭世顯戴俊以上俱缺典史二員司吏一十名浙東巡檢司巡檢一員司吏一名小溪巡檢司巡檢一員司吏一名大嵩巡檢司巡檢一員司吏一名奉化縣達嚕噶齊孫繼宗布哈綽克張良弼張成德䝉古岱額布勒津雅勒呼别多喇卜丹竒爾岱䝉古以上俱缺縣尹樓性之李炎午陳守義王宗信李天益丁濟徐文郁梁觀以上俱缺縣丞鄭賡陳榮張良弼任源王瑛姜慶張悌高純心白龍王澤許庭芝以上俱缺主簿盧震龍成全朱友明朱士勲閻微申天澤李大用周信阮鵬翁以上俱缺縣尉汪斗祥張良弼沈濬陳一悳章甫薩里王貞祝松張著段嗣宗以上俱缺奉化州元貞二年正月達嚕噶齊察罕忠翊校尉元大德五年克哷武畧將軍大德七年額森哈雅承徳郎大徳十年布呼丹承直郎茂巴爾奉議大夫實保齊承務郎延祐二年二月到任呼圖克岱爾奉訓大夫延祐三年三月到任實巴爾武徳將軍延祐六年十月到任知州李炳奉議大夫元貞二年正月初一日到任大德二年十二月初一日得代王珪奉訓大夫大德二年十二月初二日到任六年三月十二日得代陳忠奉訓大夫大德六年二月十三日到任七年十月十五日得代于巴延奉直大夫大德七年十二月初七日到任至大二年四月十二日得代裴繼炎奉訓大夫至大二年四月十二日到任四年離任宋節奉議大夫延祐元年十二月到任馬稱德奉議大夫延祐六年十月初一日到任同知星粲承事郎元貞二年正月初一日到任大德三年二月初二日得代栁惠承事郎大德三年二月初二日到任九年三月初二日得代杜益承事郎大德九年三月初二日到任至大元年三月初九日得代許庭芝承事郎至大元年三月初九日到任皇慶二年八月二十六日得代圖嚕默色哈雅忠顯校尉皇慶二年八月二十六日到任曹敏中承事郎延祐三年八月到任殷真缺李恭缺判官趙秉登仕郎元真二年五月初一日之任大德二年十二月初二日得代史䝉古岱將仕郎大德二年十二月初二日之任五年十一月十八日得代徐温登仕郎大德五年十一月十八日之任八年十一月初二日得代劉守正從仕郎大德八年十一月初二日之任十一年十一月初四日得代孫德裕從仕郎大德十一年十一月初四日之任二年十一月初二日得代鄭應綸從仕郎至大三年十一月初二日之任王成進義校尉皇慶元年十二月二十一日之任許迪吉缺判官二李居安進義校尉元貞二年正月初一日之任大德三年三月二十一日得代馮彬保進校尉大德三年三月二十一日之任六年三月十三日得代郄岱從仕郎大德六年三月十三日之任九年六月初九日得代吳亮采將仕郎大德九年六月初九日之任至大元年六月二十七日得代程時敏東平人從仕郎至大元年六月二十七日之任四年六月得代秦榮承事郎至大四年五月初八日之任張英缺連山巡檢司巡檢一員司吏一名田下巡檢司巡檢一員司吏一名公塘廵檢司巡檢一員司吏一名鮚埼巡檢司巡檢一員司吏一名柵墟嶺巡檢司巡檢一員司吏一名東宿巡檢司巡檢一員司吏一名昌國州達嚕噶齊阿嚕武畧將軍大德元年七月二十日之任達實密忠翊校尉大德三年八月二十七日之任阿哈穆特奉訓大夫大德七年正月初二日之任額琳沁武畧將軍大德九年六月二十五日之任阿穆爾丹奉訓大夫至大元年七月十七日之任索勒敏奉議大夫至大四年十月初三日之任知州趙伯元武畧將軍大德元年二月十一日之任李稷奉訓大夫大德四年正月十一日之任郝得興奉訓大夫大德六年十一月初六日之任張德珪奉訓大夫大德九年十二月十八日之任陳臯奉訓大夫至大二年四月十六日之任萬旺札勒奉政大夫同知張世榮敦武校尉烏沙日沁忠翊校尉梅遇春忠顯校尉管恮祖忠翊校尉判官馮福京登仕郎蘇志忠翊校尉蕭玉從仕郎林韶将仕郎劉瑀從仕郎劉勝和爾承事郎吏目一員司吏一名螺頭巡檢司巡檢一員司吏一名岑江巡檢司巡檢一員司吏一名三姑巡檢司巡檢一員司吏一名岱山巡檢司巡檢一員司吏一名北界巡檢司巡檢一員司吏一名慈溪縣達嚕噶齊阿多瑪勒至元十三年之任台哈布哈至元三十年九月之任托爾齊元貞二年八月十一日之任伊蘇岱爾大徳三年十二月之任嘉琿達大徳六年十二月之任黄頭大德十一年三月之任哈繖克至大三年十二月之任烏瑪喇缺縣尹珠嘉壽德至元十三年之任許慶祖至元十六年四月之任俞斌至元十七年七月之任張顯祖至元十八年六月之任馮昱至元二十一年九月之任富德庸至元二十五年十二月之任宋澤至元三十一年五月初四日之任劉瑞大德元年六月之任吳樟大徳四年六月之任史午大德八年九月之任楊允大德十一年十一月之任方安國至大二年三月之任主簿茒璡至元二十一年五月之任張真至元二十四年三月之任鈕祐祿至元二十八年十二月之任皇涖至元三十一年十月之任索多大德元年十二月之任方文豹大德四年七月之任石礎大德七年十二月之任曹傑大德十一年十一月之任薩木丹巴勒至大三年二月之任孔昭孫缺縣尉楊好信至元十四年之任茒璡主簿權尉周良至元二十五年正月之任楊天輔至元二十八年八月之任張興元貞元年二月之任茂巴爾斯大德二年二月之任穆寧士大德五年五月之任張開缺馬德固至大元年三月之任楊茂至大三年四月之任典史二員司吏一十名鳴鶴巡檢司巡檢一員司吏一名丈亭巡檢司巡檢一員司吏一名定海縣達嚕噶齊張進至元十三年五月之任雅勒呼至元十七年之任瑪哈錫哩至元二十九年十二月之任僧格哈喇齊大德四年六月之任訥古伯大德六年二月之任阿勒台默色至大元年十二月之任敏珠爾皇慶元年正月之任縣尹楊榮至元十四年三月之任高珪至元十八年四月之任朱叔麒至元二十二年之任李輝至元三十一年二月田允大德元年二月之任孫拜特穆爾大德四年任成德大德九年二月之任吳鋭至大三年四月之任縣丞李輔至元十四年二月之任奉上司指揮本處主簿田滋至元十四年三月之任張幹至元二十二年之任時亨至元二十五年二月傅珪至元二十九年三月徹爾鼐瑪岱元貞元年四月盛德昭大德二年四月之任楊泰大德五年十二月之任謝大桐大德七年九月之任程峴大德十一年三月之任楊居義至大元年十二月和爾岱布哈皇慶元年四月縣尉阿薩爾丹至元十四年之任成奎至元二十五年七月劉璟至元二十八年七月明安岱爾至元三十一年嚴邦直元貞二年八月之任郝仲大德二年九月之任解時大大德五年九月之任嵇晉臣大德八年十月之任郭世顯至大三年四月之任劉津皇慶元年三月之任典史一員司吏七名管界巡檢司巡檢一員司吏一名施公山巡檢司巡檢一員司吏一名海内巡檢司巡檢一員司吏一名白峯巡檢司巡檢一員司吏一名象山縣達嚕噶齊額森缺阿都瑪勒至元二十三年八月之任阿里至元三十一年二月之任穆爾薩元貞三年二月之任達實密大徳五年十月之任雅爾噶鼐大徳十年二月之任僧格哈喇實缺拜特穆爾皇慶元年正月之任縣尹韓秉彛至元十五年之任李時義缺烏庫哩缺高珪至元二十九年十二月之任張貞大德三年二月之任李天祐大德五年四月之任山斌大德八年四月之任程珪大德十一年三月之任劉守正至大四年十二月之任主簿馮浩至元十七年二月之任楊恕至元二十二年五月之任張守忠至元二十五年三月之任孟永貞至元二十九年十月之任于巴延大德四年四月之任揚珠格爾大德七年二月之任楊沂缺田定至大元年八月之任瞿佑至大四年八月之任縣尉范用至元二十二年正月之任董實至元二十四年十二月之任趙顯至元三十年四月之任薩勒迪默色元貞張忱大德荆德大德蔡翼大德鄭復至大傅順至大典史一員司吏七名東門巡檢司巡檢一員司吏一名莆門巡檢司巡檢一員司吏一名䝉古學教授一員學正一員醫學教授一員學正一員學録一員官醫提領所提領一員隂陽教授司教授一員學正一員學録一員雜造局局使一員副使一員織染局局使一員副使一員平準行用庫提領一員大使一員副使一員在城税務使司提領一員大使一員副使一員廣盈倉監支納一員大使一員副使一員永豐庫監支納一員大使一員副使一員司庫二員在城站提領二員車廏站提領二員萬戸府沿海翼大德三年屯駐鎮守皇慶二年那移􅄔處蘄縣翼皇慶二年自紹興路那移到路鎮守都鎮撫所達嚕噶齊一員鎮撫一員千戸所計一十六翼每翼各設千戸二員彈壓一員百戸二員慶元紹興等處海運千戸所達嚕噶齊一員千戸二員副千戸三員兩浙都轉運鹽使司慶元路鹽倉至元十三年設批驗所大德三年改為檢校所延祐六年例革當年十二月新剏鹽倉倉使一員副使一員慶元市舶提舉司至元十五年立提舉慶元市舶使司大德七年例革至大元年再立慶元市舶提舉司四年例革延祐元年復立七年再例革提舉二員同提舉一員副提舉一員各場鹽司每場各設司令一員司丞一員管勾一員清泉場鹽司長山場鹽司穿山場鹽司龍頭場鹽司玉泉場鹽司蘆花場鹽司岱山場鹽司鳴鶴場鹽司正監場鹽司延祐四明志卷三
