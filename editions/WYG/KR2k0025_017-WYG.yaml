穫非以徼福也教子以食其報可謂使為善者勸一宜書仰飛雲而俯拱木著存不忘於以詔萬子孫勿替引之二宜書披壞壤經營用力勤刻意專南豐所為稱學佛者將以勉吾儒也三宜書寺經始於紹定庚寅之孟秋越淳祐乙巳季夏攷成是嵗之秋可仁請識嵗月詔永久遂書其事於石郡人王應麟記崇報寺縣東五十里宋提刑史彌正建城東化城院縣東十五里宋時有吳僧徳安擕道錫自固二道侣禮阿育王塔至此地訝其孤迥遂剏數椽為緇徒憩止之處寳祐元年圯於風過者嗟嘆時安與錫皆亡矣惟自固存焉固欲復舊圖而未遂郡人㠯為道墐相望義聚遺骼從浮屠法作佛事而悼之固尸厥事事已有餘貲衆為固鬻牒了身事固乃以所得牒集衆財悉以興土木緝成舊緒築海塗為良田名曰化城院後衆為固祝髮白郡就正主席天壽保國接待院在縣東二十里皇朝至元二十三年僧大逵建元貞二年總統所立前額慈濟寺縣東三里皇朝大徳八年楊秀建至大二年頒降聖㫖䕶持賜額二靈寺縣東六十里宣和間陳正言捨山以建號曰金欄福林寺縣東南六十里至元三十年僧圓珏建聞於有司議額壽國寧親寺缺靈濟寺在縣東二里嘉定十二年史衛王建俗呼靈濟庵至元十六年火重建翠嵓山寳積寺縣西南七十里宋乾道三年賜額天壽重興寺縣西南五十里至元二十一年僧永明與徒弟恵涓一靖買厲民庵改建海會庵在縣西二里許首僧妙壽俗姓楊鄞中儒流也延祐甲寅與其徒募緣得地十餘畝築屋二十餘楹乞食自活以接四方因名海會禪庵尼寺廣智院縣東五里大徳十年建雲居寺縣西二里至元十七年浄心建徒弟起宗自安等甲乙住持奉化州雪竇山資聖禪寺州西北五十里舊名瀑布寺唐光啓中置咸通八年重建改名瀑布觀音禪院宋咸平三年請今額至元戊子燬住持僧善来重建初宋仁宗夢二龍争珠遍下名山圖寫山形進奏寺前兩澗合流中有木林䕶珠遂號應夢道塲南有隠潭東有石蒼潭前有含珠林千丈巖瀑布有亭三曰飛雪曰妙峯曰潄玉吕夏卿資聖寺明覺大師碑云夫真空不空是有無證寂滅不滅是往來相佛以權實之法開頓漸之徑使隨器而趨之有不離道塲得大智慧有難行苦行為人天業日月為明矣而盲者不見􅊿毛舟枻可濟矣而溺者淪於波浪人之未有惡萌而忘濟者其心一也其塗異矣昆蚑之性羣行食啄倦則息觸則避求所以安樂不待教而能也人之於貴賤貧富壽夭得喪不知自然之分愛惡悲欣亷貪静躁糾纒桎梏無所解脱晝勞形骸夜勤夢寐至於老死且不知息彼昆蚑知所以安樂人顧不能也佛之教人推性命之際以極天地之外乃至觀身如掌中物傳付法寳不寓文字是謂禪那山岳之大有時而泐金石之剛有時而刓形器之用也我則異於是無去無住無聚無離不見於内不見於外不見中間自利義也利他仁也是為涅槃妙心諸佛法印無上㣲妙祕密圓明真實正法眼藏佛以授摩訶迦葉傳僧伽棃衣㠯待補處出世為成道之符自是衣法相傳二十有七世香至王子初入中國諡曰圓覺圓覺傳大祖大祖傳鑑智鑑智傳大醫大醫傳大滿大滿傳大鑒大鑒藏衣傳法而已大慧繼之大寂承之其後皆以所居稱若天皇龍潭徳山雪峯雲門香林智門此其世次也禪師諱重顯字隠之大寂九世之孫智門之法嗣也俗姓李氏母文氏㠯太平興國五年四月八日生大師於遂州始生􅉂目若寐三日既浴乃豁然而寤屏去葷血不習戲弄七嵗有僧過其門挽持袈裟喜不自勝聞梵唄之聲輒泣下父母問其故懇請出家父母執不可師不食者累日咸平中終父母喪詣益州普安院仁銑師落髮為弟子大慈寺僧元瑩講定慧圓覺疏師執卷質問大義至心本是佛由念起而漂沈伺夜入室請益往復數四瑩不能屈乃拱手稱謝曰子非滯教者吾聞南方有得諸佛清浄法眼者子其從之待子之来也久矣師於是東出襄陽至石門聰禪師之席居三嵗機緣不諧聰諭之曰此事非思量分别所解隨州智門祚禪師子之師也師乃徒錫而詣之一夕問祚曰古人不起一念云何有過祚招師前席師攝衣趨進祚以拂子擊之師未曉其㫖祚曰解麽師擬答次祚又擊之師繇是頓悟尋往廬山承天林禪師道塲問之曰法爾不爾云何指南林曰只為法爾不爾師遂拂衣而退衆皆股慄有毁於林者林諭衆曰此如来廣大三昧也非汝等輩以取舍心可了别也師辭往池州景徳寺為首座為衆解肇法師般若論知州曽公至以果子抵於地曰古人云不離當處常湛然即今在何許師指景徳長老曰凡此長老亦不知落處曽公云上座知也不得無過師曰明眼人難瞞師南遊杭州住持蘇州洞庭翠峯嗣智門也未幾曽公出守明州手疏請師住持雪竇資聖蘇人固留不可師曰出家人止如孤鶴翹松去若片雲過頂何彼此之有雪竇本智覺禪師之道場智覺亦雪峯五世孫備傳琛琛傳益益傳韶而壽維之智覺其號也一法同源而地有盈虚師之至猶家焉決潢洿變清泚掖躄偃争迅馳州邦逺近輻凑下坐駙馬都尉和文李公表錫紫方袍侍中賈公又奏加明覺之號住持三十一載度僧七十八人先是門弟子建壽塔於寺之西南五百餘步一日命侍者洒掃塔陳亭行至山椒歴覽久之曰自今過此何日復至左右皆大驚衆迎師還師亟詣塔所衆皆號泣隨至塔前或曰師獨無頌辭世邪師曰吾平生患語之多矣翌日出杖屨衣盂散遺其徒有問疾者留食殷勤與之約曰七月七日復来相見是夜盥浴整衣側卧而滅時皇祐四年六月十日俗壽七十三僧臘五十夏以七月初六日入塔如師之約嗚呼師得妙用善機不取諸法故能知去来達性命故方是時升堂皇游牆藩者悟性相體空頓息萬縁為大乘法器曰義懷在和凡百五十人傳其法於天下彼遮䕶意根網絆初心背覺合塵逐念流徙得少為多妄立知見雖三詣投子尤陟洞山師亦援手濡足而無以救之是猶孔子之有宰我孟子之有盆城括非其師之過也自師出世門人惟盖文軫圓應文政逺塵允誠子環相與裒記提唱語句詩頌為洞庭語錄雪竇開堂錄瀑泉集子英集頌古集拈古集雪竇後錄凡七集師患語之多而其徒悵然猶以為編攟有遺盖利他之謂也予得其書而讀之二十餘年矣雖瞻仰髙山而祿利所縻無由親近使得稽前首避席霑被法雨覺寤塵勞庶幾可教者今蔑如之何師辭世十有三年碑表未立餘杭僧恵思撰行業錄與其徒元圭覺濟大師悟明繼踵過門裒文請銘以予跂慕之心重之以門人之請之勤抑有待耶愚公叩壤以移山雖不量力其誠則至矣謹焚香再拜繫之銘曰噫憃愚皆本源一念異生二根勝與劣駟馬奔嗜所得自詐諼失大道南北轅艾至老踰朝昏正遍覺天人尊迷者挽溺者掀朝暾出彗霾雲渇得漿寒得薪悟報化知非真趣安穏擺客塵王叔生廣佛事破六宗應彈指法来東非會際信衣傳隻履逝頂五山真法器立積雪殊其臂忍非忍得法髓債必償有裔嗣皖公潛佛日翳翩南游立如椔乞解脫彊哉慧攘蜂蠆神兵衛破頭峯衆雲從横六氣釃二宗教任意付懶融黄梅兒陌上童關七相了諸空聖服勞杵臼傭和心偈掊争鋒夜南鶩懷是逢帝稽首睎下風舟復新葉歸叢有道得無心通世有承四衆依燈相續壎應箎師異稟自孩提升腴雋蹈聖梯慈固拒不得施起恭孝終苴縗銑落髮瑩質疑漢之東得我師扶盲瞶柞荒菑昔無有今委蛇遇霑洽發萌荑淫竈鳴鐘未簴魚目藏明珠吐巋二山下儋負来萬里足繭踽訇春雷披蟄户辨縛解決去住沃醍醐㪺甘露百五十胄蕃舞窮車轍誦句語瞻骨目軸繪素逺胡越近杖屨捐麄相悉開悟山茀鬱泉咿幽虎跡交鼪猱啾塔門閟柏松樛天南垂海彪彪囊破褐笈單裯来環繞五體投名韁身祿飽喉狃怨憎甘鮑鱐睨真乘等贅疣慶我生辨薰蕕蘄誘掖邈無由琢堅石攄我憂方干題云登寺尋盤道人烟逺更㣲石窓秋見海山霧暮侵衣衆木隨僧老髙泉盡日飛誰能厭軒冕来此便忘機曽少卿題飛雪亭云玉虬垂處雪花翻四序雷聲六月寒憑檻未窮千丈勢請君巖下舉頭看樓攻媿和云驚見銀河空外翻湍飛千丈有餘寒下流不用長勞望祗向銀河頂上看又髙元之題云危亭上拂烟霧光蒼崖深到蛟螭穴天河飛来破山翠寒入疎林風自發翻珠錯玉無時歇巖前散作千秋雪寒聲蕭蕭凛毛髮白雲朶朶翔空滅飛流濺沬入毫端天與一詩為題絶樓攻媿題錦鏡橋亭云兩溪赴壑若奔虬此地端能截衆流三板放開千丈雪一奩照破四山秋幾年空自存公案今日重新指路頭珍重老師成勝事清名當與此山留又題妙髙峯云一峯髙出白雲端俯瞰天涯千萬山試向岡頭轉圜石不知何日到人間四明僧希顔題云鴛鷺池塘芳草雨綺羅簾幙杏花風何如月在䦨干夜長嘯一聲千嶂中又鄭丞相清之題云陸地芳洲擁翠翹巨靈穿石衮雲濤摶空蒼鳳欲飛舞奔海玉龍争怒號萬象横陳坤軸富一亭平挹月輪髙獨醒未覺孤清景笑酌寒泉讀楚騷攻媿題千丈巖云圜嶠移来東海東梵王宫在最髙峯試將法雨周沙界千丈巖頭掛玉龍又淮甸僧元肇題云上盡崎嶇脚力㣲毳袍零碎染烟霏妙髙峯頂見日出千丈巖頭看雪飛寒木著霜山衣錦清泉得月鏡交輝翩然又作東南去肯落台温第二機岳林禪寺州東北五里舊名崇福初梁大同間聰禪師建小庵曰長汀後有童氏捨基建寺唐開元中賜額曰岳林宋大中祥符間重賜曰大中崇福乃彌勒示現之處哲宗追諡定應大師彌勒有頌云即箇心心是佛十方世界最靈物縱横妙用可憐生一切不知心真實萬法何殊物何異何勞更用尋經義心王本自絶多知智者只明無學地是非憎愛世偏多仔細思量奈我何寛著肚皮須忍辱豁開心地暗消磨若逢知己須依分縱遇寃家也用和若能知此心頭事自然證得六波羅我有一布袋虚空無罣礙展開遍十方入時觀自在又偈曰彌勒真彌勒化身千百億時時示時人時人自不識舒亶詩云休話人間我獨尊何妨㕓肆且隨羣乞錢往往多空手問路時時向白雲壁上形容圖尚在囊中氣味許誰分分明提起無人問欲會應須眼裏聞寺有古瓷浄瓶六環錫杖在焉世傳彌勒遺物云詳見髙僧傳鄞城山廣福教院州東五十里唐景福初亮法師建吳越錢氏給額曰鄞城宋治平初改壽聖紹興間改今額東山瑞相教院州東南二十里唐大中年間置舊名雲峯宋治平初賜今額南山瑞峯律院州東南一十里唐咸通中置名吳峰宋治平初賜今額寺有廣莫軒攻媿題詩云廣莫乗風隘九州亂山無數㸃平疇一千里外在吾目三十年來無此㳺地下天高俱歴歴鳶飛魚躍兩悠悠昌黎費盡南山句曠望還能似此不西山資國禪寺州西南五里舊名䕶國唐元和間創宋治平初賜今額唐左拾遺𢎞文館學士虞世美為記有洗鉢池羅漢跡駐錫峯應供泉乃天台第四尊者成道之地上有樂亭至和中縣令郟修輔為記攻媿題詩云野溪清淺度危橋徑䇿枯笻上紫霄曉霧暗蒸山寺雨松風深隠海門潮浮杯水漲人何在洗鉢池清意已消又上樂亭臺上看雲山萬疊更逍遥北山廣化律院州西北三里唐大中初置名正化宋治平初賜今額告成教院州東半里後周開寳中置舊名光教即樓評事宅基宋大中祥符改今額至元間燬重建未完演教教院州西一十里後唐清泰初祖師藴思大師建舊名鹿苑宋治平初改今額浄慧院州東北四里周顯徳中祖師璡建宋天聖中賜今額即孫拾遺邵之故基宋江夏郡王趙仲爰撰藴緘大師塔銘襄陽米芾書至元間燬重建未完慈氏教院州南三里唐文徳初朱會等建名清化天祐初改名寳化宋治平初改今額寺有杜鵑花蟠屈如凰主簿樊圃詠云山