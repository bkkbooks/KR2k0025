body:
  text: 延祐四明志卷十七元袁桷撰釋道攷禪院阿育王山廣利寺縣東三十里晉義熈元年建梁武帝賜阿育王額宋大中祥符元年賜名廣利大覺禪師懷璉居之名振天下皇祐二年懷璉居東京浄因院仁宗召對賜食御製釋典頌并提綱語句授之治平三年英宗詔歸山熈寧三年建宸奎閣寺有釋迦如来真身舎利塔内有一角金鐘舎利在焉髙宗賜號曰佛頂光明之塔嘗取至禁庭寺東北山上有所謂迦葉佛左足跡上有東塔院傳者謂劉薩阿所禮舍利塔湧出之處西塔院去寺五十步塔乃唐明皇時建也寺東二里有無相庵大慧禪師作道宣感通傳晉大康二年并州離石人劉薩阿生業弋獵因病死而復蘇云在𡨕中見一梵僧語之曰汝罪深重應墮惡道今洛下齊城丹陽會稽並有古塔及浮江石像悉阿育王所造可勤求禮懴當免斯苦薩阿更生乃祝髮為僧更名恵達東詣鄒縣入烏石嶴結茅㠯寓徧訪海涘名山忽一夜聞土下鐘聲即標識其處越三日見梵僧七人行道空中地形如湧為方壇狀神光照映因劚土求之得一石函中有舍利寳塔六僧騰空而去一僧化為烏石因以名嶴焉會稽記晉相王導初渡江有道人神采不凡自言来從海上告導曰昔與阿育王同遊鄮縣安真身舍利塔阿育王與真人捧塔飛行虚空入海諸弟子攀引不及一時俱墮化為烏石如人形名僧傳云昔時神人捧塔飛行海上弟子中有未得道者墮地化為烏石猶作人形上有袈裟文至今村名塔嶼嶴名烏石今烏石在寺前數里屬鄞縣塔嶼村相去又十五里屬定海謂東塔院為舍利湧出之處天童山景徳寺縣東六十里晉永康中僧義興誅茅結屋山間有一童子日給薪水後既有衆遂辭去曰吾太白也上帝以師篤道行遣侍左右語既不見故曰太白禪師寺經兵火唐開元二十年僧法璿復故迹建精舎於山麓之東正字萬齊融造多寳塔於西南隅後徙寺於太白峯下乾元初相國第五琦奏請天童玲瓏巖為寺名後僧清閒建食堂咸通十年為天壽宋景徳四年賜今額紹興初宏智禪師撤而新之淳熈十六年僧懷敞建千佛閣日本僧榮西從敞遊歸其國致百圍之木以來寺側有虎跑泉石松夾道二十里梵宇甲東南虎跑泉玲瓏巖等詩並見集古攷大慈寺縣東六十里宋嘉定十三年史丞相彌逺創立為功德寺大梅山䕶聖院縣東南七十里唐貞元中法常禪師始誅茅結奄開成元年建寺曰上禪定會昌廢大中復建名觀音禪院柳公權書宋大中祥符元年賜今額其山盖漢梅子舊隠也法常禪師偈曰摧殘枯木倚寒林幾度逢春不變心樵客遇之猶不顧郢人那得苦追尋一池荷葉衣無盡幾樹松花食有餘剛被世人知住處更移茅舎入深居大梅山保福縣南東七十里唐正元十二年建號北蘭院大中元年改報國仙居宋大中祥符三年賜今額與䕶聖同一山汪大猷有記仗錫山延勝院縣西南一百二十里唐龍紀元年天童山紀禪師飛錫至此建宋寳元二年賜今額寺前有石巖髙丈餘上刻四明山心四字乃漢隷也金峨山真相寺縣東南八十里舊號羅漢院唐大厯元年建宋治平元年賜額金文山恵照寺縣東南七十里舊號金文懴院唐乾寧二年建宋治平元年賜額五峯山崇福寺縣東五十里舊五峯院晉天福六年建宋大中祥符三年賜額東山慧福寺縣東南四十里舊號福昌院宋淳祐七年鄭丞相請於朝増田重建為功徳寺改賜今額跘跨山崇果寺縣東五十五里晉開運二年建宋大中祥符三年賜今額普浄寺縣西南七十里舊號頂峯庵宋建隆二年建大中祥符三年賜今額四明寺縣南二十里舊號鄞水院唐天福二年建宋大中祥符元年賜今額白雲延祥寺縣東南八十里宋乾徳五年建大中祥符三年賜額法忍寺縣西南六十里舊號定光院唐咸通元年建宋治平二年賜額西延壽寺縣南四十里舊號永福院唐中和六年建翠嵓山移忠資福寺縣西南七十里舊號翠巖境明院唐乾寧元年建宋大中祥符元年賜名寳積禪院嘉泰四年前張參政請院為功徳寺賜今額報忠福善寺縣西南七十里舊號峒山院唐光啟二年建宋大中祥符元年賜名彰聖本甲乙徒弟院乾道四年改充十方禪院嘉定二年加賜前額踞山東南支衆峯環合狀若芙蓉是年樓參政鑰請為功徳院賜今額佛隴山積慶顯親寺縣東六十里唐咸通十三年建宋治平元年賜名保安慶元六年充恭淑皇后宅齊王府功徳院教忠報國寺大慈山丞相史彌逺功徳寺妙智寺大慈山丞相史彌逺功徳院霞嶼寺在縣東南六十里東錢湖之心小嶼兀然於其中大資史巖之鑿山為觀音洞髣寳陀之山因建以奉且割田以贍教院資教寺縣西四十里舊號廣徳院周顯徳元年建宋治平元年賜額悟真寺縣東南五十里漢乾祐二年建宋治平元年賜今額栖真寺縣南六十里隠學山唐建中二年建號隠學寺宋大中祥符元年賜額恵光寺縣西南四十里唐咸通八年建名小江宋大中祥符三年賜額院嘗有妖僧塑神像納老烏於其腹以術呪之使為禍福於人而邀利民之有災患者不禱其神則不寧乾道中守張津知之追妖僧至庭下具得奸狀遣吏剖其像果有死烏杖其僧而逐之民以安息治平寺縣南三十里後唐清泰二年建名保豐宋治平元年賜額廣壽寺縣東五里周廣順元年建號崇慶院宋慶厯七年賜額廣嚴寺在縣東四里舊號華嚴院晉開運元年建宋治平二年賜額布金寺縣西南三十里宋寳元二年建治平二年賜額海惠寺縣南三十里舊號廣利以院之祖師廣利大師得名治平二年賜額興教寺縣南五十里舊號小溪興福院唐咸通八年建宋治平元年賜額普和寺縣西南五十五里漢乾祐二年建名靈影宋慶厯七年賜額圓通寺縣南三十五里唐天祐十年建名東林宋治平二年賜今額鄧橋廣福寺縣東南二十里宋天聖四年賜名壽聖紹興三十二年改賜額普安寺縣南五十里梁乾化二年建名茆山宋治平元年賜額明心寺縣南三十五里晉天福五年建名厲山院宋治平二年改賜額惠燈寺縣東南二十五里舊號朱村院宋建隆二年建治平二年賜今額福聖寺縣東南四十里舊號東山塔院宋乾德四年建治平元年賜額清修寺縣西南八十里舊號清涼院宋乾德二年建大中祥符元年賜額普照寺縣南七里舊號明福院宋乾徳二年建治平二年賜今額辨利寺宋端拱中建舊為史丞相彌逺功徳寺慈悲普濟寺東湖月波山下宋淳熙五年建普光寺缺教忠報國寺宋紹興二十年建淳熙六年賜額寳華寺大慈山前史丞相彌逺功德寺普恩寺在縣東五十里皇慶二年儒人陳泳施財剏建復割田以贍其子廷藻於延祐元年申告有司達於帥府請今額律院寳巖寺縣西南五十里舊號孝義院唐元和十二年建宋大中祥符六年賜額王荆公有詩廣修寺縣東六十五里晉天福五年建宋大中祥符元年賜額普提廣福寺縣東南八十五里唐乾符六年建宋大中祥符三年賜額禪巖寺縣西南八十里唐貞元元年建寺東有巖穴可坐百餘人舊有僧言法師修道之處因巖名寺曰禪巖今為律院慈雲寺縣南三十里漢乾祐二年建名李浦宋治平二年賜額法雲寺縣東七里宋乾徳六年建號甬東浴院治平二年賜額多福寺縣東五里宋乾徳三年建治平元年賜額悟空寺縣東南六十里大慈山前史丞相彌逺功徳寺甲乙院栖心崇壽寺縣東五里舊號東津禪院唐大中十二年分寧令任景求捨宅建請心鏡大師居之僧姓朱既居於此會剡冦裘甫轉掠四明有衆數萬縱兵入寺師燕坐禪定神色不動賊衆愕然悔過作禮倒戈而退咸通二年冦平郡奏其事請以栖心名寺旌師之徳宰相裴休為之書扁七年師化謂其弟子曰後三年當焚我窆於天童山忽一日有異香發聞弟子相謂曰師有遺言今三載矣異香其啓我乎乃發龕茶毗之儼然如生獲舍利數千顆丹翠交輝敕諡心鏡塔名壽相天童亦有舍利塔焉刺史崔琪狀其行於碑宋大中祥符元年賜額政和八年四月七日御筆以有常住莊産寺院改建神霄玉清萬壽宫州以寺充焉久之復舊唐心鏡大師碑崔琪釋氏之宗也得了悟真機則曠刼不礙自釋迦去世至曹溪以降指心傳心祖系綿續下分萬𣲖不墜本枝故得之者則迥超覺路坐越三界大師之道契萬𣲖之一流也大師諱藏奐俗姓朱氏蘇州華亭人也母方娠及誕常聞異香則知兠率降祥来從百億刼幼懷貞慤長契𤣥奥松風水月未足比其清華仙露明珠詎能方其朗潤故以智通無累神測未形越六塵而迥出隻千古而無對為兒時常墮井有神人接持而出丱嵗出家師事道曠禪師弱冠詣中嶽受具戒母念其逺思之輒泣因一目不視及歸省母即日而明母喪哀毁廬墓徵瑞備顯由是名聲翕然歸敬者衆因欲絶茅誅木與禦燥濕遽感財施充積堂廡乃崇院側有湖湖有妖神漁人禱之必豐其獲罾罿交翳腥羶四起大師詣其祠而戒之鱗介遂絶後挈瓶屨以歴湖山靈境異迹遊覽將畢復詣五洩山遇虚黙大師一言辯析百契符會噫顯晦之道日月之所照也聖教其能脱諸故會昌大中衰而復盛唯大師居之瑩不能惑所謂焚之不熱溺之不濡者也洎周洛再構長壽寺敕度大師居焉時内典焚毁梵筴煨燼手緝散落實為大藏故南海節度楊公典姑蘇日請大師歸於故林以建精舎大中十二年分寧宰任景求舍宅為禪院迎大師居之剡冦裘甫率徒二千執兵晝入大師㝠心晏坐神色無撓盜衆皆悸懼叩禮逡巡而退冦平郡中奏請改禪院為栖心寺㠯旌大師之徳凡一動止禪者畢集環堂擁榻堵立雲會大師學識泉湧指鑒岐分詰難排疑之衆攻堅索隠之士皆立搴苦霧坐泮堅氷一言入神永破沈惑㠯咸通七年秋八月三日現疾告終享年七十七僧臈五十七先是命香水剃髮謂弟子曰吾七日在矣及期而滅門人童弟號躃泣血乃窆於天童巖弟子培墳藝樹三載不間忽一日異香凝空逺近郁烈弟子相謂曰昔奉大師遺囑令三載之後當焚我身今三載矣異香其啓我心乎乃定厥議掲龕發塔再睹靈相儼若平生以其年八月三日禮法茶毗於天童巖下祥風瑞雲竟日隠現獲舎利數千顆紅翠交輝白光上貫十三年弟子戒休齎舎利述行狀詣闕請諡奉勅褒誄諡曰心鏡塔曰壽相嗚呼菩薩之變通也出顯入幽示現無極其可究乎大師自童孺距耆耋陳言措行皆貽感應復以證前生行業知示滅之日時茍非位躋十地根超上品孰能造於是乎在長壽寺時謂衆僧曰昔四明天童山僧曇粹乃吾之前生有墳塔存焉相去遼逺人有疑者及追驗事實皆如其言景求將迓大師也人或難之對曰治宅之始有異僧令大其門二十年之後當有聖者居之比大師至止二十一年矣初大師將離姑蘇為徒衆留擁乃以㯶拂與之曰吾弗在此矣爾何疑焉及大師潛行衆方諭其深意又令寺之西北隅可為五百墩以鎮之衆曰力何可及大師曰不然作一墩種柏五株即五百墩也凡㣲言奥㫖皆此𩔖也至若闢𤣥關諭生死𢎞敷至􅄨不備論咸通十五年琪祗命四明郡戒休㠯其跡徵余之文遂直書其事以旌厥徳銘曰空王設喻煩惱無涯唯大師心照盡塵沙大師降靈吳之華亭方娠載誕厥聞惟馨童䝉墮井神扶㠯寧母思𦕈目歸省而明漁人禱神其獲豐盈一戒祠宇施罛莫嬰像教中虧貝葉斯隳手集三乘遺文可披識羊祜環知仲尼命正色兵威寄詞譚柄我来作牧空企音塵琢兹貞石庶乎不冺景徳寺縣西三十里宋寳祐元年間建延福寺縣東南二十里唐大中十三年建名天王宋治平元年賜前額院有天王像資聖寺縣東北一里半舊號漁浦門外院宋太平興國二年建天禧四年賜額寳林寺縣南三十五里舊號報國西林院晉開運三