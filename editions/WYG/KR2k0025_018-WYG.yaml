body:
  text: 延祐四明志卷十八元袁桷撰釋道攷定海縣總持律寺縣東北一里唐咸通初慧鑑大師剏乾寧中賜額曰䕶境宋大中祥符初改今額建炎燬後重建觀音教寺縣東北一里宋皇祐初僧戒修剏紹興中賜額妙音教寺縣西二里宋元豐中僧普照置建炎初賜額能仁教寺縣西北四里宋紹興間僧中卞建名利濟政和中賜今額慈化院在縣西北二里宋淳熈中僧圓證置顯孝接待院縣西五里宋元豐中僧一静置名崇先淳熈間請今額瑞巖禪寺縣東南九十里唐會昌中郡守黄公晟為普化禪師剏立精舎景福初改為寺宋治平初賜額名開善祥符中因産靈芝名瑞巖山有十二峯峯下有閣知郡李公撫辰題云高閣玲瓏倚半空秋來靜掃白雲蹤無人冩此天然景十二䦨干十二峯龍圖舒公亶來剏草堂為遊息之地詩云十二峯頭月未央天風吹下紫芝香我來分得僧清致布衲蒲團一草堂鄞江先生周公諤詩云紫芝巖下斵懸崖簾捲西風一梵齋流水聲中鳴好鳥寒松影裏踏青鞋裴公綠野雲連墅白傅香山月滿懐珍重社蓮風味在短藜長許野人偕華巖禪寺縣南四十里唐廣明中知禪師置名雲巖宋大中祥符初賜額名旌教景定初改今額攻媿題云但見雲生谷初無石似巖得名非舊觀買地作精藍境勝環修竹門深擁翠杉禪林自佳處莫問後三三佛巖禪寺縣南七十里唐天復初明禪師置宋寳元初請額名崇梵後改今額明慧禪寺縣東南七十里唐乾寧初置名保安宋治平初改今額恵寂律寺縣東南七十里晉開運中置名蘆浦宋治平初改今額慈濟寺縣東一百三十里宋治平初置資聖禪寺縣東南六十里唐天順初置名資福宋治平初改今額本覺禪寺縣東南一百二十里周顯徳間居民宋可規耕地得片石上鑴七佛因建彌勒庵宋治平初改立為寺宣化律寺縣南九十里宋嘉定中里人柯仲諭始建庵端平初改立寺請因武康縣廢寺舊額名宣化寂照寺縣東南九十里梁貞明中置名保安宋治平初改今額興善寺縣南五十里唐天順初置名保安宋治平初改今額延恩院縣南三十里宋端平中僧文最置名普濟庵端平中改今額顯教律院縣南五十里宋開禧中伍氏建庵治平中改今額靈峯禪寺縣南四十里周廣順初全禪師置名保安宋治平初改今額浄居禪寺縣南二十里唐乾寧初置名龍明宋治平初改今額舒亶題詩云老厭冠盖場萬事不掛耳時與林間人靜話無生理却聞錢長官只飲淨居水使我夜不眠燈花亦懽喜浄巖院縣南三十里漢乾祐初置名練盆宋治平初改今額泗州律寺縣南三十里唐清泰中有石佛因水自山流下僧清立因剏精舎後改今額回向崇法寺縣西一十五里宋建隆初僧義朋紹宗置名回向治平初改崇法永寧教寺縣西四十里晉天福中僧鑑瑩置名明波宋治平初改今額妙勝禪寺縣西三十里唐清泰中置名永安宋治平初改今額鄭佃為之記曰法常弊於有而法非有則不立是故道之應世也以有為法而以無為用猶云一身也四體具則為成人而所以為人者非四體之任也夫聲縁於耳聞者非耳也色縁於目而見者非目也茍廢耳目而求聲色之辨則何所從而受之哉故以道觀法則内之耳目異處也以道觀用則外之聲色同我也内外有辨故事之所以顯有無相生故理之所以㣲此道之所以先天地而不生後萬物而不滅也故為之宫室以致其恭為之像塑以申其信而又為之言説章句以道其所歸此法之所以自立而衆之所可知也至於有相而不可以形求有言而不可以情解超然自得而天地萬物莫之能偶此則智之所不及而用之所自成也明州定海縣有禪院名妙勝距州城三十里瀕海之上環水之中居處庳陋而有風濤漂注之患五代清泰中居人姚綰始以其地易而新之遂能避其患而衆安以處也其徒以籍相傳房居而族食凡百有四十餘年而院之存者無幾矣熈寧五年其徒以力不能勝而爭訟以起於是衆列狀以告於州願以為十方住持州下其狀於僧司使集衆以舉所知而衆皆以淡交者應州凡兩上其狀而始獲請淡交居之數年而四方之人始知有妙勝矣信慕祈嚮持金帛而至者盖迹相接於路而以後為愧於是為之復新昔之故陋今焕乎其有文矣昔之庳隘今廓乎其有容矣又因其院之隙以建轉輪寳藏其費累數百萬皆不煩於求而自應用工始畢而其徒有訟於州願復得故處州以訊於縣縣力争之而後已今既安且久矣交公於是日與其衆談無上之法轉無礙之輪以䝉利於衆生此衆之所願記而余之所以告於人者也若夫究竟寂滅而不住於法萬法現前而當體為用説無所説行無所行而有無内外不可以係而處之此則智之所不及而亦非余之所能言也元豐三年三月望日記羅適重修記曰元祐七年冬予受命提㸃二浙刑獄事明年夏出按明州之定海因之澥浦經度創鎮舟過清泉有梵刹焉枕河臨道竹深而林䕃氣象灑然清與神會就之以避炎熇時長老智榮師喜我之来芬我以香息我以牀睡足環視物幽景涼觀其院之掲名曰妙勝智榮師言五代時姚綰捨地建之初號永安大宋英宗皇帝登極以治平改元乃新今額熈寧五年主僧元旦聞於州願作十方州致廣恵首座淡交開堂始昌禪席淡交住廣恵以智榮師繼之予過時智榮師造釋迦殿新堂厨廊廡其功將成予已深嘉師能以禪人興教事起人之信也明年師又使檀越嚴恕持書乞記且云以元祐八年冬經始之至紹聖二年秋工告畢凡為屋一百五十楹佛像七身粉繪莊嚴華而不侈嗚呼天下為僧者多勞人以逸己蠱我正法智榮師能了自性不為己勞人惟張大佛事使四方衲衣緇侣得以安處乎般若之塲晨兮升堂夜兮入室破迷袪惑掃空了知如来正法眼藏與虚空等又能使一方白衣俗士信佛有大法門可以出生死滅罪業各植大善根入我佛境師之所存不其偉哉予嘗怪世之學禪者自藥山不許人看經之後妄生疑情不知藥山為人破執欲人言下一決而悟由不二法門直入無等等正覺反㠯口耳所聞縱横辨捷自謂見性棄經破律蕩無所守譬如操舟之人不信柂楫流浪江海安能到彼岸耶又聞之藥山嘗自看經或有問者藥山云遮眼此善忘其指者也如来云以筏喻者法尚應捨而況非法吾知藥山真看經者也師為我謝學者藥山古佛豈欺後世哉勉之紹聖三年四月八日記息雲律寺縣西北六十里宋治平間僧法志置崇寧初改今額正覺教寺縣西北六十四里周廣順初僧清肅置名回峯宋治平中改額寺有清風軒邑尉蔡覿詩云海風拍枕燈初暗山雨打牕人正寒料得此軒秋更好怒濤推月上闌干文康公王曙咸平中以著作佐郎宰邑詩云山勢欲壓海禪扃向此開魚龍腥不到日月影先来樹色䆋擎出鐘聲浪答回何期隨吏役蹔得拂塵埃伏龍廣福律寺縣西八十里唐咸通初鑒諸禪師置刺史栁公武請今額山有海眼泉冬夏常温宋邑宰朱景獻遊山題詩云凌雲峻嶺隔凡塵嶺外湖天别是春一千丈巖人已往五百年事跡徒陳自傳道貌今無垢不脱禪衣句尚新信是飛仙游戲處何須雲外望三神德祐初黄公震詩云壯哉天造伏龍山獨壓溟波浩蕩間百怪鯨鯢俱帖息半天風雨共高閒盈眸縹緲三神境跬歩巉巖九豹關只恐此龍難久伏雲雷天色正班班永福院縣西三十里僧清友置宋嘉定中請杭州仁和縣廢院額名永福覺海教寺縣南一十三里唐會昌初置名清海宋大中祥符初改今額洞山教寺縣西北八十里唐開平初置宋祥符請額曰幽棲洞山乃將軍山洞也覺度寺縣西六十里宋寳祐初置松林庵至元十五年改今額慈溪縣普濟教寺縣東北一里吳赤烏二年太子太傅都鄉侯闞澤書堂後捨為寺唐大中初縣令李楚臣因闞澤字徳潤故以名寺乾符中勅賜應天徳潤宋大中祥符初改今額寺之東岡有松如龍有石如虎元豐中縣令盛次仲題詩云一松偃蹇蒼龍蟠一石巉巖怒虎踞我來題作龍虎軒祗恐風雲捲將去因以龍虎名軒朱翌詠古松詩云三國名臣宅千楹釋子宫但求除橘籍不見老松公懷抱凌雲上規模偃盖同須防雷雨際恐見化為龍補陀教寺縣東一十里唐大中間建舊名大中觀音院治平初改額精進院在縣南三十里唐廣明初賜額保國宋治平初改今額白龍慈化院在縣東五里乾祐間僧師􅈯築庵修道誦經有白龍矯首以聴里人唐居恵捨基建寺故號白龍治平間賜今額永樂寺在縣西六十里宋景定初置白巖教寺縣西南三十里宋乾徳中建天聖中賜額隂興寺縣東一十五里舊名雲舎庵係在城袁通判建僧大倫改今額仍奉袁氏祠堂禪餘吉祥寺在縣西南四十里晉天福中置以禪餘山為名宋治平初改今額赭山清果教寺縣南一十里周顯徳間建宋治平初賜今額寳慶教寺縣東三十里宋端拱初僧宗定建名西資庵開禧間僧廣清請今額善慶教寺縣東南一十五里宋淳祐中僧時習建名崇孝開慶初張司法請今額妙應教寺縣東四十里宋治平間僧悟諲建紹興中請今額雲溪廣福教寺縣西南三十里唐光化初郡守黄公晟建聖壽院宋紹興中改今額定林教寺縣東一十五里晉天福初僧全奉建扁曰峯山天聖中改今額覺林教寺縣西四十里唐景福初僧𢎞之建宋治平初賜額雲湖慶安教寺縣西北一十五里周顯徳中建宋治平初賜額甘露教寺縣西六十里唐開元中湯禪師建名上龍福山宋治平初改今額金仙教寺縣西北六十里唐乾符初僧闕習建舊名福林宋治平初改今額蓮華教寺縣東北十里唐寳厯初僧圓逺等建治平初賜額資西接待教院縣北二十里宋寳祐中建寳嚴教院縣西二里宋景祐間建始號永明嘉定中請杭州錢塘寳巖廢寺額中丞舒亶詩云四山烟雨收雙沼漾晴碧白鳥忽飛來㸃破簷前色妙峯教寺縣西南六十里宋紹興間僧可宗建五峰廣福教寺縣西北三十里唐元和中僧志堅建宋祥符初請額天台東教寺縣東北一里宋嘉祐初創始名普濟淳熈初賜今額永明寺縣西南隅唐儀鳯初邑大夫吕珂捨宅為寺元號禪林院宋髙宗賜名大寳大中祥符初賜今額定香教寺縣西六十里唐天復初僧道恩建賜額太平院宋治平初改今額定慧教院縣西南五十里石晉開運初建賜額支山宋治平間改今額金繩教寺縣西北三十里唐清泰間僧法通禪師因華嚴寺廢基建祥符中賜額吉祥教寺縣東北一十里宋治平中建華嚴律院縣東北一里宋端拱初建紹興中賜今額知餘姚縣陳時舉記曰學佛之徒以戒為本戒行微細易學難持要先當明律律嚴而宻防微杜漸無所不至僧不明律動輒得咎何暇講他學是故如來將入湼槃最取教化尤深激切吿諸比丘曰於我滅後當尊重珍敬波羅提蜜多若佛弟子克遵佛訓不犯律儀堅持禁戒禪定智慧自然發生則與如來住世無異也受人天供養作濟世津梁夫復何嫌宗暐律師久從靈芝游傳南山教戒行髙潔道業純備真佛弟子為此方所欽敬久矣明州慈溪縣有東西二巨刹東曰普濟寺寺之西南隅即華嚴院也院自更十方以来屢經住持皆不克振基址湫隘室屋卑冗僅容百指嵗久不葺頹毁殆盡偷安茍且之人不復能主於是邑父老士庶咸以律師之善狀告於有司俾其尸之師不獲辭既至朝夕重習寒暑不懈慨然念敝陋之甚不足以嚴奉香火安處徒衆始鋭意更張作是願已衆信鄉合欣然效力乃闢土宏基剗除舊迹鼎新大厦設殿於中以尊大士像建堂於前後演毗尼法僧房廊廡次第成就種種莊嚴之具無不辦集四方從學之徒幾百人往来雲水至者如歸師與徒弟甘苦一體諷懴呪無頃刻怠惰邑人愈加歸向凡有疾病困苦無逺近貴賤皆投依焉而師誠意専致以故而祈禱無不獲此佛法久住之像而是院之興固未易量噫今之髙堂邃宇貌像嚴飾為邑人祈福之地者向朽敝之餘也今之芳池綠水花木映照為衲子游息之所者向糞牆之基也茍非其人道不虚行雖物之廢興固自有時然實本於人事耳儻非暐師戒律精誠有以動人其能建立如是耶師以宣和庚子住持即其年具造經營積累建炎庚戌始得周備求文章於予以紀嵗月子與師為里社之舊熟知其人因書所見之實以勒諸石本院素無莊土邦人大檀越林暐迪功施田五十畝以為倡師言自是常住必續有喜捨者當别具記云紹興壬子十月二十日記佛跡律寺縣東三十里唐天寳中僧惟實建凰巖律寺縣西二十五里宋紹興間僧宗曉建三峯資壽律寺縣西南六十里唐咸通間虞世南建名聖壽宋景定初改今額福源律寺縣西三十五里至元燬中丞舒亶題云寺占靈龜背山横小㠗頭一橋雲借路雙沼月分秋竹影摇虚室松烟著曉樓殘鐘誰共聴寒籟更颼颼證心律寺縣西四十里唐天福中僧道珍建請今額蘆山普光律寺縣西南二十五里唐清泰間建治平初賜額香山智度禪寺縣東三十里唐天寳中僧惟實結庵廣徳初建寺大厯中請額東臯福昌禪寺縣東南二里宋淳祐中僧智恭建咸淳中賜額五磊普濟禪寺縣西北四十里唐文德中僧令頵禪師建舊名靈山大中祥符改今額中丞舒亶詩云五磊峯高筆揷天長松合抱幾千年塵氛洒落非人世風露清明近月邊枕上數聲敲夜磬山前百畝起春田我来欲卧蒼苔色不著藍輿兩兩肩定水教忠報徳禪寺縣西北三十里唐乾元間僧一華建名清泉宋嘉熈初袁樞密増田建寺請於朝改賜今額石門饒益禪院縣西南五十里唐景福初進禪師建扁曰石門宋治平初賜今額西峰度門禪院縣西北六十里唐元和間常禪師建名曰西峯後改廣明宋治平初改今額永壽尼寺縣西北一十餘里宋紹興中僧恵真無念建咸淳中燬後重建湖田經堂縣東二十里宋開慶初余徳齋置寳蓮經堂縣西五十里至元中王恩恭置正念庵縣西一十五里宋淳祐中僧法印建溪隠庵縣東二十里至元中僧如良建福源精舎縣東五里淳祐十年朝奉郎知溧水縣李以申妻朱氏所建婦茹氏増創之尚書可齋袁商為記孫印傳妻胡氏復置田二頃四十畝命僧有心主領翰林侍講學士袁桷為記象山縣等慈禪寺縣西北一里舊名鳳躍宋元嘉初置治平初改今額吳郡方預釋迦殿記曰三代而下自天子逹於庻人為之宫室莫不有制卑踰尊賤敵貴則其制亂是故聖人作為法度雖毫毛纖悉之餘未嘗不叮嚀規戒盡君臣上下之分使尊而貴者不過其侈卑且賤者亦不甚陋為萬世之定法也自爾剏營百出事非經見窮巧極智矧生於後人則學者未聞固不敢輕議余以此事牽出鄞江因次象山縣有浮屠氏慶恩者忽見余而言曰負縣之北隅有我佛所居曰等慈慶恩實僧院也且院之名今天子詔以賜之舊亦以鳯躍為額甲乙繼守四百有餘嵗咨嗟前人蔽於自奉以法堂方丈香積僧室逸居飽食為事獨大殿歴年踰久棟楹梁桷橈折朽腐飄風暴雨無以處我佛某方逺慕覺道繼唱真乘不忍坐見隳敝發無量大慈悲心一日率住持人友宗訪縣人林奉元實此民巨富之又豪者同力勸緣廣募檀信迺得錢百萬涓日命工雨鍤霜斤鼎新革故飛甍畫棟蟬聨綺錯仰望俯視丹雘浮動乃以釋迦佛坐之於中文殊普賢迦葉阿難四菩薩侍焉護法二神立於其外復以十八大羅漢環拱旁列就其佛之尊者名之曰釋迦殿逺近嚮慕源源如歸嗚呼非我佛法廣大妙道通達則何能集是壯觀哉以元嘉八年十月始作治平二年十一月休工某能力為如是願丐之以書本末將激其不能為者余應之曰師之言詳矣使余雖信後之營向之巧而復為之説亦無以過之也况余所不敢輕議者耶治平二年嵗次乙巳十二月己丑朔二十五日庚戌記智門禪寺縣西二十五里舊名保安周顯徳中置宋治平初改今額崇寧二十年八月七日象山縣令金陵徐敏求為之記曰西方仙聖立開導引掖之方俾有生就善避惡與吾聖人之道初無以異若其所謂無所住而生其心夫本覺妙明者雖百姓日用而不知至於一切不得已而寓之於迹俾常情卓見聞之亦足以革非心而弭貪欲故以清淨恬虚為禪定以謙退柔遜為忍辱則知心爭可得而息也以菲薄勤儉為修行以窮逹壽夭為因果則賤陋或可得而安也以隨所作業回復償報為地獄之説則為不善於幽隱之中而幸免名刑者或知畏憚也於善俗之政教實亦有助聖人因俗之善而導之有所不禁焉及其弊滋甚則繒臺幔闕銀池玉樹以為莊嚴當然考鼓鳴螺晝夜梵唄㫁指灼體膚以為依歸當然禱福祈年忘本附末紛紛愚衆波蕩以從是學佛蔽䝉之徒以迷識佐其髙妄相夸脅而倡其風之過也韓退之于唐喟然引聖力争四海之域撥衰反正不使汩為怪焉者以為己則學佛之徒不可不慎茍非其人必肆為慢靡嵬瑣之行以害聖治為疑政亂政之罪人縣之西有佛院曰智門距縣三十里最為佳處先是院僧相繼主之姑以前後為序不復簡汰殿宇蕪穢弗除弗治其依倚禍福而恣欺惑者盖不可道也崇寧元年六月衆請於有司願更為十方禪居太守兵部陸公傳命廣恵首座僧曇恵住持慧公操孤髙能其事曽不閱月倐然革圮陋為梵釋龍天之宫方袍至者修潔盡敬人游其地善心以生學佛之徒如此盖亦無負土木華構不為虚設矣院建於周之顯徳治平中賜名為智門迨今始輪奐完備禪刹因知地廢與顯固自有時也其形勢雄快足以登臨耳目所寓無非至教海雲合散空色兩無潮浪去来愛緣欲浄泉聲漱玉與地籟倡和若出廣長舌相宣㣲妙言則意此地又必有神物䕶持須其人而後興焉余宿官於此方推行朝廷善令仁政使海濱之人漸上道化而慧公頗能知佛之本心與衆為善蠲治塔廟恥此為流輩之欺惑良異夫迷不自識者亦可嘉矣懇余施一言以為記故樂為之書寳梵教寺縣東北一百三十步舊名東禪宋建隆初置治平初改今額苾芻法明為之記曰大夏距天竺國不知其幾千萬里有能仁民之教盖出於淨飯之後當周昭王二年四歲而生焉大聖將利王於天下忽地動泉溢虹光上貫紫微王命史占之剖石南郊用紀其事生十九年父王以嗣翌之儲鍾愛甚篤禁何負出之座志堅不可奪遂踰成雪山修道徳著行滿於菩提樹下成等正覺三轉法輪度人無數機薪既盡將入涅槃顧謂其徒曰吾滅後一千年聲教當畱於四方於是阿難多聞第一與諸弟子懼㣲言將絶於畢鉢羅窟中結集法藏凡住世四十有九年所説之法若水傳器將大小諸部不可備舉盛行其土至感明帝夜夢金像飛行殿廷因遣使往西域求之月氏遇摩騰竺法蘭二大士以白氊繪其像貝多葉繕其書至止洛京首命翻譯印四十二章經為釋教来東之始也乃度僧剏白馬寺以奉之原其教大率以因果為宗近則使人遷善逺罪終則使之革凡成聖大有益於教化故世為儒道釋若鼎之足焉歴魏晉隋唐又遷千有餘載中間或隆或替皆係於時君世主其道未嘗為之増損巨唐髙僧𤣥奘義盛者嘗親往天竺備歴寒暑得經律論合前後所譯約五千餘卷梁朝傅大士乃補處慈氏方以其書覆以寳殿架以車軸使人推之此亦流通法寳無窮之意自爾檀信有所祈禱至於事廹懇投如谷答響或者竊疑之曰吾觀琅函玉軸而赤者是紙黑者是墨分别者是業識與夫施財推利之人而手未嘗捧其卷目未嘗關其書又不知其中所説何法祗一舉心祈嚮便能感格神物易危為安此係何道而致之然殊不知如来為一切衆生故於娑婆世界無一芥子許不是舎身命處且以丈尺之地鋪以芥子縱功力筭計尚莫能知况娑婆如是之廣其積功累徳宜乎不待發一言而千里應之此且以一代施之為言若其以法界身隨機逗教則塵塵刹刹殿推是藏聞所出音聲與親聞如来所説一大藏教無以異也而况手持目關游心其間者哉荆溪且一句築神咸資彼岸思惟修習永證菩提則前所謂遷善逺罪革凡成聖豈虚言邪寳梵院者在縣之東北隅去城市一牛吼地治平中始易今額業以十方講觀住持政和間猊座久虚衆舉真懿大師徳臻胡氏子世為邑之大族妙齡披緇度世延慶三十年稟法智大師天台教觀象欽仰既来適丁百廢莫能支梧一日其父允和語之曰邑中未有輪藏為道俗洗心殖福之地汝能經畫吾當助之於是樂從其説袖疏出謁豪右後七年而藏成寳殿一新華龕八面䕶法神龍從地捧之而出菩提天仙光明輝映若帝網珠互相涉入其徒了宗如雅可立同往烏墩鎮募緣得經五百函以實之興作於建炎丁未落成於紹興甲寅總費錢萬有餘貫既成臻公遂告老西堂未二十年而主人幾易第恐日遷月化後之人不知剏始之本末乃過謂僕曰此藏未有記公能以文字治増上勝緣乎僕曰昔韓梓材唐之名儒也嘗為清泉寺作輪藏記其間所載太和中率天下佛祠逾三萬其能置大藏者不過十百然以唐較宋朝其増置佛祠不啻數倍而能置大藏者又何止於十百而已哉顧當時建立之人求其記者皆一時鉅公碩儒托以文章翰墨照耀後人欲其取重於天下矣而公獨以一林下無聞之人求為之記得非以僕蕪而為誚焉缺延壽寺縣北七里舊名龍壽漢乾祐初置治平初改今額常樂禪寺縣東北三十里唐乾寧中刺史黄晟建宋乾徳初改寳慶額治平初改今額盧江縣主簿樓郁記曰嘉祐七年寳祐縣之主僧死邑令陳居玠易為十方之院命金峩首座僧道相居之院在邑之東北一舍之地即明州刺史黄君之所建也寳慶之號肇於乾徳之初至治平改元之明年乃賜常樂之額黄君諱晟仕吳越國王自君之殁百有餘年其徒相傳不為少矣知一身之利而忘其所以利於衆人相師之到而頽垣㫁棟負土而立者相忘矣相師曰吾志在乎山水之間得此固足樂矣乃與同參文應及弟子則之相與經營破私為公撤舊増新又天童僧冲太者植松杉二萬餘本不踰年遂為勝絶之地邑之人知相師不私於其身而有利於衆人咸信而歸之故黄宗浦孫常憫吳允熈陳允恭等為之檀施宗浦乃刺史之裔孫常憫先跡之墜遺有意而興起之既得相師修學去来見在一切佛回向在它化自在天殿曰摩尼寳時金剛藏説過去未来見在諸佛智地今此寳殿妙好嚴特名字何等當説何法願為敷演居士告言佛子智身寥廓徧周十方法界圓融終始無際是以如来正覺初成九天同屆普光一集十處咸登今古無差舊新一念故不離果徳大澤普應十方而為一時一會本無去来心汝今者自心之力念念之中信之此身與十方諸佛齊成正覺轉正法輪則普光即殿殿即普光既信此心住於佛住法界虚空廣大無二則妙勝即殿殿即妙勝學三世佛常行萬行利益衆生不可思議則寳莊嚴即殿殿即寳莊嚴發廣大願充滿法界救䕶衆生慧智自在則妙寳即殿殿即妙寳住菩薩住入佛智地究竟修行成最上道則摩尼寳即殿殿即摩尼寳如是言之則帝綱重重鑑象相入不動智佛常坐道塲諸大菩薩遊戯三昧則此殿者當何名為汝其諦觀作正思惟普光法堂正在此處時諸大衆聞居士言得未曽有咸作是言善哉居士快説法要我等今者信解受持願書并之作將来眼居士曰不亦善乎宣和六年十一月望日玉泉教院縣東北三十里宋乾徳初置熈寧初加賜壽聖紹興間改今額普明律寺縣西南一十五里梁天監初置名湧泉宋治平初改今額御史臺檢法官王庭秀方丈記曰普明距縣西南一十五里而近其地得於兩山之間背岡面阜東西纔踰里許而林巒相屬山光競翠幽泉逓響含溪空谷岫幌雲關一别區也院興於梁天監中號湧泉至治平初篆賜額普明歴嵗滋久四合之宇僅備甲乙繼居因陋就寡寖以隳蔽夫以釋子之宫絶在塵外而境不時興良有待也僧道澄行業精潔睿解過人其住持之明年慨然嘆曰昔人之創室展脉虬角之居現相賀跋之舎神闢林麓而運楩楠天除沙礫而備安居道之所繫誠之所至雖天地鬼神猶不違時刻之相况吾徒久有此居衲子曰視山所容猶有餘地闕者而興之當有樂成吾事者多矣於是有僧道殊法定率衆先中欽承師古乃鑿山而建方丈之室施者四集鳩工於春迄冬而成巍特亢爽屹出衆甍之上異時榛莽薈翳嵓壁峭巉若非人力所易平斸而迺今修梁峻廡翠牖碧堦虚坦明豁出人意外是可為普明松桂榮而雲壑賀也一日集其徒於上告之曰裏區勝境千佛之居五臺北峙廬阜南矗穹窿峻極穹居疊嶂懷靈抱異仙聖所宅金碧交照梵唄相聞而吾之文殊以光相現於二山金橋亘空聖燈耀夜祥雲綿延圓輝閃爍真異境也汝今諦觀佛身廣大充滿法界於衆生前無所不現則文殊遊於无量千萬億阿僧祗國所有光相在在處處可得而覩惟此丈室非大非小不侈不陋有若毗耶離城摩詰所居汝等當正思惟安住身心文殊大士將以獅子髙廣之座来至此處現大神通以不可思議㣲妙法門開示於汝足雖不登五臺不履廬阜而文殊光相於汝等前无時不現則吾此室所作佛事與彼諸方等无有異豈不快哉豈不幸哉他日妙髙居士道過之證前因曰兹山寂寥久矣近剏此室雖曰幽隘而嘗妄語其徒者如是矣願識之以示後来可乎余聞其言而善之因命筆而與之記建炎改元六月十六日朝散郎御史臺檢法官賜緋魚袋王庭秀譔蓬莱山廣福寺縣西南三十里舊名蓬莱院漢乾祐初置熈寧初改壽聖紹興間改今額權婺州永康縣事劉渭記曰四明東海之上有象山象山境之西南有佛刹焉五代之梁創之以蓬萊之額是為龍德二年我朝之宋錫之以圖書之文是為太平興國四年准勅聽以甲乙住持者天聖三年也䝉恩易以壽聖之名者熙寜二年也是院隠然介衆山之中也雖無崇巖巨壑盤亘千里髙揷雲天雄壓地軸而佳巇蒼岫周遭映帶卑相附逺相揖亭然起崪然止而朝陽暮靄露花霜竹出没於空曠有無之間怳然若圖畫中見也太僕卿直秘閣林公旦昔宰是邑尤意愛之且嘆基址頹圯榛棘出人庳堂隘宇上破而旁穿殆不足以擅斯景而奄有也因命釋永浄主院事焉盖永浄者余聞之操行謹潔智敏捷而謀多又卒之以不私於是登髙而望黙畫於方寸輦糞壤焚椔翳却立而視為之𤓰分棋布地形之崇卑櫩宇之閎狹瞭然在目中矣迺始即其舊而新之規其小而廣之三門峙列兩廡翼張閱經有堂獻供有厨澡身有室休賓有館輪焉奐焉一切鼎新有若鬼神隂来相之獨所謂佛殿闕焉居者無以寓歸依之誠来者無以聳瞻仰之禮適得邑之信向者相與出力而巍巍之殿屹立矣復建寳藏以居殿之中金函玉軸層見疊出所謂妙典秘偈悉募僧行筆之盖其徒寳山倡其初義肱賡其終積之數年而五千四十八卷之文燦然完成矣既又闢田三百畝以贍二時之供羞植松十萬本以助衆山之森立亦其徒慧初義琛與夫郡豪吳君驥有力焉竊嘗謂事以速而不達以久而有成天下之理也是院由五代以迄於今日寥寥二百餘年乃始修壊而成補罅而完易隘而曠潰質而文工告畢事告成豈一朝一夕為哉又况永浄與其徒數人協心聫力卒之以不私如是宜其有成也若夫昇猊座而獅子哮吼震雷鼓而法雨沾濡聞之者聲上上之真機飲之者味如如之妙㫖此又有待於来者焉崇寧元年三月一日記䕶境寺縣東北二十里建隆初置熈寧初加壽聖紹興間改今額保寧寺縣西南二十里舊名保安周顯徳中置宋熈寧初加壽聖紹興中改今額瑞龍寺縣東南十五里宋乾徳中置新安寺縣西南五十里周廣順中置任師寺縣西南五十里周廣順中置陳可復陳可復定海人其師與真幼嵗居杭入禁中精齋醮儀可復幼疎爽越有林生善役雷恣酒自許有問其法輒叱去可復晝夜承事伺林嗜酒每鬻衣以奉繇是卒得其術至元九年鄉大旱禱禬莫應有戲之曰陳道士能召雷命至官人將候其不騐以侮辱可復徐行精思集雲雲果合須臾雷電大作雨甚遂召為承應法師見於世祖皇帝偉其貌命治足疾可復曰疾深不可除臣有禁架術願試之試良愈復命治風風返却祈雪雪立至從上巡幸幾十年卒京師追封為誠明翊教太極真人在城道觀𤣥妙觀在東北隅唐天寳二年詔天下皆置紫極宫以祠老子梁開平二年易為真聖觀宋祥符二年改天慶紹定元年太守胡榘重建皇朝至元十九年燬至元廿九年改今額至大二年復火報恩光孝觀在西北隅唐開元二十六年所置開元宫也改為崇壽宫宋崇寧二年改崇寧萬壽政和元年改天寧萬壽紹興十三年改今額皇朝至元十九年火重建至大二年火及山門兩廡而止其殿巋然獨存靈順宫在西南隅宋開禧中徐侍郎自徽州奉五顯靈觀以歸捨地建置田以充大徳十年大風震屋重建報徳觀在西北隅宋淳祐七年趙郡王與懽建佽飛廟在焉皇朝至元十九年火重建福順觀在西北隅宋寳祐間郡王趙與懽建以奉𤣥帝祠皇朝至元二十九年宣尉趙孟傳請今額文昌宫在西北隅宋咸淳七年道士范介然建崇奉梓潼真君皇朝至元十八年申請教所以武徳文昌為西雲大寳宫在西北隅宋淳祐八年道士董真懶建大寳宫在西門後燬皇朝至元十四年王鍴以西雲道院捨於宫遂合為一回真道院在西北隅皇朝至元二十三年王惟明捨地以建明霞觀在西北隅皇朝至元二十八年道士鄒晉華建扁曰明霞真館大徳六年請今額至大二年燬紫霞仙觀在西北隅皇朝元貞元年軍千户張重翔捨地以建𤣥真道院在西南隅皇朝大徳十年道士蕭真素建今扁曰月湖福地沖和道院在西北隅皇朝至大二年道士蕭真素置蕭氏屋改為道院𤣥𤣥道庵在西南隅皇朝至大二年𤣥真道院建至大四年道士張存真建鉢堂以来方外之士蓬萊觀在縣西廣德湖之望春山先是白龍祠之側有道堂郡守樓公异生祠紹興三年請象山廢觀為額攻媿樓公作記云老與佛之學行於世尚矣未知孰為輕重然以吾鄉一境計之僧籍至八千人而道流不能以百其居財十數而佛廬至不可數何耶盖嘗聞之歐陽公矣大畧以為佛能箝人情而鼓以禍福人之趨者衆而熾老氏獨好言清淨靈仙之術其事㝠深不可質究故凡佛氏之動摇興作為力甚易而道家非遭人主之好尚不能獨興且曰其間能自力而不廢者豈不賢於其徒者哉明之四山去郡皆三十餘里西有湖千頃一山穹然秀出此為最近者名曰望春舊有靈波廟以祠白龍政宣間有陳孜者始崇以殿辟道院於東俾道士馮立權奉香火祖父少師典鄉邦因湖之淤請於朝而田之嵗得穀亡慮四十萬斛父老以為徳生立祠於其中又得道士何思逺居之於是觀宇益興廊廡畧備思逺澄心錬氣得黄老之真風驅役鬼物靈迹有不可掩者嘗之京師有運船數百千艘欲絶淮為潮不登為作法於其堧未幾潮溢歡聲如雷悉賴以濟發運使以聞勅差明州管内副道正盜發清豁旁郡山谷間多響應者祖父大飭守備郡以無恐思逺亦有隂助石記存焉紹興癸夘太守莫公將命拜章禱雨而驗奏移象山蓬莱觀廢額手書扁榜以寵異之其後主者竭力以増益前功今知觀吳若納繼胡志清之後里之巨室厲氏兄弟相與出力興造又得昝氏創岱嶽行祠於山麓遂為一方勝處由歐陽公之言觀之諸君可謂能自力而賢於其徒者矣某自念生晩不逮事祖父嘗拜祠下冠佩儼然幼年及識何君猶記其道貌能歴歴道祖父時事使人起敬吳嗣法於何為孫行謹行乃祖之法以大其居是為能負荷者故與之遊一日来請曰觀之興才六十餘年懼無以傳逺久願記之應曰傳之久不久正不在記而况此骫骳之文乎世之棟宇有傾民力為之欲為無窮之計而驟起亟廢幾不能以一瞬山顛水涯結茅累甓或遂化為殊庭自前古以至今日者非一也子以為今之琳宫蘂館據名山洞府之勝霞冠星䙱摇曳其間者皆固然耶其創始之初亦若是而已又未必能如子之居之壯其寖致雄盛者雖曰有數亦存乎人爾揆之世法又何止棟宇也哉今蓬莱之興或作於前或繼於後以躋登兹歸語子之徒儻能念其囏勤而増葺之則真可以无窮矣吳曰正欲記此以示来者遂為之書壽聖觀阿育王山前宋大觀中道士梁守清始建東嶽行宫嘉泰元年道士胡抱一請紹興府餘姚縣廣福廢觀改今額雲它觀濤山堰旁嘉定十二年賜額遺徳廟屬焉顯忠旌徳觀清修悟真觀太清悟空成道宫並在大慈山宋丞相史公母齊越國夫人𦵏於山中建為功徳所紫清觀在縣西三里豐清敏故園也皇朝至元二十一年道士范希和建玉皇觀縣東十里皇朝元貞二年道士胡道甫建甬東助順宫縣東二里皇朝至元十九年道士吳葆儔建紫虚觀縣東五里皇朝至元十九年道士樓坦建至徳觀縣東二十五里皇朝至元十八年道士程徳盖建昌國州道隆觀在州之南本東嶽祠宣和二年守臣樓异請今額建炎間金人入境以斧斫殿楹為流血金人乃去境賴以安殿曰金闕寥陽門曰蓬莱福地皇朝至元二十六年其徒争主道士陳可與祝髮為遂改為寺至大四年道士蔣明善求直於有司延祐二年復越王題臨江仙詞云試凭闌干春欲暮桃花㸃㸃胭脂故山凝望水雲迷數堆蒼玉髻千頃碧琉璃我本清都閒散客蓬萊未是幽竒明朝歸去鶴齊飛三山乗縹緲海運到天池道隆觀記貫雲石作聖朝元仁大徳撫四方興三教各有恒致以不失所為上至元間河西祝髮氏楊永福總攝江南僧政而其玩服子女飲食起居悉蠶諸僧僧罄而越取凡唐宋所額宫觀稍似豐厚者以己力經為佛寺梵其士金其像火其額不下千百所嘗又羅煆入罪僇道士凡三四人由是此流背𤣥門趨金教者甚衆永福坐法後前所額宫觀歸其教者纔一二耳余嘗觀所在諸既歸而復争者盖不得其官既安而不葺者盖不得其人所不葺者乃人鄙所復争者乃官貪之故也延祐第四禩春三月余游海上艤舟昌國之頃搜竒訪古惟以進士倅是郡干文傳偕余游此環觀所謂聖母池者再復登後之翁山周而視之雲水互碧明晦交錯唯意在而身亡也壯哉觀余又不舎而勤顧似非老氏室亦非浮屠嘗試問之有道士蔣君明善起而應曰始自汴宋哲宗元符三年前祠東嶽聖帝後以道院奉朝昏徽宗宣和初是邦守樓异請額於朝賜道隆觀皇朝至元二十又六年道士陳可尚附楊炎㫁髮緇衣亦歸佛氏遂以觀為寺至大四年春明善愬之有司天道好還復仍其舊扶顛補弊規制粗立今先生之来可謂大遭也願為文記之余求郡誌按之然就官僚詢之然即耆宿審之然嗚呼變其人而道存取其物而理在昔也彼以人勝吾以物奪非奪吾之吾也今也吾以人還彼以物棄亦非棄彼之彼也老子貴無為尚清浄吾與彼其有辨邪其無辨邪且吾聞是州浮屠之居溢三十老氏僅一區使胥而為浮屠則老氏之教不幾息明善清修強敏能事其事其不葺固非吾憂後之官守能不貪則能使無煩其不争審矣自今焚修不懈祝聖壽之無疆明善勉之哉文昌宫在州東學之側宋咸淳間州人創建以祠梓潼君皇朝至元二十六年因道隆廢為寺遂以三清像寓焉真武宫在州治之南岱山東嶽行宫宋宣和間道者徐浄超募緣以建田數畝而已祠山行宫附祖印寺之右蓬莱集仙道院在蓬莱鄉之朐山皇朝至元十八年鄉人李心道創立以為祈祝之地奉化州虚白觀州東北四里唐昭宗時賜額觀有三清像制度精巧老君像袖中有一蛇長數尺潔白如雪隠現不常洞真觀州東北四里皇朝至元二十四年前漕貢士盧震龍棄儒學道創立請額於教所而震龍為開山其宗盧道欽等甲乙住持其後道欽鬻田質業圯壞棟宇皇慶二年本州議欲興復而天師以盧乃虚白觀王師回弟子以其田入虚白合而為一焉開元宫州南五十里宋開慶元年郡守丞相吳公潛請今額元真觀州西北二十里宋嘉定十一年觀文趙公因建墳創立初營殿址之日有紫芝四本生於墓山因名紫芝山玉清葆僊道院州東南五十里宋徳祐元年戴行恕建梓潼文昌宫州東北四里宋景定二年故漕貢士盧震龍捐資買田築宫以奉梓潼帝君之像慕真觀州東三十里皇朝大徳六年七年請額於教所慈溪縣清道觀縣東南三里唐天寳八年建後廢宋紹興三十年道士葉景虚重建又於其右建東嶽祠尚書樓鑰扁其關曰列仙游館皇朝至元十七年火重建崇壽宫縣西北五十里屬鳴鶴鄉定海縣東海王廟道士嘗請崇壽為其觀額此宫遂改天寧觀又改天寧萬壽觀後東海王廟改為淵徳觀紹興元年復其舊額大隠山至道宫縣西南四十里下有龍潭唐天寳二年遣使投金龍禱雨泛出黒漆木板有金書大寳永昌四字雨隨應乃賜潭名永昌建觀潭上名大寳地卑濕宋祥符間一夕疾風大雨拔木發屋觀宇忽運於溪南髙爽之地人號神運殿治平二年賜今額世傳葛仙翁謝康樂修煉之所宫側有藥臼石臺存焉寳慶元年道士董成真聞於朝聿新之定海縣淵徳觀縣東北五里元豐元年建淵聖廣徳王廟命道士主之崇寧三年建詔天下建天寧萬壽觀以本州崇壽宫改置四年請其額寘本廟宣和五年改今額建炎四年火紹興二年重建寳慶二年徙於兹旌信朝元宫縣東北五里即招寳山下東嶽行宫宋紹興八年道士李知孟建皇朝大徳六年教所請今額陳山行宫縣南五里宋道士髙囦明所建奉東嶽香火東嶽行宫縣南七十五里海晏之穿山皇朝至大三年道士劉尚賢建澥浦行宫縣西北六十里宋乾道六年道士錢時晦建祠東嶽蓬山道院縣西北七十五里據山瞰海地處大蓬山之麓皇朝至元二十一年淵徳觀道士裘應聲創建象山縣棲霞觀在縣西南二百五十步蓬莱山之下舊名蓬莱觀秦徐福梁陶𢎞景皆隠迹於此隋大業元年廢唐天寳十三年台州刺史袁仲宣復置大中元年令楊𢎞正告於明州刺史李敬方重修宋治平二年改今額淳熈末遷於山之西嘉定十三年道士張大原於舊址重建大瀛海道院記外際乎天内包乎地三旁無垠而下無底者大瀛海也非神融混㝠智周寥廓能納六合於方寸未易與語此而有客授予大瀛海之圖為之瞿然以驚謂客曰此惡可圖也而孰為為之哉展而視之則荒厓斥澤之間浮沙淺土之上一勺之沮洳一撮之埆瘠夫豈沖和清淑眀秀靈異之所鍾乃或堂而構焉以為栖霞餐露之館而冒之以是名也又為之喟然以吁授圖者曰達人奚索之之深耶鄞之東南百里達於海舟行八十里曰象山有縣縣之東二十里曰爵溪潮汐齧衝賈舶絡繹東望日本南走天台世傳神仙安期生之屬所来往也故其民至於今好仙道而其鄉曰遊仙至元癸未鄉之人王翁棄妻子改名一真結屋其隈延接方外之友前代善書之人嘗有大瀛海三字購而得之因以為扁大徳丁未天台崇道觀道士吕虚夷為縣令禱雨有應王翁一見而莫逆也遂與共處王逝而吕嗣主教者命之世守方將資衆力大其居又欲資一言久其名也為是手圖以来蟻之於垤也蝸之於殻也涔蹄之於廣宫大囿也亦各適其適也而達人何索之之深耶予於是進道士與語曰予生長海濱請為子竟瀛海之説禹貢叙事至訖於四海而止訖者地之盡處也海之環於東西南北相通也而西海北海人所不見何也西北地髙或踞髙窺下則見極深之壑如井沈沈然者盖海去東南地卑海水旁溢不啻萬有餘里中國之地廣輪方三千里耳而東連海岸以勾股稽之水之所浸倍於中國之地者二十而羨其間洲島國土不可勝窮若三神山者盖不知其幾也奚獨蓬莱方丈瀛洲也哉載籍之所不記人迹之所不及而惟長年度世之流形質銷鑠神氣澂凝逍遥飛步乎太空之中者得而至焉之人也雖非彛教庸行而胚間氣秉絶識超越凡庶萬萬也企而慕之者人人而然能幾其彷彿者誰歟名不混世實不離世稯稯營營卒與耎肖翹之類俱為塵泥其亦可哀也夫今子出乎四民之外不與遊方之内者為徒詎可但以大其居久其名之為務哉必有事可也他日朝燕暮越瞬息入極冷然御風過三神山之頂臨睨舊鄉而一笑下戲人間自稱回道人非子也耶道士改容曰敬聞命敬聞命於是乎書以遺之日餘十有二杓貞於天田延祐第六春也集賢直學士奉議大夫呉澂記延祐四明志卷十八
