body:
  text: 延祐四明志地理𩔖三都㑹郡縣之屬提要臣等謹案延祐四明志二十卷元袁桷撰桷字伯長慶元人宋知樞宻院事韶之曽孫少為麗澤書院山長以薦改翰林國史院檢閲官累遷侍講學士辭歸卒贈江浙行省參知政事追封陳留郡公謚文清事蹟具元史本𫝊桷文章博贍為一時臺閣之冠所著清容居士集五十卷尚存已别著録又有易説春秋説諸書見於蘇天爵墓誌銘者則世無𫝊本已乆亡佚此乃所輯明州地志成於延祐七年葢慶元路總管馬澤属桷為之撰次者凡二十卷分為十二考曰沿革曰土風曰職官曰人物曰山川曰城邑曰河渠曰賦役曰學校曰祠祀曰釋道曰集古義例明簡最為有體桷先世在宋多以文學知名稱東南故家遺獻桷没後㑹朝廷修史遣使求郡國遺文故事惟袁氏所𫝊為多故其於鄉邦舊典尤極貫串志中考核精審叙述清晰不支不濫頗有良史之風視至元嘉禾至正無錫諸志更為賅洽可稱惟其自第九至第十一已闕三卷所存僅十七卷葢為𫝊冩者所脱佚然元時地志抄怢無多存之亦足以資考究固未可竟以不完廢之也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:92774e091c9880cf647da09d41206e06ed88ba12f36016ff34f4d4df039e42e4
