body:
  text: 延祐四明志卷二元袁桷撰職官攷司馬遷作秦楚月表餘事則以年表之深有㫖焉至作三代世表遭秦之火何其能詳若是也漢至宋不及一千五百年天下職方所紀牧守隋以上無稽或曰牧守不賢莫能紀史遷傳循吏五人班固傳六人若是則誠缺然矣嵗月有紀誠不能自著其澌泯何憾焉作職官攷唐刺史秦舜昌開元置州首為刺史見㑹要吕延之自明州遷越州刺史見㑹稽志裴儆大厯六年刺史八年罷王密撰紀德碣李陽氷書見集古攷崔殷大厯八年刺史記董孝子祠王密大厯中刺史有惠政李舟為碑記失其傳公以大厯十四年自湖州刺史授越州刺史遷浙東節度副使撰裴儆紀德碣云余忝躡高蹤則必承崔殷之後矣趙恒缺李長兩刺史竝見慈溪香山智度寺貞應大師行狀碑王沐綝之曽孫貞元四年刺史立夫子廟見廟碑任侗貞元九年刺史增修廣德湖溉田四百頃見地理志韓察滉之孫長慶元年刺史易縣治為州治徹舊城築新城功大而民不知役費廣而用不厲民見韓杼材所撰移城記應彪長慶三年刺史建浮橋跨江五十五丈李文孺大和三年刺史修浮橋見曽從龍所撰浮橋記于季友太和六年刺史築仲夏堰溉田數千頃見地理志張次宗㑹昌中刺史見所撰鮑郎廟碑李敬方大中初刺史殷僧辯建開元寺千佛殿李休古大中間刺史記路學見文宣王廟碑側李伉咸通六年刺史建五龍堂崔琪咸通十五年刺史見所撰心鏡大師塔銘劉文中和二年刺史見赤城志羊僎黄晟墓碑作羊吳越備史作楊鍾季文缺黄晟佐理推忠去偽功臣鎮東節度行軍司馬金紫光禄大夫檢校太子太傅持節明州諸軍事守明州刺史兼御史大夫上柱國江夏縣開國子食邑五百户創築羅郭重建浮橋傳見人物攷五代沈承業梁貞明二年刺史建城隍廟錢鏵吳越王鏐之弟錢元㺷鏐之子貞明二年刺史錢鏐之子唐同光二年刺史有惠政卒于官錢元珦鏐之子同光四年罷仰詮為刺史晉天福四年加平章事闞燔開運二年刺史以上六刺史竝見吳越備史錢億吳越王俶之弟漢乾祐二年五月判明州諸軍事見碑銘宋知州闕名建隆元年以節度使持節知明州事浚廣德湖築塘岸周萬餘丈修它山堰乾德五年卒錢惟治吳越王俶之子開寶八年以節度使持節太平興國三年遷鎮國軍節度使王素太平興國五年太中大夫行太子中允權知見雪竇山瀑布禪院立事石刻徐休復太平興國六年見㑹要趙易知太子贊善大夫太平興國七年石碑名易之錢象先太常博士雍熙年陳矜侍御史端拱中孫扶吏部郎中端拱年丘崇元淳化年復廣德湖陳充殿中丞淳化年胡旦祕書監淳化年凌景陽度支員外郎淳化年鮑當職方員外郎至道年徐繼宗司封員外郎至道年丁顧年庫部員外郎咸平年石碑名顧言王膺虞部員外郎大中祥符年蘇耆戸部員外郎大中祥符年范諷祠部員外郎直史館大中祥符年康孝基太常博士大中祥符年劉綽太常博士大中祥符年李夷庚吏部員外郎直史館天禧年浚東錢湖廣德湖移建州學燕肅司封員外郎天聖年曾㑹朝奉大夫尚書刑部郎中充集賢殿修撰知軍州兼市舶管内勸農事上護軍賜紫金魚袋天聖二年到任見葛周所撰慈溪香山寺十一碑前守曰鄭不得其名劉賡司封員外郎天聖年張交司封員外郎明道年李照刑部員外郎明道年林殆庶屯田員外郎集賢校理景祐中徐起太常少卿景祐年張弇司封員外郎景祐年席平太常少卿景祐年李制侍御史寶元中鮑亞之兵部郎中康定年錢延年工部郎中祕閣校理慶厯陸軫工部郎中直史館慶厯年石碑名軫王周司封郎中慶厯年知土人也范思道户部郎中直龍圖閣慶厯中沈扶祠部員外郎慶厯中孫沔皇祐三年以龍圖閣直學士知見通鑑長編及王岐公所撰墓誌安稹度支郎官秘閣校理皇祐中吕昌齡金部郎中皇祐中沈同工部郎中至和中齊廓兵部郎中祕閣校理嘉祐中鮑軻工部員外郎嘉祐中錢公輔太常博士祕閣校理嘉祐中郎玘工部郎中嘉祐中李思道兵部郎中治平中俞昌年兵部郎中治平中苗振光禄卿熙寜初知明州致仕事材為堂舟載歸鄆州事聞被貶事見續通考王罕衞尉卿熙寧三年趙誠太常少卿熙寧五年坐所舉李守以贓敗勒停李綖戸部郎中祕閣校理熙寧六年李定集賢殿修撰熙寧八年曽鞏度支員外郎直龍圖閣元豐元年王誨曽任宗正少卿元豐五年馬珫任左司員外元豐七年王汾直龍圖閣元祐三年韓宗道曽任司農少卿元祐年李萃曽任兵部郎中元祐年李閌曽任虞部郎中元祐年王子淵曽任光禄少卿元祐年張脩曽任太府少卿元祐年劉淑曽任户部郎中元祐二年吕温卿曽任軍器少監元祐年姚勔寶文閣待制紹聖年劉珵曽任戸部郎中紹聖年王子韶集賢殿修撰紹聖年葉濤曽任起居舍人紹聖年韋驤曽任戸部郎中元符年陸𫝊曽任戸部員外郎建中靖國年王資深集賢殿修撰崇寧年葉棣曽任吏部員外郎崇寧年吕昌齡朝奉郎尚書金部員外郎大觀三年在任重刻張次宗所撰鮑君祖廟記彭休曽任吏部員外郎大觀年白同曽任刑部郎中大觀年錢景逢曽任本路提刑大觀年宋康年曽任户部郎中大觀年陸𫝊曽任祠部郎中大觀年檀宗旦曽任太僕少卿大觀年蔡肇顯謨待制政和年李圖南顯謨閣待制政和年吕宗曽任軍器少監政和年周秩集英殿修撰政和年周邦彦直龍圖閣政和五年毛友顯謨閣待制政和六年樓异䘗猷閣待制政和七年知任滿命再任李友聞直龍圖閣宣和四年蔣彛直祕閣宣和四年蔣猷徽猷閣直學士宣和四年趙億右文殿修撰宣和六年魏憲顯謨閣直學士宣和七年李弼孺直祕閣宣和八年李友聞集英殿修撰宣和八年蘇攜直龍圖閣建炎元年金受直祕閣建炎二年沈晦集