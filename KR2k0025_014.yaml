body:
  text: 延祐四明志卷十四元袁桷撰學校考慈溪縣儒學學在縣西四十步慶厯八年令林肇徙於縣治之東南一里鄞宰荆公王安石貽書招杜先生入學為師建炎四年學燬淳祐間節度推官宋強攝治重建八年令唐仲溫始落成淳祐二年郡守陳公愷俾令曹邵立鄉先生楊文元公祠于成德堂之右元貞二年燬主簿皇公重建于今始完重建學記王安石天下不可一日而無政教故學不可一日而亡於天下古者井天下之田而黨庠遂序國學之法立乎其中鄉射飲酒春秋合樂養老勞農尊賢使能考藝選言之政至于受成獻馘訊囚之事無不出於學於此天下知仁聖義忠和之士以至一偏之伎一曲之學無所不養而又取士大夫之材行完潔而其施設已嘗試於位而去者以為之師釋奠釋菜以教不忘其學之所自遷徙逼逐以勉其怠而除其惡則士朝夕所見所聞無非所以治天下國家之道其服習必於仁義而所學必皆盡其材一日取以備公卿大夫百執事之選則其材行皆已素定而士之備選者其施設亦皆素所見聞而已不待間習而後能者也古之在上者事不慮而盡功不為而足其要如此而已此二帝三王所以治天下國家而立學之本意也後世無井田之法而學亦或存或廢大抵所以治天下國家者不復皆出於學而學之士羣居旅聚為師弟子之為者講章句課文字而已至其凌夷之久則四方之學一廢之為廟以祀孔子於天下斫木摶土為浮屠道士法為王者象州縣吏春秋帥其屬乃釋奠於其堂而學士者或不豫焉蓋廟之作出于學廢而近世之法然也今天子即位若干年頻修法度而革近世之不然者當此之時學稍稍立於天下矣猶是州之士滿二百人乃得立學於是慈溪之士不得有學而為夫子廟如故廟又壞不治今劉君在中言州使民出錢將修而作之未及為而去時慶厯闕年也後林君肇至則曰古之所以為學者吾不得而見而法者吾不可以毋循也雖然吾有人民於此不可以無教即因民錢作孔子廟如今之所云而治其四旁為學舍搆堂其中帥縣之子弟起先生杜君醇為之師而興于學噫林君其有道者耶夫吏者無變今之法而不失古之實此有道之所能也林君之為其幾於此矣林君固賢令而慈溪小邑無珍産淫貨以來四方遊販之民田桑之美有以自足無水旱之憂也無遊販之民故其俗一而不雜有以自足故人慎刑而易治而吾所見其邑之士亦多美茂之材易成也杜君者越之隱君子其學行宜為人師者也夫以小邑得賢令又得宜為人師者為之師而以修醇易治之俗而進美茂易成之材雖拘於法限於勢不得盡如古之所為吾固信其教化之將行而風俗之成也夫教化可以美風俗雖然必久而後至于善而今之吏其勢不能以久也吾雖喜且幸其將善而又憂夫來者之不吾繼於是本其意以告來者慈湖先生祠堂記鄭霖禮有功有德則附祭于學所以助教化厚風俗示儀刑也我朝自濓溪周元公以太極圖發先天之妙於是河南之學有所傳授雷動四方上紹孔子千百年不繼之統下破漢人專門角立之陋中興以來推吾道扶植國脈之功與天地並詔加節惠源分派别厥後能以所自得者教于鄉民於時其徒各尊其師力足以請于朝亦該諡典隨所寓肖像以祠斯文可謂盛哉閣學文元楊公家于四明慈水德潤湖超然口耳之學早從象山文安陸公遊以為心之精神是謂聖由覺入道推誠體物研幾察至尤深于易見諸用立朝大節浩乎不可奪分牧于民古良吏不能先天下士宗先生之學不以爵稱而以慈湖沒於寶慶二年至今誦其書籍先生之門為重雖闕里宫牆猶舊而相鄉俎豆未設志鬱焉始慈湖後人欲倣四書院以藏家孰所著文學而習之此意美矣相地湖中及龍虎軒既牽於道旁疑阻又病於規模奢廣輾轉四三年無定地制使祕撰可齋陳公塏壬寅春開閫布宣善彰以勸問祠堂中輟之故公諗於士友曰郡邑於學顔孟不過侑祀所以尊吾夫子也尊夫子而侑祀于夫子之側者未嘗不尊然則即學以祠慈湖亦何不可道一而已矣無適非道必指闕里為夫子之道在是是識其小者祠于學祠于書院同一慈湖也九京可作必為余肯於是士友翕然無異詞乃撥緡錢六十萬米二十斛下邑令尹曹君邰蘧徑名家也能成公志上作而下興役興而民不知經始於秋孟癸巳越月庚午告成堂三間前軒後廡稱是士庶子來祭洋洋如在相與頌曰非郡侯之尊所尊非令尹之敏於事此郡闕典誰實顧念又相與勉曰祠既立吾徒居先生之里讀先生之書以心會理以身率教毋為先生羞公聞之而喜霖奉祠歸雪巖山中一日謁公于鄮山之堂謂霖曰子為我記之霖再拜辭公曰豫昔分教橫浦即郡庠祠大中程公珦其事同其意合秉筆敬書先生名簡字敬仲其詳見于家傳為之詩俾邑士祭而歌曰慈水之東注兮泱泱夫子之楹夢兮堂堂其書存兮人未亡跂望不可及兮心皇皇自古有德兮侑于庠闕里俎豆兮胡為未遑鳳鳥不至孔兮傷蘭佩其髙潔兮遺芳九原不可作兮墜緒茫茫大音之寥寥兮瓦缶宫商尚雲車兮相羊想容止兮洋洋興起人之良善兮是為慈溪之鄉千秋萬嵗兮疇能忘淳祐二年良月望朝奉郎主管建寧府崇禧觀天台鄭霖記慈湖先生姪愈書郡人朝散大夫直寶章閣桂萬榮篆蓋贍學田土田四百六畝二十八步地四十六畝三十步山五十九畝二角二十步海塗田地五百九十九畝二角三十五步魚池一百二十四口額管錢糧鈔中統鈔三錠一十七兩七錢穀五十五石一升米二百一十五石五斗三升八合小麥二十二石五升六合八勺屋宇基地禮殿講堂齋廡等屋共九十八間牌門一座六扉門三座基地一十畝二分八釐三毫三絲三忽二微行路直長四十丈橫闊六丈祭器爵一十五隻犧尊二口象尊二口罍洗一副豆一十隻簠簋共四隻坫五片龍勺五柄以上銅器豆二十四隻簠簋共四十八隻坫五片以上木器籩六十二隻篚五隻以上竹器爵一十八隻香爐花瓶一副香合一箇以上鑞器羃布二片抄籍儒人二百二十二户設官教諭一員定海縣儒學學在縣東二十步雍熙二年主簿李齊建崇寧中廣之紹興八年令章汝翼改建于縣東北半里嘉定十二年令趙珌夫撥官産以贍舊田湮沒者復之重修學記胡剛中四明人物之淵自公卿至大夫日益盛則業於士者宜尤盛士所以為公卿大夫之階也而士必階於學學必有主之者焉定海地稍偏而不當以偏故廢學不講記童時從師于學冠則與友遂課試于學學之政粗舉而其宮則甚隘余心憫焉去之遊上庠叨末第旋馳官轍迹於學頓少而心於學則未忘也三十餘年間如韓令永德創殿商令逸鄉崇堂崔令端學闢廡與門俱各奐傑久則圮蠧繼之矣今令陳君纘以其字民餘力留情造士乃大修學凡梁楹之欹損者咸櫛治之甍簷之闕漏者咸鱗比之自塗墁至丹雘咸次第光明之舊觀既新而績且多於舊學前並民屋局於地則買地使局者舒後依山斷於河則塞河使斷者續四齋之外更立武齋齋之外為射圃圃之旁則為餼廪而門之外復為臺門叢是十數條皆敞晃出意表士既駭所未有物亦效異池有雙蓮植焉君所以主學之驗章章矣余濫紆朝紱鄉之士至誦言及此余聞甚聳嘆洎謁告暫歸里所見副所聞朋儕謂豫舊逰請述其事嗟夫以余業於學之早去於學之久而又忽見其學之成且備也能無述乎夫士固所以為公卿大夫之階也而學固所以為士之階也故為公卿大夫者必以學為公卿大夫之後者必習於學君慶元名輔之孫習於學者也邑之士能知學則其階於公卿大夫也孰禦特所以為學之階者又當熟講耳他日余再歸里不惟見學之成且備又士之成材亦備則公卿大夫之盛繼自今當益彬彬焉君質勉且和為政不擾以治其本末邑人能盡言之而余不能盡書也紹定四年二月望日朝請大夫祕書省著作郎兼尚左郎官鄞縣開國男食邑三百户胡剛中記瑞蓮圗碑紹定元年夏泮池蓮出雙萼咸以為瑞縣令陳纘篤意修學內外鼎新宫牆壯觀士氣翕然實成佳兆其碑圖形尚在贍學田土田二十一頃四十五畝三分六釐地一頃六十八畝六分山五頃七十一畝二分七釐額管錢糧米七百一十八石二斗六升八合地租中統鈔三十六兩七錢三分九釐山租中統鈔三十九兩八錢七釐屋宇禮殿三間櫺星門三間臺門三間內儀門五間東西廊一十八間土祠一間講堂五間先賢祠一間西挾屋一間倉屋三間祭器犧尊二隻象尊一隻罍二隻洗二隻籩四十六隻豆五十八隻簠二十隻簋二十隻篚五隻俎二十八隻爵三十隻坫一十五隻勺二柄羃布三條鐡香爐一十五隻石香爐一十一箇講鼓一面燭臺一十六條抄籍儒人八十户設官教諭一員象山縣儒學學在縣東南一百步唐會昌六年建宋嘉祐中令顧方修治建炎兵燬隆興元年令胡錡重建嘉定十一年令趙善晉作大成殿贍學田土田六百三畝一角五十五步一尺地一百一十七畝二角二十八步二尺八寸山三百六十九畝三十七步額管錢糧穀五百三十二石九升八合鈔中統鈔三十二兩四錢二分小麥一十八石一斗五升烏豆五石二斗一升屋宇大成殿并軒三間儀門七間櫺星門三座東西廊廡一十二間東西齋序六間登雋興賢尊道養正明德明善明倫堂正軒三間堂五間祭器房一間先賢堂一間倉屋一間厨屋二間湢屋一間挾屋五間殿東西趨廊二間祭器犧尊二口象尊四口籩三十二隻豆三十二隻簠一十六隻簋一十六隻坫九片羃布一條罍洗一隻爵九隻勺二柄奠盆一面俎二十隻篚五隻抄籍儒人六十六户設官教諭一員本路醫學中統三年奉詔立學建三皇殿嵗以三月三日九月九日祭享配以勾芒祝融風后力牧至元十八年創建于東北隅貫橋之南延祐二年二月重徙于東北隅魏家巷建官掌之建醫學記王應麟醫之興也其於上古乎巫彭初作醫曷為本於三皇古三墳書以後無聞易以筮傳本草內經以醫傳天之牖民至矣本草內經醫之原也易何與於醫坎離隂陽參同納甲發其緼養生者宗焉是以言醫必曰羲農黃帝云成周醫有師江左元嘉昉建學唐州郡有學助教掌之宋崇觀間置學京師在外附職侯頖自古昔方技為王官之一今朝廷崇奬蠲復悉與儒等諸路設校立師教育之將躋斯民夀域德至渥也惟四明學猶闕至元二十八年冬肅政亷訪副使陳公祥攬轡來臨察民嚬呻尤以醫為重顧講習無所喟然思作新興起之相攸胥宇鳩工經始毖祀三皇禮儀肅肅堂宇門廡規橅奐奕學成屬余以記余聞之前醫修之為道推本五行六氣寒暑日星考驗風土山川其於人也骨節經絡揲荒腧穴內則藏府焦鬲井谷精微奧眇雖國公髙手弗能究豈庸夫俗子可與知世不輕試而茍得者鮮矣此學醫者久廢可不謹乎是故醫不可無學歧伯之師曰僦貸季秦越人之師曰長桑君太倉公之師曰公孫光陽慶蓋下學可以言傳上達必由心悟誦言未明于心讀古人之糟粕斫輪猶議之矧夀夭生死所繫乎然則學孰為要一言蔽之曰仁程子謂醫書以痿痺為不仁最善名狀仁者又云切脈可觀仁仁人心也天地生生之心人得之以為心心仁則疾痛切身若保赤子萬物一體也不仁則善不勝利理汩於欲肝膽楚越也陟降庭止前聖臨之在上以仁存心以心合天如涪翁之不求報宋清之不為市龎安常之好施許叔微之隂功精義入神將得不傳之妙於筌蹄之表惟貫道器德藝於一致者可以語此其或專已臆決乃曰醫者意也是猶廢學古人入官之訓而曰何必讀書其害不止誤注本草而已殆非斆學師古之意雖然余年耄矣儻以為然願以為學者之針石是嵗九月旦日記重建醫學記袁桷醫之書作於上古乎後人猶疑焉隂陽氣運之説與易書禮相吻合魚蟲草木之精詳於詩尤近之然其辭義奧古卒莫能曉非專治者不能也聖人知之始為之師以教之後復立學以長之生人之本繇是備矣至元壬辰濟南陳公祥為肅政亷訪副使來四明遵詔旨立醫學學成甫十有八年燬焉其地近市狹紊咸病展事鄞縣西有故主簿廳事基及傍近地蕪礫不治於是教授徐君源道等請于郡遷以廣之乃斥于舊地得財若干以治土木郡侯完顔鼎爾首為之勸推官賀君貞贊輔其役𨽻于醫籍者胥率錢以補之逾年而學完殿廡翼成軒闥深靜會余自京師還里屬記其事余幼嘗聞長老言鄉里多名醫皆修謹退讓呐呐然若不勝衣察脈視色必原于井谷經絡之微眇調製湯液必通乎風土之宜甘辛燥濕內外相為表裏者悉參取于經傳故其術百不失一懷疑審問求正于勝已無忌悻之謬道同而氣和相遜以禮相處以義而昔時公卿家激厲奬與之道又能使盡其術而無愧噫亦盛矣今皇宇恢廓五方士民參雜于州里拘而不達將不勝其弊率然以僥幸懼其深有所失也徐君世儒醫教授是邦今二十餘年重靜而不撓昔之所聞徐君深知之廣天子好生之德諄諄然語之使後之學者誦其書毋執一以自滿虛心遜志復昔時之長厚不幸罹于疾病將得盡其順受無夭閼之害則徐君之教不亦闡乎余歸田里尚幸而有見也延祐三年三月翰林待制文林郎兼國史院編修官袁桷記田土基地一片係録事司撥到舊郡縣主簿衙基地內一段橫闊九丈七尺直深七丈二尺蒙亷訪分司令居民唐棣華等四户租賃年納鈔四十兩中統一段橫闊一十三丈直深三十一丈五尺於上蓋學屋宇大殿三間講堂三間土祠一間外門樓三間門房一間臺門一十二間西廊一十二間斜廊二間講堂挾屋二間祭器尊三爵二十一籩二十五篚三豆二十五俎二十五坫二十八簠七簋七罍二洗二羃布五香爐六書籍聖濟總録一部八十一難經一卷脈經全帙設官教授一員學正一員學録一員奉化州醫學古者有醫師掌醫之政令凡民之疾病者使分而治之今州縣各有學得非此意歟延祐元年達嚕噶齊茂巴爾奉議就易洞真觀廢殿修葺一新設三皇像奉祠延祐六年春達嚕噶齊呼圖克岱爾奉訓遷于嶽林寺東館驛故址未完而代者至是冬知州馬奉議到任相視殿宇基址湫溢卑陋自惟聖朝春秋致祭安可設于猥僻之所於是首捐已俸及勸率近土醫户出資助遷就州之東一百步趙氏故址築砌牆圍創立櫺星門起蓋大殿講堂廊廡等屋咸一新之規模宏麗不負尊崇屋宇櫺星門三座門樓九間大殿三間扁曰開天之門知州馬奉議立男馬克敬十二嵗書講堂五間扁曰明理堂東西兩廊共三十間三皇殿記袁桷馬侯為州急先崇儒建尊經閣成作而曰學無田曷足養士表圭田租勵之於是鄉之儒合言兹實吾黨恥鄉校日毁青襟賦焉館粲有加士子知教盍助田以成侯志侯復曰先賢遺則惠養存沒規曷敢湮廢正藉端本恥格貪戢於是始言曰噫世祖皇帝行仁肇邦萬世永憲今獲守兹土疾沴不治黎民何辜乃建三皇殿初殿在廢觀址後徙寺旁庳隘弗稱詢圖考初厥地爽亢遂廣土而興之百柱翼成萬瓦鱗比厚者效泉力者輸役官不出賦而巋然光尊耆老贊企願紀其建立以彰侯績桷嘗聞庖犧闡極人居其中靈根湛純萬化是生坎離致用窮隂陽之機夀夭不齊彼實戕竊維大聖憂之樹藝五穀輔之以醫藥剛柔燥濕各施諸用神農之功也因其厚生迄於傷生以憫以原為之經問教之以知懼使各盡性命之道則夫黃帝之功詎小矣哉三聖炳著尊祀肇唐皇甫謐之論合於醫説道不虛矣為作樂章俾歌以祀表侯於無窮侯名稱德字致逺官奉議大夫明爽軒飭吏民畏而愛然是役也州之官咸佐之鄉老皇甫簡董役訖成門九楹廊廡齋序二十八楹講堂五楹禮器備充圍繚丹堊咸曰美哉歌曰判鴻濛精一中八方圓握以通稽聖作逆不逢神之遊雲霓從磋彭殤曷恣縱簡差差指厥蹤玄籥啓人喬松煌煌大聖萬世功天昭昭日月星變化周純粹精木石土金蕩至靈飛走食物各受令一日屢蘇民乃修齡覽九州雲泠泠是州秀淑守著能牲具肥酒齊馨日出作晦晏息守厥故常民用不極何顛憤自傷縱恣作慝帝有憂筆載籍目視毫釐尺寸脈智者驚保厥德雲龍之髯杳無迹祀靡斁千萬億設官學正一員昌國州醫學學在州前真武宮之南至元二十九年醫提領許若璧陳錫受李繼之買民屋以建前以祀三皇聖像後以為醫生講肄之所至元甲午胡逢辰以儒者流精於倉扁之術來為學正醫生賴其啓迪重建醫學記袁桷醫之道即夫人身以備三才其説與易箕疇詩禮相表裏亦大矣哉蓋昔之君師聰明神聖因夫五行以寓於五常之形氣致坎離之用以合其隂陽推其運行以齊夫寒暑考九州風土之宜别溫涼燥濕之髙下蟲魚草木纎悉備具非博習廣聞者不能也至于七情既發之偏必求其中以返于正皆吾儒傳心之極論有察于聲氣臭味于杪忽考之于遺書受之于家庭積嵗年不能以竟而掌政令者從是稽其醫事以制廩祿是則寧有夭閼疵癘之憾也哉南北地氣有大不同而為之醫者各執己論近者急于好尚而恣縱不能商度十失五六誠可罪也秦漢之主率望海求不死藥藥詎能令不死蓋其空巖絶島磅礴于巨浸之際絶囂塵接雲霧靈根異草得地氣之正方外隱士時採其竒絶精良以療治輒竒中而功倍今所謂海上方皆其苗裔而昔之集方論者屢搜類于蛟龍之窟穴海於天地間號最巨焉得以有遺也昌國為州四履皆海至元二十九年始立三皇祠綿蕝不稱韓侯治儒學既竟復蒞醫學兹曷以奉虔乃廣其故址而二倍之泰定元年十月正殿成復立講堂翼以東西前為儀門外為神門廊廡有序祠象儼赫首以圭租勸民胥成不三月咸樂以助復遵詔旨為惠民藥局工既畢書來俾書其事于石桷嘗謂疾痛疴癢切于吾身者猶民之身也民困魚鹽侯能紓之儒病徴科侯能復之既憂其生又懼其罹於疾病使夫習為醫者講肄以精其術故余歷敘醫家者流其學實難三聖之書昭然具存反覆紬繹皆得以完其生是侯仁政之本愈逺而愈不可忘也設官學正一員慈溪縣醫學學在坊隅至元二十五年醫學教諭桂起豫買一士髙新班屋以建大德五年仆于颶風延祐元年桂一枝等復蓋以祠三皇聖像抄籍儒人四十一户設官教諭一員隂陽教授司隂陽教授司公宇未建至大元年命天下郡邑設隂陽教授司立教授學正學録以主之凡隂陽厯數巫術銅壺之事咸肄焉設官教授一員學正一員學録一員鄮山書院鄮山書院在城西五里大德二年趙夀建以奉朱文公以其大父嘗從文公逰也别業一區為祠割田一頃以贍上于省府建山長以主之趙夀其始也鄮山書院記袁桷粵若古儒先各以方國所尊祭于學社自宋而降定孔子祀餘悉撤廢近百年來始有事于先師凡居邑講習治官遊衍之地崇闡相望或者病焉夫氣者周流六虛神而存之聚者易推散者難窮聲音笑貌之盛若將企焉如弗及理有在也合屬閩越之地咸尊以師惟朱文公世祖皇帝一海宇立胄子求取文公訓著為學制郡縣益遵守而祀于江南者復得推衍大德二年四明趙夀家儒科慨然請于朝曰伊吾祖嶽州善待從文公遊今天子興是學願割田别居以祀而名曰鄮山事甫下趙氏已即世未幾成規廢弛大德七年三山林德載奉命祗事屋毁弗稱旋辟田沒不可問核故整圯實完實成奠祀齋明陟降儼肅賔老佐祭侯伯合餕又三年俾繫其事于石袁桷曰維四明縉紳先生辨釋著微實相表裏源同流分塗殊轍一合私而惡異者標榜之弊也炳然彜訓理何外焉夫學以植身德以敦本斯道立矣飾空説以為證弊不勝舉惟性與道匪言是夸桷懼滋久願相與勉焉林君精敏慎修宜展于世文公之學不墜審由是也大德十一年中春朔日記應奉翰林文字將仕郎同知制誥兼國史院編修官袁桷撰奉政大夫前浙東海右道肅政亷訪副使臧夢解書田土水田一百畝二角九步錢糧每嵗該收早黃穀二百六十七石一斗五升輸納稅糧該米五石七斗七升準穀一十九石一斗儒人儒學提舉司行下本路儒學及鄞縣學分撥到生徒二十一名遞年身故見存儒人七名在院陪拜肄業屋宇燕居堂三間講堂三間門屋三間廊二間倉屋三間厨屋二間朱文公祠堂一間大德十一年山長林德載建穿堂一間至大三年山長杜世學改為祠堂祭器尊二爵五罍一洗一簠二簋二龍勺二籩十二篚一豆十二俎四坫五設官山長一員翁洲書院翁洲書院昌國州治北宋理宗出扁以賜參知政事應㒡皇朝以其孫翔為山長元貞乙未嗣孫創田以贍其禮殿儀門齋廡延祐庚申同知于文傳敦勸訓導張元沖直學丘海捐資協力起蓋設官山長一員岱山書院岱山書院在昌國州岱山宋咸淳癸酉魏矩請廢酒坊基以建至元三十一年鹽場徐應舉致民居以遷于市設官山長一員岱山書院記趙與􅞜岱山居昌國縣蓬萊鄉之四斷海中環以鯨波浩渺無際書堂之建自咸淳辛未春邑人魏方直等聮詞請于縣縣為轉聞于府制使蒙翁劉先生如所請給舊酒坊基且撥僦直償寨助以緡錢于縣亦有所捐以相之邑寓王一桂趙若諘請許君定職教職導癸酉冬閣學尚書本翁陳先生開閫之初落成焉二先生朝家之柱石吾道之津梁正學之標準宜是役之克始克究許君遣二子請記嵗月與􅞜以謏聞辭不獲書院有記固嘗聞之矣朱文公于石鼓則曰養其全于未發之前察其機于將發之際善則廣而充之惡則克而去之吕成公于白鹿洞則曰挹儒先淳固懿實之餘風服大學離經辨志之始教張宣公於嶽麓則曰率性立命知天地而宰萬物者也嘗試察乎事親從兄應物處事是端也茍能充而達之則仁之大體豈不可得乎及其至也與天地合德與鬼神同用至于武夷精舍出于韓無咎之筆亦曰元晦儒者也方以學行其鄉其徒非若畸人隱士遁藏山谷服氣茹芝以慕夫道家之流也是數者天下之名書院也記之者皆天下之名君子也今岱山有書院不範諸此將奚範想夫潛心遊志於此則尊吾德行裕吾詩書茂吾藝文岱華其髙山嶽其神功崇惟志知崇效天崇髙節而抗浮雲斯無愧於斯矧斯地也昔有名卿徐大農恭先有舉首朱進士介有布衣許止齋孚以文行孝義為鄉閭倡有開斯學許君請曰茲卜築已定輪奐方新士友相聚言曰熙寧立邑以來吾地特海嶼耳淳熙間宸寵以鎮名山川改觀諸鄉老負笈於慈湖潔齋二老之門師友漸摩儒風日以盛今又祠先聖以儀後進居於德以善俗是有功于名教也請以岱山名書院不亦有光於斯有迪於後人乎愚載思之士有志於詩書道義映雪囊螢冬不爐夏不扇雖甕牖繩樞環堵蕭然一性之充裕如也矧髙堂大宇明窗淨几良朋益友切偲麗澤云乎道遵而人知敬德盛不侮狎吾德行海岱也師友淵源汪洋大肆吾學問海岱也事業日以彰聲名日以起吾聲譽海岱也有舍生而取義雖頺嵩岱不吾壓吾節海岱也若希孔孟之徒茍能效石鼓白鹿嶽麓武夷之成規縱未能孔孟伊周寧不朱張吕韓乎縱未能朱張吕韓寧不徐魏朱許乎善則善矣猶自恕之論也若夫充石鼓廣充之善固白鹿淳固懿實之風率嶽麓天地合德之神𢎞武夷學行其鄉善其徒之學則充其徐魏朱許者可以朱張吕韓矣充其朱張吕韓者可以孔孟伊周矣有志竟成斯不負蒙翁本翁之所以教庶幾乎淳祐之中人以上者此今日祠先聖建書院之意也咸淳癸酉良月通直郎知慶元府昌國縣事主管勸農事兼岱山昌國鹽場弓手寨兵軍正賜緋天台趙與􅞜記岱山書院記黃震四明枕大海為郡居天下極東又其東而中於海為昌國縣又其東而中於海為岱山岱山尤逺在鯨波浩渺間去三韓幾一帆近士而生其間往往多秀拔冠鄉書登上庠擢髙科而躋膴仕者踵相接非山海碩大之氣之所鍾而能爾耶余固聞風而為之興起久矣一日士有家於岱者忽航海過余而言曰朱文公嘗嘆佛老之區遍天下至于學校乃一郡一邑而僅一置蓋為講學之地不可以不廣也况岱山阻大海士雖欲擔簦負笈一至郡邑學不可得士果何以為麗澤之地古者五百家為黨黨有庠今岱山可三千家而反古者一黨之不若咸淳七年魏君矩等因請於郡太守劉公黻得酒坊廢基創岱山書院以祠先聖而講其説劉公既捐公帑以為助又嵗減酒息錢乃得請鄉先生定正席臯比與鄉之人士日藏修遊息於其間距於五年而書院大概成矣願為記之以發其意余聞之益敬而嘆曰岱山多士地之偏而學之正耶我宋二百年崇尚正學所以涵養成就配天其澤者於是不可尚已請因以學之正者而言之夫所謂學之正者何也理有自然而然立萬世而不可變者正也天髙地下萬物散殊莫不具此自然之理人生其間秀於萬物莫不明此自然之理大之為三綱五常細之為起居服食莫非自然非然有不容於不然者堯舜禹湯文武以是而見之行事吾先聖孔子以是而見之垂訓皆未嘗加毫末於是是所謂正而已風氣日開世變日下楊子為我墨子兼愛非正也孟子闢之而復於正老子清淨佛氏寂滅非正也韓子闢之而復於正談空者過髙功利者過卑非正也濓溪周子河南程子又闢之而復於正每一異説興必得一正論以救其後天右斯文若是信乎此理之正出於自然者終不可得而磨矣世乃又有借周程之説售佛老之私者謂愛非仁直欲掃除乍見孺子入井之心謂心即道而直改用大舜人心道心對立之説以為證謂六經為注腳謂孝弟為支離謂講學為邪説幾於前聖所未有之論時則有若文公先生出乎其間又辭而闢之天地為之重開日月為之重明有人心者宜知所嚮方矣奈何好髙之士習慣其説猶或卑正學為不足道而必求其説之勝不知此非文公之言也吾先聖孔子以來相傳之言也非吾孔子自為之言也天地間自然而然自堯舜禹湯文武以來斷斷不可易之正理也夫豈加毫末於其間而必欲外立一説以求勝耶岱山之講文公之學正矣然世之攻文公之學者尚多也其幸精思而實得篤信而力行使正論日興異説日消海隅蒼生日出之地聖朝崇正之化洋洋流動端於岱山書院占之矣敢敬書以勉德祐元年八月望日朝散郎新除浙東提舉黃震謹記設官山長一員慈湖書院慈湖書院在縣東一里宋寶慶間建於慈湖之濵以祀鄉先生楊文元公嘉熙間制置使趙與􅊸遷於湖中之沚咸淳辛未郡守劉黻於普濟寺東易地重建咸淳壬申撥餘姚定海沒入官田以為奠饗之需至元乙酉普濟僧恃楊總統權勢侵奪其地毁祠像諸生訴於官至元丁亥按察副使侍其君佐巡按至縣乃占先生舊宅遺址復建禮殿祠宇越五年壬辰甫落成慈湖書院記文及翁慈湖楊文元公之學心學也學孰為大心為大心之精神是謂聖不至於聖曲學也不大於心淺學也一心虛靈其大無對六合之外思之即至前乎千百世之已往後乎千百世之未來管攝於心若不識心何以為學自有天地以後未有經籍以前闡道之祕惟圖與書河圖中虛洛書五位心之本體也太極此心也皇極此心也堯兢兢此心也舜業業此心也禹孳孳此心也湯栗栗此心也文王翼翼此心也武王無二此心也周公無逸此心也孔子孟子操則存此心也曽子子思謹其獨此心也易説心書傳心禮制心樂治心詩聲心春秋誅心故其帝所以為帝王所以為王聖賢所以為聖賢焉有心外之學乎慈湖先生昔在太學肄業循理齋足不踰閾者纍年一日冠帶揖謝同舍郎曰某悟道晏坐反觀忽然見天地萬物萬事萬理澄然一片向者所見萬象森羅謂是一理貫通疑象與理未融一澄然一片更無象與理之分不必言象不必言理一亦不必言萬亦不必言自是一片此先生知至至之始事也及觀象山陸文安公發本心之問舉扇訟是非以對忽省此心之清明忽省此心之無始末忽省此心之無所不通守永嘉日謁先聖又謂自幼而學長而始覺覺此心澄然虛明無體廣大無際日用云為無非變化此先生知終終之終事也先生忠信篤敬言必由忠信而有證其注孝經述已易解春秋纂先聖大訓條治務最急者五次急者八遺文訓語皆先生精神流動常肅觀先生手筆齋莊中正本古篆籕心字必象心學者敬字皆從闕又心畫之發揮先生家于四明之慈湖詠春諸詩有浴沂詠歸灑然出塵意花香竹影山色水光鶯吟鶴舞皆道妙之形著今玉牒侍讀文昌劉公嘗執筆于太史氏為先生作傳及開閫府于四明奏請于朝乞為先生賞延于世即先生舊宅創書院于慈湖之濵規模軒豁襟佩鏘鳴其景行前修風厲後學懇懇切切之心即先生昭昭靈靈之心也相其事者縣宰王君愈提管陳君允平秉彜好德誰無此心開創於前正望增益於其後劉公為永嘉知名士又嘗為太學循理齋長習聞先生前言往行為詳而及翁平生讀書以本心名齋於先生片言隻字收拾殆盡知之好之樂之又若心交而神遇者噫俗流失世敗壞學士大夫童習白安漫不知心為何物驅血氣而角功名決性命而叨富貴喪精神以失虛靈者總總也藏山之卷九千插架之軸三萬手不停披口不絶吟以是為學亦祗以釣聲譽梯利祿膏唇吻飾竿牘而已矣出入口耳之學各是其是反以心學為非至有疵先生之學為禪學者何異衆人皆醉執獨醒者以為狂此先生所以太息復太息也書院有規廩稍有籍春秋之法常事不書敢書其大者以諗同志咸淳九年良月吉日朝奉大夫權尚書户部侍郎兼直學士院兼同修國史實録院同修撰兼侍講文及翁記端明殿學士朝請郎同簽書樞密院事兼同提舉編修經武略瑞安縣開國伯食邑七百户實封一百户陳宜中書寶謨閣直學士朝請大夫知慶元軍府事兼管內勸農使沿海制置使龍泉縣開國男食邑三百户陳存題蓋重建慈湖書院記王應麟古者鄉有庠黨有序閭有孰里居又有父師少師之教是以道德一而理義明書院之設意猶近古睢陽白鹿為稱首若周程朱吕治教之地文獻尤盛天典民彜之統紀恃以不墜東海之濵有大儒曰慈湖先生文元楊公立身以誠明篤敬為主立言以孝弟忠信為本躬行實踐仁熟道凝盛德清風聞者興起可謂百世之師矣古涪文公及翁紀其事不幸厄於浮屠氏鞠如荒榛天不喪於文繡衣使者侍其公行部喟然太息選一鄉宿望曹君漢炎為山長而堂録桂君應魁鋭以為己任善士相與合志協力舍舊而新是謀相攸先生舊宅熙光遺址爰契我龜鳩工飭材經之營之禮殿崇崇祠宇奕奕敷經之席肄業之舍規模視昔不愆于素冠進衣縫遊於斯習於斯如詠舞雩之風如升闕里之堂聞金石絲竹之音莫不油然而樂躍如而悟咸曰自堂徂基輪奐新矣陟降庭止惠我光明盍亦勉新德而進新之乎於是屬應麟著石章以永教思于無窮應麟耄未知學辭弗獲敢誦所聞切磋究之嘗謂儒以道得民師以賢得民師言賢不言道身即道也萬古一道萬化一心仁人心也人者天地之心也天有四時風雨霜露地載神氣風霆流形無一物而非仁仁則純一靜虛與天地同流在易為不逺復在書為精一在詩為無二在大學為毋自欺在中庸為至誠篤恭惟先生無意而自得之齋莊儼恪非禮不動言性必曰堯舜論治必曰三代道學之將廢則正色讜言不回於羣邪道學之復行則見幾卷懷不汩於勢榮髦期稱道若武公之作懿戒名滿天下若君實之在西洛本心明而外物輕行藏語默參諸百聖無不合於已易見先生潔靜精微焉於廣居賦見先生廣大髙明焉於過庭訓之言學者見先生自強不息焉於講堂之訓言孝見先生一貫之道焉先生之文章皆性與天道之昭著俯川流仰髙山心之精神江漢秋陽皓皓也居先生之居學先生之學則何以哉由事親從兄而盡性至命由灑掃應對而精義入神由內省不疚而極無聲無臭之妙下學上達不求人知而求天知庶幾識其大者夫一言一行之有愧可以欺其鄉不可以欺其家可以欺其家不可以欺其心無體之禮此心之敬無聲之樂此心之和訓詁章句云乎哉先生之學文安先生之學也文安講論語於白鹿先辨其志聽者竦然動心收其放心而存其良者在此朱文公亦云陸子所言專於尊德性學者多持守可觀又謂先生之學有為已之功合而觀之知入德之門矣學有先後覺無古今有能得之以省察克治深之以薰陶涵濡問津以辨志尋源於尊德性以達聖人之閫奧海涵春融氷釋默契道體去先生之世若此其未逺也得心學之傳必將有人焉濟濟多士克廣德心凡我同志懋敬哉復建於至元丁亥春越五年十二月成嵗在壬辰三月浚儀王應麟記重修慈湖書院本末記黃翔龍宋乾淳間鴻儒輩出以理學相為倡和慈邑則有慈湖先生邑故有湖先生居焉因以自號故邑之名昉于漢而湖之名昉于先生先生得象山陸文安之學千里心契文安沒學者尊而祠之有象山書院至今重之先生沒邑大夫始祠于湖之濵而未有講習之地先生之道雖尊而未明嘉熙間制閫節齋趙公與􅊸改祠於中沚地隘不可久既又祠於邑以不專奉廟貌為歉咸淳辛未永嘉蒙川劉公黻來帥明捐郡帑得民地於僧寺之右負山面湖創精舍肖象而祠之於是以濟民莊米為奠饗廩士之資書院之名得與上蔡稽山齒然禮殿猶闕也陵谷變遷浮屠氏壞之至元丁亥繡衣使者真定侍其君佐行部至邑問故愀然曰是不足與較也先生舊宅遺址故在盍即而圖諸卜曰吉於是命前貢士曹君漢炎為之長而堂録桂君應魁主其役始崇禮殿中嚴祠庭後闢講堂外植門壝旁翼兩廡因其舊為齋四曰忠信篤敬明通公溥先聖先師咸有像設長有署正録有序后土有祠司閽庖湢皆有舍嵗壬辰八月落成又度地講堂後為橫經庋書之所來學于是者六十有一人俱得占名數復其身先是劉公蒙川之創始前資政殿大學士本心先生文公為之記今也重建又得前尚書厚齋先生王公特大書以紀其成凡文元公心學之要躬踐之實亦既發其精蘊足以昭往而淑來矣鄉人懼後來者于廢興本末之莫詳復命翔龍記其粗竊惟前代儒先出處過化之地必建書院使學者尊慕而學其學率繇臺閫若郡邑長吏請于朝緡錢粒粟皆出縣官下無科率旁無沮撓故力省而成易今興廢植壞遭時方艱成道未亢外侮者桀中畔者疑抵攘謀度堂録桂君實身任之郡廩既不復繼資用無所出自基而構迤於塈塗丹雘一是諸生之力故金穀不可以緡石計蓋其力倍勞天幸斯文上恩寬大臺省交勸督士知名義之實始定弗搖是役也前令尹濮水馮君顯實謀其始而歷山富君德庸成其終二令尹通敏亷正規隨一心功賴以竟士之捐資多而趨事勇者堂賔沈君瀅其最是皆不可無紀昔吾聖人於道之行廢必歸之天夫天將興之必有慈惠之師明智之長主張綱維其上亦惟我同志之士相與緝熙廣於無窮文元公之道庶其益昌乎贍學田土田一百一十二畝一角五十三步渡六處額管錢糧鈔中統鈔一兩田租穀一百四十九石二斗三升二合渡租榖一十五石三斗五升七合屋宇共七十二間祭器蠟爵一十三隻羃布四片抄籍儒人六十一户設官山長一員甬東書院甬東書院鄭忠定釋奠其師迂齋先生樓昉且行鄉飲酒禮宋理宗書其扁舊在僧寺之側至元二十八年僧撤去教授吳宗彥復立張贇橋側設主奉二員以掌之田一十七畝二角四十一步穀四十五石五斗地四畝一角四十步屋宇三間鄉飲酒禮嵗旦至日郡守率鄉士大夫奠于先聖始序拜於堂上少長就序皆記禮之舊紹興七年郡守仇愈復舉故事置田百有六畝以益之後郡人林保登朝取式以奏遂行他郡故事糾儀二人鄉監郡守為之士族不齒於鄉者不預入門則糾儀舉笏以却由是人各自勵鄉飲酒禮不可廢若是鄉飲酒記王伯庠乾道五年春王正月己未太守張公率鄉大夫士釋菜序拜于郡庠禮也明之為州士風純古凡嵗之元日冬至必相與謁先聖先師而後以序拜於堂上行之久矣建炎末學火于兵自是禮廢不講紹興戊午郡將徽猷閣待制仇公一新之學成復舉故事益以酒三行之禮二年仇公被命復來乃以田百有六畝支其費伯庠是時備員學官蓋嘗紀其事矣三年朝廷頒鄉飲酒義於天下行之數年雖百格不行州縣猶聽其便以故明年序拜如初而仇公所撥之田移以養士酒禮遂輟乾道三年祕閣張公來守是邦政成多暇問知其所以越明年以鄞及昌國兩縣沒官之田二百六十畝山地二百四十九畝盡歸之學以復拜序飲酒之禮受藏受用一切趣辦而有司不預焉是日也教授率三先生侑坐獻酬於守倅禮成拜既風動千里莫不砥礪澡濯期毋負賢太守敦教化厚風俗之美意嗚呼盛矣天下之事固有若緩而急者或謂州縣之責簿書期會之為急而禮非所先蓋亦未之思也人皆有欲欲斯有爭視聽言動之間以禮自防而不流不逸則乖爭陵犯非僻之心無自而入公今禮成於一日而長幼尊卑之分昭然可見皆率服之故能不令而行政平訟理其視劫劫於米鹽細故而日不暇給者固有間矣其可不書以告來者因以田之畝步四至刻之碑隂奉化鄉飲酒禮鄉飲酒古禮也近世曠而不行至大四年正月初五日判官程時敏依奉肅政亷訪司分司趙副使省會事理於儒學講行斯禮禮畢各為歌詩以記之義學杜洲鄉學在慈溪縣西北三十里至大二年童金創建田四百畝一角二十七步山三百二畝一角地八畝房舍五十五間基地八畝租穀九百五十九石一斗二升減免分數髙下收租蠟香爐花瓶四副銅罍洗尊爵勺共一十隻木俎豆共一十一隻竹籩一十隻本路鄉曲義田莊太師史忠定王鎮會稽日捐公帑之金市田數百畝名曰義田凡仕族有親喪之不能舉與孤女之不能嫁者以其租入差給之既間居里閈端憲沈公煥請曰吾鄉義風素著相賙相恤不待甚富者能之而求者日衆授難繼也舉會稽近比行於此其可乎王韙其言乃與沈及少師汪公暨其子尚書大猷合辭以倡好義者於是捐地産或輸財以廣費積田漸多郡太守相繼輟在官之田若錢今丞相史魯公又捐楮券附益之嵗得穀斛六百米半之買地作屋十五楹于郡之望京門裏扁曰義田莊擇鄉之賢有力者掌焉仕族親喪之不能舉者給十三緡孤女之不能嫁者給五十緡其親屬若鄉里以聞于郡郡核實俾主者行之非二者勿與先後緩急間從權宜而郡守與主者不得私焉提刑程覃攝郡日許人徑投狀于主者始自紹熙初元于今四十載義田之增置未已也忠定王之言曰是田之設非止濟人之急抑以崇亷恥之風將使從官者清白自持為士者專意學業人人知身修有所恃不汩喪素節斯其惠大矣參政樓公鑰記之鄉人且繪王及少師汪公端憲沈公之像于莊所祠焉太師史公浩序云義田之設專以勸亷恥蓋賢大夫從官者居官之日少退間之日多清節自持不肯效貪汚以取富沽敗以自卑為士者生事素薄食指愈衆專意學業不善營生介潔自持不肯為屠沽之計干攫之態者使各知有義莊在身後不至晚年憂家計之蕭條男女之失所遂至折節汩喪修潔故以此為勸使其終為賢者凡為士大夫當知立義田之本意義莊記樓鑰自阡陌既開兼并成俗千百餘年非復先王之舊然而守望相助疾病相扶持良心美意則至今不泯顧貧富不齊求者衆而應者寡志雖廣而力不贍學士大夫每歎息於斯近時所在有為義田以給無告規畫有不同皆倣佛古意四明鄉誼最重薦紳韋布序必以齒嵗時往來少長有倫無洙泗間齗齗之嘆承平時大門齊國公以列卿領畫繡義襟素髙恤孤濟急不遺餘力鄉人猶能道之厥後外祖少師汪公太師史文惠王舅氏尚書暨鄉之先達與吾家諸父相繼主盟此風不墜淳熙中故龍舒别乘沈叔誨煥請于文惠王曰隨時拯恤其惠有限吾鄉以清白相勵其能稱物平施者蓋可數矣盍用會稽近比為義田之舉乎王韙其言與吾舅謀以倡率諸好事者於是或捐巳産或輸財以買各書於籍又得撥助之田合為五頃有竒嵗得穀近六百斛米三之二而附益未已也買地作屋十五楹于郡城西望京門內扁曰義田莊經畫纎息皆出吾舅推爵齒之髙而有才力者提其綱又擇仕而家食者一人司其出納及莊之事凡仕族有親之喪不能舉孤女之不能嫁者投牒于郡參稽得實以次而授始於淳熙之改元且將二紀雖未能一一充其欲所濟亦廣矣舅氏既薨諸侯以鑰間居猥以見命逮起於挂冠而後他屬令郡武使君髙裕而文善樂平丞袁木叔實任其事信義素著木叔尤能周知州里詳悉檢柅滲漏明辨真實不私市恩於是所入加多而被惠者衆先是以田數序引登諸石猶慮無以傳逺以鑰嘗預於斯也俾記之鑰念昔先人太師岐公嘗命鑰書范氏義田記于座右欲增益揚州伯父義莊以及宗族清貧終身志卒不酬今鄉之此舉無間親迹可謂尤美矣文惠有言曰是田之設非止濟人之急而以崇亷恥之風將使從官者清白自持為士者專意學業人知其所濟恃不汩喪素節以為子孫計庶其為賢者之歸也敢誦舊聞以詔方來繼自今富者樂施貧者安分與者不以為恩受者不以為幸有餘則加益焉不得已而後求焉共守規約以無負先正諸公之意而後可以久矣凡我里士尚勉之哉嘉定五年中秋節記義田莊先賢祠記王應麟古者祠先賢于學明之三賢何以祠于義田莊田以義名三賢為鄉里立也三賢者誰忠定史越王莊靖汪公端憲沈公也始忠定里居篤于義仕者勉以勵亷隅學者勸以修文行乃為義田以濟婚葬而汪沈二公比善協心聞者樂施其規約密其給授公立義以為的一鄉莫不知義自紹熙庚戌逮今百有四年而三賢有祠亦七十有七年矣成畫猶存初意寖失濟南陳公祥攬轡咨諏惟儒雅風教是崇是迪嘉前修之尚義慨實惠之未遍謂職掌之冗員子孫之繼廩二弊不可不革維之以鄉校必守舊規董之以鄉人必選宿望砥節首公永保勿墜傳之百世可也於是屬郡博士蘇焱前軍器監丞陳定孫總其綱學録薑材之前夀春推官史徽孫主出納凡故家之裔名儒之後暨學校職生有喪貧不能舉孤女不能嫁者采諸旦評參諸輿論核實而助之因時度宜視昔為寬所與寡而所及者衆諸老之美意幾廢而復續先是祠堂陋更為三楹助田於斯者列侑于旁春秋祀焉嵗中稔頗有餘粟因繕葺門軒及亭築垣浚池粲然一新應麟聞而嘆曰義者天理之公人心之正大學以是平天下然而行之一鄉愈近而愈不可欺我思古人禮俗相交患難相恤藍田吕氏之為鄉約也貧窮相救婚喪相助古靈陳公之教其民也良心之存善端之充義不可勝用比閭族黨保愛賙救之法千載百世是邦如昔義里前獻表率後進忠厚亷恥之俗成憫顛連無告若已恫瘝用敷遺無窮之澤藍田之為約蓋不專美矣創者本于義既久而義之實不明亷車之來振飭扶植居賢德善風俗於古靈有光焉咸願識其事詒永久惟建莊始末宣獻樓公紀載已備而祠未之述義理在人萬古無弊秉彜好德誰無義心是心可泯則是義可廢續古之人勿替引之與者不為私恩得者不以他費相勸以義無愧於心斯無愧於先賢敢著之石章以諗來者重建義田莊記薛基鄞風俗素厚方淳熙盛時史忠定汪莊靖沈端憲諸公投紱里居實始鳩田儲粟以待仕族之有喪不能舉孤女不能嫁者規式備詳掌者交自重士非甚不得已亦以干請為恥常斥其餘積市田附之久而益廣莊始於紹熙改元宣獻樓公所記猶存暨基至此循近比得與聞其事則弊弛非昔屋亦如之雖有粟且無所容同知府事吳郡張公伯延清明豈弟子視困窮每相與悼焉一日公悟曰是當自擇人始又曰托任貴專毋分立長二則革故刋冗咨諏老儒咸曰吳濠孫其可固辭公固命之不得已乃蒞事悉更前所為收斂必公賑遺必實僉既悅服相舊倉衡立三厫與不欺亭相接逼仄幽翳壤復卑濕不足修治其後距城猶有廢地乃拓而更新之增培燥剛流潦屏避雨楹之間虛以為治所疏櫺洞寬爽氣遙集祈左右為四厫引其前榮如舫以通不欺亭亭亦易礎石加崇焉又飾土地祠美其象設改築而北墉達於城門先賢祠後為室用備憩休措置堅密不為目前計噫是役也自前任其職者有不暇及而君被選才數月談笑成之不遺急難不告匱縮則世果無不可為之事也世常病儒者寡於實用今國家設科取士將責治道焉茍充是以往其弗有濟乎雖然微張公戢止偽冒戒佐史章周介嚴督租入吳君雖欲為顧安得致此惟公嘉惠是邦勤勞庶政俾死有藏生有歸沛然其贏作是輪奐後之出牧者如公之心遵公之法聞風興起一日必葺何患乎莫之繼也時掌計盧全祖實相其事邦人謂基在文學史宜紀成績用鑱諸石以示不忘延祐四年八月望日記田土元有田一千五十二畝二十八步半山地二十四畝二角二十四步二尺租糧每年照鄉例體減收租送納苗糧元該米四百二十七石一斗九升五合穀一千五百五十八石八升續置田土租糧係提管吳濠孫界內買到田九十一畝一十五步穀一百五十三石七斗八升屋宇元有門樓屋一間祠堂三間厫屋三間重行起蓋莊屋大小一十間係提管吳濠孫界內莊職提管一員掌計一員奉化義莊廩義莊自宋嘉定年間縣令馮多福以學廩不足出家資為倡集八鄉父兄出田或資或買田共七百石有竒别為廩以貯嘉定七年縣丞周勉為之記舊貢院貢院舊在學西宣和復科舉額解十名紹興末以西北流寓者衆增解十四名今為織染局昌國州貢士莊舊於往宋咸淳年間令姚濓任內以邑民張氏爭訴交嗣縣以其家産業五分之一申于府于臺于部照應𨽻學置莊專為貢選士人計偕之費歸附後至元十七年升州存縣以本莊田糧歸學後縣革而學亦廢有司收係入官延祐四明志卷十四
