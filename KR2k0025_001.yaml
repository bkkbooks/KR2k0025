body:
  text: 延祐四明志卷一元袁桷撰沿革考詩書紀明堂社稷田制與周官殊後雖旁曲傅會卒不相似何邪或曰周官太平書也周公嘗行之周祀歷八百是果無更改邪繇秦至宋率數十年輒易矣郡縣城邑廢徙率無常所陵谷變易然也兼之以人事其理若是作沿革考句章鄞為越舊名國語曰勾踐之地南至于句無北至于禦兒東至于鄞西至于姑蔑又曰吾請達王甬句東韋昭曰今句東東浹口外州宋景文公補音州與洲同越語注曰甬甬江句句章也晉孫恩冦浹口入餘姚通典云明州東北到大海浹口七十里輿地廣記定海縣有大浹江秦平越始皇二十五年以吳越地為會稽郡治吳漢地志會稽所部郡縣二十六上應牽牛之宿下當少陽之位今屬明者曰句章曰鄞曰鄮則鄮立縣繇秦來久矣陸士龍言秦始皇留鄮縣三十餘日景帝四年吳王濞反誅復為郡治於吳元鼎五年除東越因以其地為治并屬於此而立東部都尉後徙章安陽朔元年又徙治鄞或有冦害復徙句章後漢晉宋齊梁皆因之隋平陳併餘姚鄞鄮三縣入句章𨽻吳州後改越州仍𨽻焉王象之按隋志有餘繼縣而輿地廣記於餘姚縣下注云隋平陳省入句章唐志於餘姚縣下注云析故句章縣置以縣置姚州則隋志之所謂餘繼即餘姚也是隋句章一邑之地既割餘姚𨽻越州又為明州之全境也鄞以堇得名加邑為鄞羅願云齧苦堇釋曰可食之菜也郭云今堇葵葉如栁子如米汋食之滑本草唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫草色本草云堇汁味甘説者以為堇苦而言甘者古人語甘草謂之大苦也觀綿之詩言沮漆之間土地肥美則曰周原膴膴堇荼如飴堇荼皆苦萊也地既饒美其所生菜雖有性苦者皆甘如飴則此地皆可居矣是堇得地味亦甘也內則棗栗飴蜜以甘之堇荁枌榆兔薧滫瀡以滑之脂膏以膏之言養老者懼其腸澀故用此物調和飲食荁亦堇類冬用堇夏用荁廣雅曰夏荁秋堇滑如粉是也士虞禮則曰夏用葵冬用荁鄭注云荁堇類也乾則滑夏秋用生葵冬春用乾荁此蓋隨文解之故不同嚴氏曰詩注孔氏謂堇即烏頭且引驪姬置堇於肉蓋以堇為爾雅芨堇之堇也如此則與鴆毒同與堇荼可食之物非其類矣按地志有赤堇山乾道舊志在東四十里鄮易也亦加邑焉輿地志曰邑人以其海中物産於山下鄮易因名鄮縣唐武德四年析句章縣立鄞州八年州廢更置鄮縣𨽻越州開元二十六年採訪使齊浣奏以鄮縣為明州以其境內山四明為名領縣四曰鄮曰奉化慈溪翁山天寶初改為餘姚郡肅宗至德二年復為明州長慶元年刺史韓察欲移州城以白浙東觀察使薛戎上言明州北臨鄞江地形卑隘請移明州置於鄮縣而以州舊城近南高處置縣從之見唐會要及移城記州初置時領縣四曰鄮曰翁山曰奉化曰慈溪要不出秦三縣之境雖郡號餘姚而餘姚縣仍𨽻越州廣德二年益以象山縣大厯六年省翁山海壖舊置望海鎮元和十四年從薛戎言不𨽻明州唐會要元和十四年八月浙東觀察使薛戎奏準敕諸道所管支郡别置鎮遏守捉兵馬者宜並屬刺史其邊徼溪洞接連蠻夷之處特建城鎮者則不在此限今當道望海鎮去明州七十餘里俯臨大海與新羅日本諸蕃接界請據敕文不𨽻明州許之錢鏐時以明州為節鎮置望海軍又更望海鎮曰靜海鎮尋置望海縣梁開平三年也未幾改縣為定海鄮縣亦改為鄞漢乾祐二年錢俶命其弟億判明州宋建隆元年升為奉國軍授億為節度使開寶八年又命俶子惟治領之太平興國二年吳越王納土改授惟治鎮國軍節度使自是始用文臣為知州熙寧六年析鄞東之海中洲富都等三鄉創立昌國縣而明之屬縣凡六矣在唐為上郡大觀元年始升為望高宗駐蹕吳會明婺俱為要郡而明州控扼海道紹興三年置沿海制置使以鎮之寧宗在藩邸領明州觀察使即位改元慶元升州為府因以名之皇元混一改府為路罷制置使立浙東宣慰使司於紹興後徙處復徙婺至元十六年以正使趙孟傳副使劉良分治於慶元尋併於婺大德七年島夷厖雜宜用重臣鎮服海口遂立浙東都元帥府即舊府治為之至元十五年以昌國升州元貞元年奉化縣以戶口及格升為下州辨證王應麟唐武德元年改郡為州太守為刺史權置州郡頗多太宗命省分為十道開元二十一年分為十五道天寶元年以州為郡刺史為太守至德二載復以郡為州太守復為刺史今按開元始置明州則曰明州刺史天寶以州為郡則曰餘姚郡太守志云置州之時名郡曰奉化以備封爵一州豈有兩郡名哉圖經開元謂開元郡名奉化天寶元年改為餘姚郡未詳所據元豐九域志始曰奉化郡未知何時改辨州郡唐志明州餘姚郡以境有四明山為名山海經瞿父山又東四百里曰句餘之山郭璞注山在餘姚南句章北二縣因以名州曰明郡曰餘姚皆本於句餘山虞氏餘姚人九域志晉虞喜陳虞荔墳在慈溪鳴鶴山辨餘姚郡鄞縣東有鄮郭古鄮縣城也漢地理志會稽郡鄮縣姓苑有鄮氏蓋以邑為氏五代改鄮曰鄞圖經云唐有鄞縣非也地理志無鄞陸雲集秦始皇南巡登稽嶽在鄮縣三十餘日圖經云後漢改鄞為鄮山之隂既而復為鄞非也西漢已有鄮辨鄮越語勾踐之地東至於鄞韋昭注今鄞縣是也後漢書注鄞故城在鄮縣東南圖經曰白杜里有鄞城山漢志鄞有鮚崎亭今在奉化有天門山今象山之東門山然則奉化象山二縣漢之鄞也鄞城山其古鄞城歟今鄞縣有鄞塘鄉接奉化蓋鄞之境四皓黃公鄞大里人世説注孫承公性好山水求鄞縣遺心細務縱意遊肆名阜勝丘靡不歷覽辨鄞句章九域志云因山為名戰國䇿有句章昧蓋以邑為氏漢伐東粵遣橫海將軍韓説出句章浮海從東方往史記正義句章故城在鄞鄮縣西一百里此張守節以開元之鄮言之元和郡志句章故城在今州西一里此李吉甫以元和之明州言之後漢注與史記正義同圖經古句章城在鄞縣南六十里此今之地里也虞翻傳注句章董黯則慈溪乃漢句章之地晉劉牢之東屯上虞使劉裕戍句章今鄞縣有句章鄉蓋自此鄉及慈溪皆句章境古句章城在小溪鎮辨句章左傳越滅吳請使吳王居甬東注句章縣東海中洲也吳語云甬句東注今句章東海外洲也越語注云甬甬江句句章也晉孫恩冦浹口入餘姚破上虞通典云越徙夫差於甬東韋昭曰即句章東浹口外洲明州東北到大海浹口七十里今按甬東浹口即定海縣之浹港輿地廣記定海有大浹江今以城東為甬東誤矣浹口外洲即翁洲也郡志有甬東為昌國蓋本於元和郡縣志昌國乃唐之翁山縣乃熙寧六年析鄞縣置豈亦句章地歟辨甬東本路東至海岸一百四里自海岸二百五十里方出海洋至石馬山凡兩潮約六百里為本路之界西至本路界一百二十里以慈溪縣之西金川鄉桐下浦為界自界首至紹興路一百九十五里南至本路界一百四十六里以奉化南松林鄉柵墟嶺海為界自界首至台州路二百四十里北至海岸六十二里自海岸至蘇州洋二百二十里其分界處係大海即無地里相距自界首至平江府一千五百里東南到海岸一百十二里自海岸泛大海八百三十八里至海中鋸門山為本路之界西南到本路界一百二十六里以奉化州松林鄉杉木嶺為界自界首至台州寧海縣七十里東北到海岸七十二里自海岸汛大海一千二十八里為本路之界西北到本路一百五里以慈溪縣鳴鶴鄉雙河為界自界首至紹興路二百五十五里鄞縣境土東距西六十五里南距北五十七里東南距西北一百二十五里西南距東北二百一十五里東至縣界三十五里以陽堂鄉育王寺山隴東河頭鋪為界自界首至定海縣三十五里西至縣界三十里以桃源鄉潘奧嶺為界自界首至慈溪縣三十里南至縣界五十一里以鄞塘鄉傳霸河為界自界首至奉化州三十五里北至縣界一十五里以老界鄉陳渡橋鋪為界自界首至定海縣五十里東南到縣界九十里以豐樂鄉金峨山嶺為界自界首至奉化州六十里西南到縣界一百七十四里以通逺鄉梅山嶺為界自界首至紹興路餘姚州一百二十里東北到縣界四十一里以老界鄉褚浦堰為界自界首至定海縣三十五里西北到縣界三十五里以清道鄉西渡江心為界自界首至慈溪縣一十五里奉化州境土東西一百七十里南北一百五里東至鄞縣界七十里以藤嶺并道陳嶺為界自界首至鄞縣五十里西至紹興路􅌘縣界一百里以陸照嶺為界自界首至􅌘縣一百四十里南至台州寧海縣界六十里以柵墟嶺為界自界首至寧海縣六十五里北至鄞縣界四十五里以北渡大江為界自界首至鄞縣三十五里東南到象山縣界以鄞港中流白石山南港為界陸路再折海計五百七十里自界首至象山縣二百四十五里西南到台州寧海縣界五十里以杉木嶺為界自界首至寧海縣七十里東北到鄞縣界六十里以金峨嶺為界自界首至鄞縣八十四里西北到紹興路􅌘縣界一百二十里以箬坑嶺為界自界首至􅌘縣一百三十里昌國州境土東西五百里南北三百里西南至本路三百五里東五潮至西莊石馬山與高麗國分界南五潮至龍嶼與象山縣分界西一潮至蛟門山與定海縣分界北五潮至大磧山與平江路分界東南三潮至韭山與象山縣分界西南二潮至三山與定海縣分界東北五潮至神前壁下與海州分界西北三潮至灘山與嘉興路分界慈溪縣境土東西一百里南北九十里東至定海縣界六十里以梅林涇及雙橋鸕鷀浦為界西至紹興路餘姚州界八十里以桐下湖從浦至大江為界南至鄞縣界三十里以鍾乳山及潘粵嶺孤兒岡為界北至嘉興路海鹽州界六十里以大海岸中桑嶼并黃牛山為界東南到鄞縣界一十五里以西渡江心為界自界首至本路三十五里東北到定海縣界六十里以雁門嶺為界西南到紹興路餘姚州界一百里以楊溪村及高巖并石門山為界西北到紹興路餘姚州界八十里以上林鄉為界定海縣境土東西三百九十里南北二百五十七里東至昌國州界以本縣崇丘鄉青山嶼接海面號鮫門山為界縣東至海岸三里自海岸至鮫門山約半潮折三十七里計四十里自界首至昌國州約一潮計二百里西至鄞縣界五十里以本縣清泉鄉西陳渡橋鋪北為界自界首至鄞縣十五里南至鄞縣界三十五里以本縣靈巖鄉河頭鋪育王山壠為界自界首至鄞縣三十五里北至本縣岸二里即是海面直連至平江路海洋為界但以潮下行舟約一潮折二百二十里其分界處係大海東南到本縣海晏鄉烏崎山海洋為界計一百一十里本縣至海洋一百五里自海岸至烏﨑山五里其分界處係大海西南到鄞縣界三十五里以本縣崇丘鄉褚浦堰東為界自界首至鄞縣三十五里西北到慈溪縣界一百二十里以本縣靈緒鄉東墟步為界自界首至慈溪縣三十里東北到本縣岸二里即是大海直接至昌國州界以潮下行舟約半潮至昌國州金塘鄉折一百五十里自金塘鄉至昌國州二百里象山縣境土東西二百里南北二百五里縣治西北距府城驛三百七十一里東至鄞縣界八十里以東殊山為界西至台州寧海縣一百里以磕蒼山脊為界南至台州寧海縣界一百九十里以秋盧門海港為界北至鄞縣界一十五里以嶼山為界東南到海六十里西南到台州寧海縣界一百十五里以漁溪海港磕蒼山脊為界東北到鄞縣界四十里以鄞港及中流及翁山為界西北到奉化州界二百四十五里以鄞港中白石山為界土風考漢地理言揚為輕揚概言之也吳地繇會稽抵臨淮水旱異宜禹貢任土曷嘗以風俗言哉浙東七州習俗各殊陸士龍書王先生七觀盡矣止矣不得踰越也作土風考陸士龍答車茂安書雲白前書未報重得來況知賢甥石季甫當屈鄮令尊堂憂灼賢姊涕泣上下愁勞舉家慘戚何可爾邪輒為足下具説鄮縣土地之快非徒浮言華艷而已皆有實徴也縣去郡治不出三日直東而出水陸並通西有大湖廣縱千頃北有名山南有林澤東臨巨海往往無涯泛船長驅一舉千里北接青徐東洞交廣海物惟錯不可稱名遏長川以為陂燔茂草以為田火耕水種不煩人力決泄任意高下在心舉鍤成雲下鍤成雨既浸既潤隨時代序官無逋滯之穀民無飢乏之慮衣食常充倉庫恆實榮辱既明禮節甚備為君甚簡為民亦易季冬之月牧既畢嚴霜隕而蒹葭萎林鳥祭而罻羅設因民所欲順時遊獵結置繞岡密罔彌山放鷹走犬弓弩亂發鳥不得飛獸不得逸真光赫之觀盤戲之至樂也若乃斷遏海浦隔截曲隈隨潮進退採蚌捕魚鱣鮪赤尾蜛齒比目不可紀名鱠鰡鰒炙鰶鯸蒸石首臛􅛈真東海之俊味肴膳之至妙也及其蚌蛤之屬目所希見耳所不聞品類數百難可盡言也昔秦始皇至尊至貴前臨終南退燕阿房離宮别館隨意所居沉綸涇渭飲馬昆明四方奇麗天下珍玩無所不有猶以不如吳會也鄉東觀滄海遂御六軍南巡狩登稽嶽刻文石身在鄮縣三十餘日夫以帝王之尊不憚爾行季甫年少受命牧民武城之歌足以興化桑弧蓬矢丈夫之志經營四方古人所嘆何足憂乎且彼吏民恭謹篤慎敬愛官長鞭撲不施聲教風靡漢吳以來臨此縣者無不遷變尊大人賢姊上下當為喜慶歌舞相送勿為慮也足下急啓喻寬慰真説此意吾不虛言也停及不一一陸雲白車茂安答書永白即日得報披省未竟歡喜踊躍輒於母前伏讀三周舉家大小豁然忘愁也足下此書足為典誥雖山海經異物志二京三都殆不復過也恐有其言無其事耳雖爾猶足息號泣歡抃笑也府君入後月當西出足下可豫至界上吾欲先一日與卿相見也答不復多車永白王深寧先生四明七觀東野先生韜光環堵根極深寧慕白賁以息影玩素履以洗心有南州公子儼然蹐門言曰竊懷太史公之志廣攬四方之恢詭譎怪升高能賦山川能説庶幾一二於君子之九能詩定之方中傳建邦能命龜田能施命作器能銘使能造命升高能賦師旅能誓山川能説喪紀能誄祭祀能語君子能此九者可謂有德可以為大夫也能叶奴代切今至是邦也願啓我以偉觀博我以奇概先生曰余卧遊詩書之囿視不踰几席敢誦舊聞吾子自擇焉昔嘗窺宛委之簡見神禹之山經吳越春秋禹東巡登衡嶽夢見赤繡衣男自稱玄夷蒼水使者謂禹曰欲得我山書者齋於黃帝之嶽禹退齋三日登宛委山發石得金簡玉字言治水之要山海經十二篇相傳為夏禹所記東有山曰句餘實維四明南餘姚北句章二縣以為名山海經南山經又東四百里曰句餘之山注今在餘姚南句章北二縣因此為名九域志四明山句餘山為二以地理考之其實一也即山氏州俶自開元之盛叶音成唐地理志江南名山四明其一也明州開元二十六年採訪使齊浣奏以越州之鄮縣置以其境有四明山名之其山㠍嶫巃嵸谽谺嶔崟駿極皓蒼危碧峭青方石四面天劃神剜出入三光窗豁牖谹對修眉於天姥接五界於金庭四明山二百八十峯洞周回一百八十里有四門通日月星辰山居賦注天台四明相接連四明方石四面自然開窗沃州天姥山在剡白樂天記南對天台而華頂赤城列焉北對四明而金庭石鼓介焉沃州天姥為眉目孫綽遊天台賦落五界而迅征注五縣之界五縣餘姚鄞句章剡始寧金庭宫在桐柏山會稽記四明山高峰軼雲連岫蔽日兹謂赤水之天分瑶扉闢而不扃福地記三十六洞天九曰四明山名丹山赤水之天上有石窗四穴松晉羡期之儔來宅來燕倣佛壺瀛駟虯乘鷖娭翔紫清山中人兮冠切雲駒皎皎兮鴻冥冥或梯空而上或履雪而行韓文公送惠師詩發迹入四明梯空上秋旻少陵詩履穿四明雪謂鄭虔從逸老以逍遙賦二韭與三菁景幽栖之至行道義重而貨輕四明逸老賀知章見李太白集知章自號四明狂客謝靈運山居賦天台桐柏方石太平二韭四明五奧三菁注韭以菜為名三菁太平之北諸山神仙所居宋書山隂孔祐至行通神隱於四明山嘗見山中有數百斛錢視之瓦石不異珍木嘉草薆薱榮呫甘嚌芳有果青櫺陸龜蒙集四明山中有果名青櫺極甘九域志山有四面各産異木不雜茗十二雷采襭區萌朝以道詩官有白茶十二雷注四明茶名區音勾川原出焉練澄黛渟雲蒸雨降豐我稻粳南豐廣德湖記源出四明山其下桑土蠶緰繭純紅女織棐交梭吳綾緰七候切唐地理志云明州土貢吳綾交梭綾躡跂蹻以攀隮徑沓嶂之紆縈跂蹻即屐屩字傃參同之伯陽佇客星之子陵軼埃壒乎區外逴飛遁而離羣安石之東山謝敷之太平世説謝敷入太平山中十餘年咫尺可尋也爾乃地載神氣支分􅍺聯大隱之峰名士楊適生焉慶厯五先生大隱楊適其一也鳴鶴之岫二虞喜荔兆焉九域志古迹鳴鶴山有虞喜虞荔墳將與子朋霞侶月釣石耕煙諷逺遊於穹谷吟考槃於鳴泉分靈藥之刀圭友造化而飛高圓九域志夏侯曽先地志云大隱山南入天台北蜂峯四明東足乃謝康樂鍊藥之所倘有意乎彼謂鰐鮫霧溼之蟠鬱蔡肇明州謝表鰐鮫霧溼之所蟠鬱夷𨽻􅔓舶之所往來未知有建德之國空同之仙公子曰愚行天下睹終南嵩岱之高興公登陸𥚹矣孫綽字興公遊天台山賦序登陸則有四明天台先生曰海於天地間最巨故觀於海者難為水駕言徂東浩溔滄溟羲和浴於榑桑日杲杲兮金鉦朝潮夕汐與月虧盈有鰌如山從以鯤鯨風俗記海鰌長數千里穴居海底入穴則潮上出穴則水退神虬驤首吐雷噓雲方其駿濤虎浪之興銀峯萬仞雪屋千層簸空扤嶽沃日吞江雷公為之矍踼天杭為之蕩震叶平聲盧賦竇志未能該也唐盧肇海潮賦竇叔蒙海濤志穆之圖論目擊其真燕肅字穆之知明州著海潮圖論二篇天門之水瀖泋㴸浤浤汩汩逺注析木漢地理志鄞東南有天門水入海有越天門山輿地廣記象山縣東門山即越天門山三吳轉粟粲粲粒玉飢氓仰哺檣連尾屬敻舶迅舸蠻䌖夷琛東洎青徼南薄朱垠陸雲答車茂安書鄮縣東臨巨海往往無涯泛船長驅一舉千里北接青徐東洞交廣登山而望渺渺鷗鷺之浮天根候五兩以帆讀為帆飇爰居戢而澄氛郭璞江賦覘五兩之動靜淮南子注綄候風也楚人謂之五兩綄音桓國語爰居海鳥雕題卉服馯寒貊雞林揚枻東門檥鷁江漘爰有狻猊犀象翠羽火齊薇水龍鱗之馥郁蠙珠木難之瓌麗杜陽所未編辛文不能計狻猊獅子火齊玫瑰占城薔嶶水得自西域龍鱗香見香譜木難碧珠蘇鶚杜陽編言奇寶辛文計然也世道窊鳥瓜切隆如濤降升蓋獻龜於明者治之兆祥符七年明州獻青毛金文龜雨毛於鄮者亂之萌唐五行志神龍二年雨毛於鄮縣占曰邪人進賢人遁在昔勾踐疆宇至鄞仰瞻沼吳蒲螺之濱曰甬句東浹口外洲戰爭蟻穴興亡貉丘越語勾踐之地東至於鄞韋昭注今鄞縣是也後漢書注鄞故城在鄮縣東今奉化象山漢鄞地左傳越滅吳請使吳王居甬東注句章縣海中洲也吳語云甬句東注今句章東海內外洲也越語注甬甬江句句章也晉孫恩冦浹口入餘姚破上虞通典云越徙夫差於甬東韋昭云即句章東浹口外洲明州東北到大海浹口七十里輿地廣記定海縣有大浹江九域志羅城或云越王無諸所築吳語越大夫種曰吳薦飢其民必移就蒲螺於東海之濱螺即螺秦政騁欲狼心未滿遊鄮踰月從流忘反海水羣飛洪茶於民一瞬為墟鮑車魚罾陸雲答車茂安書昔秦始皇前臨終南退燕阿房離宮别館隨意所居沈綸涇渭飲馬昆明四方奇麗天下珍玩無所不有猶以為不如吳會也東觀滄海遂御六軍南巡狩登稽嶽刻文石身在鄮縣三十餘日逮漢六葉濯征東粵句章出師命臣韓説漢武帝伐東粵遣橫海將軍韓説出句章浮海自東方而往典午末造妖冦鴟張裕以豪英往戍句章晉孫恩之亂劉牢之東屯上虞使劉裕戍句章孫恩冦句章牢之擊走之夏侯曽先地志云劉牢之築城以遏三江口唐季不綱盜覆此城巨容筒箭獲醜䇿勳唐王郢陷明州鎮遏使劉巨容以筒箭射郢死拜明州刺史想霸諸夏吞六王之雄圖螭舟兕楫射蛟之弧殿殿闐闐憺陽侯駴天吳矯矯三將如熊如貙電矛雨矢揃刈攘除威殫勢遷鮒入鯢居昆明幾劫桑田丰蕪吾將訪其遺躅既堙沒而無餘矣建炎凱獻於高橋六飛安行於海澨隱士相如抒忠納説何懋賞之漻漻豈亦若新城三老之縹遰建炎間張俊用隱士劉相如之䇿留明州遂有高橋之捷遰音逝瓜見千古以永愾淡東波之無窮誦潛聖之緒言謇謇乘槎其焉從壯魯連之高蹈閔精衛之深衷子好遊乎公子曰水至平端不傾心術如此象聖人荀子成相不在險也請更端以教先生曰海物惟錯嶲味崒焉任公垂餌便嬛揄竿波臣效異鱗萬介千寸鮚腹蟹亭以崎名漢律獻醬惟逺見珍漢地理志鄞有鮚崎亭注鮚音結蚌也長一寸廣二分有小蟹在腹中崎曲岸也其中多鮚故名説文漢律會稽郡獻鮚醬三斗郭璞江賦璅鮚腹蟹南越志璅鮚腹中有蟹子如榆莢合體共生蚶菜疲民君嚴奏免唐孔戣字君嚴明州嵗貢淡菜蚶蛤之屬戣以為自海抵京師道路役夫凡四十三萬人奏罷之貢才鰂骨元豐仁儉九域志明州土貢烏鰂魚骨五斤􅛈蚌蛤鰶鯸鰡鰒石首蜛齒赤尾比目繽品類之數百愈茂安之慘蹙車永茂安外甥石季甫見使為鄮令舉家慘蹙句章人説此縣有短狐之疾問陸雲以土地之宜雲答書曰鄮縣海物惟錯不可勝名斷遏海浦隔截曲隈隨潮進退采蚌捕魚鱣鮪赤尾蜛齒比目不可紀名鱠鰡鰒炙鰶鯸蒸石首臛􅛈真東海之俊味肴膳之至妙也及其蚌蛤之屬目所希見耳所不聞品類數百難可盡言當為喜慶勿為慮也亥市攸聚水族有簿兼韓子之南烹藹鱟蠔與章柱雖石華海月之詩綺貝繡螺之賦弗能殫舉東暆之鰅邪頭之鮸潘國之鯊且甌之蜃珠蟞紫􅎕居怯切其來如雨鱴鰜􅒹數以盆鼓於是擊鮮鼎食羞用膳經嘯父蝦鯗宣子魚餐陳登之鱠虞悰之鯖芼以秋菘酟以冬橙掇苔髮以為蔌醉螯杯而未醒若乃潤下作鹹散鹽為貴宿沙肇煮而海王之策祈望之守昉於齊而征利説文古者宿沙初作煮海鹽魯連子宿沙瞿子善煮鹽管子海王之國謹正鹽策王去聲晏子曰海之鹽蜃祈望守之煮讀為煮字漢郡設官三十有六會稽則海鹽居一此三縣猶未置也考諸唐志鄮始有鹽晏巽管𣙜法寖以嚴地理志鄮縣有鹽劉晏李巽海瀕稚耋弗能音耐苦淡若作和煮甘耆鹺鹼音減酌醴燔枯鱐鮑恣啖繇是亭監棊布牢盆嵗增負塗山積熬素雪凝翦竹􅓗以供煬釋耒耨而肆勤一帣三斛川浮陸馳帣俱便切説文囊也今鹽官三斛為一帣也行商通其儥音鬻巡院譏其私劉晏置巡院捕私鹽蓋日用飲食不可以無朝虀箬裏其功與醯醬俱馬齒水精氷鏤霜明魏太祖賜劉恭馬齒鹽七種後魏明元賜崔浩水精戎鹽古云食肴之將詎屑玉而嘰瓊東箭箈茁越竹筍萌楊氏之果染霞垂星鹽音艷為夏稿屏羶撤腥飫高裴之菜食奚猗氏之足云後魏高允厨中鹽菜而已裴俠食唯鹽菜栁子晉問猗氏之鹽晉之大寶也魚鹽之湊民殷財阜不謂之樂郊邪公子曰海加租而魚不出鹽顓利而人窮怨不聞蕭望之朱文李之言歟漢食貨志後漢朱暉傳吾冬饘夏麮丘舉切藜羮不糝味無味夫何慊願聞所以利民者先生曰先民有夏盡力溝洫魏之豹起西門豹史起漢之兒白兒寬白公疏泉灑流沕潏膏澤維鄮之邑厥壤鹵舄原高隰下易暵以溢相時鍾泄守宰逌職我懷休明循良輩出斡造化機卷舒神術有豐無窶潦霽惟一觀乎句章淢陂之舊內史修復所居民富晉孔愈為會稽內史句章縣有漢時舊陂毁廢數百年愈修復故堰溉田二百餘頃言觀乎南湖曰小江溉田置堰元緯氏王蘭鞠無絶如古桐鄉唐地理志鄮縣南二里有小江湖溉田八百頃開元中令王元緯置民立祠宇以祠之九域志它山堰王元緯置後封善政侯觀乎西南堰曰仲夏頃凡數千雨我多稼築者季友惠以厚下唐志鄮縣西南四十里有仲夏堰溉田數千頃太和六年刺史于季友築湖有廣德實在西界刺史曰侗增修勿壞夷庚起隄峋也建埭誰其填閼音淤利微害大發議請復志不克遂唐志鄮縣西十二里有廣德湖溉田四百頃貞元九年刺史任侗因故迹增修南豐先生記云湖大五十里漕渠東北入江大厯八年令儲仙舟更今名大中元年刺史李敬方刻石謂湖成三百年矣湖之興其在齊梁之際乎至道元年守丘崇元復之天禧二年李夷庚正湖界起隄十八里限之熙寧元年張峋築隄九千一百三十四丈為埭二十政和中塞為田高廟時李光泰發請復湖不克行唐有西湖爰在東郊陸令開廣農殖嘉苗唐志鄮縣東二十五里有西湖溉田五百頃天寶二年令陸南金開廣之湖姓以錢亦處東鄙受溪七十二環塘八十里四閘七􅋣重治者李明州東錢湖受七十二溪纍石為塘八十里天禧元年李夷庚重修中有四閘十􅋣溉田五十四萬畝􅋣即堰字滈滈清渠有蓴有苽有蒲菡萏煙海鴈鳧蓋自晉以來遏川水種既浸既潤民食無覂方勇切陸雲答車茂安書鄮縣西有大湖廣縱千頃遏長川以為陂燔茂草以為田火耕水種不煩人力決泄任意高下在心舉鍤成雲下鍤成雨既浸既潤隨時代序官無逋滯之穀民無飢乏之慮衣食常充倉庫常實介甫鳴弦乃隄乃陂瘠土衍沃遺黎之思聞見録王荆公知鄞縣起隄堰決陂塘為水陸之利也邑人便之公屬民浚渠川見鄞縣經遊記吏隨以窳棄稷弗務新溝之歌靡聞均水之約莫舉唐薛大鼎治新溝漢召信臣作均水約束甽澮塞而坼龜坊音防庸圮而涸鮒曩畝一鍾令食二釜孰能諗夫愛民者塗之人可以禹公子曰佐耕以水展也民利思不出位吾將有俟欲聞閎大傑特之觀無隱乎爾先生曰明多名山竺乾氏居之寶地金繩祖花禪枝南有雪竇東有太白飛瀑淙淙曽巒齾齾大梅之巉崿衣荷餐松之詠淡如也玉几之岝嶺神耀得道之銘炳如也吳市子真松風隱居陳迹故在是邪非歟大梅禪師詩一池荷葉衣無盡數樹松花食有餘東坡先生宸奎閣碑銘神耀得道非有師傳見八師子經大梅山或謂梅子真所隱南史陶𢎞景詣鄮縣阿育王塔受五大戒文正之詩大年希白之筆釋子之所夸詡存乎否乎范文正公送湛公歸四明講席詩滿面南風指四明山長水曲不勝情自言此去雲林下惟講華嚴報太平鄞有法智師名禮主天台教聚徒四百楊文公大年慕其道三以書留之住世錢希白碑其異於塔雖然著本論者惡其學幻而言哤意者辟世之士晞髮濯纓岑蔚林密魚潛龜藏思昔山人有徐廣孝經之指唐藝文志徐浩稱四明山人上廣孝經十卷王蔣顧三隱席珍韞璞不蘄流俗之知己容齋三筆載李孟傳所録三人王茂剛居林村巖壑深處刻意讀書尤邃於易慈溪蔣季莊當宣和間鄙荆舒之學不事科舉閉門窮經高抑崇率一嵗四五訪其廬顧主簿南渡後寓慈溪亷介安貧踐履雖細事不茍旦起俟賣菜者過門問菜把直幾何隨所言便酬之它布帛皆然久之人皆信服不忍欺之璜也自謂似龎藴僧騰客之該洽故老稱美李璜老於韋布有詩曰此身便是龎居士也更無人賣笊籬為文用僧騰客事或問為何事曰侯景臺城事也著白樂天年譜事見攻愧集今堪嵒之下豈無草耕木茹匪黃匪緇蟬蛻囂滓欲往從之耄且休矣子謂斯何公子曰姑舍是側聞是邦鴻生碩德所治教也南豐曾子江漢星斗之望牧於斯南豐先生曾子固名鞏守明州修州城程工賦裁省費十六忠肅陳公雪竹霜柏之操二於斯陳忠肅公瓘瑩中以越州簽判攝倅明州寓居城之湖西著四明尊堯集船司空則以道之朝倉庾氏則子約之吕正學參前修姱節映終古景迂先生朝説之以道以元符上書黨人監明州造船場易玄星紀譜作於甬江官舍舊有祠放翁作記大愚先生吕祖儉子約監明州苗米倉去倉中淫祠後為太府丞以直言謫死高安諡曰忠前代令有琯長史有吉甫未足數也唐房琯慈溪令李吉甫明州長史文獻濡染必有聞而知之者敬在下風先生曰明士鄉也有越大夫種之英風其人通達而多能呂氏春秋高誘注大夫文種字會鄞人有大里黃公之高標其人恬靜而自珍會稽典録虞翻仲翔對王朗景興曰鄞大里黃公潔已暴秦之世高祖即阼不能一致惠帝恭遜出則濟難輿地志云鄞有大里夏里黃公所居董子以孝行著愛親者式其儀刑典録虞仲翔曰孝子句章董黯盡心色養喪致其哀單身林野鳥獸歸懷怨親之辱白日報讎海內聞名昭然光著任奕以文章進摛藻者襲其芬馨典録朱育對濮陽興曰文章之士立言粲盛則御史中丞句章任奕文􅊾曄若春榮宏云光修四士尚義挹其徑操思特立以獨行典録虞仲翔曰主簿句章梁宏鄭云皆敦始終之義引罪免居鄮主簿任光身當白刃濟君於難揚州從事句章王修委身受命垂聲來世見吳志虞翻傳注故虞仲翔以俊異之生為海嶽之精典録仲翔曰會稽山有金木鳥獸之殷水有魚鹽珠蚌之饒海嶽精液善生俊異是以忠臣係踵孝子連閭陸士龍因吏民之謹知禮教之明士龍答車茂安書鄮縣榮辱既明禮節甚備為君甚簡為民亦易吏民恭謹篤慎敬愛官長鞭撲不施聲教風靡屯艱否閉堙曖湛冥宋以文治賢路恢𢎞丘樊緼褐化為紳纓邑校求師再書延致斯廣川之淵源也杜醇慶歷鄉先生王荆公宰鄞因孔子廟為學再書請醇為之師慈溪令林肇興學亦起醇為師順昌嬰孺以俞為字斯新息之慈仁也俞偉字仲寬宰南劍順昌劍人生子多者皆不舉仲寬作戒殺子文召父老使歸勸鄉人活者以千計生子者多以俞為小字也孝通神明凱風終養斯朱康叔之純誠也李宗質字文叔濮人文定公之裔所生母展氏罹靖康之亂母子相失至江州水南遇展氏於㕓中物色良是別十餘年而奉色養者二十餘年居鄞之石塘攻愧先生銘墓誠齋楊公為傳而贊之曰非至孝奚而通神明非通神明奚而得毋引裾強諌辛毗其直陳文介公禾政和初為正言抗疏言宦官上拂衣起禾褰挽上衣上為少留衣裾脫落上曰碎朕衣矣內侍請易衣上曰留之以旌直節鉤黨挂名范滂自出周鍔范忠宣公之甥陳忠肅公同年進士娶其女弟入元祐黨籍臨難盡節解揚之匹吳從龍奉化人李全之變提孤軍為前鋒馬中流矢為賊所擒賊使偽稱援絶紿泰州開城門從龍至城下大呼曰馬傷被執非降賊者揚州初不破泰州可死守賊怒刃交下罵賊不絶口以死詔立廟官其後石交嵗寒之死不渝信義如漢脂習李猷字嘉仲一字獻夫鄞人建炎初以婦翁沒王事自京師詣南都行在所見友人陳東少陽上書死猷為位而哭祭曰吾欲收葬少陽有知其啓我心越一日得尸又二日得首合而斂之會其鄉人胡中行欲求護喪併以行李付之猷終肇慶府節推高閌抑崇志其墓卻賈胡之賻持玉雪之亷父子如魏胡質王正已字正之慶厯鄉先生説之後父勳提舉廣南市舶一錢之利皆歸有司家人不識舶貨之名及卒賈胡率錢二百萬為賻正已固卻之曰吾父以亷直聞雖貧孤猶能負喪以歸不愧亷叔度也趙彥逾字德老帥蜀餽遺不入私家將去聚宗室在九縣者分餉之子䈣夫守袁州寶慶中真文忠公入朝上問有何亷吏以䈣夫對詔擢直祕閣與監司亦父子以亷著者之人也編典録而無愧令譽焯乎日星下逮里巷則有旌閭之楊掌庫之童若􅊵置中林之好德紹興間明州民楊慶以孝旌表門閭江休復雜志王介甫為鄞令訪義夫節婦得三人其一人可采曰童判子為人掌典庫其家養疏屬數口奉寡姊承順不違其甥不事家産屢負人債輒為償之不以告姊菌蕣一時之榮華荃茅萬世之淑慝彼鍾黃之竊據郡乘幾於曲筆唐紀中和元年鄮賊鍾季文陷明州景福元年明州刺史鍾季文卒其將黃晟自稱刺史郡志書季文不書其事書晟取其墓銘不書自稱刺史非春秋懲惡之義先生言未既公子起而稱曰鄭圃澤多賢衛多君子魯東海多卿相汝潁多奇士見列子左傳漢地理志晉周顗傳居使然也盍語其詳先生曰世族蟬嫣重圭纍組位槐調鼎宅揆惟五袞鉞焜耀乎宗翰衡樞舄奕乎該輔牙纛畫繡差肩踵武廢歷中王周始守鄉郡紫艾紛綸常伯亞旅庠聲序音洋洋鄒魯習鄉上齒長少有敘流品別渭涇公卿列韋布俎豆秩秩章縫楚楚汪大猷字仲嘉冬至元日集鄉士行禮大成殿下退序拜明倫堂推長者祭酒自齒韋布之列凡周之士亦世吾州之俗近古春秋二高之説詩禮曹鄭之詁高憲敏公閌字抑崇著春秋集傳高元之字端叔著春秋義宗曹粹中著詩解鄭鍔字剛中著周禮解義殊科首登於蓬萊紹興初立博學宏辭科王璧炳文首中選入館閣掄魁三冠於龍虎淳熙戊戌姚穎嘉泰壬戌傅行簡嘉定甲戌袁正肅甫名茅膴仕多桂竇桐韓之疊矩又有文章授訣孝弟彚聚迂齋樓先生昉字暘叔以古文訣授諸生俞觀能象山人著孝弟類鑒灊山清篇武子妙句朱翌字新仲以詩名為中書舍人有灊山集張良臣字武子有雪窗詩潛虛有辨杜集有注張漢慈溪人著辨虛見攻愧集卞圜字養直注少陵集家自以為舒向人自以為揚馬兹可以言文獻乎公子曰媺則媺矣然世祿非不朽科舉外有學願識其大者先生曰故國下車喬木蒼蒼理義雨露名節風霜古之遺直曰豐清敏排姦詆奄讜論廩廩託興荷花聞者斂袵豐清敏稷字相之為御史中丞入對蔡京於殿陛間揖稷曰今日必有高論稷正色答曰行自知之與殿中侍御史陳師錫共言京姦惡宦官寖盛稷懷唐書上殿為上讀仇士良傳方數行上曰已喻稷若不聞者讀畢乃止致身常伯纍鎮大藩資産才七十畝賦荷花詩有人心正畏暑水面獨搖風蔡京見之曰此人豈肯受我籠絡邪慶厯師儒燕及孫曽曰樓宣獻斯文統盟有德有言既和且清樓宣獻鑰字大防慶厯鄉先生郁之曽孫為給事中上疏留彭龜年而去性寬厚好賢樂善知貢舉以文獻之傳語真文忠公許以致逺泗沂絶學闡自關洛朱張吕子緒承先覺臨川二陸自得於心若異而同為已功深淳熙四儒探賾性淵並遊三先生之門獨契陸子之心傳舒文靖璘元質沈端憲煥叔晦楊文元公簡敬仲袁正獻公燮和袁甫廣微朱文公答項平甫書曰子思以來教人之法惟以尊德性道問學兩事為用力之要子靜所説專是尊德性事而某平日所論却是問學上多了所以為彼學者多持守可觀又言陸子靜楊敬仲有為已功夫若能窮理當甚有可觀處則講貫以淑艾仕則善教以昌言長庚曉月惟楊暨袁袁亦有子受業于楊進禮退義家學用光春木芚兮高山仰止人固亡而書存世未逺而道邇顔何人哉希之則是若昔魯廬江贊名德先賢沛三輔序耆舊節士後有作者孰謂知管晏而已隋經籍志漢光武始詔南陽撰作風俗故沛三輔有耆舊節士之序魯廬江有名德先賢之贊郡國之書由是而作公子肅然改容離席而拜曰廣哉觀乎井蛙甕蠛昭然開明乃知西河俗美以子夏北海風移由康成文藝抑末歸根六經滌源雍本敬義明誠鄉黨之化漢學是崇讀書尚友作聖之功闕里近只遵海而東從羣叟兮問塗貫今古兮心同河東為晉問濟北為錢塘七述余頗識鄉里故事欲擬相如久矣年六十始克為之視鼂子十六嵗之作汗顔滋甚筆力衰薾見聞單陋效矉不能奇也後十年篋中得舊藁不忍棄録而藏之山川不改風俗非昔祗以增懷古之一慨云浚儀深寧老人王伯厚父述延祐四明志卷一
